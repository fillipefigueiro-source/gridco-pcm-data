er, você deve:", "o": ["Aceitar o laudo, pois a câmera estava calibrada", "Aceitar apenas os pontos em 'Aceitação'", "Invalidar o ensaio e reprogramar: sem ≥70% de carga e irradiância >600 W/m² entre 10h e 14h, o resultado não é válido", "Pedir para refazer apenas as imagens que deram quentes"], "c": 2, "e": "tecnico", "tipo": "caso"}], "cos": [{"q": "Chegam ao mesmo tempo: um inversor offline, uma TCU parada e uma usina inteira desligada. O critério correto de triagem é:", "o": ["Ordem de chegada dos alarmes", "Começar pelo mais fácil de resolver para limpar a fila", "Priorizar pelo maior impacto/risco: tratar primeiro a usina desligada (P1) e classificar os demais em seguida", "Distribuir os três igualmente entre os operadores"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "Antes de executar um religamento remoto após atuação de proteção, o operador do COS deve:", "o": ["Religar imediatamente para reduzir a perda de geração", "Verificar no SCADA qual proteção atuou e avaliar a causa; religar sobre falha ativa é inseguro", "Aguardar 30 minutos e religar automaticamente", "Transferir a decisão ao cliente"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Uma passagem de turno correta no COS exige:", "o": ["Resumo verbal rápido entre operadores", "Encerrar todos os alarmes antes de sair, mesmo sem tratativa", "Registro documentado: ocorrências em andamento, alarmes pendentes e verificação dos sistemas (SCADA, telefonia, links)", "Apenas conferir e-mails do turno anterior"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "Sobre as plataformas de monitoramento do COS:", "o": ["O Fracttal mostra a geração em tempo real", "Prescinto/IBM acompanham geração e performance; o SunOp concentra status e SCADA", "O Painel PCM é a ferramenta de comando remoto dos inversores", "O SunOp serve apenas para relatórios mensais"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Um evento que ameaça a segurança de pessoas e bens na usina (ex.: princípio de incêndio, invasão) é classificado como:", "o": ["Risco Médio — programar equipe para o dia seguinte", "Risco Alto — apenas OS e acompanhamento", "Risco Crítico — abrir OS, notificar imediatamente e acionar as autoridades competentes", "Risco Baixo — registrar no log de turno"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "2h da manhã: a usina desarma por atuação 50/51. Você religa remotamente e ela desarma de novo em minutos. A melhor conduta é:", "o": ["Tentar religar mais algumas vezes com intervalos maiores", "Não insistir: falha ativa confirmada — registrar a ocorrência, acionar a equipe de campo/escala e comunicar conforme a matriz de escalada", "Bloquear o alarme até o amanhecer para não poluir a tela", "Reduzir o ajuste do relé remotamente e religar"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Um inversor aparece offline, mas o medidor de energia mostra a geração da usina normal e estável. A leitura correta é:", "o": ["Falha grave do inversor — acionar equipe de campo de madrugada", "Usina parcialmente parada — abrir P1", "Provável perda de comunicação (telemetria), não de geração: registrar, tratar o link e programar verificação, sem despacho emergencial", "Defeito do medidor — abrir chamado à concessionária"], "c": 2, "e": "tecnico", "tipo": "caso"}, {"q": "O cliente liga exigindo o religamento imediato da cabine que desarmou, 'porque cada hora parada custa caro', antes de qualquer inspeção. Você deve:", "o": ["Religar — o cliente é o dono do ativo e assume o risco", "Religar e registrar que foi ordem do cliente", "Manter o procedimento: explicar que religar sobre falha não diagnosticada põe pessoas e o ativo em risco, registrar e acionar a escalada (supervisão/KAM)", "Desligar o telefone e seguir a fila de alarmes"], "c": 2, "e": "cultura", "tipo": "caso"}, {"q": "Seu turno está acabando e há uma ocorrência crítica em tratativa, com equipe a caminho da usina. Você deve:", "o": ["Encerrar a ocorrência e deixar o próximo turno reabrir se precisar", "Sair no horário — o SCADA guarda tudo", "Registrar o log detalhado (estado, ações, pendências, contatos) e fazer a passagem de turno documentada, garantindo continuidade da tratativa", "Levar a tratativa para casa e acompanhar pelo celular"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "Vendaval na região: os trackers de uma usina vão a posição de stow e chegam alarmes de 'tracker fora de rastreamento'. A conduta correta é:", "o": ["Comandar o retorno imediato ao rastreamento para não perder geração", "Reconhecer que o stow por vento é proteção (não falha): monitorar o vento, registrar o evento e aguardar a normalização antes de retomar o backtracking", "Abrir P1 e despachar equipe para travar as mesas manualmente", "Desligar a NCU para silenciar os alarmes"], "c": 1, "e": "tecnico", "tipo": "caso"}], "pcm": [{"q": "Sobre SS e OS na Grid, a regra é:", "o": ["Toda demanda vira OS automaticamente, sem triagem", "Quando é preciso ir a campo, abre-se uma SS e o PCM a transforma em OS; sem ida a campo, a área abre a OS direto", "SS e OS são sinônimos no Fracttal", "Só o COS pode abrir SS"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Aderência, no controle do PCM, mede:", "o": ["O tempo médio de reparo das corretivas", "O percentual de OS fechadas sem retrabalho", "O planejado vs. executado da programação", "A disponibilidade contratual da usina"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "Os três instrumentos centrais do planejamento do PCM são:", "o": ["Plano de 52 semanas, programação semanal e controle de backlog", "RMO, boletim diário e curva I×V", "APR, PT e LOTO", "Prescinto, SunOp e Mapa de Equipes"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "Sobre MTBF e MTTR, é correto afirmar:", "o": ["MTBF menor é melhor; MTTR maior é melhor", "MTBF é o tempo médio entre falhas (quanto maior, melhor); MTTR é o tempo médio de reparo (quanto menor, melhor)", "Ambos medem a mesma coisa em unidades diferentes", "MTTR inclui o tempo de geração perdida por soiling"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "No fluxo de garantias e materiais, cabe ao PCM:", "o": ["Comprar sobressalentes e calibrar instrumentos", "Trocar o equipamento em garantia para não perder SLA", "Conduzir os chamados de garantia via Controller e a gestão das MPAs; sobressalentes e calibração ficam com o Asset Management", "Negociar penalidades de contrato com o cliente"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "A semana explodiu em corretivas P1 e a equipe do cluster não dará conta da programação. Como PCM, a melhor conduta é:", "o": ["Cancelar as preventivas do mês para abrir espaço", "Manter a programação e deixar as P1 para a semana seguinte", "Reprogramar as preventivas de menor criticidade preservando os SLAs das corretivas, registrando o motivo da reprogramação e o novo prazo", "Pedir que o campo execute tudo com horas extras não planejadas"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "Uma OS de troca de inversor foi fechada no Fracttal sem o nº de série nem a posição do equipamento novo. Você deve:", "o": ["Aceitar — o importante é que a usina voltou a gerar", "Completar você mesmo com dados estimados", "Devolver/reabrir a OS para o campo registrar nº de série e posição: sem dado confiável, histórico, garantia e indicadores ficam comprometidos", "Anotar em uma planilha paralela do cluster"], "c": 2, "e": "cultura", "tipo": "caso"}, {"q": "A MPS de uma usina distante vence este mês e a previsão indica uma janela de baixa irradiância na próxima semana. O melhor planejamento é:", "o": ["Esperar o fim do mês para decidir", "Programar a MPS na janela de baixa geração, agrupando outras OS do mesmo cluster para otimizar o deslocamento da equipe volante", "Executar a MPS em pleno pico de geração, pois o prazo manda", "Transferir a MPS para o plano do ano seguinte"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "O backlog de um cluster cresce há 2 meses, puxado por corretivas repetidas de TCU. Como PCM, além de programar as OS, você deve:", "o": ["Aumentar a meta de OS/dia da equipe", "Escalar o caso à Engenharia (N2) com histórico e indicadores para RCA — recorrência pede tratamento de causa-raiz, não só mais corretivas", "Excluir as OS antigas para limpar o indicador", "Reclassificar as corretivas como preventivas"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Uma MPA exige desligamento da cabine MT de um cliente sensível a indisponibilidade. O planejamento correto inclui:", "o": ["Executar sem avisar, em um domingo, para ninguém perceber", "Negociar janela de desligamento com COS/KAM/cliente, garantir PT específica e equipe habilitada NR10-SEP, e comunicar início/fim da manobra", "Fazer a MPA com a cabine energizada para não parar a usina", "Dispensar o ATR para reduzir o tempo de manobra"], "c": 1, "e": "processos", "tipo": "caso"}], "kam": [{"q": "O RMO (Relatório Mensal de Operação) é:", "o": ["Um log interno do COS, sem envolvimento do cliente", "O relatório mensal com indicadores da operação (PR, disponibilidade, SLA, ocorrências), produzido com a Performance e apresentado pelo KAM ao cliente", "O relatório de manobras da cabine MT", "Um formulário de abertura de SS"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Quando contrato e tabela interna divergem sobre prazos de atendimento, a regra de priorização é:", "o": ["Vale sempre a tabela interna da Grid", "Vale o prazo mais folgado, para proteger a equipe", "Prioriza-se pelo prazo mais restritivo previsto no contrato do cliente", "O KAM define caso a caso, sem registro"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "O PR (Performance Ratio) que o KAM apresenta ao cliente representa:", "o": ["A % do tempo em que a usina esteve apta a gerar", "A relação entre a energia gerada e a esperada para o recurso solar medido no período", "A potência de pico instalada (MWp)", "O tempo médio entre falhas do portfólio"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Aditivos contratuais (novos escopos, mudanças de condição) devem ser conduzidos:", "o": ["Pelo líder de campo, que conhece o serviço", "Diretamente pelo cliente no Fracttal", "Pelo KAM, em conjunto com Comercial e Jurídico", "Pela Engenharia, via RCA"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "Disponibilidade e PR podem contar histórias diferentes. Uma usina pode ter disponibilidade alta e PR baixo quando:", "o": ["Está desligada há semanas", "Está apta a gerar, mas com perdas como soiling, degradação, mismatch ou sensores/trackers desajustados reduzindo a geração", "O contrato não define SLA", "O MTTR está baixo demais"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Na reunião mensal, o cliente questiona a queda do PR. Você sabe que houve seca prolongada e soiling elevado. A melhor conduta é:", "o": ["Prometer que o PR volta ao normal no próximo mês, sem detalhar", "Culpar a equipe de campo pela limpeza atrasada", "Apresentar a decomposição das perdas com dados (soiling, tickets de performance) e o plano de ação (ex.: higienização com gatilho de PR), com prazos", "Sugerir mudar a fórmula do PR para o número melhorar"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "O cliente pede, 'como cortesia', um serviço claramente fora do escopo contratado (ex.: obra civil no terreno). Você deve:", "o": ["Aceitar para preservar o relacionamento", "Encaminhar ao campo como OS corretiva comum", "Registrar a demanda e tratá-la como aditivo, alinhando com Comercial/Jurídico antes de assumir qualquer compromisso", "Recusar por e-mail sem propor caminho"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "Uma corretiva P1 se aproxima do estouro do SLA contratual, com risco de penalidade. Como KAM, você deve:", "o": ["Esperar o fechamento da OS para ver se estoura", "Pedir ao PCM para alterar a data de abertura da OS", "Escalar internamente (Coordenação/COS/PCM) para destravar o atendimento e comunicar o cliente proativamente com status e previsão", "Reclassificar a OS para P3"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "O cliente pressiona pelo religamento imediato de uma cabine que desarmou, dispensando a inspeção 'para não perder geração'. Sua postura como dono do contrato é:", "o": ["Autorizar, transferindo o risco ao cliente por e-mail", "Sustentar o procedimento: religamento seguro só após diagnóstico — segurança é inegociável — e explicar ao cliente o risco de religar sobre falha ativa", "Pedir ao COS que religue fora do horário comercial", "Negociar um religamento parcial sem diagnóstico"], "c": 1, "e": "cultura", "tipo": "caso"}, {"q": "Ao revisar o RMO antes do envio, você nota disponibilidade de 100% num mês em que houve uma parada de 2 dias. Você deve:", "o": ["Enviar assim mesmo — o número favorece a Grid", "Corrigir manualmente para um valor 'razoável'", "Segurar o envio e validar o dado com a Performance: relatório ao cliente só sai com dado confiável e rastreável", "Remover o indicador do relatório deste mês"], "c": 2, "e": "cultura", "tipo": "caso"}], "performance": [{"q": "O cálculo do PR de uma usina usa como referência de recurso solar:", "o": ["A média histórica de geração da própria usina", "A irradiância no plano dos módulos (POA) medida pela estação solarimétrica", "A GHI de um site meteorológico público", "A potência nominal dos inversores"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "São perdas tipicamente acompanhadas na análise de performance:", "o": ["Soiling, sombreamento, degradação, indisponibilidade e clipping", "APR, PT e LOTO", "MTBF, MTTR e backlog", "TAP, TTR e resistência de contato"], "c": 0, "e": "tecnico", "tipo": "conceito"}, {"q": "Sobre mecanismos de degradação de módulos, é correto afirmar:", "o": ["PID e LID são o mesmo fenômeno com nomes diferentes", "O PID decorre de potencial elétrico entre células e moldura/terra e pode ser mitigado (ex.: aterramento funcional/reversão); LID/LeTID são degradações induzidas por luz (e temperatura) ligadas ao material da célula", "LeTID só ocorre em módulos de filme fino", "PID melhora o desempenho em climas úmidos"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Um piranômetro sujo ou descalibrado na estação solarimétrica tende a:", "o": ["Não afetar o PR, que usa apenas a energia gerada", "Subestimar a irradiância medida e inflar artificialmente o PR calculado", "Aumentar o soiling real dos módulos", "Desligar o datalogger por segurança"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "O gatilho para recomendar higienização (limpeza) dos módulos é:", "o": ["Sempre a cada 30 dias, independentemente do dado", "Queda de PR >10% ou índice de sujidade elevado — a limpeza pode recuperar até cerca de 10% de PR", "Qualquer ΔT positivo na termografia", "Disponibilidade abaixo de 95%"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "O PR de uma usina caiu 6%, mas as usinas vizinhas do mesmo cluster mantiveram PR estável e a irradiância reportada pela estação destoa das vizinhas. Sua primeira hipótese deve ser:", "o": ["Degradação acelerada dos módulos", "Problema no sensor (piranômetro sujo/descalibrado/sombreado) distorcendo o cálculo — validar a qualidade do dado antes de acusar a usina", "Furto de módulos", "Clipping dos inversores"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Várias strings de um mesmo inversor apresentam queda progressiva de corrente, mais acentuada nas strings próximas ao polo negativo, sem sujeira aparente. A conduta correta é:", "o": ["Abrir chamado de limpeza para o campo", "Suspeitar de PID: consolidar as evidências (curvas, comparativos por posição elétrica) e escalar à Engenharia para confirmação (ex.: curva I×V, eletroluminescência) e plano de mitigação", "Trocar os fusíveis das strings afetadas", "Reduzir o MPPT do inversor para estabilizar"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Ao meio-dia, a potência de uma usina fica 'achatada' exatamente no limite nominal dos inversores, e a geração diária segue próxima do esperado. Você deve:", "o": ["Abrir ticket de falha de inversor por limitação de potência", "Reconhecer clipping (sobredimensionamento CC/CA): comportamento esperado de projeto — registrar a perda na categoria correta, sem chamado de falha", "Pedir ao COS para religar os inversores", "Classificar como indisponibilidade parcial"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Você confirma um desvio persistente de geração em um inversor (string fora). O encaminhamento correto é:", "o": ["Enviar mensagem avulsa ao técnico do cluster", "Abrir ticket/chamado de performance direcionado, com o diagnóstico (usina, inversor, string, perda estimada), para virar OS via PCM e ser rastreável até a recuperação", "Aguardar o RMO para relatar ao cliente", "Corrigir o esperado para 'zerar' o desvio"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Faltam dados de telemetria em 5 dias do mês por falha de link, e o RMO precisa ser emitido. A conduta correta é:", "o": ["Interpolar os dados e apresentar como medidos", "Excluir os 5 dias e não mencionar", "Sinalizar o gap de dados no relatório, explicitar o método de estimativa usado e a incerteza — dado confiável vale mais que número bonito", "Adiar o RMO indefinidamente"], "c": 2, "e": "cultura", "tipo": "caso"}], "conhecimento": [{"q": "Na Grid, as Ordens de Serviço (OS) vivem e são gerenciadas:", "o": ["Em planilhas de cada cluster", "No Fracttal — da criação ao fechamento, com evidências e leituras", "No e-mail do supervisor", "No Painel de Performance"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "A pasta '16. Procedimentos Operacionais' reúne:", "o": ["Apenas contratos e propostas comerciais", "Fluxos Internos, POPs (procedimentos operacionais padrão) e POP Flash (versão rápida e visual), além do atalho 'Criar OS - Fracttal'", "Somente relatórios mensais dos clientes", "Os backups do SCADA"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "A diferença entre POP e POP Flash é:", "o": ["O POP Flash substitui o POP e tem validade maior", "O POP é o passo a passo completo da atividade; o POP Flash é o resumo de bolso, visual, para consulta rápida em campo", "O POP é do COS e o POP Flash é do PCM", "Não há diferença, são cópias"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "No Painel PCM você acompanha:", "o": ["A curva I×V das strings", "Programação semanal, OS por status, religamentos, preventivas (MPM/MPS/MPA) e SS pendentes com sugestão do PCM", "Somente a geração em tempo real", "Os holerites da equipe"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "No ciclo de vida de uma OS, os papéis são:", "o": ["O campo abre, programa, executa e aprova sozinho", "COS, Performance, Engenharia e Líderes abrem SS/OS; o PCM programa; o campo executa; o líder de campo aprova no fechamento", "O cliente abre e fecha todas as OS", "O KAM programa a semana e o COS executa"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Um técnico novo do seu cluster pergunta 'como se faz a termografia da MPS'. A orientação correta é:", "o": ["Explicar de memória, cada um faz do seu jeito", "Procurar o POP da atividade na pasta 16. Procedimentos Operacionais (e levar o POP Flash para consulta em campo), sempre na versão vigente", "Pesquisar um vídeo na internet", "Perguntar ao cliente como ele prefere"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Você identificou uma anomalia que exige ida de equipe a campo. O caminho correto para a execução é:", "o": ["Mandar mensagem no grupo do WhatsApp do cluster", "Abrir uma SS para o PCM transformar em OS e programar — toda execução de campo acontece por OS", "Ligar direto para o técnico mais próximo", "Esperar a próxima preventiva para incluir o serviço"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Você precisa saber quem é o supervisor responsável por um cluster e o contato do líder de uma área. Onde encontrar?", "o": ["No Fracttal, na aba de ativos", "No organograma da intranet (intranet.gridco.com.br); o supervisor do seu cluster é o primeiro contato para dúvidas e prioridades", "No Painel PCM", "No datalogger da estação solarimétrica"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Uma OS de campo nasceu de um ticket de Performance (string fora). Ao concluir o reparo, o fechamento ideal da OS deve:", "o": ["Dizer apenas 'resolvido' para ganhar tempo", "Ser feito pelo COS, que abriu o ticket", "Registrar com capricho o que foi encontrado e feito, com fotos e leituras — é isso que permite à Performance confirmar a recuperação da geração", "Ficar aberta até o próximo RMO"], "c": 2, "e": "cultura", "tipo": "caso"}, {"q": "Você quer conferir se uma usina teve religamentos nesta semana e o status das preventivas programadas. A ferramenta certa é:", "o": ["O Painel PCM (fillipefigueiro-source.github.io/gridco-pcm-data, link na intranet), que mostra programação, religamentos e preventivas", "O megôhmetro", "O e-mail do COS", "O Painel de Performance, que mostra apenas tickets"], "c": 0, "e": "processos", "tipo": "caso"}]},"recrut":{"externo":{"nome":"Prova de Recrutamento — Técnico (Externo)","desc":"Filtro de conhecimento técnico básico de candidatos","corte":0.6,"q":[{"q":"O inversor solar:","o":["Converte CC em CA","Move trackers","Mede vento"],"c":0,"e":"tecnico"},{"q":"O que é uma string?","o":["Conjunto de módulos em série","Um tipo de fusível","Um inversor"],"c":0,"e":"tecnico"},{"q":"NR de trabalho em altura:","o":["NR35","NR10","NR12"],"c":0,"e":"cultura"},{"q":"Antes de intervir em circuito elétrico:","o":["APR/PT e desenergizar (LOTO)","Mexer direto","Só EPI de mão"],"c":0,"e":"cultura"},{"q":"O que protege uma string contra sobrecorrente?","o":["Fusível","Anemômetro","Datalogger"],"c":0,"e":"tecnico"},{"q":"GHI é a irradiância no plano:","o":["Horizontal","Inclinado","Vertical"],"c":0,"e":"tecnico"},{"q":"Soiling é:","o":["Sujeira nos módulos","Falha de rede","Clipping"],"c":0,"e":"tecnico"},{"q":"Multímetro mede:","o":["Tensão/corrente/resistência","Irradiância","Vento"],"c":0,"e":"tecnico"},{"q":"Em MT, trabalhar sozinho:","o":["Nunca","Pode com pressa","À noite"],"c":0,"e":"cultura"},{"q":"Termografia detecta:","o":["Pontos quentes","Vento","Soiling diretamente"],"c":0,"e":"tecnico"},{"q":"O que é um tracker?","o":["Estrutura que segue o sol","Um inversor","Um relé"],"c":0,"e":"tecnico"},{"q":"DPS protege contra:","o":["Surtos atmosféricos","Sujeira","Falta de sol"],"c":0,"e":"tecnico"},{"q":"Aterramento serve para:","o":["Segurança/escoar falta","Gerar energia","Nada"],"c":0,"e":"tecnico"},{"q":"EPI é:","o":["Equipamento de Proteção Individual","Um inversor","Uma NR"],"c":0,"e":"cultura"},{"q":"Uma usina FV injeta energia na:","o":["Rede elétrica","Bateria do carro","Atmosfera"],"c":0,"e":"tecnico"}]},"interno":{"nome":"Prova de Recrutamento Interno — Avançada","desc":"Promoção/realocação: técnico + processos","corte":0.7,"q":[{"q":"POA/IPOA é a irradiância:","o":["No plano do módulo (a que gera)","Horizontal","Difusa"],"c":0,"e":"tecnico"},{"q":"DNI é medida por:","o":["Pireliômetro (rastreador)","Piranômetro horizontal","Anemômetro"],"c":0,"e":"tecnico"},{"q":"Relés 50/51 são de:","o":["Sobrecorrente","Irradiância","Temperatura"],"c":0,"e":"tecnico"},{"q":"DGA (gases no óleo) elevada indica:","o":["Possível falha interna do trafo","Trafo novo","Soiling"],"c":0,"e":"tecnico"},{"q":"SLA de P1/P2/P3:","o":["4h/24h/5d.u.","1h/2h/3h","Sem prazo"],"c":0,"e":"processos"},{"q":"Quem cria a OS a partir da SS:","o":["PCM","Técnico","Cliente"],"c":0,"e":"processos"},{"q":"Quando escalar para Engenharia (N2):","o":["Recorrência (≥2x/30d)/sem causa","Sempre","Nunca"],"c":0,"e":"processos"},{"q":"Equipamento em garantia com defeito:","o":["Chamado ao fabricante","Trocar sozinho","Descartar"],"c":0,"e":"processos"},{"q":"PR caiu sem queda de disponibilidade:","o":["Perdas (soiling/sombra/sensor)","Indisponibilidade","Mais sol"],"c":0,"e":"tecnico"},{"q":"Antes de ensaio em MT:","o":["LOTO, aterramento temporário e PT","Só avisar","Nada"],"c":0,"e":"cultura"},{"q":"Reaperto de torque correto:","o":["Torquímetro calibrado conforme spec","No olho","Aleatório"],"c":0,"e":"tecnico"},{"q":"Falso alarme recorrente no COS:","o":["Tratar causa (config/dado)","Religar sempre","Ignorar"],"c":0,"e":"processos"},{"q":"Termografia ideal é com a usina:","o":["Em carga/geração","Desligada","À noite"],"c":0,"e":"tecnico"},{"q":"Matriz de escalada define:","o":["Quem/quando acionar","Preço","EPI"],"c":0,"e":"processos"},{"q":"MTBF maior significa:","o":["Mais confiável","Menos confiável","Nada"],"c":0,"e":"processos"},{"q":"Resistência de isolação baixa num cabo MT:","o":["Reprovar e investigar","Aprovar","Energizar"],"c":0,"e":"tecnico"},{"q":"Aderência (PCM) mede:","o":["Planejado vs. executado","Irradiância","Vento"],"c":0,"e":"processos"},{"q":"Clipping é:","o":["Limitação do inversor no pico","Sujeira","Vento"],"c":0,"e":"tecnico"}]}},"books":{"campo": {"titulo": "Book do Conhecimento — Equipe de Campo", "desc": "A teoria essencial de O&M solar para técnicos, eletricistas e mantenedores da Grid Co. Estude aqui; a avaliação cobra aplicação.", "capitulos": [{"t": "O papel do campo no O&M", "h": "<p>O <b>O&amp;M</b> (Operação e Manutenção) existe para manter a usina gerando com segurança e disponibilidade. A <b>equipe de campo</b> é a mão que executa: rondas, preventivas, corretivas e verificações — sempre por <b>Ordem de Serviço (OS)</b>.</p><p>Três tipos de manutenção convivem: <b>preditiva</b> (antecipa a falha por inspeção/termografia), <b>preventiva</b> (planejada, em intervalos definidos) e <b>corretiva</b> (após a falha). Uma OS bem executada e bem registrada vira dado confiável para os indicadores.</p>"}, {"t": "Segurança é inegociável (LOTO, APR/PT, EPI)", "h": "<p>Nenhuma tarefa é urgente ao ponto de dispensar segurança. Antes de qualquer intervenção:</p><ul><li><b>APR</b> — Análise Preliminar de Risco da atividade; se aparecer risco não previsto, pare e reavalie.</li><li><b>PT</b> — Permissão de Trabalho para tarefas elétricas/energizadas.</li><li><b>LOTO</b> — bloqueio e etiquetagem: desenergize, bloqueie e <b>confirme o isolamento</b> antes de tocar. Só reenergize ao fim, de forma controlada.</li><li><b>EPI</b> completo; atenção a arco elétrico e choque (NR-10) e trabalho em altura (NR-35).</li></ul><p>Regra de ouro: <b>nunca energize sem confirmar que está isolado</b> e sem a equipe ciente.</p>"}, {"t": "Como uma usina FV funciona", "h": "<p>A luz gera corrente contínua (CC) nos <b>módulos</b> → agrupados em <b>strings</b> → <b>string box</b> (fusíveis/DPS) → <b>inversor</b> (converte CC em CA) → <b>transformador</b> → rede da concessionária. O <b>tracker</b> (rastreador) inclina os módulos seguindo o sol. O <b>SCADA</b> monitora tudo em tempo real e é a base do COS.</p>"}, {"t": "Módulos: falhas e o que observar", "h": "<p>Os módulos são robustos, mas degradam e falham. Saiba reconhecer:</p><ul><li><b>Soiling (sujeira)</b>: poeira/dejetos reduzem a geração — perda gradual, pior em época seca.</li><li><b>Hot spot (ponto quente)</b>: célula sombreada/danificada ou diodo bypass com defeito esquenta um ponto — visível na termografia.</li><li><b>Microfissuras</b>: trincas nas células (transporte/instalação) reduzem potência.</li><li><b>PID</b> (degradação por potencial) e <b>LID/LeTID</b> (degradação por luz/temperatura): perdas ao longo do tempo.</li><li><b>Delaminação/amarelamento</b> do encapsulante.</li></ul><p>Ferramentas: <b>inspeção visual</b> + <b>termografia</b> (identifica pontos quentes em conexões e células).</p><div style='background:#f4f7fb;border-radius:10px;padding:10px 12px;margin:10px 0'><b>🎬 O vídeo acima</b> (MC Elétrica) explica por que uma célula sombreada ou trincada vira <b>hot spot</b>. <b>Na Grid Co.</b>, o hot spot é o achado clássico da <b>termografia com drone</b>: classificamos o risco pela <b>Tabela de Resposta a Falhas</b> e abrimos a <b>OS priorizada</b> por perda de geração e segurança.</div><p style='margin-top:12px'><b>Mais vídeo-aulas — assista e conecte com a operação:</b></p><h4 style='margin:14px 0 2px'>▸ Efeito PID (Prof. Marcelo Villalva)</h4><iframe src='https://www.youtube.com/embed/6hSIvPyavyg' style='width:100%;aspect-ratio:16/9;border:0;border-radius:12px;margin:6px 0 2px' allowfullscreen loading='lazy'></iframe><p style='font-size:13px;color:#556'><b>Conexão Grid:</b> o PID aparece como queda de geração no string. Detectamos cedo cruzando a <b>curva de geração (Painel Performance)</b> com a termografia — nos estágios iniciais é reversível.</p><h4 style='margin:14px 0 2px'>▸ Perdas por LID e PID ao longo do tempo</h4><iframe src='https://www.youtube.com/embed/UDa8z0vumzg' style='width:100%;aspect-ratio:16/9;border:0;border-radius:12px;margin:6px 0 2px' allowfullscreen loading='lazy'></iframe><p style='font-size:13px;color:#556'><b>Conexão Grid:</b> perdas lentas só aparecem comparando <b>geração esperada × real</b>. É o papel do acompanhamento mensal de performance, que dispara investigação quando o desvio persiste.</p><h4 style='margin:14px 0 2px'>▸ Microfissuras e módulos trincados (segurança)</h4><iframe src='https://www.youtube.com/embed/Xi3O4PFB1ik' style='width:100%;aspect-ratio:16/9;border:0;border-radius:12px;margin:6px 0 2px' allowfullscreen loading='lazy'></iframe><p style='font-size:13px;color:#556'><b>Conexão Grid:</b> módulo trincado gera <b>risco elétrico</b> e vira ponto quente. Nunca pisar ou apoiar carga sobre o módulo; ao encontrar, registrar em OS e isolar conforme o risco.</p><h4 style='margin:14px 0 2px'>▸ Inspeção termográfica na prática</h4><iframe src='https://www.youtube.com/embed/mPEgrUuiSzg' style='width:100%;aspect-ratio:16/9;border:0;border-radius:12px;margin:6px 0 2px' allowfullscreen loading='lazy'></iframe><p style='font-size:13px;color:#556'><b>Conexão Grid:</b> é assim que a <b>inspeção com drone</b> enxerga as falhas acima. O laudo termográfico alimenta o plano de correções, priorizado por risco e impacto na geração.</p>", "video": "https://www.youtube.com/embed/tWcQFBKmpII"}, {"t": "Sujeira (soiling) e limpeza", "h": "<p>A sujeira acumulada derruba a geração. Por contrato, a <b>limpeza dos módulos</b> e a <b>roçagem</b> são <b>semestrais</b>; atividades extras exigem consulta comercial. A decisão de limpar fora do plano se baseia na <b>perda de geração</b> observada versus o custo/risco da atividade. Remova também objetos que gerem <b>sombreamento</b> (galhos, sujeira, ninhos).</p>"}, {"t": "Inversores: inspeção e falhas comuns", "h": "<p>Inspeção: verificar <b>vedações, poeira e ventilação</b>; abrir compartimentos <b>com LOTO</b>; inspecionar terminais/barramentos por superaquecimento ou corrosão; <b>reaperto com torquímetro</b>; <b>termografia sob carga</b>.</p><p>Falhas típicas e primeira ação:</p><ul><li><b>Falha de aterramento</b>: checar com detecção de resistência de isolamento CC.</li><li><b>Erro de polaridade</b>: desligar e corrigir os cabos.</li><li><b>Sobre/subtensão</b>: verificar tensão dos módulos e a qualidade da rede.</li><li><b>Falha de comunicação</b>: checar cabos (RS485/Ethernet), configurações e <b>reiniciar</b> o dispositivo.</li><li><b>Superaquecimento</b>: garantir ventilação e <b>limpar filtros de ar e ventoinhas</b>.</li></ul>"}, {"t": "Proteções e aterramento", "h": "<p>Antes de energizar, verifique o sistema de proteção: <b>aterramento das massas metálicas</b>, <b>para-raios/DPS</b>, <b>disjuntores</b>, <b>fusíveis</b>, relés e <b>intertravamentos mecânicos</b>. Faça a <b>medição da resistência de aterramento</b> nas preventivas. Proteção reprovada = não energize.</p>"}, {"t": "Tracker (rastreador)", "h": "<p>O tracker segue o sol para maximizar a geração. Inspecione: <b>estrutura e ancoragem</b>, <b>verticalidade do mastro</b>, <b>cabos e atuadores</b>, sensores e conexões. Ajustes de posição (ex.: modo de proteção contra vento) são validados pelo <b>COS</b> conforme as condições ambientais.</p>"}, {"t": "Níveis de manutenção (Rondas + Nível 1–4)", "h": "<p>O plano preventivo é organizado em níveis (ver Manual O&amp;M, coluna REF):</p><ul><li><b>Rondas periódicas</b> (equipe operacional): inspeção geral, cabos/terminais, sinalização de alarmes, ambiente físico.</li><li><b>Nível 1–4</b> (equipe de manutenção): tensões nos bornes, aterramento, <b>termografia</b>, reaperto, limpeza de painéis, verificação de estrutura/proteções.</li></ul><p>A <b>periodicidade</b> define a sigla: <b>MPM</b> (mensal), <b>MPT</b> (trimestral), <b>MPS</b> (semestral) e <b>MPA</b> (anual). Cada item de checklist tem uma REF que aparece na OS.</p>"}, {"t": "Corretiva e resposta a falhas (criticidade)", "h": "<p>A <b>Tabela de Resposta a Falhas</b> classifica o incidente pelo impacto na geração:</p><ul><li><b>Risco Baixo</b>: sem perda de geração → ação programada, criação de OS e relatório.</li><li><b>Risco Médio</b>: perda de comunicação parcial ou perda de geração até <b>30%</b> → OS, <b>notificação imediata</b> ao contratante, acionamento remoto e equipe de campo.</li><li><b>Risco Alto</b>: perda de comunicação ou perda de geração <b>&gt; 30%</b> → tudo do Médio + acionamento das autoridades quando aplicável.</li><li><b>Risco Crítico</b>: ameaça à segurança de bens e pessoas → OS, notificação e <b>acionamento das autoridades competentes</b>.</li></ul><p>Numa usina desligada, a <b>primeira tentativa</b> costuma ser o <b>religamento remoto pelo COS</b> antes de mobilizar a equipe.</p>"}, {"t": "Indicadores (KPIs)", "h": "<p>O que a Grid mede e por que o campo importa:</p><ul><li><b>Disponibilidade</b> = tempo de operação realizado ÷ tempo de operação planejado.</li><li><b>MTBF</b> — tempo médio entre falhas (confiabilidade).</li><li><b>MTTR</b> — tempo médio de reparo (agilidade da corretiva).</li><li><b>Performance Ratio</b> e geração real vs simulada no <b>PVSyst</b> (P50/P90/P95).</li></ul><p>Registrar na OS o <b>início e o fim</b> da falha é o que torna MTTR e disponibilidade corretos.</p>"}, {"t": "A OS e o registro", "h": "<p>Toda execução de campo é por <b>OS</b>. Preencha ativo, tipo e descrição com clareza, anexe <b>registros fotográficos</b> e informe início/fim. O <b>líder de campo aprova no fechamento</b>. OS bem preenchida = rastreabilidade e indicador confiável.</p>"}]}, "lider": {"titulo": "Book do Conhecimento — Líder de Campo", "desc": "Liderança técnica no cluster: segurança, qualidade das OS, priorização e escalonamento.", "capitulos": [{"t": "O papel do líder no cluster", "h": "<p>O líder é o <b>ponto técnico do cluster</b>: verifica a execução, valida a qualidade das OS, conduz <b>DDS, APR e PT</b> e conecta a equipe volante ao Coordenador de O&M, ao PCM e ao COS.</p><ul><li>Você é o guardião das <b>regras de ouro</b>: LOTO, distâncias de MT, nunca sozinho em MT, EPI sempre.</li><li>Pressão de rota <b>nunca</b> justifica pular APR/PT — quem autoriza o atalho assina o risco.</li><li>Seu exemplo define o padrão da equipe: o que você tolera, vira norma.</li></ul>"}, {"t": "Validação e qualidade: o filtro final", "h": "<p>Você aprova o fechamento das OS. Antes de aprovar, confira:</p><ul><li><b>Evidências completas:</b> fotos antes/depois, leituras, nº de série/posição em trocas.</li><li><b>Reparo correto e normalização confirmada</b> (equipamento gerando, alarme limpo).</li><li>Classificação e descrição que sustentem histórico e garantia.</li></ul><p>OS incompleta → <b>devolver para complementação</b>, não aprovar 'para ajudar'. Seu indicador-chave é o <b>retrabalho (OS reabertas)</b>: ele mede a qualidade da sua validação.</p>"}, {"t": "Priorizar e escalar sem errar", "h": "<ul><li><b>SLA por criticidade:</b> P1 = 4 h · P2 = 24 h · P3 = 5 dias úteis. Surgiu P1, a preventiva P3 reprograma com o PCM (registrando o motivo).</li><li><b>N1 (campo):</b> reset, fusível em estoque, limpeza, reconexão. <b>N2 (Engenharia):</b> falha recorrente (≥2x/30 dias) ou causa não identificada — leve histórico e evidências para o RCA (5 Porquês). <b>N3:</b> projeto/retrofit.</li><li>'Reset resolve' três vezes seguidas não é solução — é sintoma. Escale.</li><li>Valide também as <b>condições de ensaio</b>: termografia fora de carga/irradiância mínima é laudo inválido — refazer.</li></ul>"}, {"t": "Rituais que sustentam o cluster", "h": "<ul><li><b>DDS diário</b> curto e real (riscos do dia, não leitura burocrática).</li><li><b>Alinhamento com o PCM:</b> programação da semana, reprogramações justificadas, backlog do cluster.</li><li><b>Comunicação com o COS:</b> chegada/saída de usina, início/fim de manobra, normalização confirmada.</li><li><b>Desenvolvimento da equipe:</b> aptidões MPM/MPS/MPA em dia (aprovação ≥80% nas certificações do Academy) e reciclagem de quem ficou abaixo.</li></ul>"}]}, "cos": {"titulo": "Book do Conhecimento — COS", "desc": "Operação 24/7: monitorar, triar alarmes, religar com segurança, acionar e registrar.", "capitulos": [{"t": "O turno bem operado", "h": "<p>O COS monitora o portfólio <b>24/7</b>. O turno começa e termina com disciplina:</p><ul><li><b>Início:</b> conferir sistemas (SCADA, telefonia, links), alarmes pendentes e a passagem de turno documentada do colega.</li><li><b>Durante:</b> ronda das usinas (round-robin) — geração/performance no <b>Prescinto/IBM</b>, status e comando no <b>SunOp/SCADA</b>.</li><li><b>Fim:</b> log de turno detalhado e <b>passagem documentada</b> (ocorrências em andamento, pendências, contatos acionados). Ocorrência crítica nunca 'morre' na troca de turno.</li></ul>"}, {"t": "Triagem de alarmes e criticidade", "h": "<p>Vários alarmes ao mesmo tempo? Ordene por <b>impacto e risco</b>, não por facilidade:</p><ul><li><b>P1 (4 h):</b> usina/planta parada, proteção de subestação atuada, risco a pessoas. <b>P2 (24 h):</b> inversor/skid parado. <b>P3 (5 dias úteis):</b> string, TCU isolada. Prioriza-se sempre o <b>prazo mais restritivo do contrato</b>.</li><li>Separe <b>perda de geração</b> de <b>perda de comunicação</b>: inversor offline com medidor normal costuma ser telemetria — não é despacho de madrugada.</li><li>Situação com risco a pessoas/bens = <b>Risco Crítico</b>: OS + notificação imediata + autoridades competentes.</li><li>Todo alarme tratado: análise preliminar, ocorrência registrada e <b>ack</b>.</li></ul>"}, {"t": "Religamento seguro e acionamento", "h": "<ul><li>Antes de religar: <b>ver no SCADA qual proteção atuou</b> e avaliar a causa. Religar sobre falha ativa é inseguro — desarmou de novo, <b>não insista</b>: acione o campo.</li><li>Religamento presencial exige <b>OS e PT específica</b> (cabine/inversor/usina).</li><li><b>Stow de tracker por vento é proteção</b>, não falha: monitore e aguarde normalizar.</li><li>Equipamento em garantia: não improvisar — registrar evidências e seguir o fluxo de garantia (Controller).</li><li>Acionou o campo? Passe <b>dados</b>: usina, ativo, proteção atuada, leituras — não 'vai lá ver'.</li></ul>"}, {"t": "Comunicação, escalada e registro", "h": "<ul><li>Siga a <b>matriz de escalada</b>: quem acionar, quando e por qual canal — inclusive supervisão e cliente conforme protocolo.</li><li>Cliente pressionando por religamento sem diagnóstico? Sustente o procedimento e <b>escale</b> (supervisão/KAM). Segurança não se negocia por telefone.</li><li>Registro detalhado de ocorrências e logs = base do SLA, do RMO e do pós-incidente (post-mortem).</li><li>Feche o ciclo: ocorrência → OS (Fracttal) → normalização confirmada → comunicação às partes.</li></ul>"}]}, "pcm": {"titulo": "Book do Conhecimento — PCM", "desc": "Planejar, programar e controlar: 52 semanas, OS no Fracttal, indicadores e garantias.", "capitulos": [{"t": "O ciclo da OS: da SS ao fechamento", "h": "<p>Toda execução de campo acontece <b>por OS</b>. Quando é preciso ir a campo, nasce uma <b>SS</b> — e o PCM a transforma em OS; sem campo, a área abre a OS direto.</p><ul><li><b>Abrem SS/OS:</b> COS, Performance, Engenharia e Líderes. <b>Programa:</b> PCM. <b>Executa:</b> campo. <b>Aprova o fechamento:</b> líder de campo.</li><li>O PCM garante que cada OS tenha ativo, tipo, criticidade e descrição corretos — a triagem começa na criação.</li><li>Ferramentas: <b>Fracttal</b> (vida da OS) e <b>Painel PCM</b> (programação, religamentos, preventivas, SS pendentes).</li></ul>"}, {"t": "Plano 52 semanas e programação semanal", "h": "<ul><li>O <b>plano de 52 semanas</b> distribui MPM/MPT/MPS/MPA por usina e cluster ao longo do ano; a <b>programação semanal</b> materializa a semana da equipe volante.</li><li>Otimize <b>deslocamento</b>: agrupe OS do mesmo cluster na mesma janela; preventivas com desligamento em janelas de baixa irradiância e com anuência do cliente (via KAM/COS).</li><li>Corretivas P1 furam a fila (SLA 4 h): reprograme as preventivas menos críticas <b>registrando motivo e novo prazo</b> — reprogramação sem registro destrói a aderência.</li><li>MPA com desligamento de MT: janela negociada, PT específica, equipe NR10-SEP e comunicação de início/fim de manobra.</li></ul>"}, {"t": "Indicadores e backlog: o dado que governa", "h": "<ul><li><b>Aderência</b> = planejado vs. executado. <b>Backlog</b> = fila de OS pendentes — acompanhe por cluster e por criticidade.</li><li><b>MTBF</b> (tempo médio entre falhas, maior = melhor) e <b>MTTR</b> (tempo médio de reparo, menor = melhor) + disponibilidade fecham o painel.</li><li>Integridade do dado no Fracttal é sua responsabilidade: OS sem nº de série, sem leituras ou mal classificada → <b>devolver para correção</b>, não completar 'no achismo'.</li><li>Backlog crescendo por falha <b>recorrente</b> (≥2x/30 dias)? Não é volume, é causa-raiz: escale à Engenharia (N2) com histórico para RCA.</li></ul>"}, {"t": "Garantias, MPAs e interfaces", "h": "<ul><li><b>Garantia:</b> equipamento coberto não se troca — evidências + chamado ao fabricante via <b>Controller</b>; o PCM acompanha o chamado até a solução.</li><li><b>MPAs:</b> gestão anual — janelas, ensaios (isolamento, TTR, aterramento, curva I×V), relatórios e pendências.</li><li><b>Sobressalentes e calibração</b> de instrumentos: Asset Management (alinhe necessidades com antecedência).</li><li>Interfaces diárias: COS (religamentos/ocorrências que viram OS), Performance (tickets que viram OS), líderes (capacidade real da semana) e KAM (janelas e compromissos com o cliente).</li></ul>"}]}, "kam": {"titulo": "Book do Conhecimento — KAM", "desc": "Dono do contrato: indicadores, SLA, RMO, aditivos e a voz do cliente dentro da Grid.", "capitulos": [{"t": "O dono do contrato e do relacionamento", "h": "<p>O KAM é o <b>dono do contrato e do cliente</b>: conduz o relacionamento, as reuniões periódicas, o <b>RMO</b>, a gestão de SLA, os aditivos e o escalonamento interno. Aprova os entregáveis da carteira.</p><ul><li>Conheça o contrato de cor: <b>escopo, exclusões, SLAs por criticidade e penalidades</b>.</li><li>Regra de priorização: vale sempre o <b>prazo mais restritivo do contrato</b>.</li><li>Você representa o cliente dentro da Grid — e a Grid diante do cliente. As duas direções com a mesma transparência.</li></ul>"}, {"t": "Os indicadores que o cliente vê", "h": "<ul><li><b>PR</b> — energia gerada vs. esperada para o recurso medido (estação solarimétrica). <b>Disponibilidade</b> — % do tempo apta a gerar. Podem divergir: usina disponível com PR baixo indica perdas (soiling, degradação, sensores).</li><li><b>SLA por criticidade</b> (P1 4 h · P2 24 h · P3 5 dias úteis), <b>MTTR/MTBF</b>.</li><li>Explique desvios com <b>decomposição de perdas e plano de ação</b>, nunca com promessas vazias — em mês de soiling, mostre o dado e o gatilho de higienização (queda de PR &gt;10%).</li><li>Antes de enviar o RMO, <b>valide os números com a Performance</b>: dado inconsistente detectado pelo cliente custa mais que um atraso de um dia.</li></ul>"}, {"t": "SLA, penalidades e escalonamento", "h": "<ul><li>Monitore as OS críticas da carteira (Painel PCM/Fracttal). SLA em risco → <b>escale internamente</b> (Coordenação, COS, PCM) e comunique o cliente <b>proativamente</b>, com status e previsão.</li><li>Penalidade/notificação contratual: trate com registro formal e alinhamento com Comercial/Jurídico.</li><li>Pressão do cliente <b>não passa por cima da segurança</b>: religamento só após diagnóstico — explique o risco e sustente o procedimento; escale se preciso.</li></ul>"}, {"t": "Escopo, aditivos e limites", "h": "<ul><li>Pedido fora de escopo (obra, serviço extra, mudança de condição) = <b>aditivo</b>: registre a demanda, não assuma compromisso e conduza com <b>Comercial/Jurídico</b>.</li><li>'Cortesias' recorrentes viram passivo contratual — o que a Grid entrega, o contrato precisa prever.</li><li>Documente acordos de reunião em ata; compromissos verbais não gerenciam contrato.</li><li>Feche o ciclo interno: o que você promete ao cliente vira demanda planejada no PCM, não surpresa no campo.</li></ul>"}]}, "performance": {"titulo": "Book do Conhecimento — Performance", "desc": "PR, perdas e qualidade do dado: do desvio detectado ao chamado que recupera geração.", "capitulos": [{"t": "PR e disponibilidade na prática", "h": "<p>O <b>PR</b> compara a energia gerada com a esperada para o recurso solar medido — a referência é a <b>irradiância no plano dos módulos (POA)</b> da estação solarimétrica (GHI = DNI·cos(z) + DHI; quem gera é a POA).</p><ul><li><b>Disponibilidade</b> mede tempo apto a gerar; PR mede o quão bem gerou. Disponibilidade alta com PR baixo = perdas escondidas.</li><li>Compare sempre com <b>pares</b>: usinas vizinhas do cluster, inversores irmãos, strings da mesma mesa — desvio relativo denuncia mais que valor absoluto.</li></ul>"}, {"t": "A cadeia de perdas", "h": "<ul><li><b>Soiling:</b> perda por sujeira; gatilho de higienização = queda de PR &gt;10% ou índice de sujidade (recupera até ~10% de PR; água de osmose reversa).</li><li><b>PID:</b> degradação por potencial induzido — padrão típico: strings próximas ao polo negativo piores; confirmar com curva I×V/EL e mitigar via Engenharia.</li><li><b>LID/LeTID:</b> degradação induzida por luz (e temperatura), ligada ao material da célula — estabiliza/mitiga diferente do PID; não confundir.</li><li><b>Clipping:</b> potência achatada no nominal do inversor — comportamento de projeto, não falha; registrar na categoria certa.</li><li><b>Indisponibilidade, sombreamento, mismatch, microtrincas e trackers desalinhados</b> completam o quadro — cada perda na sua caixinha, senão o PR vira caixa-preta.</li></ul>"}, {"t": "Qualidade do dado: desconfie do sensor primeiro", "h": "<ul><li>Piranômetro <b>sujo, descalibrado ou sombreado</b> distorce o PR (irradiância subestimada infla o PR; e vice-versa). Antes de acusar a usina, <b>valide o sensor</b>: compare com estações vizinhas e satélite.</li><li>Telemetria com gaps: sinalize o buraco, explicite o método de estimativa e a incerteza — nunca apresente estimado como medido.</li><li>Limpeza/verificação de sensores é manutenção: cobre via OS.</li><li>Trabalhe com o <b>Analista COS-Performance</b> a validação contínua da qualidade do dado. Dado confiável é valor da Grid — é ele que sustenta RMO, SLA e decisões.</li></ul>"}, {"t": "Do desvio ao chamado (e ao RMO)", "h": "<ul><li>Desvio persistente confirmado → <b>ticket/chamado de performance</b> direcionado, com diagnóstico completo: usina, inversor, string, perda estimada (kWh e R$) e evidências. Chamado vago vira visita perdida.</li><li>O ticket vira OS via PCM; acompanhe até a <b>recuperação confirmada</b> da geração — fechar OS não é recuperar PR.</li><li>Antes do chamado, cheque o óbvio: clipping, stow por vento, limitação da concessionária (curtailment) e sensor.</li><li>Produza o <b>RMO e boletins</b> com narrativa de perdas e plano de ação — é o que o KAM apresenta ao cliente.</li></ul>"}]}, "conhecimento": {"titulo": "Book do Conhecimento — Processos Grid Co.", "desc": "O mapa da mina: onde vivem as OS, os painéis, os POPs e a quem recorrer.", "capitulos": [{"t": "Onde as coisas vivem", "h": "<ul><li><b>Fracttal:</b> onde vivem as OS — criação, execução e fechamento.</li><li><b>Painel PCM</b> (fillipefigueiro-source.github.io/gridco-pcm-data, link na intranet): programação semanal, OS por status, religamentos, preventivas MPM/MPS/MPA e SS pendentes. Senha por perfil — cada cliente vê o seu.</li><li><b>Painel de Performance</b> (intranet): geração, disponibilidade e tickets de performance.</li><li><b>Pasta 16. Procedimentos Operacionais:</b> Fluxos Internos, POPs, POP Flash e o atalho <b>'Criar OS - Fracttal'</b>.</li><li><b>Intranet (intranet.gridco.com.br):</b> organograma, contatos, procedimentos e formulários. <b>Grid Co. Academy:</b> trilhas e reciclagem.</li></ul>"}, {"t": "O fluxo da OS de ponta a ponta", "h": "<p>Regra de ouro: <b>toda execução de campo acontece por OS</b>.</p><ul><li>Precisa de campo? Abre-se uma <b>SS</b> → o <b>PCM</b> transforma em OS e programa na semana. Sem campo, a área abre a OS direto.</li><li><b>Abrem:</b> COS, Performance, Engenharia e Líderes. <b>Programa:</b> PCM. <b>Executa:</b> campo. <b>Aprova o fechamento:</b> líder de campo.</li><li>Criticidade define o prazo: <b>P1 = 4 h · P2 = 24 h · P3 = 5 dias úteis</b>.</li><li>OS bem preenchida (fotos antes/depois, leituras, nº de série em trocas) é <b>dado confiável</b> — sustenta garantia, indicadores e o relatório que o cliente recebe.</li></ul>"}, {"t": "POP e POP Flash: como se faz por aqui", "h": "<ul><li><b>POP</b> = passo a passo completo e controlado da atividade. <b>POP Flash</b> = resumo de bolso, visual, para consulta rápida em campo.</li><li>Na dúvida de 'como se faz', procure o POP na pasta 16 — e use sempre a <b>versão vigente</b> (resumo de treinamento não substitui o procedimento controlado).</li><li>Percebeu que o POP está desatualizado ou não cobre um caso real? Registre e comunique — a base de conhecimento melhora com quem executa.</li></ul>"}, {"t": "Quem é quem e a quem recorrer", "h": "<ul><li><b>Campo</b> executa · <b>Supervisão de Campo</b> lidera as equipes (6 supervisores, um por conjunto de clusters — seu primeiro contato) · <b>PCM</b> programa · <b>COS</b> monitora 24/7 e religa · <b>Performance</b> acompanha geração · <b>KAM</b> cuida do cliente/contrato · <b>Engenharia</b> ataca causa-raiz · <b>HSEQ</b> é transversal em segurança.</li><li>Escalonamento técnico: <b>N1</b> campo (reset, fusível, limpeza) → <b>N2</b> Engenharia (recorrência ≥2x/30 dias ou causa desconhecida) → <b>N3</b> projeto/retrofit.</li><li>Organograma completo e contatos: <b>intranet</b>. Dúvida de prioridade: seu supervisor; dúvida de procedimento: POP; dúvida de programação: Painel PCM.</li></ul>"}]}}};

": "e_bola"}, {"t": "Peço horas extras para fazer tudo sem critério.", "q": "ok", "fb": "Custo e fadiga sem priorizar; risco de mais erro.", "to": "b"}]}, "b": {"s": "Duas preventivas podem ser adiadas com baixo risco. Conduta?", "m": "Passo 2 · formalizar", "o": [{"t": "Reprogramo formalmente com o PCM, com justificativa e nova data, preservando a aderência.", "q": "good", "fb": "Correto — reprogramação controlada mantém rastreio e aderência.", "to": "c"}, {"t": "Adio sem avisar o PCM.", "q": "bad", "fb": "Some do indicador de aderência e do controle.", "to": "c"}, {"t": "Adio e prometo 'encaixar depois' sem data.", "q": "ok", "fb": "Sem data, vira preventiva perdida.", "to": "c"}]}, "c": {"s": "Fechamento:", "m": "Passo 3 · acompanhar", "o": [{"t": "Acompanho para as preventivas adiadas não virarem atraso crônico.", "q": "good", "fb": "Excelente — evita a bola de neve.", "to": "e_ok"}, {"t": "Considero encerrado após adiar.", "q": "ok", "fb": "Sem acompanhamento, o atraso se acumula.", "to": "e_parcial"}]}, "e_ok": {"fim": 1, "tit": "Plano sob controle", "txt": "Decidiu por risco, formalizou e acompanhou."}, "e_parcial": {"fim": 1, "tit": "Decidiu, sem acompanhar", "txt": "Reprogramou, mas sem garantir o cumprimento."}, "e_bola": {"fim": 1, "tit": "Bola de neve", "txt": "Decisão sem critério vira mais corretiva e perda de aderência."}}}, {"id": "desv", "tit": "Desvio de procedimento", "tag": "Liderança · disciplina operacional", "ctx": "Você flagra um técnico experiente <b>pulando etapas do POP</b> de seccionamento 'porque sempre deu certo'.", "start": "a", "nodes": {"a": {"s": "Conduta imediata?", "m": "Passo 1 · parar o desvio", "o": [{"t": "Interrompo, explico o risco e retomo pelo procedimento correto.", "q": "good", "fb": "Correto — 'sempre deu certo' não protege do dia que der errado.", "to": "b"}, {"t": "Deixo terminar porque é experiente.", "q": "bad", "fb": "Experiência não substitui o procedimento de segurança.", "to": "e_norm"}, {"t": "Faço vista grossa a 'quando sobrar tempo'.", "q": "ok", "fb": "Sem data firme, vira atraso crônico.", "to": "c"}]}, "c": {"s": "Fechamento:", "m": "Passo 3 · indicador", "o": [{"t": "Monitoro o indicador de aderência para não acumular atrasos.", "q": "good", "fb": "Excelente — evita a bola de neve de preventivas.", "to": "e_ok"}, {"t": "Considero encerrado após remarcar.", "q": "ok", "fb": "Sem monitorar, o atraso se acumula.", "to": "e_parcial"}]}, "e_ok": {"fim": 1, "tit": "Aderência preservada", "txt": "Reprogramou com critério e monitorou o indicador."}, "e_parcial": {"fim": 1, "tit": "Remarcou, sem monitorar", "txt": "Faltou acompanhar para não virar atraso crônico."}, "e_canc": {"fim": 1, "tit": "Dívida técnica", "txt": "Cancelar preventiva ou travar corretiva de risco gera mais falha depois."}}}, {"id": "pec", "tit": "Peça sobressalente em falta", "tag": "PCM · suprimentos", "ctx": "Um inversor precisa de uma <b>peça que não há em estoque</b>. A usina opera com um módulo de potência a menos.", "start": "a", "nodes": {"a": {"s": "Conduta?", "m": "Passo 1 · encaminhar", "o": [{"t": "Aciono compras com urgência (prazo/criticidade), registro a pendência e avalio operação segura no interim.", "q": "good", "fb": "Correto — trata suprimento e operação provisória.", "to": "b"}, {"t": "Espero a peça sem acionar compras formalmente.", "q": "bad", "fb": "Sem pedido formal, a peça não chega.", "to": "e_esp"}, {"t": "Mando a equipe improvisar uma peça equivalente.", "q": "bad", "fb": "Improviso em inversor é risco elétrico e de garantia.", "to": "e_esp"}]}, "b": {"s": "Enquanto a peça não chega:", "m": "Passo 2 · operação interina", "o": [{"t": "Confirmo com engenharia/fabricante se é seguro operar parcial e monitoro de perto.", "q": "good", "fb": "Correto — operação interina validada e monitorada.", "to": "c"}, {"t": "Deixo operando parcial sem validar.", "q": "ok", "fb": "Pode agravar o dano; validar é mais seguro.", "to": "c"}]}, "c": {"s": "Fechamento:", "m": "Passo 3 · previsibilidade isco", "txt": "Intervir por conta pode anular a garantia e gerar custo indevido."}}}, {"id": "reinc", "tit": "Falha recorrente na mesma usina", "tag": "PCM · causa raiz", "ctx": "A mesma usina gerou <b>5 corretivas do mesmo tipo</b> em 2 meses.", "start": "a", "nodes": {"a": {"s": "Como você trata?", "m": "Passo 1 · enxergar o padrão", "o": [{"t": "Analiso a recorrência (causa comum) em vez de tratar cada OS isolada.", "q": "good", "fb": "Correto — recorrência pede análise de causa raiz.", "to": "b"}, {"t": "Sigo abrindo e fechando corretivas normalmente.", "q": "bad", "fb": "Trata o sintoma; a causa fica ativa.", "to": "e_sint"}, {"t": "Reclamo da equipe por 'não resolver'.", "q": "bad", "fb": "Culpar sem causa não corrige.", "to": "e_sint"}]}, "b": {"s": "A causa é um componente subdimensionado/ambiente. Conduta?", "m": "Passo 2 · agir na fonte", "o": [{"t": "Proponho ação definitiva (melhoria/engenharia) com custo x benefício.", "q": "good", "fb": "Correto — resolve na fonte, não repete corretiva.", "to": "c"}, {"t": "Só programo mais preventivas para 'compensar'.", "q": "ok", "fb": "Ajuda, mas não elimina a causa.", "to": "c"}]}, "c": {"s": "Fechamento:", "m": "Passo 3 · acompanhar", "o": [{"t": "Acompanho a recorrência cair após a ação e registro no histórico do ativo.", "q": "good", "fb": "Excelente — fecha a causa e comprova.", "to": "e_ok"}, {"t": "Considero encerrado ao implementar.", "q": "ok", "fb": "Sem acompanhar, pode reincidir.", "to": "e_parcial"}]}, "e_ok": {"fim": 1, "tit": "Causa raiz eliminada", "txt": "Enxergou o padrão, agiu na fonte e acompanhou."}, "e_parcial": {"fim": 1, "tit": "Ação sem confirmação", "txt": "Implementou, sem comprovar a queda da recorrência."}, "e_sint": {"fim": 1, "tit": "Sintoma tratado", "txt": "Repetir corretiva sem causa perpetua a falha."}}}], "performance": [{"id": "qda", "tit": "Queda de geração — investigar causa", "tag": "Performance · diagnóstico", "ctx": "Uma usina gera <b>abaixo do esperado</b> há 3 dias. Pode  aparece <b>muito abaixo</b> no dashboard, mas os vizinhos estão normais.", "start": "a", "nodes": {"a": {"s": "Antes de acionar, você:", "m": "Passo 1 · validar o dado", "o": [{"t": "Verifico se o sensor/medição do string está saudável (falha de leitura x falha real).", "q": "good", "fb": "Correto — validar o dado antes do ticket.", "to": "b"}, {"t": "Abro ticket de falha grave direto.", "q": "bad", "fb": "Pode ser erro de medição; validar primeiro.", "to": "e_tick"}, {"t": "Comparo com o histórico do mesmo string.", "q": "ok", "fb": "Bom, mas cheque também o sensor.", "to": "b"}]}, "b": {"s": "O sensor/telemetria daquele string está com defeito (dado furado). Conduta?", "m": "Passo 2 · causa certa", "o": [{"t": "Abro ticket de correção da telemetria, não de falha de geração.", "q": "good", "fb": "Correto — o problema é o dado, não o string.", "to": "c"}, {"t": "Abro ticket de falha de geração mesmo assim.", "q": "bad", "fb": "Manda a equipe caçar um problema que não existe.", "to": "e_tick"}, {"t": "Desconsidero o string do cálculo sem registrar.", "q": "ok", "fb": "Corrige o gráfico, mas some a pendência do sensor.", "to": "c"}]}, "c": {"s": "Fechamento:", "m": "Passo 3 · confiabilidade", "o": [{"t": "Registro a correção e reforço a validação de sensores na rotina.", "q": "good", "fb": "Excelente — protege a confiabilidade do painel.", "to": "e_ok"}, {"t": "Só corrijo o caso pontual.", "q": "ok", "fb": "Sem rotina, o falso positivo volta.", "to": "e_parcial"}]}, "e_ok": {"fim": 1, "tit": "Dado confiável", "txt": "Validou a medição, tratou a causa certa e reforçou a rotina."}, "e_parcial": {"fim": 1, "tit": "Corrigiu pontual", "txt": "Resolveu o caso, sem elevar a confiabilidade geral."}, "e_tick": {"fim": 1, "tit": "Caça ao fantasma", "txt": "Ticket de falha sobre dado furado desperdiça equipe."}}}, {"id": "sc", "tit": "Soiling x chuva iminente", "tag": "Performance · decisão de limpeza", "ctx": "A perda por soiling chegou a ~4%, mas a <b>previsão indica chuva</b bilidade e PR medem coisas diferentes.", "to": "b"}, {"t": "Se está disponível, está tudo certo.", "q": "bad", "fb": "Perda de performance existe mesmo com tudo 'ligado'.", "to": "e_conf"}, {"t": "Assumo erro do dashboard.", "q": "ok", "fb": "Pode ser real; investigue antes de descartar.", "to": "b"}]}, "b": {"s": "O PR está baixo e uniforme. Causas prováveis?", "m": "Passo 2 · perda silenciosa", "o": [{"t": "Soiling, PID/degradação ou mismatch — investigo com curva e inspeção/termografia.", "q": "good", "fb": "Correto — perdas silenciosas típicas.", "to": "c"}, {"t": "Só pode ser sombra.", "q": "ok", "fb": "Sombra é localizada; perda uniforme aponta outra causa.", "to": "c"}]}, "c": {"s": "Fechamento:", "m": "Passo 3 · agir", "o": [{"t": "Abro ticket com a causa provável e o dado de perda, e priorizo a correção.", "q": "good", "fb": "Excelente — traduz o PR baixo em ação priorizada.", "to": "e_ok"}, {"t": "Anoto como 'perda normal' e sigo.", "q": "bad", "fb": "Naturalizar perda silenciosa custa geração ao longo do tempo.", "to": "e_parcial"}]}, "e_ok": {"fim": 1, "tit": "Performance sob controle", "txt": "Separou disponibilidade de PR e agiu sobre a perda silenciosa."}, "e_parcial": {"fim": 1, "tit": "Perda naturalizada", "txt": "Faltou transformar o PR baixo em ação."}, "e_conf": {"fim": 1, "tit": "Confundiu os indicadores", "txt": "'Disponível' não é 'gerando bem' — a perda passou batida."}}}, {"id": "pr", "tit": "PR abaixo da meta contratual", "tag": "Performance · KPI/contrato", "ctx": "O <b>Performance Ratio</b> do mês ficou <b>abaixo da meta</b> do contrato.", "start": "a", "nodes": {"a": {"s": "Primeiro passo?", "m": "Passo 1 · decompor", "o": [{"t": "Decomponho as perdas (soiling, indisponibilidade, sombra, degradação) para achar o que puxou o PR.", "q": "good", "fb": "Correto — decompor mostra onde agir.", "to": "b"}, {"t": "Reporto o PR baixo sem explicar a causa.", "q": "ok", "fb": "Número sem causa não gera ação nem defesa.", "to": "b"}, {"t": "Contesto iável é o valor da OS.", "to": "c"}, {"t": "Escrevo 'defeito diversos' e sigo.", "q": "ok", "fb": "Genérico demais; o PCM não prioriza direito.", "to": "c"}]}, "c": {"s": "Fechamento:", "m": "Passo 3 · categorizar", "o": [{"t": "Classifico tipo/risco corretos para a OS entrar na fila certa do PCM.", "q": "good", "fb": "Excelente — categoria certa = priorização certa.", "to": "e_ok"}, {"t": "Deixo a categoria em branco.", "q": "ok", "fb": "Sem categoria, a OS pode ficar mal priorizada.", "to": "e_parcial"}]}, "e_ok": {"fim": 1, "tit": "OS no padrão", "txt": "Aberta no ato, com dado e categoria — pronta para priorizar."}, "e_parcial": {"fim": 1, "tit": "OS incompleta", "txt": "Aberta, mas com dado/categoria fracos."}, "e_tarde": {"fim": 1, "tit": "OS tardia", "txt": "Registrar depois faz o achado perder prioridade."}, "e_semos": {"fim": 1, "tit": "Sem rastreio", "txt": "Sem OS, o serviço some do histórico e da gestão."}}}, {"id": "pcm", "tit": "Usando o Painel PCM", "tag": "Processo · PCM", "ctx": "Sua equipe tem folga de agenda e você quer <b>puxar trabalho do Painel PCM</b>.", "start": "a", "nodes": {"a": {"s": "Como escolhe o que executar?", "m": "Passo 1 · priorizar", "o": [{"t": "Pego as OS priorizadas pelo PCM (risco/geração), começando pelas do meu cluster.", "q": "good", "fb": "Correto — segue a priorização e otimiza deslocamento.", "to": "b"}, {"t": "Escolho as mais fáceis para 'produzir número'.", "q": "bad", "fb": "Melhora a quantidade, não o risco/impacto.", "to": "e_facil"}, {"t": "Faço qualquer uma sem olhar a prioridade.", "q": "ok", "fb": "Sem priorização, pode deixar a mais crítica para trás.", "to": "b"}]}, "b": {"s": "Uma OS crítica está fora do seu cluster. Conduta?", "m": "Passo 2 · alinhar", "o": [{"t": "Alinho com o PCM/líder se devo deslocar ou se outra equipe atende.", "q": "good", "fb": "Correto — decisão coordenada evita sobreposição.", "to": "c"}, {"t": "Ignoro por ser fora do cluster.", "q": "ok", "fb": "Pode deixar uma crítica sem atendim function cenRender(){var sc=_cen.sc,n=sc.nodes[_cen.cur],st=document.getElementById('censtage');

function cenChoose(n,i,btn){var op=n.o[i],WQ={good:2,ok:1,bad:0},LB={good:'✓ Decisão de alto nível',ok:'~ Aceitável, dá para melhorar',bad:'✗ Rever conduta'};

 document.getElementById('censtage').innerHTML='<div style="text-align:center;padding:8px"><div class="cen-badge">Desfecho</div><h3 style="color:#0f2f5c;margin:6px 0">'+n.tit+'</h3><p>'+n.txt+'</p><div style="font-size:38px;font-weight:800;color:#0f2f5c">'+pct+'%</div><div style="font-weight:700">'+jd+'</div><p style="color:#5b6b7d;font-size:13px">Qualidade das decisões: '+_cen.score+'/'+(_cen.max*2)+'</p><button class="gbtn" style="width:auto;padding:8px 16px;font-size:13px" onclick="playCase('+_cen.idx+')">↻ Refazer</button> <button class="gbtn" style="width:auto;padding:8px 16px;font-size:13px;background:#eef2f7;color:#0f2f5c" onclick="showCases()">Outros casos ›</button></div>';}

D.tecbooks={"order": ["irradiancia", "modulos", "inversores", "subestacoes", "trackers", "stringbox", "scada"], "books": {"irradiancia": {"tit": "Recurso Solar & Irradiância", "ic": "📡", "resumo": "O combustível da usina: como medimos e por que o dado de irradiância sustenta todo o diagnóstico de performance.", "sec": [{"t": "Componentes da irradiância", "h": "<p>A radiação solar chega em componentes:</p><ul><li><b>GHI</b> (Global Horizontal) — total no plano horizontal.</li><li><b>DNI</b> (Direta Normal) — direta, perpendicular ao Sol.</li><li><b>DHI</b> (Difusa Horizontal) — espalhada por céu/nuvens.</li><li><b>POA/IPOA</b> (no plano do módulo) — <b>é a que de fato gera</b>.</li></ul><p>Relação: <b>GHI = DNI·cos(z) + DHI</b>.</p>"}, {"t": "Medição na usina", "h": "<p>A <b>estação solarimétrica</b> mede a irradiância (piranômetro GHI e sensor no plano dos módulos), além de temperatura e vento. Sensor <b>sujo ou descalibrado engana o diagnóstico</b> — por isso ele também entra na rotina de inspeção.</p>"}, {"t": "Por que importa na Grid", "h": "<p>O <b>Performance Ratio (PR)</b> compara a geração real com a esperada pela irradiância. É o PR que separa <b>queda por clima</b> (irradiância baixa) de <b>perda interna</b> (soiling, falha). Sem irradiância confiável, não há diagnóstico confiável.</p>"}], "vids": [{"id": "FnvrNkwxDoc", "t": "Radiação, irradiância e irradiação solar", "c": "Elétrica & Renováveis"}, {"id": "fvY3eTZXqr8", "t": "Determinar a irradiação para projetos", "c": "Curso Solar USP"}], "iea": ["IEA-PVPS T16 — Solar Resource Handbook", "IEA-PVPS T13-21 (2022) — Soiling Losses in PV Plants"]}, "modulos": {"tit": "Módulos Fotovoltaicos", "ic": "🔆", "resumo": "Como o módulo gera, seus modos de falha e como a Grid detecta cada um.", "sec": [{"t": "Anatomia e geração", "h": "<p>Um módulo é uma associação de <b>células de silício</b> entre <b>vidro</b>, <b>encapsulante (EVA/POE)</b> e <b>backsheet</b> (ou vidro, no bifacial), com <b>caixa de junção</b> e <b>diodos de bypass</b>. Os diodos protegem o módulo quando uma célula é sombreada — entender isso explica o ponto quente.</p>"}, {"t": "Principais modos de falha", "h": "<ul><li><b>Hot spot</b>: célula sombreada/trincada esquenta — visível na termografia.</li><li><b>Microfissuras</b>: trincas no transporte/instalação reduzem potência.</li><li><b>PID</b> e <b>LID/LeTID</b>: perdas ao longo do tempo.</li><li><b>Delaminação/amarelamento</b> do encapsulante.</li></ul>"}, {"t": "Como a Grid detecta", "h": "<p><b>Termografia aérea (drone)</b> revela pontos quentes e strings offline; <b>eletroluminescência</b> expõe microtrincas; a <b>curva de geração</b> capta perdas lentas (PID, LID).</p>"}], "vids": [{"id": "tWcQFBKmpII", "t": "Ponto quente (hot spot)", "c": "MC Elétrica"}, {"id": "Xi3O4PFB1ik", "t": "Microfissuras e trincas", "c": "Elétrica e Cia"}, {"id": "6hSIvPyavyg", "t": "Efeito PID", "c": "Prof. Marcelo Villalva"}, {"id": "mPEgrUuiSzg", "t": "Inspeção termográfica na prática", "c": "Iqony"}], "iea": ["IEA-PVPS T13-30 (2025) — Degradation and Failure of PV Modules", "IEA-PVPS T13-16 (2021) — Service Life Estimation"]}, "inversores": {"tit": "Inversores", "ic": "⚡", "resumo": "O coração eletrônico: converte CC em CA, busca o ponto de máxima potência e é fonte comum de indisponibilidade.", "sec": [{"t": "Função e MPPT", "h": "<p>O inversor converte a energia <b>CC</b> dos módulos em <b>CA</b> na frequência da rede, e o <b>MPPT</b> mantém a operação no <b>ponto de máxima potência</b>. Em usinas há <b>inversores string</b> (vários menores) e <b>centrais</b> (poucos grandes).</p>"}, {"t": "Principais falhas", "h": "<ul><li><b>Sobretemperatura</b> (ventilação/filtros sujos) — causa desarme.</li><li><b>Falha de rede</b> (sub/sobretensão, frequência) — normalmente rearmável.</li><li><b>Falha de isolamento</b> (CC) — exige inspeção.</li></ul>"}, {"t": "Rearme e manutenção", "h": "<p>Antes de religar: <b>ler o código</b>, confirmar <b>condição segura</b>, respeitar o <b>nº de tentativas</b>. Reincidiu? Parar, registrar e escalar fabricante/engenharia. Limpeza de filtros e verificação de ventilação são manutenção de rotina.</p>"}], "vids": [{"id": "MhV_Lq446Uk", "t": "Inversor solar: para que serve e tipos", "c": "E4 Energias Renováveis"}, {"id": "4GJwk1qtJxo", "t": "Strings e MPPTs", "c": "MC Elétrica"}], "iea": ["IEA-PVPS T13-25 (2022) — O&M Guidelines (seção de inversores)"]}, "subestacoes": {"tit": "Subestações & Média Tensão", "ic": "🏭", "resumo": "Onde a energia da usina é elevada e conectada à rede — e onde a segurança elétrica é inegociável.", "sec": [{"t": "Função", "h": "<p>A subestação <b>eleva a tensão</b> (transformador) para conectar a usina à rede de distribuição/transmissão, e concentra <b>proteção e medição</b>. É o ponto de fronteira com a concessionária.</p>"}, {"t": "Equipamentos", "h": "<ul><li><b>Transformador</b> elevador; <b>skid</b> (transformador + QGBT) nas usinas.</li><li><b>Disjuntor</b> e <b>relés de proteção</b> (atuam nos trips).</li><li><b>Chaves seccionadoras</b>, TCs/TPs de medição.</li></ul>"}, {"t": "Segurança", "h": "<p>Toda intervenção segue <b>seccionamento com LOTO</b> (bloqueio/etiquetagem), EPI adequado e <b>confirmação de ausência de tensão medindo no local</b>. Nunca religar sobre uma proteção que atuou sem identificar a causa.</p>"}], "vids": [{"id": "t3AXSWAET-w", "t": "Skid (transformador + QGBT) de uma usina", "c": "Eng. Emerson Pereira"}, {"id": "5TS-IxfZOKE", "t": "Equipamentos de uma subestação", "c": "SE em Foco"}], "iea": []}, "trackers": {"tit": "Trackers & Estruturas", "ic": "🔄", "resumo": "Seguidores que aumentam a geração — e um dos itens que mais gera OS de campo.", "sec": [{"t": "Função e ganho", "h": "<p>O <b>tracker</b> gira as mesas para acompanhar o Sol, aumentando a geração frente ao sistema fixo. Usa <b>motor</b>, <b>controlador</b>, <b>fim de curso</b> e sensores de posição.</p>"}, {"t": "Modos de operação", "h": "<ul><li><b>Seguimento</b> normal ao longo do dia.</li><li><b>Backtracking</b> — evita sombra entre fileiras no início/fim do dia.</li><li><b>Stow</b> — posição de proteção (vento forte).</li></ul>"}, {"t": "Falhas típicas", "h": "<p><b>Travamento/desalinhamento</b> por obstáculo (vegetação), falha de motor, fim de curso ou controlador. Diagnosticar antes de atuar; <b>nunca forçar</b> a mesa.</p>"}], "vids": [{"id": "qLIkIFooRgg", "t": "Como funciona o tracker (seguidor solar)", "c": "MA Energia Solar"}, {"id": "nTlQnOJtHf4", "t": "Sistema tracker numa usina real", "c": "Elétrica & Solar"}], "iea": ["IEA-PVPS T13-26 (2024) — Bifacial Tracking"]}, "stringbox": {"tit": "String Box & Cabeamento CC", "ic": "🔌", "resumo": "A proteção do lado CC — fusíveis, DPS e seccionamento. Onde o risco de arco elétrico é maior.", "sec": [{"t": "Função", "h": "<p>A <b>string box</b> agrupa várias strings e concentra a <b>proteção do lado CC</b>: <b>fusíveis</b> por string, <b>DPS</b> (surtos) e <b>chave seccionadora</b>. Protege pessoas e equipamentos.</p>"}, {"t": "Riscos do lado CC", "h": "<p>Corrente contínua <b>não tem passagem por zero</b> — o <b>arco elétrico CC</b> é perigoso e persistente. <b>Nunca manipular fusível sob carga.</b> Conexões frouxas viram <b>ponto quente</b> e risco de incêndio.</p>"}, {"t": "Conduta segura", "h": "<p>Desenergizar conforme procedimento, EPI para arco, confirmar ausência de tensão, usar fusível do <b>valor correto</b>, reapertar com torque e registrar.</p>"}], "vids": [{"id": "l336NR2Tbq4", "t": "String box: por que é essencial", "c": "E4 Energias Renováveis"}, {"id": "wOYTBky6slQ", "t": "String box — proteção do sistema", "c": "MC Elétrica"}], "iea": []}, "scada": {"tit": "SCADA & Monitoramento", "ic": "🖥️", "resumo": "Os olhos do COS: como a usina é monitorada 24/7 e como separar perda real de perda de comunicação.", "sec": [{"t": "O que é SCADA", "h": "<p><b>SCADA</b> é o sistema <b>supervisório</b> que coleta a telemetria da usina (inversores, medição, estação solarimétrica) e apresenta <b>geração, alarmes e disponibilidade</b> em tempo real.</p>"}, {"t": "Papel do COS", "h": "<p>O <b>COS</b> monitora 24/7, faz a <b>triagem de alarmes</b> por impacto, aciona equipe e registra ocorrências. Distingue <b>perda de comunicação</b> (dado ausente) de <b>perda real</b> de geração.</p>"}, {"t": "Perda real x aparente", "h": "<p>Queda <b>ampla e simultânea</b> ao meio-dia costuma ser <b>nuvem</b> (cai junto com a irradiância). Perda que <b>não acompanha a irradiância</b> indica falha real → abrir ocorrência.</p>"}], "vids": [{"id": "Job-KbLINZ4", "t": "O que é um sistema supervisório (SCADA)", "c": "FM4 Automation"}, {"id": "0gqlBHem66A", "t": "Importância do monitoramento da usina", "c": "Evosolar"}], "iea": ["IEA-PVPS T13-19 (2021) — PV Failure Monitoring", "IEA-PVPS T13-28 (2024) — Technical & Economic KPIs"]}}};

D.modcase={"mps_termo": {"tit": "Ponto quente na inspeção", "ctx": "Na termografia de rotina você encontra um terminal muito mais quente que os vizinhos.", "start": "a", "nodes": {"a": {"s": "Primeiro passo?", "o": [{"t": "Reaperto na hora com o painel energizado.", "q": "bad", "fb": "Nunca intervir energizado — risco de arco/choque.", "to": "e_bad"}, {"t": "Confirmo a leitura (ε=0,95, junção/fita), classifico pela tabela e registro com foto.", "q": "good", "fb": "Correto — validar a leitura e classificar antes de agir.", "to": "b"}, {"t": "Ignoro, metal esquenta mesmo.", "q": "bad", "fb": "ΔT relevante em conexão é anomalia, não normal.", "to": "e_bad"}]}, "b": {"s": "É nível de Rejeição. Conduta?", "o": [{"t": "Aceite com observações e acompanho depois.", "q": "ok", "fb": "Rejeição não é 'acompanhar' — precisa de correção programada.", "to": "e_ok"}, {"t": "Abro OS Corretiva com desligamento programado (reaperto com torque) e termografia de verificação.", "q": "good", "fb": "Excelente — trata a causa com segurança e comprova.", "to": "e_good"}]}, "e_good": {"fim": 1, "tit": "Anomalia tratada", "txt": "Leitura validada, classificada e corrigida com verificação."}, "e_ok": {"fim": 1, "tit": "Resolução parcial", "txt": "Rejeição exige correção programada, não só acompanhamento."}, "e_bad": {"fim": 1, "tit": "Conduta insegura", "txt": "Intervir energizado ou ignorar é risco e falha que evolui."}}}, "fundamentos": {"tit": "Queda de geração em dia de céu limpo", "ctx": "10h30, céu limpo. O COS informa que a usina caiu <b>~40% de geração</b> de um dia para o outro. Você está em campo.", "start": "a", "nodes": {"a": {"s": "Por onde você começa o diagnóstico?", "o": [{"t": "Verifico no SCADA quais inversores estão gerando e comparo com a irradiância POA do momento.", "q": "good", "fb": "Correto — o SCADA mostra onde a cadeia módulos→inversor→trafo→rede quebrou, sem andar à toa.", "to": "b"}, {"t": "Vou direto ao inversor mais próximo olhar alarmes.", "q": "ok", "fb": "Pode funcionar, mas sem a visão do SCADA você pode inspecionar o equipamento errado.", "to": "b"}, {"t": "Assumo soiling e programo limpeza de módulos.", "q": "bad", "fb": "Soiling é perda gradual — não derruba 40% de um dia para o outro.", "to": "e_err"}, {"t": "Reinicio todos os inversores para ver se volta.", "q": "bad", "fb": "Reset em massa sem diagnóstico mascara a causa e pode agravar uma falha real.", "to": "e_err"}]}, "b": {"s": "O SCADA mostra <b>dois inversores do mesmo skid em zero</b>; POA normal e os demais gerando. O que isso indica?", "o": [{"t": "O problema provavelmente está no elo comum (trafo/proteção do skid); inspeciono o skid com segurança.", "q": "good", "fb": "Correto — dois inversores juntos apontam para o elemento compartilhado, não para falha individual.", "to": "c"}, {"t": "Abro chamado ao fabricante dos dois inversores.", "q": "ok", "fb": "Pode até ser, mas dois de uma vez no mesmo skid pede antes a inspeção do elo comum — evita chamado indevido.", "to": "c"}, {"t": "Começo testando string por string das mesas ligadas a eles.", "q": "bad", "fb": "Começar pela ponta da cadeia é ineficiente: strings não derrubam dois inversores ao mesmo tempo.", "to": "c"}]}, "c": {"s": "Você encontra o <b>disjuntor BT do skid desarmado</b>. Conduta?", "o": [{"t": "Não religo de imediato: inspeciono sinais de falha (cheiro, marcas de queima, termografia rápida), registro e religo conforme procedimento, alinhado com o COS.", "q": "good", "fb": "Correto — proteção atuou por algum motivo; religar sobre falha não eliminada é risco.", "to": "e_ok"}, {"t": "Religo e fico monitorando por perto.", "q": "ok", "fb": "Restabelece rápido, mas sem investigar a causa o desarme pode voltar — ou pior.", "to": "e_parcial"}, {"t": "Religo quantas vezes precisar até segurar.", "q": "bad", "fb": "Religamentos sucessivos sobre falha são risco grave de dano e acidente.", "to": "e_err"}]}, "e_ok": {"fim": 1, "tit": "Diagnóstico pela cadeia de geração", "txt": "Você usou SCADA + lógica da cadeia (módulos→inversor→trafo→rede) para achar o elo comum, e tratou o desarme com causa investigada e registro."}, "e_parcial": {"fim": 1, "tit": "Voltou, mas sem causa", "txt": "A geração voltou, porém sem investigar a causa do desarme o problema tende a reaparecer — e a disponibilidade sofre de novo."}, "e_err": {"fim": 1, "tit": "Ação sem diagnóstico", "txt": "Agir antes de localizar a falha na cadeia de geração desperdiça tempo e pode transformar um desarme simples em dano maior."}}}, "recurso": {"tit": "PR despencou, geração normal", "ctx": "O relatório semanal aponta <b>PR de 68%</b>, mas a energia gerada está em linha com o histórico e com usinas vizinhas.", "start": "a", "nodes": {"a": {"s": "Qual a primeira hipótese a investigar?", "o": [{"t": "Dado de irradiância errado — se a geração está normal e só o PR caiu, o sensor da estação solarimétrica pode estar lendo POA a mais.", "q": "good", "fb": "Correto — PR = gerado vs. esperado; se o 'esperado' vem de sensor ruim, o PR mente.", "to": "b"}, {"t": "Soiling nos módulos.", "q": "ok", "fb": "Soiling derruba a geração junto com o PR — aqui a geração está normal, então a suspeita principal é o dado do sensor.", "to": "b"}, {"t": "Comunico ao cliente que a usina degradou.", "q": "bad", "fb": "Comunicar degradação sem verificar o dado é queimar credibilidade — sensor sujo/descalibrado gera dado falso.", "to": "e_err"}, {"t": "Ajusto o PR na planilha para o valor 'esperado'.", "q": "bad", "fb": "Maquiar indicador nunca é opção — o dado precisa ser corrigido na origem e o período sinalizado.", "to": "e_err"}]}, "b": {"s": "Em campo, o que verificar na estação solarimétrica?", "o": [{"t": "Piranômetros (sujeira, sombreamento, nivelamento), célula de referência, datalogger — e comparo GHI×POA entre si.", "q": "good", "fb": "Correto — a verificação cobre todos os sensores que alimentam o PR, e a comparação cruzada revela qual está fora.", "to": "c"}, {"t": "Limpo só o piranômetro horizontal (GHI) e encerro.",
