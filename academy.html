 e logs anexados. Esse histórico é <b>documentação de referência em auditorias</b>.</li><li><b>Passagem verbal ao operador noturno:</b> reforçando usinas críticas, pendências prioritárias e alertas de segurança.</li></ul><p>Antes de liberar o posto: <b>logoff de todos os sistemas</b> (o próximo operador entra com as próprias credenciais) e posto limpo. Regra de ouro do turno: toda manobra ou comando remoto deve ser <b>autorizado e registrado</b>; em caso de dúvida, consultar o supervisor — <b>nunca realizar alterações sem validação técnica</b>.</p>"}], "quiz": [{"q": "No início do turno, o operador:", "o": ["Confere sistema, alarmes e passagem de turno", "Apaga os registros", "Sai"], "c": 0, "e": "processos"}, {"q": "Verificação de ferramentas/sistemas inclui:", "o": ["SCADA, links e telefonia", "Só o café", "Nada"], "c": 0, "e": "processos"}, {"q": "Senhas de acesso devem ser:", "o": ["Geridas conforme política (cofre)", "Coladas na mesa", "Compartilhadas livremente"], "c": 0, "e": "processos"}, {"q": "Alarmes pendentes na entrada do turno:", "o": ["Ignorar", "Assumir e tratar", "Apagar"], "c": 1, "e": "processos"}, {"q": "Passagem de turno bem feita evita:", "o": ["Perda de informação de eventos em aberto", "Mais geração", "Nada"], "c": 0, "e": "processos"}, {"q": "Falha no link/SCADA no início do turno:", "o": ["Esperar", "Registrar e acionar TI/automação", "Ignorar"], "c": 1, "e": "processos"}, {"q": "O log de turno serve para:", "o": ["Rastreabilidade dos eventos", "Decoração", "Nada"], "c": 0, "e": "processos"}, {"q": "Acesso de terceiro ao COS:", "o": ["Liberar sem controle", "Seguir o procedimento de acesso", "Proibir sempre"], "c": 1, "e": "processos"}, {"q": "Final de turno sem passagem:", "o": ["Aceitável", "Não — documentar e repassar", "Tanto faz"], "c": 1, "e": "processos"}, {"q": "Conferência de sistemas é feita:", "o": ["Só quando dá problema", "No início de cada turno", "Nunca"], "c": 1, "e": "processos"}]}, "cos_monit": {"titulo": "POP COS — Monitoramento Contínuo", "icone": "📈", "eixo": "processos", "dur": "12 min", "video": "", "videoTip": "Vídeo do POP.COS.02 em operação", "secoes": [{"t": "Vigilância contínua: plataformas e ronda", "h": "<p>O monitoramento é a rotina-mãe do COS: a tela principal do <b>SCADA SunOp, PV Operation e Fusion</b> deve permanecer <b>visível e ativa durante todo o turno</b>, em todos os turnos. O objetivo é a <b>detecção imediata</b> de falha, mau funcionamento ou alteração de estado — inversores desligados, trackers fora de posição, medidores sem comunicação — antes que o impacto em geração cresça.</p><ul><li>Executar a <b>ronda das usinas (round-robin)</b>, varrendo alarmes e desvios de geração/performance no Prescinto (IBM).</li><li>Usar <b>filtros e classificação de alarmes</b> do SCADA para priorizar a atenção nos eventos mais críticos, e não na ordem de chegada.</li><li>Manter o <b>status operacional de cada usina atualizado</b> no SCADA, refletindo a situação em tempo real — o dado que o resto da empresa consome nasce aqui.</li></ul>"}, {"t": "Análise preliminar: do alarme à causa provável", "h": "<p>Todo alarme novo recebe <b>reconhecimento (Ack)</b> — marcando-o como visto — e contextualização: que tipo de alarme é (comunicação, string, sobretemperatura, rede) e qual equipamento afeta. A triagem inicial testa hipóteses em sequência:</p><ul><li><b>Falha de comunicação:</b> verificar conectividade por outras vias (ping, portal do fabricante); confirmada a queda de link, abrir chamado com o provedor de internet da usina. Usina 'offline' no SCADA nem sempre é usina parada.</li><li><b>Falha de equipamento:</b> observar múltiplos alarmes do mesmo equipamento ou de equipamentos relacionados; consultar o <b>histórico de 15 dias</b> — recorrência caracterizada deve ser repassada aos supervisores de campo.</li><li><b>Condição ambiental:</b> correlacionar com o clima (sobretemperatura em dia quente, subpotência em dia nublado). A previsão do tempo das localidades é levantada no primeiro horário do dia e publicada no grupo, subsidiando inclusive a viabilidade de manutenções.</li><li><b>Manobra/manutenção:</b> verificar se há intervenção programada que justifique o alarme — e <b>sempre aguardar a confirmação do técnico de campo</b> sobre manobras antes de qualquer ação, mantendo a conversa no grupo para visibilidade de todos.</li></ul><p>Em dúvida sobre a análise (ex.: alarmes de string no Fusion, que traz sugestões de tratamento do próprio fabricante), consultar o manual do equipamento ou o supervisor.</p>"}, {"t": "Registro, qualidade do dado e desvios silenciosos", "h": "<p>Todos os alarmes e ações devem ser registrados no <b>SCADA, no log de turno e, quando aplicável, no CMMS (Prescinto)</b>. O registro não é burocracia: é o que permite reconstruir eventos, medir MTTR e sustentar auditorias — o histórico de grupos e e-mails é documentação oficial.</p><p>Dois cuidados elevam o nível do monitoramento:</p><ul><li><b>Desvio sem alarme:</b> queda de geração sem nenhum alarme ativo é suspeita clássica de <b>falha de telemetria ou sensor</b> — ou de uma falha real que o sistema não enxerga. Ausência de alarme não é atestado de normalidade: o desvio detectado na ronda deve ser investigado e registrado.</li><li><b>Falso alarme recorrente:</b> não basta reconhecer repetidamente; a causa (configuração, qualidade de dado) precisa ser tratada, senão o ruído crônico mascara o alarme verdadeiro.</li></ul><p>O operador que domina esta seção entende que monitorar não é olhar tela: é <b>validar o dado, correlacionar contexto e transformar desvio em ação registrada</b>.</p>"}], "quiz": [{"q": "Plataforma de performance citada:", "o": ["Prescinto/IBM", "Word", "Paint"], "c": 0, "e": "processos"}, {"q": "A ronda de usinas (round-robin) serve para:", "o": ["Varrer alarmes/desvios de todas as usinas", "Lavar módulos", "Nada"], "c": 0, "e": "processos"}, {"q": "Desvio de geração detectado na ronda:", "o": ["Ignorar", "Registrar e analisar", "Apagar"], "c": 1, "e": "processos"}, {"q": "Monitorar status de equipamentos é feito via:", "o": ["SCADA", "Telefone só", "E-mail só"], "c": 0, "e": "processos"}, {"q": "Frequência ideal da ronda:", "o": ["Contínua/por ciclos no turno", "1x por mês", "Nunca"], "c": 0, "e": "processos"}, {"q": "Queda de PR numa usina específica:", "o": ["Sem importância", "Investigar (sujeira, falha, sensor)", "Religar e ignorar"], "c": 1, "e": "processos"}, {"q": "Dado/sensor inconsistente no monitoramento:", "o": ["Confiar", "Sinalizar (qualidade do dado)", "Apagar"], "c": 1, "e": "processos"}, {"q": "Monitoramento 24/7 garante:", "o": ["Detecção rápida de falhas", "Mais módulos", "Nada"], "c": 0, "e": "processos"}, {"q": "Várias usinas com desvio simultâneo sugere:", "o": ["Causa comum (clima/plataforma) — avaliar", "Nada", "Religar todas sem registro"], "c": 0, "e": "processos"}, {"q": "A ronda documentada vira:", "o": ["Registro/insumo de relatório", "Lixo", "Nada"], "c": 0, "e": "processos"}]}, "cos_alarmes": {"titulo": "POP COS — Eventos & Alarmes", "icone": "🚨", "eixo": "processos", "dur": "12 min", "video": "", "videoTip": "Vídeo do POP.COS.03 em operação", "secoes": [{"t": "Classificação e priorização: a tabela P1–P4", "h": "<p>O POP.COS.03.001 padroniza a avaliação de <b>severidade e impacto</b> de todo alarme do SCADA SunOp e do Prescinto (IBM). A classificação por equipamento é a referência inicial:</p><table><tr><th>Prioridade</th><th>Gravidade</th><th>Equipamentos típicos</th></tr><tr><td><b>P1</b></td><td>Crítica</td><td>Disjuntores, inversor, relé, transformador</td></tr><tr><td><b>P2</b></td><td>Alta</td><td>Strings, trackers, módulos fotovoltaicos</td></tr><tr><td><b>P3</b></td><td>Média</td><td>CFTV, switch, ETM</td></tr><tr><td><b>P4</b></td><td>Baixa</td><td>Falha de comunicação de tracker, estruturas de suporte</td></tr></table><p>A tabela orienta, mas a decisão final pondera o <b>impacto potencial</b>: perda total ou parcial de <b>geração</b>; risco de <b>segurança</b> (pessoas, dano a equipamento, incêndio/curto); <b>conformidade</b> com requisitos de rede/regulatórios; <b>tempo de resolução</b> exigido; e <b>custo</b> da interrupção. Um mesmo equipamento pode subir de prioridade se o contexto agravar o risco.</p>"}, {"t": "Triagem, Ack consciente e registro", "h": "<p>Ao disparo do alarme, o operador identifica <b>usina, equipamento específico e descrição</b> — a matéria-prima da triagem. O <b>reconhecimento (Ack)</b> marca o alarme como visto e assumido; por isso ele deve ser <b>coerente com a ação que será tomada</b>, nunca um clique automático:</p><ul><li><b>Ack em massa sem análise</b> é falha grave: mascara eventos reais e destrói a confiança no painel de alarmes.</li><li>Ack sem tratar o problema apenas esconde o evento — o alarme sai da tela, a falha continua na usina.</li></ul><p>A prioridade definida (P1–P4) é <b>registrada no CMMS ao abrir a ocorrência</b>, junto da descrição e do impacto estimado. Esse registro alimenta o acionamento, os indicadores (MTTR, disponibilidade) e o histórico usado em análises de recorrência.</p>"}, {"t": "Do alarme à ação: encadeamento com resposta e escalada", "h": "<p>A classificação não é um fim: ela <b>determina o fluxo seguinte</b>.</p><ul><li>A prioridade define o <b>POP de resposta</b> correspondente (ex.: POP.COS.04.001 para P1) ou a triagem preliminar detalhada.</li><li>A prioridade define a <b>urgência da comunicação interna</b> — Supervisor, Engenharia, Campo — conforme a Matriz de Escalada (POP.COS.05.002).</li></ul><p>Em cenários de <b>avalanche de alarmes</b> (tempestades, eventos de rede), a disciplina de priorização é decisiva: tratar primeiro os P1 (segurança e perda total), <b>agrupar alarmes por causa comum</b> (uma subtensão na subestação pode derrubar dezenas de inversores — é um evento, não dezenas) e deixar P3/P4 para tratamento conforme SLA. Sinais de causa sistêmica — o mesmo alarme em várias usinas do mesmo cliente ou mesma região — devem ser escalados para Engenharia/PCM, pois indicam problema de projeto, configuração ou rede, não falha isolada.</p>"}], "quiz": [{"q": "Alarme de perda total de geração é:", "o": ["P1", "P3", "Sem prioridade"], "c": 0, "e": "processos"}, {"q": "Após classificar, o operador faz:", "o": ["Triagem e registro da ocorrência", "Nada", "Apaga"], "c": 0, "e": "processos"}, {"q": "\"Ack\" do alarme significa:", "o": ["Reconhecer/baixar o alarme tratado", "Ignorar", "Excluir o equipamento"], "c": 0, "e": "processos"}, {"q": "Registrar a ocorrência serve para:", "o": ["Rastreabilidade e acionamento", "Atrasar", "Nada"], "c": 0, "e": "processos"}, {"q": "Vários alarmes ao mesmo tempo: prioriza-se por:", "o": ["Criticidade/SLA", "Ordem alfabética", "Sorteio"], "c": 0, "e": "processos"}, {"q": "Triagem preliminar busca:", "o": ["Entender o evento antes de acionar", "Pular etapas", "Nada"], "c": 0, "e": "processos"}, {"q": "Alarme P3 (menor):", "o": ["Tratar/planejar conforme SLA", "Acionar emergência", "Ignorar para sempre"], "c": 0, "e": "processos"}, {"q": "Ack sem tratar o problema:", "o": ["Boa prática", "Errado (mascara o evento)", "Recomendado"], "c": 1, "e": "processos"}, {"q": "Falso alarme recorrente:", "o": ["Tratar a causa (config/dado)", "Religar sempre", "Ignorar"], "c": 0, "e": "processos"}, {"q": "A abertura da ocorrência alimenta:", "o": ["A OS/chamado e os indicadores", "Nada", "Só o café"], "c": 0, "e": "processos"}], "avancado": [{"q": "Tempestade gera dezenas de alarmes simultâneos. Conduta:", "o": ["Tratar um a um sem critério", "Priorizar P1 (segurança/perda total), agrupar por causa comum", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Alarme de subtensão na subestação + inversores caindo:", "o": ["P3", "Provável evento de rede/proteção — P1, escalar", "Soiling"], "c": 1, "e": "processos"}, {"q": "Religamento remoto falhou 2x seguidas no mesmo inversor:", "o": ["Tentar infinitamente", "Abrir OS de campo e marcar recorrência", "Ack e esquecer"], "c": 1, "e": "processos"}, {"q": "Alarme intermitente sem perda de geração:", "o": ["P1", "Avaliar como qualidade de dado/sensor, registrar", "Acionar campo já"], "c": 1, "e": "processos"}, {"q": "Diferença entre alarme e evento P1 real:", "o": ["São iguais", "Validar impacto (geração/segurança) antes de escalar", "Sempre escalar tudo"], "c": 1, "e": "processos"}, {"q": "Ack em massa sem análise pode:", "o": ["Ajudar", "Esconder falhas reais", "Nada"], "c": 1, "e": "processos"}, {"q": "Priorização correta com P1 e dois P2 abertos:", "o": ["P2 primeiro", "P1 primeiro, depois P2 por SLA", "Aleatório"], "c": 1, "e": "processos"}, {"q": "Registro incompleto da ocorrência impacta:", "o": ["Nada", "Acionamento e indicadores (MTTR)", "Mais geração"], "c": 1, "e": "processos"}, {"q": "Evento que se repete em várias usinas do mesmo cliente:", "o": ["Coincidência", "Possível causa sistêmica — escalar engenharia/PCM", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Quando NÃO acionar o campo imediatamente:", "o": ["Sempre acionar", "Quando o religamento remoto resolve e não há risco", "Nunca acionar"], "c": 1, "e": "processos"}]}, "cos_incid": {"titulo": "POP COS — Resposta a Incidentes", "icone": "⚡", "eixo": "processos", "dur": "12 min", "video": "", "videoTip": "Vídeo do POP.COS.04 em operação", "secoes": [{"t": "Resposta imediata ao P1: confirmar antes de agir", "h": "<p>O POP.COS.04.001 rege a resposta a alarmes <b>críticos (P1)</b> — como a perda total de geração de uma usina — com três objetivos: minimizar tempo de inatividade, proteger pessoas e ativos e recuperar a geração. A sequência inicial é:</p><ul><li><b>Reconhecimento imediato (Ack)</b> do alarme sonoro/visual no SCADA SunOp e/ou Prescinto.</li><li><b>Confirmação rápida da criticidade:</b> perda total se confirma no monitoramento — todos os inversores offline, disjuntor principal aberto. Risco à segurança se avalia pela descrição do alarme (fumaça, incêndio, falha grave de proteção).</li><li><b>Comunicação:</b> reportar imediatamente ao supervisor e/ou equipe técnica.</li></ul><p>Confirmar antes de agir evita os dois erros clássicos: mobilizar uma emergência para um problema de telemetria, ou subestimar um evento real por preguiça de validação.</p>"}, {"t": "Intervenção remota segura: a regra de ouro", "h": "<p>Antes de qualquer manobra, o operador faz um <b>diagnóstico rápido e remoto</b>: a causa é identificável e resolvível daqui?</p><ul><li><b>Perda total:</b> se o disjuntor principal está aberto e <b>a condição permite</b>, tentar o fechamento remoto via SCADA conforme procedimento.</li><li><b>Inversores desligados:</b> tentar reset remoto <b>somente se não houver indicação de falha física nem segurança comprometida</b>.</li></ul><p>A regra de ouro do POP é explícita: <b>NUNCA</b> tentar ação remota que possa agravar a situação, danificar equipamento ou colocar pessoas em risco. Na dúvida, a ação remota <b>NÃO</b> deve ser tentada sem validação do Supervisor. Atenção especial a disjuntores abertos por <b>atuação de proteção</b>: religar às cegas pode significar fechar sobre falta. E se o religamento remoto falhou repetidamente no mesmo equipamento, insistir é perder tempo e mascarar recorrência — o caminho é a OS de campo.</p>"}, {"t": "Acionamento de campo, ocorrência e vigilância até o fim", "h": "<p>Confirmado o P1, a escalada é imediata: ligar para o <b>Supervisor</b> informando <b>usina afetada, natureza do alarme</b> (ex.: 'perda total de geração', 'alarme de incêndio') e <b>observações e tentativas remotas já realizadas</b>. O Supervisor — ou o operador sob sua orientação — aciona a <b>equipe de campo mais próxima</b> para deslocamento imediato, e a comunicação com partes interessadas segue após a validação: alerta conciso nos grupos de WhatsApp (usinas e clientes) e e-mail para a lista de emergência (gerência, comercial, engenharia).</p><p>Em paralelo, a gestão documental não espera o desfecho:</p><ul><li><b>Abrir a ocorrência P1 no CMMS imediatamente após a triagem</b>, mesmo com ações em andamento — data/hora, usina, tipo de alarme, impacto estimado, ações iniciais e prints de tela.</li><li><b>Vigilância intensiva</b> sobre a usina afetada até a resolução, coordenando com o campo: fornecer dados dos sistemas, receber atualizações do local e manter ocorrência e logs atualizados.</li><li>Após a resolução, participar da <b>análise pós-incidente</b> (causa raiz, lições aprendidas, ações preventivas — POP.COS.06.004).</li></ul>"}], "quiz": [{"q": "Diante de perda total de geração (P1):", "o": ["Aguardar o dia seguinte", "Resposta imediata (SLA 4h) e religamento/acionamento", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Intervenção remota é feita via:", "o": ["SCADA/SunOp", "Visita", "Carta"], "c": 0, "e": "processos"}, {"q": "Acionar o campo significa:", "o": ["Abrir OS e enviar a turma", "Nada", "Religar remoto de novo"], "c": 0, "e": "processos"}, {"q": "Antes de acionar o campo, o operador reúne:", "o": ["Informações do evento (usina, equipamento, severidade)", "Só a hora", "Nada"], "c": 0, "e": "processos"}, {"q": "Gestão de OS pelo COS inclui:", "o": ["Abrir e acompanhar a OS", "Apagar OS", "Nada"], "c": 0, "e": "processos"}, {"q": "P1 com risco de segurança:", "o": ["Acionar com prioridade e segurança", "Esperar", "Ignorar"], "c": 0, "e": "processos"}, {"q": "Se o remoto resolve:", "o": ["Registra e encerra (sem OS de campo)", "Aciona campo mesmo assim", "Apaga"], "c": 0, "e": "processos"}, {"q": "Recorrência do mesmo incidente:", "o": ["Marcar e escalar", "Esconder", "Nada"], "c": 0, "e": "processos"}, {"q": "A comunicação do incidente segue:", "o": ["A matriz de escalada", "O acaso", "Nada"], "c": 0, "e": "processos"}, {"q": "Documentar o incidente serve para:", "o": ["Pós-análise e indicadores", "Nada", "Atrasar"], "c": 0, "e": "processos"}], "avancado": [{"q": "Incidente com risco de segurança (princípio de incêndio na cabine):", "o": ["Tratar como P3", "Acionar emergência/segurança antes de tudo", "Religar"], "c": 1, "e": "processos"}, {"q": "Vários inversores caem em sequência no mesmo skid:", "o": ["Tratar um a um", "Suspeitar de causa comum (rede/temperatura) e escalar", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Religamento remoto disponível, mas a falha é física (componente queimado):", "o": ["Insistir no remoto", "Não insistir — abrir OS de campo", "Ack"], "c": 1, "e": "processos"}, {"q": "P1 ocorre à noite (sem geração possível):", "o": ["Ignorar", "Registrar e priorizar pela criticidade real (segurança/garantia)", "Acionar campo de madrugada sempre"], "c": 1, "e": "processos"}, {"q": "Incidente recorrente já documentado antes:", "o": ["Tratar como novo", "Referenciar o histórico/base de conhecimento e escalar", "Apagar"], "c": 1, "e": "processos"}, {"q": "Antes de acionar o campo num incidente:", "o": ["Nada", "Reunir usina, equipamento, severidade e contexto", "Só a hora"], "c": 1, "e": "processos"}, {"q": "Gestão da OS aberta pelo COS inclui:", "o": ["Abrir e acompanhar até o fechamento", "Abrir e esquecer", "Apagar"], "c": 0, "e": "processos"}], "passThr": 0.8}, "cos_escala": {"titulo": "POP COS — Comunicação & Escalada", "icone": "📣", "eixo": "processos", "dur": "12 min", "video": "", "videoTip": "Vídeo do POP.COS.05 em operação", "secoes": [{"t": "Os quatro níveis de escalada (N0–N3)", "h": "<p>A Matriz de Escalada (POP.COS.05.002) define <b>quem aciona quem, por qual canal e em quanto tempo</b>, garantindo que eventos críticos alcancem o nível certo de decisão sem ruído nem atraso.</p><ul><li><b>Nível 0 — Operador de Turno:</b> primeira resposta; triagem, Ack, tentativas de solução remota e abertura de OS.</li><li><b>Nível 1 — Supervisor de Operação:</b> primeiro ponto de escalada; valida a triagem, autoriza ações complexas, aciona equipe de campo e gerencia a resposta inicial.</li><li><b>Nível 2 — Especialistas / Gerência de O&M:</b> suporte técnico especializado e coordenação interdepartamental (Engenharia, Suprimentos).</li><li><b>Nível 3 — Diretoria:</b> incidentes de alto impacto financeiro ou de imagem, decisões estratégicas e comunicação com stakeholders externos.</li></ul><p>Princípio estrutural: a cadeia passa <b>primeiro pelo Supervisor</b>, que filtra e direciona — escalar 'por cima' desorganiza a resposta; escalar tarde demais estoura o SLA. O equilíbrio é dado pelos gatilhos objetivos da matriz.</p>"}, {"t": "Matriz por prioridade: gatilhos, canais e prazos", "h": "<p>Cada prioridade tem gatilho e prazo definidos:</p><table><tr><th>Situação</th><th>Nível acionado</th><th>Canal</th><th>Prazo de contato</th></tr><tr><td><b>P1</b> confirmada</td><td>N1 Supervisor</td><td>Telefone IMEDIATO + e-mail</td><td>Máx. 5 min</td></tr><tr><td><b>P1</b> sem progresso em 30 min</td><td>N2 Gerência O&M</td><td>Telefone + e-mail</td><td>Máx. 15 min</td></tr><tr><td><b>P1</b> impacto financeiro/indisponibilidade prolongada</td><td>N3 Diretoria</td><td>Telefone via Supervisor/Gerente + e-mail</td><td>Máx. 30 min</td></tr><tr><td><b>P2</b> sem progresso em 60 min ou 1ª tentativa remota sem sucesso</td><td>N1 Supervisor</td><td>Telefone ou e-mail + registro</td><td>Máx. 10 min</td></tr><tr><td><b>P2</b> sem progresso em 4 h</td><td>N2 Gerência O&M</td><td>E-mail c/ cópia ao N1</td><td>Máx. 30 min</td></tr><tr><td><b>P3</b> acompanhamento excede o turno</td><td>N1 (ciência)</td><td>E-mail de resumo de turno</td><td>Próximo turno</td></tr><tr><td><b>P4</b></td><td>Nenhum (N0)</td><td>Log de turno + e-mail de encerramento</td><td>—</td></tr></table><p>No P1, o Supervisor já avalia de saída a necessidade de acionar N2 e N3 imediatamente; no P2, avalia acionamento de campo e especialistas.</p>"}, {"t": "Comunicação eficaz: conteúdo, registro e confirmação", "h": "<p>Escalar não é repassar pânico — é transferir contexto acionável. Toda comunicação de escalada deve conter, de forma concisa: <b>usina, tipo de alarme, impacto atual, ações já tomadas, próximos passos sugeridos e urgência</b>. E o processo só está completo com três disciplinas:</p><ul><li><b>Registro:</b> toda escalada entra na ocorrência do CMMS — data, hora, quem foi acionado e canal utilizado. Escalada não registrada é escalada que não aconteceu para efeito de auditoria e SLA.</li><li><b>Confirmação de recebimento:</b> o operador deve garantir que a pessoa acionada <b>confirmou</b> a comunicação; ligação não atendida ou mensagem não lida não conta como acionamento.</li><li><b>Cadeia disciplinada:</b> acionar primeiro o Supervisor, para que as ações sejam filtradas e tratadas nos níveis corretos da tabela.</li></ul><p>Com o cliente e demais partes interessadas, a comunicação é <b>clara, objetiva, factual e no tempo certo</b> — o histórico dessas mensagens é documentação de referência em auditorias.</p>"}], "quiz": [{"q": "A matriz de escalada define:", "o": ["Quem acionar e em quanto tempo", "O preço", "A cor do EPI"], "c": 0, "e": "processos"}, {"q": "P1 sem início no prazo:", "o": ["Nada acontece", "Escala automaticamente (ex.: Coordenador)", "Apaga"], "c": 1, "e": "processos"}, {"q": "Comunicar o cliente sobre um incidente:", "o": ["Claro e no tempo certo", "Nunca", "Só depois de semanas"], "c": 0, "e": "processos"}, {"q": "Comunicação de status interna serve para:", "o": ["Alinhar o time", "Atrasar", "Nada"], "c": 0, "e": "processos"}, {"q": "Escalar cedo demais sem necessidade:", "o": ["Ideal", "Evitar (mas não atrasar P1)", "Sempre"], "c": 1, "e": "processos"}, {"q": "Parte interessada externa típica:", "o": ["O cliente/concessionária", "O vizinho", "Ninguém"], "c": 0, "e": "processos"}, {"q": "Registro da comunicação:", "o": ["Importante (rastreabilidade)", "Desnecessário", "Proibido"], "c": 0, "e": "processos"}, {"q": "Quem o operador aciona primeiro num P1 técnico de campo:", "o": ["Conforme a matriz (supervisão/coordenação)", "O cliente direto sempre", "Ninguém"], "c": 0, "e": "processos"}, {"q": "Mensagem de status deve ser:", "o": ["Clara, objetiva e factual", "Vaga", "Inexistente"], "c": 0, "e": "processos"}, {"q": "A escalada existe para:", "o": ["Garantir resposta no SLA", "Punir", "Nada"], "c": 0, "e": "processos"}]}, "cos_doc": {"titulo": "POP COS — Documentação & Relatórios", "icone": "🗒️", "eixo": "processos", "dur": "12 min", "video": "", "videoTip": "Vídeo do POP.COS.06 em operação", "secoes": [{"t": "Registro detalhado de ocorrências: o que não pode faltar", "h": "<p>Pelo POP.COS.06.001, toda ocorrência <b>P1, P2 ou P3</b> — ou anomalia significativa <b>mesmo sem alarme</b> — deve ser registrada no CMMS de forma completa e padronizada. O registro é a fonte de verdade para diagnóstico, histórico, análise de causa raiz e gestão de ativos. Campos essenciais:</p><ul><li><b>Identificação:</b> usina, data/hora do início (da detecção, se diferir do disparo), tipo de ocorrência (lista padronizada) e prioridade.</li><li><b>Sintomas:</b> o que foi observado ('geração zero no inversor X', 'usina offline').</li><li><b>Mensagens de alarme:</b> transcrição <b>exata</b>, incluindo códigos de erro — é o que permite ao especialista diagnosticar sem estar na tela.</li><li><b>Impacto inicial quantificado:</b> 'perda de 500 kW', 'offline por 2 horas', 'risco de segurança elétrica'.</li><li><b>Contexto:</b> fatores relevantes ('coincidente com tempestade', 'após manobra de desligamento').</li></ul><p>Registrar 'inversor com defeito, resolvido' não é registro — é a ausência de um.</p>"}, {"t": "Ações do COS, OS associada e evidências", "h": "<p>A ocorrência conta a história completa da atuação do COS:</p><ul><li><b>Ações preliminares registradas uma a uma:</b> 'Ack do alarme', 'tentativa de reset remoto do inversor X (sem sucesso)', 'verificação de conectividade (ping OK)', 'análise de logs no SCADA'. Isso evita retrabalho do campo e comprova o cumprimento do procedimento.</li><li><b>OS associada:</b> se uma OS foi aberta, ela é <b>linkada à ocorrência</b> com status atualizado (aberta, em andamento, concluída). Ocorrência e OS se complementam: uma descreve o problema e o contexto, a outra a execução.</li><li><b>Anexos:</b> capturas de tela dos alarmes e dashboards (SCADA/CMMS), <b>gráficos de geração ou PR</b> evidenciando a queda, logs específicos do equipamento. Meses depois, quando um cliente contestar uma indisponibilidade, são essas evidências que reconstroem o evento.</li></ul><p>Qualidade do registro: <b>revisar antes de salvar</b> (completo, claro, sem erros) e <b>atualizar continuamente</b> — diagnóstico do campo, solução implementada, data/hora da resolução — até o fechamento, referenciando ocorrências anteriores semelhantes quando houver.</p>"}, {"t": "Logs de turno, relatórios e aprendizado pós-incidente", "h": "<p>Além da ocorrência individual, a documentação do COS se sustenta em camadas:</p><ul><li><b>Log de turno e diário de bordo:</b> registro cronológico dos eventos e ações do turno, consolidado no e-mail de encerramento (pendências, usinas normais, ocorrências e ações, observações). É o elo formal entre turnos e a base da rastreabilidade.</li><li><b>Relatórios operacionais:</b> os registros do COS alimentam relatórios diários/semanais e os indicadores (disponibilidade, MTTR, recorrência) consumidos por Performance, PCM, KAM e gestão — dado mal registrado vira indicador errado e decisão errada.</li><li><b>Análise pós-incidente (post-mortem):</b> após eventos críticos, identificar causa raiz, lições aprendidas e ações preventivas, transformando o incidente em melhoria de procedimento.</li><li><b>Base de conhecimento:</b> soluções e diagnósticos documentados aceleram a resposta dos próximos operadores — conhecimento que fica só na cabeça de alguém não escala turnos de 24/7.</li></ul><p>O histórico de mensagens nos grupos e e-mails é <b>documentação de referência em auditorias e revisões operacionais</b>: escreva cada registro como se fosse ser lido por um auditor — porque um dia será.</p>"}], "quiz": [{"q": "O log de turno registra:", "o": ["Os eventos do turno", "Nada", "Só o clima"], "c": 0, "e": "processos"}, {"q": "Post-mortem é:", "o": ["Análise após o incidente", "Um EPI", "Um inversor"], "c": 0, "e": "processos"}, {"q": "Relatórios do COS são:", "o": ["Diários/semanais", "Nunca", "De 10 em 10 anos"], "c": 0, "e": "processos"}, {"q": "Atualizar a base de conhecimento ajuda:", "o": ["Próximos operadores a resolver mais rápido", "A atrasar", "Nada"], "c": 0, "e": "processos"}, {"q": "Registro detalhado de ocorrência melhora:", "o": ["Rastreabilidade e MTTR", "Soiling", "Nada"], "c": 0, "e": "processos"}, {"q": "Um aprendizado de incidente deve:", "o": ["Virar conhecimento/procedimento", "Ser esquecido", "Ficar só na cabeça"], "c": 0, "e": "processos"}, {"q": "Relatório sem dados consistentes:", "o": ["Útil", "Pouco confiável — revisar", "Ideal"], "c": 1, "e": "processos"}, {"q": "Quem usa os relatórios do COS:", "o": ["Performance, PCM, KAM e gestão", "Ninguém", "Só o estagiário"], "c": 0, "e": "processos"}, {"q": "Documentação é parte:", "o": ["Do trabalho do operador", "De ninguém", "Opcional sempre"], "c": 0, "e": "processos"}, {"q": "Post-mortem busca:", "o": ["Causa e ações para não repetir", "Culpar", "Nada"], "c": 0, "e": "processos"}]}, "kam_x": {"titulo": "Gestão de Contrato & Cliente (KAM)", "icone": "🤝", "eixo": "processos", "dur": "18 min", "video": "", "videoTip": "Vídeo de condução de RMO/reunião com cliente", "secoes": [{"t": "O papel do KAM", "h": "<p>O <b>KAM</b> é o dono do contrato/cliente: relacionamento, reuniões, <b>RMO</b>, gestão de <b>SLA</b>, aditivos e escalonamento. Aprova entregáveis da carteira.</p>"}, {"t": "Indicadores e contrato", "h": "<p>Lê e explica ao cliente: <b>disponibilidade, PR, SLA por criticidade, MTTR/MTBF</b>. Conhece o <b>escopo e as penalidades</b> do contrato e prioriza pelo prazo mais restritivo.</p>"}, {"t": "Aditivos e escalonamento", "h": "<p>Conduz <b>aditivos</b> (com Comercial/Jurídico), trata <b>penalidades/notificações</b> e <b>escala</b> internamente o que precisa para cumprir o contrato.</p>"}], "quiz": [{"q": "O KAM é responsável por:", "o": ["Dono do contrato/cliente", "Trocar fusíveis", "Operar SCADA"], "c": 0, "e": "processos"}, {"q": "O RMO é:", "o": ["Relatório mensal de operação ao cliente", "Um equipamento", "Um EPI"], "c": 0, "e": "processos"}, {"q": "SLA de P1 que o KAM reporta:", "o": ["4 h", "24 h", "5 d.u."], "c": 0, "e": "processos"}, {"q": "Mudança de escopo no contrato vira:", "o": ["Aditivo (Comercial/Jurídico)", "OS de campo", "Nada"], "c": 0, "e": "processos"}, {"q": "O KAM prioriza pelo prazo:", "o": ["Mais restritivo do contrato", "Mais folgado", "Do técnico"], "c": 0, "e": "processos"}, {"q": "Disponibilidade abaixo do contratado pode gerar:", "o": ["Penalidade", "Bônus", "Nada"], "c": 0, "e": "processos"}, {"q": "Diante de uma reclamação do cliente, o KAM:", "o": ["Ignora", "Escuta, registra e aciona plano de ação", "Repassa sem tratar"], "c": 1, "e": "processos"}, {"q": "Quem aprova os entregáveis da carteira:", "o": ["O KAM", "O técnico", "O fornecedor"], "c": 0, "e": "processos"}, {"q": "Antes do contrato entrar em operação, o KAM:", "o": ["Faz a passagem do Comercial → O&M", "Nada", "Vai a campo trocar inversor"], "c": 0, "e": "processos"}, {"q": "O KAM lê indicadores como:", "o": ["PR, disponibilidade, SLA, MTTR/MTBF", "Só a cor", "Nenhum"], "c": 0, "e": "processos"}], "avancado": [{"q": "Cliente questiona uma penalidade por SLA. O KAM:", "o": ["Aceita sem checar", "Valida com evidências (Performance/COS) antes de responder", "Ignora"], "c": 1, "e": "processos"}, {"q": "PR caiu no mês por soiling alto. Postura com o cliente:", "o": ["Esconder", "Explicar a causa e o plano (lavagem) com dados", "Culpar o cliente"], "c": 1, "e": "processos"}, {"q": "Pedido de inclusão de usina na carteira:", "o": ["Fazer informalmente", "Formalizar aditivo (escopo/preço) e onboarding", "Recusar sempre"], "c": 1, "e": "processos"}, {"q": "Conflito entre prazo do cliente e capacidade da equipe:", "o": ["Prometer sem base", "Negociar com dados e acionar Coordenação/PCM", "Ignorar o cliente"], "c": 1, "e": "processos"}, {"q": "Indicador de disponibilidade divergente entre Grid e cliente:", "o": ["Aceitar a do cliente", "Reconciliar metodologia/medição (Performance)", "Brigar"], "c": 1, "e": "processos"}, {"q": "Notificação contratual recebida:", "o": ["Arquivar", "Tratar com Jurídico e plano de resposta", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Reunião de RMO deve focar em:", "o": ["Desculpas", "KPIs, desvios, ações e próximos passos", "Assuntos aleatórios"], "c": 1, "e": "processos"}, {"q": "Risco contratual identificado cedo:", "o": ["Esconder até estourar", "Comunicar internamente e mitigar", "Nada"], "c": 1, "e": "processos"}, {"q": "O KAM e a Performance, na relação com o cliente:", "o": ["Trabalham separados", "Atuam juntos (KAM relação, Performance dado)", "Competem"], "c": 1, "e": "processos"}, {"q": "Escalonamento interno serve para:", "o": ["Garantir cumprimento do contrato/SLA", "Atrasar", "Punir"], "c": 1, "e": "processos"}, {"q": "Cliente compara disponibilidade e diverge da Grid:", "o": ["Aceitar a dele", "Reconciliar metodologia/medição com a Performance", "Brigar"], "c": 1, "e": "processos"}, {"q": "Penalidade por SLA iminente:", "o": ["Esperar estourar", "Mobilizar plano de ação e comunicar proativamente", "Esconder"], "c": 1, "e": "processos"}, {"q": "Cliente pede escopo extra sem aditivo:", "o": ["Fazer de graça", "Formalizar aditivo (escopo/preço)", "Recusar sem explicar"], "c": 1, "e": "processos"}, {"q": "Tendência de queda de PR num cliente ao longo dos meses:", "o": ["Aguardar reclamação", "Antecipar conversa com dados e plano (Performance)", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Notificação contratual recebida:", "o": ["Arquivar", "Acionar Jurídico + plano de resposta", "Ignorar"], "c": 1, "e": "processos"}, {"q": "RMO deve focar em:", "o": ["Desculpas", "KPIs, desvios, ações e próximos passos", "Assuntos aleatórios"], "c": 1, "e": "processos"}], "passThr": 0.8}, "perf_x": {"titulo": "Análise de Performance", "icone": "📊", "eixo": "tecnico", "dur": "20 min", "video": "", "videoTip": "Vídeo de análise de PR e abertura de chamado de performance", "secoes": [{"t": "PR, disponibilidade e perdas", "h": "<p>A Performance acompanha o <b>PR</b> (gerado vs. esperado), a <b>disponibilidade</b> e as <b>perdas</b> (soiling, sombreamento, degradação, indisponibilidade, clipping). Usa a <b>estação solarimétrica</b> como referência.</p>"}, {"t": "Detecção de desvios e chamados", "h": "<p>Detecta <b>desvios</b> de geração vs. esperado, investiga a causa e abre <b>chamados de performance</b> direcionados ao tempo real/campo. Produz o <b>RMO</b> e os boletins.</p>"}, {"t": "Qualidade do dado", "h": "<p>Dado confiável é tudo: sensores calibrados, telemetria íntegra. Um <b>sensor descalibrado/sujo</b> distorce o PR. A Performance valida a qualidade do dado com o Analista COS-Performance.</p>"}], "quiz": [{"q": "PR é:", "o": ["Gerado vs. esperado", "Potência instalada", "Nº de inversores"], "c": 0, "e": "tecnico"}, {"q": "Referência de irradiância para o PR vem da:", "o": ["Estação solarimétrica", "Conta de luz", "Previsão do tempo só"], "c": 0, "e": "tecnico"}, {"q": "Perda por sujeira chama-se:", "o": ["Soiling", "Clipping", "Derating"], "c": 0, "e": "tecnico"}, {"q": "Clipping é:", "o": ["Limitação do inversor no pico", "Sujeira", "Falha de tracker"], "c": 0, "e": "tecnico"}, {"q": "Ao detectar desvio, a Performance:", "o": ["Abre chamado e investiga", "Ignora", "Religa"], "c": 0, "e": "tecnico"}, {"q": "Um sensor descalibrado:", "o": ["Distorce o PR", "Melhora a geração", "Não afeta"], "c": 0, "e": "tecnico"}, {"q": "O RMO consolida:", "o": ["KPIs e desvios do mês", "Nada", "Só fotos"], "c": 0, "e": "processos"}, {"q": "Disponibilidade e PR baixos juntos sugerem:", "o": ["Indisponibilidade impactando a geração", "Mais sol", "Nada"], "c": 0, "e": "tecnico"}, {"q": "Chamado de performance vai para:", "o": ["Tempo real/campo", "O cliente", "Lixo"], "c": 0, "e": "processos"}, {"q": "Quem valida a qualidade do dado com a Performance:", "o": ["Analista COS-Performance", "O motorista", "Ninguém"], "c": 0, "e": "processos"}], "avancado": [{"q": "PR caiu 8% sem queda de disponibilidade. Hipótese principal:", "o": ["Indisponibilidade", "Soiling/sombra/sensor (perdas)", "Mais geração"], "c": 1, "e": "tecnico"}, {"q": "Geração real > esperada de forma persistente:", "o": ["Comemorar e ignorar", "Verificar dado/irradiância (possível erro de sensor)", "Reduzir módulos"], "c": 1, "e": "tecnico"}, {"q": "Um inversor com clipping frequente indica:", "o": ["Falha", "Possível subdimensionamento/inversor saturando — avaliar", "Soiling"], "c": 1, "e": "tecnico"}, {"q": "Desvio só em horários de baixa irradiância:", "o": ["Soiling", "Possível sombreamento/erro de baixa luz — analisar", "Clipping"], "c": 1, "e": "tecnico"}, {"q": "PR do contrato medido com sensor não calibrado:", "o": ["Aceitar", "Reconciliar/calibrar antes de reportar", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Degradação de módulos aparece como:", "o": ["Queda gradual de PR ao longo do tempo", "Salto súbito", "Nada"], "c": 0, "e": "tecnico"}, {"q": "Falha de telemetria de uma usina:", "o": ["Assumir 0 e penalizar", "Sinalizar gap de dado e tratar", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Antes de abrir chamado de performance:", "o": ["Confirmar que é perda real (não dado)", "Abrir sempre", "Nunca abrir"], "c": 0, "e": "processos"}, {"q": "Comparar usinas gêmeas ajuda a:", "o": ["Isolar causa de desvio", "Nada", "Aumentar soiling"], "c": 0, "e": "tecnico"}, {"q": "Perda por indisponibilidade é responsabilidade de melhorar via:", "o": ["Manutenção (MTTR/MTBF)", "Sol", "Cliente"], "c": 0, "e": "processos"}, {"q": "Duas usinas do mesmo cliente caem o PR no mesmo dia, clima normal. Hipótese:", "o": ["Soiling nas duas", "Causa sistêmica (plataforma/medição) — investigar", "Mais sol"], "c": 1, "e": "tecnico"}, {"q": "PR de uma usina sobe logo após uma OS de inversor. Conclusão:", "o": ["Coincidência", "A falha do inversor causava a perda (confirma a ação)", "Erro de dado"], "c": 1, "e": "tecnico"}, {"q": "Queda de PR só no fim da tarde, todos os dias:", "o": ["Soiling uniforme", "Sombreamento de objeto a oeste / sujeira parcial — analisar", "Clipping"], "c": 1, "e": "tecnico"}, {"q": "Disponibilidade 100% mas PR baixo o mês inteiro:", "o": ["Indisponibilidade", "Perdas (soiling/temperatura/sensor), não indisponibilidade", "Mais geração"], "c": 1, "e": "tecnico"}, {"q": "POA muito acima da GHI num dia limpo e sem tracker:", "o": ["Normal", "Possível erro/sujeira no sensor — validar dado", "Mais energia"], "c": 1, "e": "tecnico"}, {"q": "Geração real persistentemente acima do esperado:", "o": ["Comemorar", "Verificar irradiância/sensor (possível erro de medição)", "Reduzir módulos"], "c": 1, "e": "tecnico"}, {"q": "Antes de cobrar penalidade de disponibilidade do cliente:", "o": ["Aceitar o número dele", "Reconciliar metodologia/medição (qualidade do dado)", "Ignorar"], "c": 1, "e": "processos"}], "passThr": 0.8}, "mpa_modstr": {"titulo": "MPA — Módulos, Strings & String Boxes", "icone": "🔆", "eixo": "tecnico", "dur": "26 min", "video": "", "videoTip": "Vídeo de medição de Voc/Isc e higienização de módulos (Grid)", "apto": "Apto MPA · Módulos/Strings", "passThr": 0.8, "secoes": [{"t": "Medições energizadas — Voc e Isc", "h": "<p>A <b>Voc</b> (tensão de circuito aberto) de uma string ≈ <b>nº de módulos × Voc do módulo</b>, corrigida pela temperatura. A <b>Isc</b> (corrente de curto) reflete a irradiância e a saúde das células. Mede-se a Isc com <b>alicate amperímetro CC True RMS</b>.</p><p><b>Interpretação:</b> Voc bem abaixo do esperado (≈ a de um módulo a menos) → <b>módulo/conector em aberto</b> ou <b>diodo de bypass acionado</b>. Isc menor que as strings vizinhas (mesmo limpa) → <b>sombreamento/mismatch/célula degradada</b>.</p>"}, {"t": "Segurança específica (risco letal contínuo)", "h": "<ul><li>A montante do ponto seccionado, <b>enquanto houver sol</b>, há <b>tensão letal (Voc) contínua</b>.</li><li><b>Energia capacitiva residual</b> após ensaio com megôhmetro — <b>descarregar/aterrar</b> antes de manusear.</li><li>Lavagem: <b>água condutiva</b> pode entrar em conectores fissurados; risco de <b>choque térmico</b> ao molhar painel quente.</li><li>EPI: <b>vestimenta anti-arco Categoria de Risco II</b> (mínimo). Seccionamento conforme o <b>POP de Manobras</b>.</li></ul>"}, {"t": "Higienização condicional e fixação", "h": "<p><b>Higienização</b> é <b>condicional</b> (gatilho: queda de <b>PR &gt; 10%</b> ou índice de sujidade), pode recuperar <b>até 10% de PR</b>; usar <b>água de osmose reversa</b>, umedecendo <b>de cima para baixo</b>.</p><p><b>Fixação — aceitação:</b> módulos coplanares; torquímetro atinge o estalo <b>sem girar</b> o parafuso (ancoragem íntegra); cabos DC 100% legíveis. <b>Rejeição:</b> parafusos girando em falso/grampos soltos (reaperto na fileira); identificação ilegível.</p>"}, {"t": "📖 POP — Módulos & Strings (referência)", "h": "<p><b>Higienização condicional</b>: gatilho PR &gt;10% ou sujidade; recupera <b>até 10% de PR</b>; água de osmose reversa, de cima para baixo.</p><p><b>Segurança</b>: tensão <b>Voc letal e contínua a montante</b> com sol; <b>energia capacitiva residual</b> após o megôhmetro (descarregar/aterrar antes de tocar); medir Isc com <b>alicate True RMS CC</b>; EPI <b>anti-arco Cat. Risco II</b>.</p><p><b>Fixação</b>: aceitação = coplanar + torquímetro estala sem girar + cabos DC legíveis; rejeição = parafuso girando em falso.</p><p style=\"font-size:11px;color:#888;margin-top:8px\">Fonte: procedimento controlado da Grid Co. — resumo de referência. Sempre consulte a versão vigente do POP antes de executar.</p>"}], "quiz": [{"q": "A Voc de uma string corresponde a:", "o": ["nº de módulos × Voc do módulo (corrigida por temperatura)", "A corrente da string", "A potência da usina"], "c": 0, "e": "tecnico"}, {"q": "A Isc é medida com:", "o": ["Alicate amperímetro CC True RMS", "Megôhmetro", "Terrômetro"], "c": 0, "e": "tecnico"}, {"q": "A montante do ponto seccionado, com sol, há:", "o": ["Tensão letal (Voc) contínua", "Nada", "Só corrente"], "c": 0, "e": "cultura"}, {"q": "Após ensaio com megôhmetro, antes de manusear os cabos:", "o": ["Descarregar/aterrar a energia capacitiva residual", "Tocar direto", "Nada"], "c": 0, "e": "cultura"}, {"q": "Higienização condicional recupera até:", "o": ["10% de PR", "50% de PR", "Nada"], "c": 0, "e": "tecnico"}, {"q": "Gatilho para higienizar os módulos:", "o": ["Queda de PR > 10% ou sujidade", "Toda semana", "Nunca"], "c": 0, "e": "tecnico"}, {"q": "Lavagem de módulos usa:", "o": ["Água de osmose reversa, de cima para baixo", "Água do rio com pressão", "Solvente"], "c": 0, "e": "tecnico"}, {"q": "EPI mínimo contra arco na string box:", "o": ["Vestimenta anti-arco Cat. Risco II", "Camiseta", "Nenhum"], "c": 0, "e": "cultura"}, {"q": "Parafuso de fixação girando em falso:", "o": ["Rejeição — reaperto na fileira", "Aceitação", "Ignorar"], "c": 0, "e": "tecnico"}, {"q": "Identificação dos cabos DC ilegível:", "o": ["Critério de rejeição (refazer)", "Aceitável", "Irrelevante"], "c": 0, "e": "processos"}], "avancado": [{"q": "Voc da string ≈ 40 V abaixo do esperado (≈ um módulo). Interpretação mais provável:", "o": ["Soiling", "Módulo/conector em aberto ou diodo de bypass acionado", "Excesso de sol"], "c": 1, "e": "tecnico"}, {"q": "Isc 15% menor que as strings vizinhas, módulos limpos. Hipótese:", "o": ["Tudo normal", "Sombreamento/mismatch/célula degradada — investigar", "Mais geração"], "c": 1, "e": "tecnico"}, {"q": "Voc da string ZERO num dia ensolarado:", "o": ["Normal", "String totalmente aberta (seccionador/fusível/conector)", "Excesso de irradiância"], "c": 1, "e": "tecnico"}, {"q": "Conector DC com fissura e sinais de infiltração:", "o": ["Manter", "Substituir — risco de arco/choque (água condutiva)", "Pintar"], "c": 1, "e": "tecnico"}, {"q": "Lavar módulos quentes ao meio-dia com água fria:", "o": ["Sempre ok", "Risco de choque térmico — seguir horário/procedimento", "Recomendado"], "c": 1, "e": "tecnico"}, {"q": "Isc igual nas strings mas Voc de uma está baixa:", "o": ["Problema de corrente", "Problema de tensão (módulo/bypass) — não de sujeira", "Soiling"], "c": 1, "e": "tecnico"}, {"q": "Você vai medir Isc mas não tem alicate True RMS CC:", "o": ["Usar qualquer alicate", "Não medir — instrumento inadequado falseia o valor", "Estimar"], "c": 1, "e": "tecnico"}, {"q": "Diferença grande de Isc entre strings idênticas sob mesma irradiância indica:", "o": ["Mismatch/sombra/sujeira localizada", "Nada", "Mais potência"], "c": 0, "e": "tecnico"}, {"q": "Após reaperto, dois módulos ficaram não coplanares:", "o": ["Aceitar", "Rejeição — corrigir alinhamento/ancoragem", "Ignorar"], "c": 1, "e": "tecnico"}, {"q": "Trabalhar na string com sol forte exige consciência de que:", "o": ["Está desenergizada", "Há Voc letal a montante mesmo seccionada a jusante", "Não há risco"], "c": 1, "e": "cultura"}, {"q": "PR caiu 12% e sujidade alta; demais parâmetros ok. Ação:", "o": ["Trocar inversor", "Higienização condicional dos módulos", "Abrir N3"], "c": 1, "e": "tecnico"}, {"q": "Grampos de fixação soltos numa fileira inteira:", "o": ["Reaperto pontual", "Reaperto de toda a fileira (segurança estrutural)", "Ignorar"], "c": 1, "e": "tecnico"}]}, "mpa_cabine": {"titulo": "MPA — Cabine de Média Tensão", "icone": "🏭", "eixo": "tecnico", "dur": "28 min", "video": "", "videoTip": "Vídeo de ensaios na cabine MT (disjuntor/seccionadora) da Grid", "apto": "Apto MPA · Cabine MT", "passThr": 0.8, "secoes": [{"t": "Equipamentos e ensaios", "h": "<p>A cabine/cubículo de MT é o ponto de <b>manobra, proteção e medição</b>. Componentes: <b>disjuntor MT</b> (extraível ou fixo), <b>seccionadora</b>, <b>TP/TPA</b> e <b>TC</b>, barramentos e isoladores. Ensaios da MPA: <b>resistência de isolamento</b>, <b>resistência de contato</b> (disjuntor/seccionadora) e <b>relação de transformação</b> (TP/TC). Norma: <b>ABNT NBR IEC 62271-100</b>.</p>"}, {"t": "Sequência de manobra segura", "h": "<p>Ordem obrigatória antes de trabalhar: <b>1) Bloqueio (cadeado+etiqueta)</b> nas seccionadoras de <b>montante (MT)</b> e <b>jusante (BT/inversores)</b>; <b>2) Constatação de ausência de tensão</b>; <b>3) Aterramento temporário (ATR)</b> e/ou <b>chave de aterramento do cubículo</b> — obrigatórios para <b>descarregar a energia capacitiva residual</b>; <b>4) Disjuntor extraível na posição teste/extraída</b>. É <b>proibido</b> aproximar/tocar barramentos, contatos, TPs e TCs.</p>"}, {"t": "Interpretação dos resultados", "h": "<ul><li><b>Resistência de contato alta</b> (disjuntor/seccionadora) → <b>desgaste/oxidação</b> dos contatos → aquecimento → tratar/substituir.</li><li><b>Resistência de isolamento baixa</b> → não energizar; investigar umidade/contaminação.</li><li><b>Intertravamento</b> mecânico não funcional → <b>não operar</b> (risco de manobra indevida).</li></ul>"}, {"t": "📖 POP — Cabine MT (referência)", "h": "<p>Norma <b>ABNT NBR IEC 62271-100</b>. Ensaios: resistência de isolamento, <b>resistência de contato</b> e relação.</p><p><b>Sequência de manobra segura (LOTO)</b>: bloqueio montante + jusante → confirmar ausência de tensão → ATR/chave de aterramento (descarrega a capacitiva residual) → disjuntor extraível em posição de teste.</p><p>Resistência de contato alta = desgaste/oxidação. <b>Intertravamento não funcional → não operar.</b></p><p style=\"font-size:11px;color:#888;margin-top:8px\">Fonte: procedimento controlado da Grid Co. — resumo de referência. Sempre consulte a versão vigente do POP antes de executar.</p>"}], "quiz": [{"q": "A cabine de MT é o ponto de:", "o": ["Manobra, proteção e medição", "Lavagem", "Geração CC"], "c": 0, "e": "tecnico"}, {"q": "Norma de disjuntores de MT/AT:", "o": ["ABNT NBR IEC 62271-100", "NR35", "NBR 16690"], "c": 0, "e": "tecnico"}, {"q": "1ª etapa para trabalhar na cabine:", "o": ["Bloqueio (cadeado/etiqueta) montante e jusante", "Tocar o barramento", "Abrir o disjuntor com a mão"], "c": 0, "e": "cultura"}, {"q": "Por que usar ATR/chave de aterramento do cubículo:", "o": ["Descarregar a energia capacitiva residual", "Aumentar a geração", "Limpar"], "c": 0, "e": "cultura"}, {"q": "Durante a manutenção, o disjuntor extraível deve estar:", "o": ["Na posição teste/extraída", "Inserido e fechado", "Energizado"], "c": 0, "e": "tecnico"}, {"q": "Resistência de contato alta no disjuntor indica:", "o": ["Desgaste/oxidação dos contatos", "Mais geração", "Nada"], "c": 0, "e": "tecnico"}, {"q": "Resistência de isolamento baixa na cabine:", "o": ["Energizar", "Não energizar — investigar", "Ignorar"], "c": 1, "e": "tecnico"}, {"q": "Intertravamento mecânico não funcional:", "o": ["Operar normalmente", "Não operar — risco de manobra indevida", "Forçar"], "c": 1, "e": "cultura"}, {"q": "É permitido tocar barramentos/TP/TC após o desligamento remoto?", "o": ["Sim", "Não — só após LOTO, ausência de tensão e aterramento", "Se for rápido"], "c": 1, "e": "cultura"}, {"q": "TC e TP servem para:", "o": ["Medição e proteção (corrente/tensão)", "Lavar", "Gerar energia"], "c": 0, "e": "tecnico"}], "avancado": [{"q": "Resistência de contato da seccionadora muito acima do histórico. Conduta:", "o": ["Aceitar", "Tratar (limpeza/aperto/substituição) — risco de aquecimento", "Energizar"], "c": 1, "e": "tecnico"}, {"q": "Você desligou remoto mas o detector ainda acusa tensão num TP:", "o": ["Tocar mesmo assim", "Não intervir — investigar fonte residual/montante", "Ignorar"], "c": 1, "e": "cultura"}, {"q": "Sequência correta de preparação:", "o": ["Bloqueio M+J → ausência de tensão → ATR/chave de terra → extraível em teste", "Abrir e mexer", "ATR depois de tocar"], "c": 0, "e": "cultura"}, {"q": "Relação de transformação do TP fora do esperado:", "o": ["Tudo bem", "Investigar TP (medição/proteção comprometida)", "Ignorar"], "c": 1, "e": "tecnico"}, {"q": "Disjuntor com isolamento baixo e contato alto:", "o": ["Liberar", "Reprovar — não energizar; manutenção corretiva", "Energizar com cuidado"], "c": 1, "e": "tecnico"}, {"q": "Intertravamento permite abrir a porta com o circuito energizado:", "o": ["É normal", "Falha grave de segurança — não operar, corrigir", "Bom para agilidade"], "c": 1, "e": "cultura"}, {"q": "Energia capacitiva residual existe mesmo com a cabine 'desligada' porque:", "o": ["Cabos/barramentos retêm carga — por isso aterrar", "Não existe", "É da rede"], "c": 0, "e": "tecnico"}, {"q": "Manobra de seccionamento na cabine deve seguir:", "o": ["A intuição", "PT + POP de Manobras de Seccionamento", "O cliente"], "c": 1, "e": "processos"}, {"q": "Antes de extrair o disjuntor:", "o": ["Garantir montante/jusante abertos e bloqueados", "Extrair direto", "Energizar"], "c": 0, "e": "cultura"}, {"q": "Para-raios da cabine com isolamento degradado:", "o": ["Manter", "Substituir — proteção contra surto comprometida", "Pintar"], "c": 1, "e": "tecnico"}, {"q": "Aquecimento localizado num contato visto na termografia da cabine:", "o": ["Normal", "Resistência de contato alta — investigar/tratar", "Soiling"], "c": 1, "e": "tecnico"}, {"q": "Trabalhar na cabine MT sozinho:", "o": ["Permitido", "Proibido (MT exige acompanhamento)", "Só à noite"], "c": 1, "e": "cultura"}]}, "mps_termo": {"titulo": "MPS — Termografia (níveis de aceitação)", "eixo": "tecnico", "icone": "🌡️", "dur": "~50 min", "videoTip": "Vídeo Grid: rota de termografia e leitura de termograma", "video": "", "passThr": 0.8, "apto": "Apto MPS · Termografia", "secoes": [{"t": "Tabela de níveis de aceitação (°C)", "h": "<p>Critérios de <b>temperatura absoluta</b> por componente (Aceitação / Atenção / Rejeição):</p>\n<table style=\"width:100%;border-collapse:collapse;font-size:12px\">\n<tr style=\"background:#191528;color:#fff\"><th style=\"text-align:left;padding:4px\">Componente</th><th>Aceita</th><th>Atenção</th><th>Rejeita</th></tr>\n<tr><td style=\"padding:4px\">Painel comando MT / relés</td><td align=center>≤45°C</td><td align=center>45–60</td><td align=center>&gt;60</td></tr>\n<tr style=\"background:#f4f4f7\"><td style=\"padding:4px\">TC / TP (resina epóxi)</td><td align=center>≤55</td><td align=center>55–70</td><td align=center>&gt;70</td></tr>\n<tr><td style=\"padding:4px\">Seccionadora / Disjuntor MT</td><td align=center>≤50</td><td align=center>50–70</td><td align=center>&gt;70</td></tr>\n<tr style=\"background:#f4f4f7\"><td style=\"padding:4px\">Trafo a óleo — tanque</td><td align=center>≤65</td><td align=center>65–90</td><td align=center>&gt;90</td></tr>\n<tr><td style=\"padding:4px\">Trafo a óleo — buchas MT/BT</td><td align=center>≤70</td><td align=center>70–90</td><td align=center>&gt;90</td></tr>\n<tr style=\"background:#f4f4f7\"><td style=\"padding:4px\">Trafo a seco — bobinas resina</td><td align=center>≤90</td><td align=center>90–115</td><td align=center>&gt;115 <b>ou ΔT entre fases &gt;10°C</b></td></tr>\n<tr><td style=\"padding:4px\">Inversor — dissipador</td><td align=center>≤55</td><td align=center>55–70</td><td align=center>&gt;70</td></tr>\n<tr style=\"background:#f4f4f7\"><td style=\"padding:4px\">Inversor — conexões CC / CA</td><td align=center>≤50</td><td align=center>50–70</td><td align=center>&gt;70</td></tr>\n<tr><td style=\"padding:4px\">QGBT — disjuntores BT</td><td align=center>≤50</td><td align=center>50–70</td><td align=center>&gt;70</td></tr>\n<tr style=\"background:#f4f4f7\"><td style=\"padding:4px\">QGBT — barramentos</td><td align=center>≤55</td><td align=center>55–75</td><td align=center>&gt;75</td></tr>\n<tr><td style=\"padding:4px\">String Box — disjuntor CC / bornes</td><td align=center>≤55</td><td align=center>55–75</td><td align=center>&gt;75</td></tr>\n<tr style=\"background:#f4f4f7\"><td style=\"padding:4px\">DPS</td><td align=center>≤45</td><td align=center>45–60</td><td align=center>&gt;60</td></tr>\n<tr><td style=\"padding:4px\">Tracker — motor / TCU / NCU</td><td align=center>≤65/50/45</td><td align=center>—</td><td align=center>&gt;80/70/60</td></tr>\n<tr style=\"background:#f4f4f7\"><td style=\"padding:4px\">Módulo — células</td><td align=center>≤65</td><td align=center>65–80</td><td align=center>&gt;80</td></tr>\n<tr><td style=\"padding:4px\">Módulo — caixa de junção (diodo bypass)</td><td align=center>≤70</td><td align=center>70–85</td><td align=center>&gt;85</td></tr>\n<tr style=\"background:#f4f4f7\"><td style=\"padding:4px\">Conector MC4</td><td align=center>≤55</td><td align=center>55–75</td><td align=center>&gt;75</td></tr>\n<tr><td style=\"padding:4px\">Drone — strings geral</td><td align=center>≤65</td><td align=center>65–75</td><td align=center>&gt;75</td></tr>\n<tr style=\"background:#f4f4f7\"><td style=\"padding:4px\">Drone — nível celular (hotspot/PID)</td><td align=center>≤65</td><td align=center>65–85</td><td align=center>&gt;85</td></tr>\n</table><p style=\"font-size:11px;color:#888;margin-top:8px\">Fonte: procedimento controlado da Grid Co. — resumo de referência. Sempre consulte a versão vigente do POP antes de executar.</p>"}, {"t": "Condições do ensaio", "h": "<p><b>Condições obrigatórias do ensaio</b> (sem elas, o resultado não é válido):</p>\n<ul><li>Usina com <b>≥70%</b> da carga nominal;</li>\n<li>Irradiância <b>&gt;600 W/m²</b>, céu limpo, entre <b>10h e 14h</b>;</li>\n<li>Emissividade <b>ε = 0,95</b>; paleta <i>Ironbow</i>; distância mínima 1 m;</li>\n<li>Cobre/alumínio polido têm ε menor → focar na <b>junção / fita isolante</b>, não no metal nu;</li>\n<li>Se religou para medir, aguardar <b>15 min</b> de estabilização térmica;</li>\n<li>Ensaio <b>estritamente óptico</b> — proibido tocar barramentos/cabos com pontas de prova;</li>\n<li>Abertura de painel posicionado <b>lateralmente</b>, com EPI <b>anti-arco</b>.</li></ul><p style=\"font-size:11px;color:#888;margin-top:8px\">Fonte: procedimento controlado da Grid Co. — resumo de referência. Sempre consulte a versão vigente do POP antes de executar.</p>"}, {"t": "Tratamento de anomalias", "h": "<p><b>Tratamento das anomalias:</b></p>\n<ul><li><b>Rejeição</b> → destacar em vermelho + etiqueta no painel + <b>OS Corretiva</b> (programar desligamento p/ reaperto com torquímetro, limpeza química ou troca de terminal);</li>\n<li><b>Atenção</b> → registrar como \"Aceite com observações\" e acompanhar com prioridade na próxima inspeção;</li>\n<li><b>Ponto frio</b> (anormalmente mais frio que os vizinhos) → <b>também é defeito</b> (conexão aberta / sem corrente). Mudar levemente o ângulo, reconfirmar e <b>contatar a Engenharia de O&M</b>.</li></ul><p style=\"font-size:11px;color:#888;margin-top:8px\">Fonte: procedimento controlado da Grid Co. — resumo de referência. Sempre consulte a versão vigente do POP antes de executar.</p>"}], "quiz": [{"q": "Irradiância de 500 W/m² no momento do ensaio:", "o": ["Pode medir", "Não atende (mínimo &gt;600 W/m²) — aguardar/adiar", "Tanto faz"], "c": 1, "e": "tecnico"}, {"q": "Disjuntor MT a 64°C:", "o": ["Aceita", "Atenção (50–70) — aceite com observações", "Rejeita"], "c": 1, "e": "tecnico"}, {"q": "Disjuntor MT a 75°C:", "o": ["Aceita", "Atenção", "Rejeição (&gt;70) — etiqueta + OS corretiva"], "c": 2, "e": "tecnico"}, {"q": "Emissividade para cabo isolado/superfície pintada:", "o": ["0,50", "0,95", "1,50"], "c": 1, "e": "tecnico"}, {"q": "Superfície de cobre polido lê temperatura aparente baixa. Conduta:", "o": ["Confiar no valor", "Focar a leitura na junção/fita isolante (ε menor no metal)", "Pintar o cobre"], "c": 1, "e": "tecnico"}, {"q": "Pode-se tocar o barramento com ponta de prova durante a termografia?", "o": ["Sim", "Não — ensaio estritamente óptico", "Só com luva"], "c": 1, "e": "cultura"}, {"q": "Religou o painel para medir. Antes de registrar:", "o": ["Mede já", "Aguardar 15 min de estabilização térmica", "Espera 1h"], "c": 1, "e": "tecnico"}, {"q": "Carga mínima da usina para o ensaio ser representativo:", "o": ["30%", "50%", "70% da nominal"], "c": 2, "e": "tecnico"}, {"q": "Ponto anormalmente FRIO em relação aos vizinhos:", "o": ["Está ótimo", "É defeito (conexão aberta) — reconfirmar e escalar Engenharia", "Ignorar"], "c": 1, "e": "tecnico"}, {"q": "Trovoada durante a execução:", "o": ["Continuar", "Suspender e buscar abrigo", "Acelerar"], "c": 1, "e": "cultura"}], "avancado": [{"q": "Trafo a seco: fase A 95°C, B 96°C, C 84°C (todas &lt;115). Conclusão:", "o": ["Aceita", "ΔT entre fases = 12°C &gt; 10°C → Rejeição, tratar", "Atenção só"], "c": 1, "e": "tecnico"}, {"q": "Conector MC4 a 78°C com vizinhos a 45°C:", "o": ["Normal", "Rejeição (&gt;75) + conexão ruim → OS corretiva", "Atenção"], "c": 1, "e": "tecnico"}, {"q": "Caixa de junção do módulo a 82°C:", "o": ["Aceita", "Atenção (70–85) — diodo bypass possivelmente ativando, acompanhar", "Rejeição"], "c": 1, "e": "tecnico"}, {"q": "Drone: string inteira uniformemente a 78°C:", "o": ["Ok", "Rejeição geral de strings (&gt;75) → string em circuito/falha, investigar", "Atenção"], "c": 1, "e": "tecnico"}, {"q": "Drone, nível celular: ponto isolado a 88°C:", "o": ["Aceita", "Rejeição (&gt;85) → hotspot/microfissura/PID", "Atenção"], "c": 1, "e": "tecnico"}, {"q": "Substring com faixa retangular quente longitudinal:", "o": ["Sujeira", "Ativação/falha de diodo de bypass", "Reflexo"], "c": 1, "e": "tecnico"}, {"q": "Barramento de QGBT a 76°C numa emenda parafusada:", "o": ["Aceita", "Rejeição (&gt;75) → emenda frouxa, reaperto com torquímetro", "Atenção"], "c": 1, "e": "tecnico"}, {"q": "Conexão CC de entrada do inversor a 72°C:", "o": ["Aceita", "Rejeição (&gt;70) → MC4/fusível de entrada, tratar", "Atenção"], "c": 1, "e": "tecnico"}, {"q": "TC (resina epóxi) a 68°C:", "o": ["Aceita", "Atenção (55–70) — acompanhar", "Rejeição"], "c": 1, "e": "tecnico"}, {"q": "Trafo a óleo, tanque a 88°C:", "o": ["Rejeição", "Atenção (65–90), perto do limite — acompanhar de perto", "Aceita tranquilo"], "c": 1, "e": "tecnico"}, {"q": "No mesmo painel: um ponto em Rejeição e outro em Atenção. Prioridade:", "o": ["O de atenção", "OS corretiva no de rejeição; o de atenção vira aceite com observações", "Fechar os dois sem ação"], "c": 1, "e": "processos"}, {"q": "Ponto a 40°C onde os vizinhos estão a 60°C:", "o": ["Melhor componente", "Ponto frio = conexão aberta/sem corrente → defeito, reconfirmar e escalar", "Erro do equipamento, ignorar"], "c": 1, "e": "tecnico"}]}, "c_os": {"titulo": "Como abrir uma OS", "icone": "📝", "eixo": "processos", "dur": "12 min", "video": "", "videoTip": "", "secoes": [{"t": "SS e OS", "h": "<p>Toda execução de campo acontece por <b>OS</b> (Ordem de Serviço). Quando é preciso ir a campo, abre-se uma <b>SS</b> (Solicitação de Serviço) e o <b>PCM</b> a transforma em OS. Sem ida a campo, a área abre a OS direto.</p>"}, {"t": "Quem faz cada etapa", "h": "<p><b>Abertura:</b> COS, Performance, Engenharia e Líderes abrem a SS/OS.<br><b>Programação:</b> o PCM programa a OS na semana.<br><b>Execução:</b> a equipe de campo executa.<br><b>Fechamento:</b> o líder de campo aprova no fechamento.</p>"}, {"t": "Criar no Fracttal", "h": "<p>As OS vivem no <b>Fracttal</b>. Para criar a partir de uma SS, use o atalho <b>“Criar OS - Fracttal”</b> na pasta <b>16. Procedimentos Operacionais</b>, ou crie direto no Fracttal. Preencha ativo, tipo e descrição com capricho — OS bem preenchida vira dado confiável.</p>"}], "quiz": [{"q": "Quem programa a OS na semana?", "o": ["O COS", "O PCM", "O técnico"], "c": 1, "e": "processos"}, {"q": "Quem aprova no fechamento da OS?", "o": ["O cliente", "O líder de campo", "O PCM"], "c": 1, "e": "processos"}, {"q": "Toda execução de campo acontece por:", "o": ["WhatsApp", "OS", "E-mail"], "c": 1, "e": "processos"}, {"q": "Quem pode abrir a SS/OS?", "o": ["Só o PCM", "COS, Performance, Engenharia e Líderes", "Só o cliente"], "c": 1, "e": "processos"}]}, "c_pcm": {"titulo": "Painel PCM", "icone": "📊", "eixo": "processos", "dur": "10 min", "video": "", "videoTip": "", "secoes": [{"t": "O que é", "h": "<p>O <b>Painel PCM</b> mostra a programação semanal de manutenção, os religamentos, as preventivas e as sugestões do PCM. Atualiza sozinho a cada poucos minutos.</p>"}, {"t": "Como acessar", "h": "<p>Acesse em <b>fillipefigueiro-source.github.io/gridco-pcm-data</b> (link também na intranet). Entre com a senha do seu perfil — cada cliente vê o seu.</p>"}, {"t": "O que acompanhar", "h": "<p>Programação da semana, OS por status, religamentos, preventivas (<b>MPM/MPS/MPA</b>) e as SS pendentes com a sugestão do PCM.</p>"}], "quiz": [{"q": "O Painel PCM mostra principalmente:", "o": ["A folha de pagamento", "A programação semanal de manutenção", "O organograma"], "c": 1, "e": "processos"}, {"q": "Com que frequência ele atualiza?", "o": ["Uma vez por mês", "A cada poucos minutos", "Nunca"], "c": 1, "e": "processos"}, {"q": "As preventivas no painel são:", "o": ["MPM, MPS e MPA", "Só corretivas", "Nenhuma"], "c": 0, "e": "processos"}]}, "c_perf": {"titulo": "Painel Performance", "icone": "📈", "eixo": "processos", "dur": "10 min", "video": "", "videoTip": "", "secoes": [{"t": "O que é", "h": "<p>O <b>Painel de Performance</b> acompanha a geração e a saúde das usinas: energia gerada, disponibilidade e os chamados (tickets) de performance.</p>"}, {"t": "Como acessar", "h": "<p>Acesse pelo painel de Performance disponível na <b>intranet</b> da Grid. A equipe de Performance abre os tickets quando uma usina gera abaixo do esperado.</p>"}, {"t": "Por que importa para o campo", "h": "<p>Muitas OS de campo nascem de um ticket de Performance (ex.: string fora, inversor em falha). Fechar bem a OS ajuda a Performance a confirmar a recuperação da geração.</p>"}], "quiz": [{"q": "O Painel de Performance acompanha:", "o": ["Geração e disponibilidade das usinas", "O ponto dos funcionários", "O estoque"], "c": 0, "e": "processos"}, {"q": "Quem abre os tickets de performance?", "o": ["A equipe de Performance", "O cliente", "O motorista"], "c": 0, "e": "processos"}, {"q": "Um ticket de performance pode virar:", "o": ["Uma OS de campo", "Uma multa", "Férias"], "c": 0, "e": "processos"}]}, "c_quem": {"titulo": "Quem é quem na Grid", "icone": "👥", "eixo": "processos", "dur": "10 min", "video": "", "videoTip": "", "secoes": [{"t": "As áreas da O&M", "h": "<p>Campo (execução), <b>Supervisão de Campo</b> (lidera as equipes), <b>PCM</b> (programa a manutenção), <b>Performance</b> (monitora geração), <b>COS</b> (centro de operação e religamentos), <b>KAM</b> (relação com o cliente), <b>Engenharia</b> e <b>HSEQ</b> (segurança, transversal).</p>"}, {"t": "Supervisores de campo", "h": "<p>Hoje são <b>6</b>, cada um cobre um conjunto de clusters: <b>Camila Viana, Danuth Fernandes, Fred Alexandrino, Kevin Amorim, Pedro Candido e Vitor Valadares</b>. Seu supervisor é o primeiro contato para dúvidas e prioridades.</p>"}, {"t": "Organograma completo", "h": "<p>O organograma completo, com o líder de cada área e os contatos, está na <b>intranet: intranet.gridco.com.br</b>.</p>"}], "quiz": [{"q": "Quem programa a manutenção?", "o": ["PCM", "KAM", "HSEQ"], "c": 0, "e": "processos"}, {"q": "Quantos supervisores de campo há hoje?", "o": ["3", "6", "12"], "c": 1, "e": "processos"}, {"q": "Onde está o organograma completo?", "o": ["No Fracttal", "Na intranet", "No WhatsApp"], "c": 1, "e": "processos"}, {"q": "Quem cuida da relação com o cliente?", "o": ["KAM", "COS", "Campo"], "c": 0, "e": "processos"}]}, "c_proc": {"titulo": "Onde achar um procedimento", "icone": "📁", "eixo": "processos", "dur": "10 min", "video": "", "videoTip": "", "secoes": [{"t": "A pasta de procedimentos", "h": "<p>Tudo fica em <b>16. Procedimentos Operacionais</b>, com três partes: <b>Fluxos Internos</b>, <b>POPs</b> (procedimentos operacionais padrão) e <b>POP Flash</b> (versão rápida e visual).</p>"}, {"t": "POP x POP Flash", "h": "<p>O <b>POP</b> é o passo a passo completo de uma atividade. O <b>POP Flash</b> é o resumo de bolso, para consultar em campo. Na dúvida de “como se faz”, procure o POP da atividade.</p>"}, {"t": "Atalhos úteis", "h": "<p>Na mesma pasta há o atalho <b>“Criar OS - Fracttal”</b>. A intranet também reúne procedimentos e formulários.</p>"}], "quiz": [{"q": "Os procedimentos ficam em:", "o": ["16. Procedimentos Operacionais", "No e-mail", "Só no Fracttal"], "c": 0, "e": "processos"}, {"q": "A versão de bolso, rápida, é o:", "o": ["POP Flash", "Contrato", "Organograma"], "c": 0, "e": "processos"}, {"q": "“Como se faz” uma atividade você procura no:", "o": ["POP", "RH", "Financeiro"], "c": 0, "e": "processos"}]}, "c_ferr": {"titulo": "Ferramentas do dia a dia", "icone": "🧰", "eixo": "processos", "dur": "8 min", "video": "", "videoTip": "", "secoes": [{"t": "Fracttal", "h": "<p>Onde vivem as OS e a manutenção. Você executa e fecha as OS por lá.</p>"}, {"t": "Painéis", "h": "<p><b>Painel PCM</b> (programação), <b>Painel Performance</b> (geração) e o <b>Mapa de Equipes</b> (equipes, bases e rotas).</p>"}, {"t": "Conhecimento", "h": "<p>O <b>Grid Co. Academy</b> (aqui) para trilhas e reciclagem, e a <b>intranet</b> para organograma, procedimentos e formulários.</p>"}], "quiz": [{"q": "As OS você executa e fecha no:", "o": ["Fracttal", "Excel", "WhatsApp"], "c": 0, "e": "processos"}, {"q": "Para ver equipes, bases e rotas você usa:", "o": ["O Mapa de Equipes", "O e-mail", "O ponto"], "c": 0, "e": "processos"}, {"q": "Trilhas e reciclagem ficam em:", "o": ["Grid Co. Academy", "No contrato", "No Fracttal"], "c": 0, "e": "processos"}]}, "aplicacao_campo": {"titulo": "Aplicação: cenários de decisão", "icone": "🧩", "eixo": "tecnico", "dur": "15 min", "video": "", "videoTip": "", "secoes": [{"t": "Como funciona", "h": "<p>Aqui não se pergunta definição — se pede <b>decisão</b>. Leia o cenário e escolha a ação correta, como em campo. Estude antes o Book do Conhecimento.</p>"}], "quiz": [{"q": "UFV com perda de comunicação total e geração zerada. Pela Tabela de Resposta a Falhas, nível e primeira ação?", "o": ["Risco Baixo — agendar na próxima ronda", "Risco Alto — abrir OS, notificação imediata e acionamento remoto", "Aguardar o cliente reclamar"], "c": 1, "e": "tecnico"}, {"q": "Usina desligada, sem causa aparente. Antes de mobilizar equipe ao local, o que se tenta primeiro?", "o": ["Trocar o inversor", "Religamento remoto pelo COS", "Abrir garantia com o fabricante"], "c": 1, "e": "tecnico"}, {"q": "Vai abrir a cabine para uma corretiva no inversor. Etapa obrigatória antes de tocar em qualquer terminal:", "o": ["Fotografar o painel", "Aplicar LOTO e confirmar o isolamento", "Ligar o gerador de apoio"], "c": 1, "e": "tecnico"}, {"q": "Inversor gerando, mas some do SCADA (sem dados). Ação inicial:", "o": ["Substituir o inversor", "Verificar cabos RS485/Ethernet e reiniciar o dispositivo", "Desligar a usina inteira"], "c": 1, "e": "tecnico"}, {"q": "Termografia sob carga mostra ponto quente numa conexão. O que indica e o que fazer?", "o": ["Normal, seguir a ronda", "Conexão frouxa/oxidada — desenergizar, reapertar com torquímetro e reinspecionar", "Pintar a estrutura"], "c": 1, "e": "tecnico"}, {"q": "Geração caindo devagar há semanas, época seca, sem falha de equipamento. Suspeita principal:", "o": ["Sujeira acumulada (soiling)", "Erro de polaridade", "Furto de cabos"], "c": 0, "e": "tecnico"}, {"q": "Módulo com mancha escura localizada que esquenta (hot spot). Causa provável:", "o": ["Excesso de limpeza", "Sombreamento/célula danificada ou diodo bypass", "Tensão alta da rede"], "c": 1, "e": "tecnico"}, {"q": "Superaquecimento recorrente do inversor. Primeira verificação:", "o": ["Trocar os módulos", "Ventilação e limpeza de filtros/ventoinhas", "Aumentar a tensão de entrada"], "c": 1, "e": "tecnico"}, {"q": "No mesmo dia caem uma MPM (preventiva mensal) e uma corretiva de Risco Alto. Prioridade:", "o": ["A MPM, porque é planejada", "A corretiva de Risco Alto", "A que estiver mais perto da base"], "c": 1, "e": "tecnico"}, {"q": "Antes de energizar após um reparo na cabine, o item que reprova a energização é:", "o": ["Falta de foto", "Proteção/aterramento reprovado na verificação", "Ausência do cliente"], "c": 1, "e": "tecnico"}]}},"trilhas":{"campo":{"nome":"Equipe de Campo","desc":"Técnicos, eletricistas e mantenedores","cor":"#1F7A3D","nivel":"Operacional","mods":["cultura","seguranca","fundamentos","recurso","protecoes","tracker","processos","manutencao","mpm","mps","mps_termo","mpa","mpa_modstr","mpa_cabine","confiab","aplicacao_campo"]},"lider":{"nome":"Líder de Campo","desc":"Liderança técnica e validação de qualidade","cor":"#8a5a00","nivel":"Supervisão","mods":["cultura","seguranca","fundamentos","recurso","protecoes","tracker","processos","manutencao","mpm","mps","mps_termo","mpa","mpa_modstr","mpa_cabine","confiab","lider_x"]},"cos":{"nome":"COS — Centro de Operação","desc":"Monitoramento 24/7, alarmes e religamento","cor":"#2E5FBF","nivel":"Monitoramento","mods":["cultura","seguranca","fundamentos","recurso","processos","cos_turno","cos_monit","cos_alarmes","cos_incid","cos_escala","cos_doc","confiab","cos_x"]},"pcm":{"nome":"PCM — Pré-Operação","desc":"Planejamento, controle de OS e indicadores","cor":"#7A1FA2","nivel":"Planejamento","mods":["cultura","fundamentos","recurso","processos","manutencao","confiab","pcm_x"]},"kam":{"nome":"KAM — Gestão de Contrato","desc":"Relacionamento, RMO, SLA e contrato","cor":"#C2185B","nivel":"Estratégico","mods":["cultura","fundamentos","recurso","processos","confiab","perf_x","kam_x"]},"performance":{"nome":"Performance","desc":"PR, disponibilidade, perdas e desvios","cor":"#00838F","nivel":"Analítico","mods":["cultura","fundamentos","recurso","protecoes","processos","manutencao","confiab","perf_x"]},"conhecimento":{"nome":"Processos e Conhecimento Grid Co.","desc":"Como funcionam nossos processos, painéis e onde achar tudo","cor":"#185FA5","nivel":"Transversal","mods":["c_os","c_pcm","c_perf","c_quem","c_proc","c_ferr"]}},"finais":{"campo": [{"q": "Para que uma termografia de MPS seja válida, as condições mínimas do ensaio são:", "o": ["Qualquer horário do dia, desde que a usina esteja energizada", "Usina com ≥70% da carga nominal, irradiância >600 W/m², céu limpo, entre 10h e 14h", "Usina desligada (LOTO) para poder aproximar a câmera dos barramentos", "Irradiância acima de 200 W/m² e emissividade ajustada para 0,5"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "A sequência correta de segurança antes de qualquer intervenção elétrica é:", "o": ["LOTO → APR → medir tensão energizado → intervir", "Leitura da OS + APR/PT → LOTO → detector de tensão (ausência em todas as fases) → aterramento temporário quando aplicável → intervir", "Detector de tensão → intervir → registrar a APR ao final", "PT verbal do líder → intervir com EPI → LOTO apenas se demorar mais de 1 hora"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Ao medir a Voc de uma string, você encontra um valor aproximadamente igual ao de 'um módulo a menos' que o esperado. A causa mais provável é:", "o": ["Soiling uniforme em toda a string", "PID em estágio inicial", "Módulo/conector em aberto ou diodo de bypass acionado", "Fusível CC da string rompido"], "c": 2, "e": "tecnico", "tipo": "conceito"}, {"q": "Na inspeção padrão de uma TCU parada, ANTES de abrir chamado, o técnico deve:", "o": ["Substituir a TCU por uma reserva e devolver a antiga ao almoxarifado", "Forçar a mesa manualmente para a posição de backtracking", "Verificar alimentação, botão de emergência e base do fusível, fazer reset, testar continuidade do fusível e registrar foto da TCU e do nº MAC", "Desabilitar o stow para observar se a mesa volta a rastrear"], "c": 2, "e": "tecnico", "tipo": "conceito"}, {"q": "Durante a termografia, um borne aparece anormalmente MAIS FRIO que os vizinhos do mesmo circuito. Isso indica:", "o": ["Conexão saudável, com resistência de contato baixa", "Reflexo do céu — basta ignorar", "Possível conexão aberta ou circuito sem corrente: também é defeito; reconfirmar o ângulo e acionar a Engenharia de O&M", "Emissividade alta do material"], "c": 2, "e": "tecnico", "tipo": "conceito"}, {"q": "Você identifica um fusível CC rompido em uma string box, em plena geração. A melhor conduta é:", "o": ["Trocar o fusível imediatamente com luva isolante, sem interromper a geração", "Seccionar/isolar o circuito conforme o POP, medir a string (Voc/Isc) para investigar a causa antes de repor o fusível, e registrar tudo na OS", "Fazer um jumper provisório até chegar o fusível correto", "Apenas fotografar e deixar para a próxima preventiva mensal"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "No meio de uma MPM, você sente cheiro de queimado e vê um conector CC derretido dentro da string box. A APR do dia não previa intervenção nesse circuito. Você deve:", "o": ["Concluir o reparo rapidamente, já que está com EPI", "Fechar a tampa e relatar verbalmente no fim do dia", "Parar, sinalizar/isolar a área, comunicar o líder e abrir corretiva — intervir só com APR/PT específica", "Desligar o inversor inteiro por conta própria e trocar o conector"], "c": 2, "e": "cultura", "tipo": "caso"}, {"q": "A termografia registrou 78°C em um borne de string box (nível de Rejeição). Conforme o POP, a conduta é:", "o": ["Reapertar imediatamente o borne energizado, com torquímetro", "Registrar como 'Aceite com observações' e reavaliar na próxima MPS", "Destacar em vermelho, etiquetar o painel e abrir OS corretiva com desligamento programado para reaperto com torquímetro ou troca do terminal", "Trocar o fusível da string, que é a causa provável"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "Um inversor em garantia apresenta falha interna recorrente. A conduta correta da equipe é:", "o": ["Abrir o inversor e substituir a placa com peça paralela para reduzir indisponibilidade", "Não intervir internamente: registrar evidências (fotos, códigos de falha, leituras) e abrir chamado ao fabricante via Controller", "Trocar o inversor por um de outra usina e avisar depois", "Aguardar a MPA para tratar o caso"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Você concluiu a troca de um componente e o inversor voltou a operar. Antes de encerrar a atividade, o fechamento correto da OS exige:", "o": ["Descrever 'trocado e normalizado' e fechar", "Confirmar a normalização, anexar fotos antes/depois, registrar leituras e o nº de série e posição do componente trocado", "Enviar as fotos por mensagem ao líder e fechar a OS em branco", "Deixar a OS aberta até o fim do mês para o PCM completar"], "c": 1, "e": "processos", "tipo": "caso"}], "lider": [{"q": "O indicador que melhor mede a qualidade da validação técnica feita pelo líder de campo é:", "o": ["Número de OS abertas no mês", "Retrabalho — OS reabertas após o fechamento", "Quilometragem da equipe volante", "Quantidade de APRs assinadas"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Pela régua de escalonamento da Grid, uma falha deve subir do N1 (campo) para o N2 (Engenharia) quando:", "o": ["Sempre que envolver inversor", "For recorrente (≥2 vezes em 30 dias) ou a causa não for identificada", "O cliente pedir formalmente", "O reparo custar mais de um valor de alçada"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Os prazos de SLA por criticidade adotados como referência são:", "o": ["P1 = 1 h; P2 = 8 h; P3 = 48 h", "P1 = 4 h; P2 = 24 h; P3 = 5 dias úteis", "P1 = 24 h; P2 = 5 dias; P3 = 30 dias", "P1 = 12 h; P2 = 36 h; P3 = 10 dias úteis"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Sobre reaperto de conexões, a prática correta que o líder deve exigir é:", "o": ["Aperto 'no sentimento', pois torquímetro atrasa a rota", "Sobreaperto de 20% como margem de segurança", "Torquímetro de estalo no valor especificado pelo fabricante, nunca com o circuito energizado", "Reaperto energizado, desde que com luva isolante classe 0"], "c": 2, "e": "tecnico", "tipo": "conceito"}, {"q": "Para atividades em média tensão (MT), a regra que o líder deve garantir é:", "o": ["Um eletricista experiente pode trabalhar sozinho se tiver NR10", "Basta a APR genérica do dia para manobras em cabine", "Nunca sozinho em MT, com NR10-SEP e PT específica para a manobra (cabine/inversor/usina)", "MT só pode ser tocada pela concessionária"], "c": 2, "e": "tecnico", "tipo": "conceito"}, {"q": "Um técnico experiente quer 'pular' a APR porque o serviço é rápido e a equipe está atrasada na rota. Como líder, você deve:", "o": ["Autorizar, pois a produtividade do cluster também é meta", "Autorizar só desta vez, registrando depois", "Não autorizar: parar, fazer a APR/PT e reforçar no DDS que segurança é inegociável — não existe serviço rápido o bastante para justificar o atalho", "Fazer você mesmo o serviço para ir mais rápido"], "c": 2, "e": "cultura", "tipo": "caso"}, {"q": "Uma OS de corretiva chega para sua aprovação sem foto do 'depois' e sem as leituras finais. A conduta correta é:", "o": ["Aprovar, pois você confia no técnico", "Devolver a OS para complementação das evidências antes de aprovar o fechamento", "Aprovar e pedir as fotos por mensagem depois", "Fechar a OS e abrir outra só para as fotos"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "O mesmo inversor desarma pela 3ª vez em 3 semanas; o reset sempre normaliza. Sua equipe sugere 'seguir resetando'. Você deve:", "o": ["Aceitar — se o reset resolve, não há falha", "Trocar o inversor preventivamente", "Escalar para o N2 (Engenharia) com histórico e evidências, pois recorrência ≥2x/30 dias pede RCA da causa-raiz", "Aumentar o setpoint de temperatura para reduzir os desarmes"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "Sua equipe tem hoje uma preventiva P3 programada e surge uma corretiva P1 (usina parada) no mesmo cluster. Você deve:", "o": ["Concluir a preventiva primeiro, pois estava programada", "Dividir a equipe em dois, mesmo ficando alguém sozinho na cabine MT", "Atender a P1 imediatamente (SLA de 4 h) e reprogramar a preventiva com o PCM, registrando o motivo", "Aguardar o COS resolver remotamente antes de decidir"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "A equipe apresenta um relatório de termografia feito às 7h30 da manhã, com céu encoberto e usina em baixa carga. Como líd
