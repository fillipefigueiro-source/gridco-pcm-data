 líder, para o bem e para o mal."}}}, "pcm_x": {"tit": "A semana que não fechava", "ctx": "Segunda-feira, montagem da programação. O quadro: <b>aderência caiu 3 semanas seguidas</b>, o backlog de P3 cresceu 20%, há <b>MPMs vencendo</b> em duas usinas e o RMO do maior cliente sai na sexta. No Fracttal, você nota várias OS fechadas na semana passada <b>sem evidência e sem confirmação de normalização</b>.", "start": "a", "nodes": {"a": {"s": "Por onde você começa a montar a semana?", "o": [{"t": "Investigo a causa da queda de aderência (rota? peças? corretivas comendo a agenda?) antes de programar — a programação nova herda o gargalo se ele não for tratado.", "q": "good", "fb": "Aderência caindo 3 semanas é sintoma de causa estrutural, não de azar. Programar por cima do gargalo só empilha replanejamento — primeiro entender, depois programar.", "to": "b"}, {"t": "Programo primeiro as MPMs vencendo e o que couber de P3, e deixo a análise de aderência para depois do RMO.", "q": "ok", "fb": "Priorizar preventivas vencendo é correto — mas sem atacar a causa da aderência a mesma programação vai falhar de novo, e o RMO de sexta vai expor exatamente isso. A análise não pode esperar.", "to": "b"}, {"t": "Aumento a carga programada da semana para compensar as três semanas ruins.", "q": "bad", "fb": "Programar acima da capacidade real derruba ainda mais a aderência — o indicador piora e a equipe desacredita da programação. Volume não conserta gargalo.", "to": "b"}]}, "b": {"s": "A análise mostra: corretivas não planejadas consumiram 40% das horas da turma, puxadas por um único cluster com falhas repetidas. O que isso muda na sua programação?", "o": [{"t": "Reservo capacidade realista para corretivas, priorizo as MPMs vencendo, e abro input de confiabilidade para a Engenharia sobre o cluster recorrente.", "q": "good", "fb": "É o tripé do PCM: programar com capacidade real, proteger as preventivas (antes que virem corretivas) e devolver a recorrência para quem ataca causa-raiz.", "to": "c"}, {"t": "Congelo as preventivas do cluster problemático até as corretivas cederem.", "q": "bad", "fb": "Cortar preventiva de um cluster que já falha muito é acelerar a espiral: menos preventiva → mais corretiva → menos agenda. É exatamente o ciclo que o PCM existe para quebrar.", "to": "c"}, {"t": "Repasso as corretivas do cluster para a semana seguinte e rodo a semana só com preventivas, para recuperar a aderência no papel.", "q": "bad", "fb": "Adiar corretivas para maquiar aderência inverte a prioridade (SLA!) e transforma o indicador em ficção. Aderência é ferramenta de gestão, não vitrine.", "to": "c"}]}, "c": {"s": "Quinta-feira, véspera de fechar os números do RMO. As OS sem evidência da semana passada distorcem MTTR e disponibilidade. Você:", "o": [{"t": "Reabro/devolvo as OS para correção com os líderes, corrijo a integridade do dado e só então consolido os indicadores do RMO.", "q": "good", "fb": "Dado ruim no RMO é passivo com o cliente: se a disponibilidade reportada não resistir a uma auditoria, a credibilidade do relatório inteiro cai. Integridade primeiro, relatório depois.", "to": "f_ok"}, {"t": "Consolido com os dados como estão e anoto internamente a ressalva para corrigir no mês seguinte.", "q": "ok", "fb": "Transparência interna é melhor que nada — mas o número reportado ao cliente continua distorcido, e corrigir retroativamente no mês seguinte custa mais credibilidade do que corrigir agora.", "to": "f_meio"}, {"t": "Ajusto manualmente os indicadores para o valor 'mais provável' e fecho o RMO.", "q": "bad", "fb": "Número ajustado na mão é indefensável: nem rastreabilidade, nem método. Se o cliente cruzar com o SCADA dele, a conversa muda de indicador para confiança.", "to": "f_ruim"}]}, "f_ok": {"fim": 1, "tit": "PCM no controle", "txt": "Você tratou a causa (capacidade + recorrência), protegeu as preventivas e blindou a integridade do dado antes do RMO. Aderência volta a subir com base real — e o relatório ao cliente resiste a qualquer auditoria. Planejamento é isso: menos apagar incêndio, mais impedir o próximo."}, "f_meio": {"fim": 1, "tit": "Semana salva, dado devendo", "txt": "A programação melhorou, mas o RMO saiu com número frágil e ressalva de gaveta. Cliente descobre distorção antes da correção 'planejada' — e a conversa fica difícil. Integridade de dado não é etapa opcional do ciclo: é o alicerce dele."}, "f_ruim": {"fim": 1, "tit": "Indicador de ficção", "txt": "Backlog maquiado, preventiva cortada ou número ajustado na mão: a curto prazo parece gestão, a médio prazo é uma bomba de retrabalho e credibilidade. O PCM só agrega valor enquanto o dado que ele publica é verdade."}}}, "kam_x": {"tit": "A penalidade que veio por e-mail", "ctx": "Terça-feira, 9h. O cliente do seu maior contrato envia e-mail formal: pela medição dele, a <b>disponibilidade do mês ficou abaixo do garantido</b> e ele pretende aplicar a penalidade contratual. Pelo painel da Grid, a disponibilidade ficou <b>acima</b> do limite. O RMO é sexta-feira.", "start": "a", "nodes": {"a": {"s": "Qual é a sua primeira ação como KAM?", "o": [{"t": "Aciono a Performance para reconciliar metodologia e medição (períodos, exclusões, fonte do dado) antes de responder formalmente.", "q": "good", "fb": "Divergência de indicador quase sempre é divergência de metodologia (janelas, exclusões de força maior, fonte). Responder sem reconciliar é responder no escuro.", "to": "b"}, {"t": "Respondo de imediato contestando a penalidade e anexando o print do painel da Grid.", "q": "ok", "fb": "Rapidez é boa, mas print de painel não é reconciliação: se a metodologia do cliente tiver base contratual, a contestação precipitada enfraquece a Grid na conversa que importa.", "to": "b"}, {"t": "Aceito provisoriamente a penalidade para preservar a relação e tento reverter depois.", "q": "bad", "fb": "Aceitar sem análise cria precedente contratual e financeiro. Relação boa se constrói com dado sólido e transparência — não com concessão no escuro.", "to": "b"}]}, "b": {"s": "A reconciliação mostra: o cliente contou como indisponibilidade um período de curtailment da rede (fora da responsabilidade do O&M). Ainda assim, houve um evento real de 6 h em que o SLA de atendimento estourou. Como você leva isso à conversa?", "o": [{"t": "Apresento a reconciliação completa: excluo o curtailment com base no contrato, reconheço o evento das 6 h e trago o plano de ação para o estouro de SLA.", "q": "good", "fb": "Transparência assimétrica não funciona: quem só mostra o que lhe favorece perde a discussão seguinte. Corrigir o cálculo E reconhecer a falha real é o que sustenta a credibilidade.", "to": "c"}, {"t": "Foco a resposta na exclusão do curtailment — o evento das 6 h ficou dentro do mês e se dilui na média.", "q": "bad", "fb": "Se o cliente descobrir o estouro de SLA por conta própria (e descobre), a omissão custa mais que a penalidade. KAM esconde-se de desvio uma vez só.", "to": "c"}, {"t": "Encaminho a reconciliação técnica por e-mail e considero o assunto encerrado.", "q": "bad", "fb": "Divergência contratual com penalidade na mesa se trata em conversa, não em anexo. O e-mail informa; a reunião alinha, contextualiza e preserva a relação.", "to": "c"}]}, "c": {"s": "Na mesma conversa, o cliente pede para incluir duas usinas novas na carteira 'já entrando na operação do mês que vem'. Você:", "o": [{"t": "Recebo bem o pedido e formalizo: aditivo com escopo e preço (Comercial/Jurídico) + onboarding estruturado antes de assumir a operação.", "q": "good", "fb": "Crescimento de carteira é ótimo — formalizado. Aditivo protege as duas partes e o onboarding garante que a operação começa com dado, acesso e rotina prontos.", "to": "f_ok"}, {"t": "Aceito começar a operar informalmente enquanto o aditivo corre em paralelo, como gesto de boa vontade.", "q": "ok", "fb": "Parece parceria, mas operar sem contrato é risco sem cobertura: sem SLA definido, sem preço, sem responsabilidade clara. Se algo falhar nessas usinas, a Grid responde sem respaldo. O gesto de boa vontade é acelerar o aditivo.", "to": "f_meio"}, {"t": "Recuso por ora — primeiro resolvemos a disputa da penalidade, depois falamos de expansão.", "q": "bad", "fb": "Condicionar expansão à disputa mistura as agendas e azeda as duas. A disputa se resolve com dado; a expansão, com aditivo. São trilhos paralelos.", "to": "f_meio"}]}, "f_ok": {"fim": 1, "tit": "Contrato defendido, relação fortalecida", "txt": "Reconciliação técnica antes da resposta, transparência sobre a falha real com plano de ação, e expansão formalizada por aditivo. A penalidade indevida caiu, a confiança subiu e a carteira cresceu com base sólida. Gestão de contrato é isso: dado, método e relação — nessa ordem."}, "f_meio": {"fim": 1, "tit": "Resolveu, mas deixou pontas", "txt": "A disputa até andou, mas sobraram riscos: operação sem contrato, agenda misturada ou desvio subcomunicado. Cada ponta solta dessas tem endereço certo — auditoria, cobrança retroativa ou desgaste na renovação. Feche as pontas enquanto são pequenas."}, "f_ruim": {"fim": 1, "tit": "Precedente caro", "txt": "Concessão sem análise ou omissão de desvio: os dois caminhos terminam no mesmo lugar — perda de credibilidade e precedente contratual ruim. O KAM defende o contrato com dado e transparência; sem isso, vira só um canal de desconto."}}}, "perf_x": {"tit": "O PR que caiu sem avisar", "ctx": "Fechamento semanal: uma usina apresenta <b>PR 7% abaixo do esperado</b>, com disponibilidade em 100% — nenhum equipamento parado. A usina gêmea, a 3 km, está com PR normal. O cliente recebe o boletim na sexta.", "start": "a", "nodes": {"a": {"s": "Disponibilidade 100% e PR baixo. Qual é a sua primeira linha de investigação?", "o": [{"t": "Qualidade do dado primeiro: sensores da estação solarimétrica (calibração/sujeira), telemetria e consistência POA vs. GHI — antes de assumir perda real.", "q": "good", "fb": "Regra de ouro da Performance: antes de caçar perda na usina, confirme que a régua está certa. Sensor sujo ou descalibrado fabrica desvio de PR sem nenhuma perda real.", "to": "b"}, {"t": "Soiling: estamos na estação seca e a gêmea pode ter sido lavada há menos tempo.", "q": "ok", "fb": "Hipótese plausível — mas note: soiling atinge sensor e módulos de forma diferente, e a gêmea normal enfraquece a tese de sujeira regional. Valide o dado antes: se a régua estiver errada, a lavagem não vai recuperar nada.", "to": "b"}, {"t": "Abro chamado imediato para o campo inspecionar strings — 7% é muita perda para esperar.", "q": "bad", "fb": "Chamado sem diagnóstico manda o campo procurar agulha em palheiro — e se o desvio for de medição, a inspeção volta 'sem anomalia' e o PR continua 'baixo'. Investigação primeiro, mobilização depois.", "to": "b"}]}, "b": {"s": "Dados validados: sensores ok, telemetria íntegra. Cruzando as curvas por inversor, você encontra um deles com geração ~20% abaixo dos pares só entre 10h e 14h. Isso sugere:", "o": [{"t": "Clipping não explica (seria corte no pico igual nos pares); o padrão sugere limitação térmica ou strings degradadas/sombreadas — chamado direcionado a esse inversor com a evidência anexada.", "q": "good", "fb": "É o valor da análise por inversor: transforma '7% na usina' em 'um inversor, janela 10h–14h, hipóteses específicas'. O campo chega sabendo o que procurar.", "to": "c"}, {"t": "Registro o desvio e espero mais uma semana de dados para confirmar a tendência antes de acionar.", "q": "bad", "fb": "O padrão já é claro e recorrente na janela de maior geração — cada semana de espera é perda real acumulada. Tendência confirmada com evidência não precisa de mais paciência, precisa de ação.", "to": "c"}, {"t": "Solicito lavagem completa da usina — resolve soiling e de quebra melhora o resto.", "q": "bad", "fb": "Lavagem geral para um desvio localizado num inversor é gastar em cima da hipótese errada: soiling não escolhe um inversor nem uma janela horária.", "to": "c"}]}, "c": {"s": "O campo confirma: ventilação obstruída causando derating térmico no inversor. Reparo programado. Como você fecha o ciclo no boletim de sexta?", "o": [{"t": "Reporto o desvio, a causa confirmada, a ação e o prazo — e sigo monitorando o PR pós-reparo para confirmar a recuperação.", "q": "good", "fb": "Ciclo completo: desvio → diagnóstico → ação → verificação. O cliente vê método, e o PR pós-reparo confirma (ou não) que a causa era essa mesma. Análise sem verificação é palpite bem formatado.", "to": "f_ok"}, {"t": "Reporto apenas que 'o desvio foi identificado e tratado' — detalhe técnico não agrega para o cliente.", "q": "ok", "fb": "Melhor que omitir, mas genérico demais: causa + ação + prazo é o que diferencia um boletim confiável de um comunicado. Cliente que entende o método cobra menos e confia mais.", "to": "f_meio"}, {"t": "Retiro o desvio do boletim, já que a causa foi encontrada e o reparo está programado.", "q": "bad", "fb": "Desvio tratado se reporta com orgulho, não se esconde. Omitir mina a credibilidade do boletim — e o cliente enxerga o PR baixo nos dados dele de qualquer forma.", "to": "f_ruim"}]}, "f_ok": {"fim": 1, "tit": "Análise que vira ação", "txt": "Dado validado antes da conclusão, desvio isolado por inversor e janela horária, chamado direcionado com evidência e ciclo fechado com verificação pós-reparo. É exatamente assim que a Performance transforma curva em decisão — e boletim em confiança."}, "f_meio": {"fim": 1, "tit": "Diagnóstico bom, entrega tímida", "txt": "A investigação foi certeira, mas a comunicação genérica desperdiçou o valor dela. O boletim é a vitrine do método: causa, ação e prazo custam duas linhas e compram a confiança que segura o contrato."}, "f_ruim": {"fim": 1, "tit": "A curva não perdoa", "txt": "Mobilização sem diagnóstico, espera desnecessária ou omissão no boletim: em todos os casos a perda real continuou correndo — e o cliente enxerga o PR nos dados dele. Performance é método: validar o dado, isolar o desvio, agir direcionado e verificar o resultado."}}}, "c_os": {"tit": "A anomalia que ninguém pediu", "ctx": "Você está numa usina executando uma OS de preventiva. No caminho entre dois skids, repara num <b>cabo de string com isolação danificada</b>, encostado na estrutura. Não tem nada a ver com a OS de hoje.", "start": "a", "nodes": {"a": {"s": "O que você faz com o achado?", "o": [{"t": "Registro na hora (foto + localização exata) e abro a SS para virar OS corretiva, sinalizando o risco elétrico.", "q": "good", "fb": "Achado em campo segue o fluxo: SS com evidência → PCM converte em OS e prioriza. A foto e a localização exata poupam a próxima equipe de procurar.", "to": "b"}, {"t": "Aproveito que estou aqui e já reparo o cabo — depois regularizo o registro.", "q": "bad", "fb": "Executar sem OS quebra o fluxo: sem APR da tarefa, sem programação, sem rastreio. E 'regularizar depois' costuma virar nunca. O reparo espera a OS; o registro, não.", "to": "b"}, {"t": "Aviso o líder pelo WhatsApp com foto e sigo minha preventiva — ele encaminha.", "q": "ok", "fb": "Comunicar é bom, mas WhatsApp não é registro: se o líder estiver ocupado, o achado morre no grupo. Quem viu, registra — a SS leva 2 minutos e não depende de ninguém lembrar.", "to": "b"}]}, "b": {"s": "Na hora de abrir a SS, o que não pode faltar para o PCM conseguir programar bem a corretiva?", "o": [{"t": "Ativo/local exato, descrição objetiva do dano, foto e a indicação de risco (cabo energizado exposto próximo à estrutura).", "q": "good", "fb": "É esse conjunto que permite ao PCM classificar a criticidade certa e programar com o material adequado. SS vaga vira OS mal priorizada.", "to": "c"}, {"t": "Uma descrição rápida — 'cabo danificado na usina X' — para não atrasar minha preventiva.", "q": "bad", "fb": "'Cabo danificado' sem local nem foto obriga alguém a voltar lá só para descobrir o que você já sabia. Dois minutos de capricho economizam uma viagem.", "to": "c"}, {"t": "Descrição completa e sugestão de classificação como P1, para garantir atendimento rápido.", "q": "ok", "fb": "Descrição completa, ótimo — mas inflar a criticidade para 'garantir' atendimento distorce a fila de todos. Descreva o risco com precisão; a classificação é papel de quem prioriza com a visão do todo.", "to": "c"}]}, "c": {"s": "A SS virou OS e foi programada para outra equipe na semana seguinte. Qual é o fim correto do SEU papel nesse fluxo?", "o": [{"t": "Nenhuma ação extra: o fluxo segue com o PCM e a equipe programada; se eu notar agravamento antes, atualizo a SS/aviso o líder.", "q": "good", "fb": "Exato — o fluxo existe para você confiar nele. Seu papel foi ver, registrar bem e sinalizar o risco; o sistema faz o resto. Vigilância extra só se o cenário mudar.", "to": "f_ok"}, {"t": "Cobro diariamente o PCM até a execução, para garantir que não caia no esquecimento.", "q": "ok", "fb": "A intenção é boa, mas cobrança diária de cada SS não escala e vira ruído. O registro bem feito com risco sinalizado é o que garante a priorização — não a insistência.", "to": "f_meio"}, {"t": "Passo lá de novo semana que vem e, se ninguém tiver vindo, resolvo eu mesmo.", "q": "bad", "fb": "Resolver 'por fora' na segunda visita repete o erro da primeira tentação: execução sem OS, sem APR e sem programação. Se o prazo parecer errado, o caminho é o líder/PCM — não o atalho.", "to": "f_ruim"}]}, "f_ok": {"fim": 1, "tit": "Fluxo redondo", "txt": "Achado registrado com evidência, SS completa, criticidade honesta e confiança no fluxo. A corretiva foi programada com o material certo e ninguém precisou voltar lá para 'entender o problema'. É o processo funcionando como desenhado."}, "f_meio": {"fim": 1, "tit": "Chegou lá, com ruído", "txt": "O achado foi tratado, mas com atrito desnecessário — registro dependendo de terceiros ou cobrança em excesso. O fluxo SS→OS funciona quando cada um faz bem a sua parte: registrar com capricho vale mais que insistir depois."}, "f_ruim": {"fim": 1, "tit": "O atalho cobrou caro", "txt": "Execução sem OS: sem APR, sem programação, sem registro — e um risco elétrico tratado no improviso. O que parecia proatividade deixou a usina sem histórico e você sem respaldo. Na Grid, toda execução de campo passa por OS. Sempre."}}}, "c_pcm": {"tit": "Segunda-feira no painel", "ctx": "07h30 de segunda. Antes de sair da base, você abre o <b>Painel PCM</b> para organizar a semana da turma. A programação mostra: 2 preventivas MPM, 1 corretiva P2 e uma SS pendente com sugestão do PCM para sua rota.", "start": "a", "nodes": {"a": {"s": "Como você usa o painel para montar o dia?", "o": [{"t": "Confiro prazos e prioridades: a P2 tem SLA correndo — organizo a rota para atendê-la dentro do prazo e encaixo as MPMs na sequência lógica de deslocamento.", "q": "good", "fb": "É para isso que o painel existe: enxergar prazo, prioridade e rota juntos. Corretiva com SLA na frente, preventivas otimizando o deslocamento.", "to": "b"}, {"t": "Sigo a ordem em que as OS aparecem na tela — se está programado, a ordem já deve estar certa.", "q": "ok", "fb": "A programação define a semana, mas a sequência do dia é sua: o painel mostra prazos e locais justamente para você otimizar rota e SLA. Ler a ordem sem ler os prazos desperdiça a ferramenta.", "to": "b"}, {"t": "Começo pelas MPMs, que são mais rápidas, e deixo a P2 para o fim do dia.", "q": "bad", "fb": "P2 tem SLA de 24 h correndo — deixá-la para o fim do dia é apostar que nada vai atrasar. Prioridade não é ordem de conveniência.", "to": "b"}]}, "b": {"s": "No painel, a SS pendente da sua rota tem uma sugestão do PCM: 'aproveitar deslocamento da MPM de quarta'. Você:", "o": [{"t": "Valido a sugestão com o líder: se a SS virar OS a tempo, o encaixe de quarta economiza um deslocamento inteiro.", "q": "good", "fb": "A sugestão do PCM é exatamente esse tipo de otimização — mas quem confirma o encaixe é o líder com a visão da semana. Sugestão validada vira eficiência; sugestão ignorada vira viagem dobrada.", "to": "c"}, {"t": "Executo a SS na quarta junto com a MPM, já que o PCM sugeriu.", "q": "bad", "fb": "SS ainda não é OS — sem a conversão, não há programação, APR nem registro de execução. A sugestão orienta o planejamento; não substitui o fluxo.", "to": "c"}, {"t": "Ignoro — sugestão não é programação, e minha semana já está cheia.", "q": "bad", "fb": "A sugestão existe para economizar deslocamento seu. Ignorá-la sem avaliar é jogar fora a otimização que o painel te entrega de graça.", "to": "c"}]}, "c": {"s": "Quarta à tarde, você nota no painel que uma das suas MPMs de sexta aparece como 'reprogramada' e sumiu da sua lista. Você:", "o": [{"t": "Confirmo a mudança com o líder/PCM e reorganizo a sexta com base no painel atualizado.", "q": "good", "fb": "O painel atualiza a cada poucos minutos justamente para isso: mudança de programação chega a todos ao mesmo tempo. Confirmar e replanejar é o uso correto.", "to": "f_ok"}, {"t": "Executo a MPM de sexta mesmo assim — estava programada no começo da semana.", "q": "bad", "fb": "Executar OS reprogramada gera conflito: outra equipe pode ter assumido, o material pode ter sido remanejado, e o registro fica órfão. O painel de agora vale mais que a memória de segunda.", "to": "f_meio"}, {"t": "Deixo a sexta livre — reprogramou, não é mais problema meu.", "q": "ok", "fb": "A OS saiu mesmo da sua lista, mas 'sumiu por quê?' é uma pergunta que vale fazer: às vezes a reprogramação abre espaço para adiantar outra pendência da rota. Sexta vazia é oportunidade, não folga automática.", "to": "f_ok"}]}, "f_ok": {"fim": 1, "tit": "Painel bem usado, semana redonda", "txt": "Prioridade por SLA, sugestões validadas e replanejamento em cima do dado atualizado. O painel PCM é o mapa da semana — quem lê prazos e rotas juntos roda menos, atende no prazo e não é surpreendido por mudança de programação."}, "f_meio": {"fim": 1, "tit": "Quase — o painel avisou", "txt": "A semana andou, mas houve retrabalho que o painel teria evitado: execução fora da programação atual ou SS tratada sem virar OS. A regra de bolso: antes de deslocar, confira o painel — ele está sempre mais atualizado que o plano de segunda-feira."}, "f_ruim": {"fim": 1, "tit": "A semana atropelou", "txt": "SLA apertado deixado para o fim, sugestões ignoradas e programação desatualizada na cabeça: o resultado é deslocamento dobrado e prazo em risco. O painel PCM existe para tirar essas surpresas do caminho — use-o no início do dia, não depois do problema."}}}, "c_perf": {"tit": "O ticket que virou OS", "ctx": "A equipe de Performance abriu um <b>ticket</b>: a usina onde você fará preventiva amanhã está gerando <b>5% abaixo do esperado</b>, com suspeita de strings fora em um inversor. O ticket virou OS corretiva, programada junto com a sua preventiva.", "start": "a", "nodes": {"a": {"s": "Antes de sair para a usina, o que vale conferir no ticket/OS?", "o": [{"t": "A evidência da Performance: qual inversor, quais strings suspeitas e em que horários o desvio aparece — para chegar sabendo onde procurar.", "q": "good", "fb": "O ticket de performance nasce de análise de curva — ele aponta o alvo. Ler a evidência antes transforma uma caça às cegas em inspeção direcionada.", "to": "b"}, {"t": "Nada além do endereço — em campo eu descubro o problema com o multímetro.", "q": "bad", "fb": "Descobrir em campo o que a análise já sabia é desperdiçar a maior vantagem do ticket: a localização do desvio. Você gastaria horas testando strings boas.", "to": "b"}, {"t": "Confiro só se a OS tem os materiais previstos — o diagnóstico é papel da Performance.", "q": "ok", "fb": "Material importa, mas o diagnóstico final é seu: a Performance aponta a suspeita pela curva; quem confirma fisicamente (conector, fusível, diodo) é o campo. As duas leituras se completam.", "to": "b"}]}, "b": {"s": "Em campo, você confirma: 2 strings fora por conectores danificados. Reparo feito. Como você fecha a OS para 'conversar' bem com a Performance?", "o": [{"t": "Registro causa, strings/posições exatas, fotos antes/depois e horário da normalização — para a Performance confirmar a recuperação na curva.", "q": "good", "fb": "O horário da normalização é ouro para a Performance: ela cruza com a curva de geração e confirma que a perda sumiu. OS bem fechada encerra o ticket com evidência.", "to": "c"}, {"t": "Fecho como 'strings normalizadas' — a Performance vê o resto na curva de geração.", "q": "bad", "fb": "Sem posição, causa e horário, a Performance não sabe se a recuperação da curva veio do seu reparo ou de outro fator. O ticket fica aberto e alguém volta a te perguntar.", "to": "c"}, {"t": "Registro tudo e aviso o líder por mensagem que o serviço está pronto.", "q": "ok", "fb": "O registro completo é o que importa — o aviso é cortesia útil, mas é a OS no Fracttal que fecha o ciclo com a Performance, não a mensagem.", "to": "c"}]}, "c": {"s": "Dias depois, você nota no painel de Performance que a geração daquela usina segue um pouco abaixo do esperado. Você:", "o": [{"t": "Sinalizo à Performance/líder: o reparo resolveu as 2 strings, mas pode haver perda residual — melhor a análise conferir antes de virar novo ticket tardio.", "q": "good", "fb": "É o circuito virtuoso: campo também lê o painel e devolve sinal para a análise. Perda residual detectada cedo é ticket pequeno; detectada tarde, é RMO constrangedor.", "to": "f_ok"}, {"t": "Considero encerrado — minha OS foi executada e aprovada.", "q": "ok", "fb": "Formalmente sim, sua parte acabou. Mas o campo que olha o painel e puxa o alerta vale mais do que o que só executa: a perda residual seria pega semanas antes.", "to": "f_meio"}, {"t": "Volto à usina para reinspecionar por conta própria na próxima folga de agenda.", "q": "bad", "fb": "Ir a campo sem análise e sem OS é gastar deslocamento com base em impressão. O caminho é sinalizar a Performance — ela confirma na curva se há perda real e onde.", "to": "f_meio"}]}, "f_ok": {"fim": 1, "tit": "Campo e Performance no mesmo time", "txt": "Você usou a análise para chegar certeiro, fechou a OS com o dado que a Performance precisava e ainda devolveu um alerta pelo painel. É esse ciclo — curva aponta, campo confirma, registro fecha — que recupera geração rápido."}, "f_meio": {"fim": 1, "tit": "Serviço bom, ciclo incompleto", "txt": "O reparo saiu bem, mas o ciclo com a Performance ficou devendo: registro raso, ticket sem confirmação ou alerta residual não dado. A regra de bolso: a OS fala com a curva — feche uma pensando na outra."}, "f_ruim": {"fim": 1, "tit": "Caça às cegas", "txt": "Ignorar a evidência do ticket e fechar a OS sem dado transformou uma inspeção direcionada em tentativa e erro. A Performance existe para apontar onde a geração está vazando — quem não lê o ticket procura vazamento com venda nos olhos."}}}, "c_quem": {"tit": "Quem eu aciono?", "ctx": "Seu primeiro mês na Grid. Numa mesma manhã, três situações chegam até você: um <b>alarme de inversor offline</b> que você percebeu no painel, uma <b>dúvida sobre a prioridade</b> entre duas OS da sua rota, e um <b>cliente que te aborda</b> na usina pedindo um serviço extra \"rapidinho\".", "start": "a", "nodes": {"a": {"s": "O inversor offline que você viu no painel: quem trata isso primeiro?", "o": [{"t": "O COS — monitoramento 24/7 e religamento remoto são deles; confirmo se já estão tratando antes de qualquer movimento.", "q": "good", "fb": "Exato. O COS enxerga o alarme em tempo real e tenta o religamento remoto antes de qualquer mobilização. Confirmar com eles evita deslocamento à toa.", "to": "b"}, {"t": "Eu mesmo — estou mais perto da usina e resolvo mais rápido.", "q": "bad", "fb": "Sem passar pelo COS você pode atropelar um religamento remoto em andamento — e mobilizar campo para algo que se resolvia em 2 minutos de SCADA.", "to": "b"}, {"t": "Aviso meu supervisor de campo para ele decidir o que fazer.", "q": "ok", "fb": "O supervisor é seu primeiro contato para dúvidas — mas para alarme em tempo real o dono do processo é o COS. Avisar o supervisor não é errado; acionar o COS é mais direto.", "to": "b"}]}, "b": {"s": "A dúvida de prioridade entre as duas OS da rota: quem é o contato certo?", "o": [{"t": "Meu supervisor de campo — é o primeiro contato para dúvidas e prioridades da rota.", "q": "good", "fb": "É exatamente o papel dele: os 6 supervisores cobrem os clusters e destravam prioridade, rota e recurso. Dúvida de campo começa no supervisor.", "to": "c"}, {"t": "O PCM — foi quem programou as OS, então sabe a ordem certa.", "q": "ok", "fb": "O PCM define a programação da semana, mas a arbitragem do dia a dia na rota é do supervisor — ele tem o contexto do cluster e aciona o PCM se precisar reprogramar.", "to": "c"}, {"t": "O KAM do cliente — prioridade é assunto de contrato.", "q": "bad", "fb": "O KAM cuida da relação com o cliente, não da ordem de execução da sua rota. Acioná-lo para isso é atravessar o fluxo — e demorar mais.", "to": "c"}]}, "c": {"s": "O cliente te aborda na usina pedindo um serviço extra fora do escopo, 'coisa rápida'. Você:", "o": [{"t": "Escuto com atenção, explico que vou encaminhar pelo canal certo e repasso ao supervisor/KAM — serviço extra passa por avaliação de escopo.", "q": "good", "fb": "Cordialidade com o cliente + fluxo correto: quem avalia escopo extra é o KAM (com aditivo, se for o caso). Você não fecha nem recusa — encaminha.", "to": "f_ok"}, {"t": "Faço o serviço — é rápido e deixa o cliente satisfeito.", "q": "bad", "fb": "Serviço fora do escopo sem OS: sem cobertura de contrato, sem APR, sem registro. A simpatia de hoje vira precedente e risco amanhã — e o KAM descobre depois.", "to": "f_meio"}, {"t": "Explico que não posso e sugiro que ele ligue para a central da Grid.", "q": "ok", "fb": "Não executar está certo — mas 'liga para a central' devolve o problema ao cliente. Melhor: você mesmo encaminha ao supervisor/KAM e dá o retorno. Cliente no centro é isso.", "to": "f_ok"}]}, "f_ok": {"fim": 1, "tit": "Mapa na cabeça", "txt": "COS para o tempo real, supervisor para a rota, KAM para o cliente — cada demanda no trilho certo, sem atravessar fluxo nem deixar ninguém sem resposta. Quem conhece o organograma resolve mais rápido e com menos ruído."}, "f_meio": {"fim": 1, "tit": "Boa vontade, trilho errado", "txt": "A intenção foi boa, mas atalhos por fora do fluxo criam retrabalho e risco: religamento atropelado ou serviço sem cobertura. Antes de agir, vale a pergunta de 10 segundos: 'de quem é este processo?' — o organograma da intranet responde."}, "f_ruim": {"fim": 1, "tit": "Todo mundo no lugar errado", "txt": "Acionando as pessoas erradas, cada demanda demorou mais: o alarme esperou, a rota travou e o cliente criou expectativa errada. Conhecer quem é quem não é burocracia — é o caminho mais curto para resolver."}}}, "c_proc": {"tit": "Uma atividade que você nunca fez", "ctx": "Sua OS de amanhã inclui uma atividade que você <b>nunca executou</b>: manobra num tipo de string box que você não conhece. O colega que sempre fazia isso está de férias.", "start": "a", "nodes": {"a": {"s": "Como você se prepara hoje?", "o": [{"t": "Procuro o POP da atividade na pasta 16. Procedimentos Operacionais e estudo o passo a passo completo antes de ir.", "q": "good", "fb": "Atividade nova = POP completo, na véspera. É para isso que ele existe: o conhecimento da empresa não pode depender de quem está de férias.", "to": "b"}, {"t": "Levo o POP Flash no bolso e sigo por ele em campo — é a versão rápida oficial.", "q": "ok", "fb": "O POP Flash é ótimo para relembrar em campo o que você já domina — mas para uma atividade que você nunca fez, o passo a passo completo (riscos, condições, exceções) vem antes. Flash complementa, não substitui.", "to": "b"}, {"t": "Ligo para o colega de férias e peço um resumo por áudio.", "q": "bad", "fb": "Áudio de férias não é procedimento: sem riscos mapeados, sem versão vigente, sem respaldo. O POP existe justamente para a empresa não depender da memória de uma pessoa.", "to": "b"}]}, "b": {"s": "No POP, um passo cita uma ferramenta que não está no seu kit padrão. Você:", "o": [{"t": "Resolvo hoje: verifico com o líder/base a disponibilidade da ferramenta antes do deslocamento de amanhã.", "q": "good", "fb": "Ler o POP na véspera vale exatamente por isso: descobrir a pendência com tempo de resolver. Ferramenta descoberta em campo é OS reprogramada.", "to": "c"}, {"t": "Sigo amanhã mesmo assim — na hora improviso com o que tiver no carro.", "q": "bad", "fb": "Improvisar ferramenta em manobra elétrica é risco direto — e é justamente o tipo de desvio que o POP existe para impedir.", "to": "c"}, {"t": "Adio a OS até a ferramenta padrão chegar na base.", "q": "ok", "fb": "Mais prudente que improvisar — mas adiar sem antes verificar a disponibilidade é pular uma etapa: muitas vezes a ferramenta está na base ou com outra turma, e a OS sai no prazo.", "to": "c"}]}, "c": {"s": "Em campo, você percebe que um passo do POP não bate com o modelo de string box da usina (versão mais nova do equipamento). Você:", "o": [{"t": "Paro, alinho com o líder como proceder com segurança e registro a divergência para atualização do POP.", "q": "good", "fb": "Procedimento desatualizado se trata assim: segurança primeiro, decisão com o líder e feedback para corrigir o documento. Sua divergência registrada protege o próximo.", "to": "f_ok"}, {"t": "Adapto por conta própria — o princípio da manobra é o mesmo.", "q": "bad", "fb": "'O princípio é o mesmo' é como começam os relatos de acidente. Divergência entre POP e equipamento real é ponto de parada, não de criatividade.", "to": "f_meio"}, {"t": "Interrompo a atividade e devolvo a OS sem executar, anotando o motivo.", "q": "ok", "fb": "Parar é sempre legítimo — mas devolver sem alinhar com o líder pode ser exagero: muitas divergências se resolvem com uma consulta rápida e a atividade segue com segurança. Pare, pergunte, depois decida.", "to": "f_ok"}]}, "f_ok": {"fim": 1, "tit": "Procedimento vivo", "txt": "POP estudado na véspera, pendência de ferramenta resolvida antes do deslocamento e divergência registrada para atualização. É assim que o procedimento se mantém vivo: quem consulta, executa melhor; quem dá feedback, melhora o documento para todos."}, "f_meio": {"fim": 1, "tit": "Deu certo por pouco", "txt": "A atividade saiu, mas com improviso onde deveria haver método. POP ignorado ou adaptado 'no princípio' funciona até o dia em que não funciona — e nesse dia a diferença entre incidente e rotina é ter seguido o passo a passo."}, "f_ruim": {"fim": 1, "tit": "Memória não é método", "txt": "Depender de áudio de colega e de improviso de ferramenta transformou uma atividade padronizada em aventura. A pasta 16 existe para isso não acontecer: POP antes, ferramenta certa, e divergência é ponto de parada."}}}, "c_ferr": {"tit": "Um dia, cinco ferramentas", "ctx": "Dia cheio: você precisa <b>(1)</b> ver sua programação da semana, <b>(2)</b> executar e fechar uma OS, <b>(3)</b> conferir se a usina voltou a gerar bem após o reparo, e <b>(4)</b> achar o contato de um supervisor de outro cluster.", "start": "a", "nodes": {"a": {"s": "Para começar o dia: programação da semana e detalhes da sua OS. Onde você olha?", "o": [{"t": "Programação no Painel PCM; a execução e o fechamento da OS, no Fracttal.", "q": "good", "fb": "Cada ferramenta no seu papel: o painel mostra o que está programado; o Fracttal é onde a OS vive — execução, evidências e fechamento.", "to": "b"}, {"t": "Tudo no Fracttal — se a OS está lá, a programação também está.", "q": "ok", "fb": "Dá para ver suas OS no Fracttal, mas a visão de programação da semana (prazos, rotas, sugestões do PCM, religamentos) é o painel. Quem só olha o Fracttal enxerga a árvore, não a floresta.", "to": "b"}, {"t": "Espero o líder mandar a lista do dia no grupo.", "q": "bad", "fb": "Depender do grupo é ficar cego entre uma mensagem e outra. As ferramentas são self-service: painel e Fracttal estão sempre atualizados, sem depender de ninguém postar.", "to": "b"}]}, "b": {"s": "OS executada. Para conferir se a usina retomou a geração esperada após o reparo, você usa:", "o": [{"t": "O Painel de Performance — geração e saúde da usina, incluindo o efeito do meu reparo na curva.", "q": "good", "fb": "É lá que a recuperação aparece. Campo que confere o painel depois do reparo fecha o ciclo — e pega perda residual antes de virar ticket.", "to": "c"}, {"t": "O Fracttal — se a OS foi aprovada, a geração está ok.", "q": "bad", "fb": "OS aprovada atesta o serviço, não a curva. A confirmação de que a geração voltou ao esperado vive no painel de Performance — são leituras complementares.", "to": "c"}, {"t": "Pergunto ao COS pelo rádio se está tudo normal.", "q": "ok", "fb": "O COS confirma o status operacional agora — útil. Mas 'sem alarme' não é 'gerando o esperado': a comparação com a curva esperada é o painel de Performance.", "to": "c"}]}, "c": {"s": "Falta o contato do supervisor do outro cluster e, de quebra, você quer revisar um procedimento antes de amanhã. Onde encontra os dois?", "o": [{"t": "Na intranet: organograma com contatos e a pasta 16. Procedimentos Operacionais (POPs); capacitação e reciclagem, no Academy.", "q": "good", "fb": "Fechou o mapa: intranet para organograma e procedimentos, Academy para trilhas e reciclagem. Cada informação tem um endereço fixo — e nenhum deles é 'perguntar no grupo'.", "to": "f_ok"}, {"t": "Pergunto no grupo do WhatsApp — alguém sempre tem o contato salvo.", "q": "bad", "fb": "Funciona às vezes, mas o contato do grupo pode estar desatualizado — e o procedimento 'que alguém manda' pode ser versão velha. Fonte oficial existe para isso.", "to": "f_ok"}, {"t": "No Mapa de Equipes — se tem as equipes, deve ter contatos e procedimentos também.", "q": "bad", "fb": "O Mapa de Equipes mostra equipes, bases e rotas — ótimo para logística, mas organograma e POPs vivem na intranet. Ferramenta certa para cada pergunta.", "to": "f_ok"}]}, "f_ok": {"fim": 1, "tit": "Caixa de ferramentas completa", "txt": "Painel PCM para programar o dia, Fracttal para a OS, Painel de Performance para confirmar a geração, intranet para organograma e POPs, Academy para se manter afiado. Quem sabe onde cada coisa vive gasta o tempo resolvendo — não procurando."}, "f_meio": {"fim": 1, "tit": "Quase lá", "txt": "Você chegou às respostas, mas por caminhos indiretos — dependendo de mensagem, rádio ou memória alheia. As ferramentas self-service estão sempre atualizadas: o hábito de consultá-las direto poupa horas por semana."}, "f_ruim": {"fim": 1, "tit": "Perdido no próprio quintal", "txt": "Sem usar as ferramentas certas, o dia virou uma caça a informações: lista no grupo, geração 'no achismo' e contato desatualizado. O mapa é curto — Fracttal, painéis, intranet, Academy — e aprender onde cada coisa vive é o primeiro passo de qualquer rotina eficiente."}}}, "aplicacao_campo": {"tit": "Plantão de sábado: a corretiva completa", "ctx": "Sábado, 10h20. O COS aciona: usina com <b>50% da geração perdida</b> — um dos dois inversores centrais desarmado, religamento remoto sem sucesso. Você é o técnico de plantão. Este cenário atravessa o atendimento inteiro: da chegada ao fechamento.", "start": "a", "nodes": {"a": {"s": "Você chega à usina. Antes de encostar no inversor, a sequência correta é:", "o": [{"t": "APR da tarefa, PT para a intervenção, LOTO no circuito e teste de ausência de tensão — só então abrir o inversor.", "q": "good", "fb": "A sequência de segurança não muda por ser sábado nem por ser 'só um diagnóstico': APR → PT → LOTO → teste. Sempre, nessa ordem.", "to": "b"}, {"t": "Leitura rápida dos códigos de erro no IHM (sem abrir nada) e só depois a papelada de segurança, já sabendo o que procurar.", "q": "ok", "fb": "Ler o IHM por fora, sem abrir nem tocar, é aceitável para orientar o diagnóstico — mas atenção à armadilha: 'já que estou aqui' vira abertura sem LOTO. A APR/PT vem antes de qualquer intervenção física.", "to": "b"}, {"t": "Direto ao diagnóstico — cada hora parada é geração perdida, e a segurança formal fica para quando houver intervenção de verdade.", "q": "bad", "fb": "Diagnóstico já é intervenção: painel aberto, circuitos expostos, tensão presente. A pressa do sábado é exatamente quando o método mais protege.", "to": "b"}]}, "b": {"s": "Diagnóstico: fusível de string queimado no lado CC + indício de conector aquecido. Há fusível reserva no carro. Você:", "o": [{"t": "Investigo a causa antes de trocar: fusível não queima à toa — meço isolação/corrente da string e inspeciono o conector aquecido. Troco e corrijo a causa.", "q": "good", "fb": "Trocar fusível sem investigar é tratar o sintoma: ele queima de novo na segunda, com a mesma perda de geração. Causa primeiro, peça depois.", "to": "c"}, {"t": "Troco o fusível para religar logo (recupero a geração) e programo a investigação do conector para a próxima visita.", "q": "bad", "fb": "Religar em cima de um conector aquecido é reenergizar um ponto de falha térmica — risco de evolução para arco/incêndio. A causa não espera a próxima visita.", "to": "c"}, {"t": "Substituo fusível E conector de uma vez, sem medições — os dois são baratos e a usina volta mais rápido.", "q": "ok", "fb": "Resolve os componentes visíveis, mas sem medir a string você não sabe se a causa é outra (isolação, sombreamento severo, corrente anômala). Trocar peça sem medição é aposta — às vezes acerta, às vezes volta sábado que vem.", "to": "c"}]}, "c": {"s": "Reparo concluído, medições ok. Para devolver a usina à operação e encerrar, a sequência correta é:", "o": [{"t": "Verificação completa (proteções, aterramento, área liberada), energização conforme procedimento, confirmação de geração com o COS e OS fechada com fotos, leituras, causa e horário de normalização.", "q": "good", "fb": "Fim de atendimento é isso: energizar com método, confirmar a normalização com quem monitora e registrar o dado completo que sustenta histórico, garantia e indicadores.", "to": "f_ok"}, {"t": "Energizo, vejo o inversor subir na tela local e fecho a OS como 'normalizado' — o COS enxerga o resto pelo SCADA.", "q": "bad", "fb": "Subiu na tela local não significa gerando pleno no SCADA — e OS sem causa, fotos e horário é dado perdido. A confirmação com o COS e o registro completo são parte do serviço.", "to": "f_meio"}, {"t": "Energizo e permaneço 2 horas na usina observando, antes de fechar a OS.", "q": "ok", "fb": "Zelo é bom, mas 2 horas paradas de plantão é recurso mal usado: a confirmação objetiva (COS/SCADA + medições) diz em minutos o que a observação diria em horas. Confirme com método e libere-se para o próximo chamado.", "to": "f_ok"}]}, "f_ok": {"fim": 1, "tit": "Atendimento de manual", "txt": "Segurança na sequência certa, causa investigada antes da peça, energização com método e registro completo. A usina voltou inteira, o dado ficou íntegro e ninguém precisou improvisar. É exatamente esse o padrão que os cenários de decisão treinam."}, "f_meio": {"fim": 1, "tit": "Voltou — mas ficou devendo", "txt": "A geração retornou, mas com pontas soltas: confirmação pulada ou registro raso. No próximo desarme, quem atender vai começar do zero — e se a falha reincidir, não há dado para a análise. Atendimento completo inclui o fechamento."}, "f_ruim": {"fim": 1, "tit": "A pressa cobrou juros", "txt": "Atalhos de segurança ou religamento em cima da causa: o cenário terminou com risco real — para você e para o ativo. Releia a Tabela de Resposta a Falhas e a sequência APR → PT → LOTO → teste. Geração se recupera; acidente, não."}}}};
D.modeval={"mps_termo": [{"q": "Irradiância de 500 W/m² no momento do ensaio:", "o": ["Pode medir", "Não atende (mínimo &gt;600 W/m²) — aguardar/adiar", "Tanto faz"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Disjuntor MT a 64°C:", "o": ["Aceita", "Atenção (50–70) — aceite com observações", "Rejeita"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Disjuntor MT a 75°C:", "o": ["Aceita", "Atenção", "Rejeição (&gt;70) — etiqueta + OS corretiva"], "c": 2, "e": "tecnico", "tipo": "conceito"}, {"q": "Emissividade para cabo isolado/superfície pintada:", "o": ["0,50", "0,95", "1,50"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Superfície de cobre polido lê temperatura aparente baixa. Conduta:", "o": ["Confiar no valor", "Focar a leitura na junção/fita isolante (ε menor no metal)", "Pintar o cobre"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Na inspeção, um terminal do disjuntor MT está a 82°C (vizinhos ~40°C). Conduta correta?", "o": ["Registrar como Atenção e seguir", "Destacar em vermelho, etiquetar o painel e abrir OS Corretiva (reaperto com torquímetro)", "Reapertar na hora, com o painel energizado"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Você chega para o ensaio às 15h30, irradiância 480 W/m². O que faz?", "o": ["Mede assim mesmo", "Não atende às condições (>600 W/m², 10h–14h) — reprograma o ensaio", "Aumenta a emissividade para compensar"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "A câmera aponta 300°C num cabo de cobre polido nu. Provável interpretação?", "o": ["Falha crítica imediata", "Leitura falsa por baixa emissividade do metal polido — focar na junção/fita (ε=0,95)", "Trocar o cabo na hora"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Um módulo aparece com um 'ponto frio' anormal em relação aos vizinhos. Isso indica:", "o": ["Está mais protegido, tudo ok", "Possível célula/string inativa (sem gerar) — investigar como anomalia", "Excesso de limpeza"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Encontrou 3 conexões em nível de Rejeição na string box. Melhor encaminhamento?", "o": ["Aceite com observações e acompanhar", "OS Corretiva com desligamento programado para reaperto/limpeza/troca, com termografia de verificação depois", "Só registrar foto no relatório"], "c": 1, "e": "tecnico", "tipo": "caso"}], "fundamentos": [{"q": "Qual sequência descreve corretamente o fluxo de geração de uma UFV até a rede?", "o": ["Módulos (CA) → inversor → string box → trafo → rede", "Módulos (CC) → string → string box → inversor (CC→CA) → transformador → subestação → rede", "Módulos (CC) → transformador → inversor → string box → rede", "String box → módulos → subestação → inversor → rede"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "O PR (Performance Ratio) de uma usina expressa:", "o": ["O percentual do tempo em que a usina esteve apta a gerar", "A potência instalada total em MWp", "A relação entre a energia efetivamente gerada e a esperada para o recurso solar disponível", "A perda de geração causada exclusivamente por sujeira"], "c": 2, "e": "tecnico", "tipo": "conceito"}, {"q": "Entre os equipamentos de uma UFV, onde ocorre a maior parte dos alarmes tratados pelo O&M?", "o": ["Nos inversores", "Na cerca perimetral e CFTV", "Nos módulos fotovoltaicos", "Na estação meteorológica"], "c": 0, "e": "tecnico", "tipo": "conceito"}, {"q": "Soiling é o nome dado a:", "o": ["Degradação das células por potencial induzido (PID)", "Perda de geração por sujeira acumulada sobre os módulos", "Corrosão das estruturas metálicas dos trackers", "Aquecimento anormal dos conectores CC"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Uma usina pode apresentar disponibilidade próxima de 100% e, ainda assim, PR baixo. Isso acontece porque:", "o": ["Disponibilidade e PR medem a mesma coisa, então é erro de cálculo", "A disponibilidade mede aptidão a gerar, enquanto o PR captura perdas como soiling, derating e sensores — a usina pode estar 'ligada' gerando menos que o esperado", "O PR só cai quando há equipamento parado", "A disponibilidade inclui o recurso solar e o PR não"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Meio-dia, POA alta. Um inversor comunica normalmente no SCADA, mas está com potência zero. A melhor conduta é:", "o": ["Abrir chamado imediato ao fabricante do inversor", "Aguardar o dia seguinte para confirmar a repetição do comportamento", "Verificar em campo o lado CC (string box, seccionadoras, proteções) e os alarmes locais antes de abrir chamado", "Reiniciar o SCADA para atualizar a leitura"], "c": 2, "e": "tecnico", "tipo": "caso"}, {"q": "O SCADA perdeu comunicação com a usina inteira, mas o medidor da subestação mostra exportação normal de energia. Como tratar?", "o": ["Como parada total de geração (P1), com religamento de emergência", "Como falha de monitoramento: priorizar o restabelecimento da comunicação (datalogger/rede), sem declarar indisponibilidade de geração", "Como falha de todos os inversores simultaneamente", "Ignorar, pois a energia está sendo exportada"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "O transformador de um skid desarma. Sobre o impacto, é correto afirmar:", "o": ["Apenas uma string deixa de gerar; prioridade baixa", "Somente o SCADA é afetado, sem perda de geração", "Todos os inversores conectados àquele skid param de exportar — bloco inteiro fora, tratar com prioridade alta", "O impacto se limita à estação solarimétrica"], "c": 2, "e": "tecnico", "tipo": "caso"}, {"q": "O cliente questiona por que sua usina gerou menos que a usina vizinha no mês. Antes de responder, você deve comparar:", "o": ["Apenas a energia bruta gerada pelas duas", "MWp instalado, PR, disponibilidade e o recurso solar medido de cada usina no período", "Somente o número de alarmes registrados", "A idade dos inversores de cada planta"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Numa manhã nublada que abre ao meio-dia, a geração salta rapidamente. Um técnico novo estranha 'picos' nos inversores. A explicação correta é:", "o": ["Falha de firmware nos inversores", "A potência acompanha a irradiância no plano dos módulos — variação rápida de nuvem produz rampas reais de geração", "O transformador está regulando mal a tensão", "O SCADA interpola dados errados em dias nublados"], "c": 1, "e": "tecnico", "tipo": "caso"}], "recurso": [{"q": "A irradiância que efetivamente determina a geração dos módulos é:", "o": ["GHI — global no plano horizontal", "DNI — direta normal ao sol", "DHI — difusa do céu", "POA/IPOA — no plano do módulo (plano do arranjo)"], "c": 3, "e": "tecnico", "tipo": "conceito"}, {"q": "A relação física entre as componentes da radiação é:", "o": ["GHI = DNI + DHI, sempre", "GHI = DNI·cos(z) + DHI, onde z é o ângulo zenital", "DHI = GHI + DNI", "POA = GHI − DNI"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Na estação solarimétrica, o pireliômetro montado em rastreador mede:", "o": ["GHI", "DHI", "DNI — componente direta, perpendicular ao sol", "Temperatura de módulo"], "c": 2, "e": "tecnico", "tipo": "conceito"}, {"q": "Um piranômetro sujo, sombreado ou descalibrado tem como principal consequência:", "o": ["Redução real da geração da usina", "PR calculado errado — a usina parece pior (ou melhor) do que é", "Desarme das proteções da subestação", "Parada dos trackers por falta de referência"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Para medir a irradiância POA, a estação utiliza:", "o": ["Piranômetro inclinado no plano do arranjo ou célula de referência", "Anemômetro compensado", "Somente o piranômetro horizontal", "O datalogger, que calcula POA sem sensor"], "c": 0, "e": "tecnico", "tipo": "conceito"}, {"q": "O PR da semana caiu para 68%, mas a geração está em linha com o histórico e com usinas vizinhas. A hipótese mais provável é:", "o": ["Degradação súbita dos módulos", "Sensor de irradiância lendo a mais (sujeira/descalibração) — denominador do PR inflado", "Furto de cabos em strings", "Soiling severo em toda a planta"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "O GHI da estação bate com o satélite, mas a POA registrada está fisicamente alta demais para a inclinação do arranjo. Suspeita principal:", "o": ["DNI zerado pelo datalogger", "Piranômetro inclinado desnivelado ou descalibrado", "Módulos gerando acima do nominal", "Anemômetro travado"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Dia totalmente encoberto. Um técnico estranha que mesas com orientações diferentes geram quase igual. A explicação é:", "o": ["Falha coletiva dos trackers", "Com DNI ≈ 0, a geração vem da componente difusa (DHI), que é quase independente da orientação", "O SCADA está normalizando os dados", "Os inversores limitam potência em dias nublados"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "O datalogger da estação parou de registrar há 3 dias e ninguém percebeu. Além de restabelecê-lo, a conduta correta é:", "o": ["Preencher o histórico com valores típicos para não deixar buraco", "Comunicar a equipe de performance sobre o período sem dado válido, que afeta o cálculo de PR e perdas", "Reiniciar os inversores para sincronizar os dados", "Apagar o período do banco para não distorcer médias"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Após semanas de seca, o PR aparece acima de 100% em algumas horas do dia. A causa mais provável é:", "o": ["A usina realmente superou o recurso solar", "Sensor POA sujo lendo irradiância a menos — o 'esperado' cai e o PR infla", "Erro do medidor de faturamento da subestação", "Temperatura ambiente baixa demais para os módulos"], "c": 1, "e": "tecnico", "tipo": "caso"}], "protecoes": [{"q": "Na string box, a função do DPS/SPD é:", "o": ["Proteger cada string contra sobrecorrente", "Proteger o circuito contra surtos causados por descargas atmosféricas", "Permitir o seccionamento seguro do circuito CC", "Medir a corrente de cada string"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "O fusível de cada string protege contra:", "o": ["Surtos de tensão atmosféricos", "Sobrecorrente na string", "Falha de comunicação da string box", "Inversão de polaridade apenas"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Sobre SPDA e aterramento, é correto afirmar:", "o": ["O SPDA (captores + malha) protege contra descargas atmosféricas; o aterramento dá referência e escoa correntes de falha — essencial à segurança de pessoas e equipamentos", "O SPDA substitui a necessidade de malha de aterramento", "O aterramento serve apenas para reduzir ruído no SCADA", "SPDA e DPS são o mesmo dispositivo em pontos diferentes"], "c": 0, "e": "tecnico", "tipo": "conceito"}, {"q": "As funções de proteção 50/51 dos relés da subestação correspondem a:", "o": ["Subtensão e sobretensão", "Sobrecorrente instantânea e temporizada", "Diferencial de transformador e falha de disjuntor", "Frequência alta e baixa"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "A atuação (devida ou indevida) de uma proteção da subestação que desliga a usina é classificada como:", "o": ["Evento de baixa prioridade, tratado na próxima preventiva", "Evento P1 — usina parada", "Ocorrência apenas registrada em diário", "Falha exclusiva do cliente/concessionária"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Após tempestade, vários DPS de string boxes estão com indicador de fim de vida. A conduta correta é:", "o": ["Removê-los e operar sem DPS até chegar reposição", "Substituí-los sob OS e aproveitar para inspecionar SPDA e conexões da malha de terra, já que houve descarga", "Apenas registrar e aguardar a próxima MPS", "Religar a usina primeiro e trocar os DPS depois, com tudo energizado"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "O relé da subestação atuou e a causa ainda não foi identificada. Sobre o religamento:", "o": ["Religar imediatamente para reduzir a perda de geração", "Religar e observar se desarma de novo, como teste", "Não religar até verificar o registro do relé e inspecionar o trecho protegido — religar sobre falha não eliminada é risco grave", "Transferir a decisão ao fabricante do relé"], "c": 2, "e": "tecnico", "tipo": "caso"}, {"q": "Na ronda, você encontra uma cordoalha de aterramento rompida na estrutura. Classificação e conduta:", "o": ["Aceite com observações — estética apenas", "Rejeição: sinalizar e abrir corretiva, pois compromete o escoamento de correntes de falha e a segurança das pessoas", "Normal — a estrutura tem aterramento redundante infinito", "Reparar improvisando emenda com fio de cobre qualquer, sem registro"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Antes de substituir o fusível de uma string, a sequência correta envolvendo o seccionador CC é:", "o": ["Trocar direto — fusível é componente de baixa tensão", "Abrir o seccionador/disjuntor CC para isolar o circuito e confirmar ausência de tensão/corrente antes de tocar no porta-fusível", "Curto-circuitar a string para zerar a corrente", "Desligar apenas o inversor via SCADA e trocar em seguida"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "O disjuntor geral desarma minutos após cada tentativa de religamento. A melhor conduta é:", "o": ["Continuar religando até a proteção 'acomodar'", "Bloquear novas tentativas, levantar o registro de atuação do relé e inspecionar o circuito protegido antes de qualquer novo religamento", "Aumentar o ajuste de corrente do relé para evitar o desarme", "Desativar temporariamente a função 51"], "c": 1, "e": "tecnico", "tipo": "caso"}], "tracker": [{"q": "Na arquitetura de controle dos trackers, a NCU tem a função de:", "o": ["Mover diretamente cada mesa", "Concentrar várias TCUs e comunicar com o SCADA", "Medir a irradiância de referência", "Alimentar eletricamente os motores"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "O tracker típico de UFV movimenta os módulos:", "o": ["Em dois eixos, seguindo azimute e elevação", "Em um eixo, em geral no sentido leste-oeste", "Apenas verticalmente, para limpeza", "Somente em situações de vento forte"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "São componentes do sistema de tracker:", "o": ["TCU, motor/atuador, sensor de inclinação, fim de curso e fonte/bateria", "Piranômetro, datalogger e célula de referência", "Relé 50/51, TP e TC", "String box, DPS e fusíveis de string"], "c": 0, "e": "tecnico", "tipo": "conceito"}, {"q": "A inspeção padrão de uma TCU parada, antes de abrir chamado, inclui:", "o": ["Atualizar o firmware e trocar a TCU por reserva", "Verificar alimentação da TCU, botão de emergência, aperto da base do fusível, reset e teste de continuidade do fusível", "Reposicionar a mesa manualmente e lubrificar o atuador", "Somente registrar a falha e aguardar o fabricante"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "No registro do atendimento a uma TCU, o padrão da Grid exige:", "o": ["Apenas descrição textual da falha", "Foto da TCU e do número MAC, com registro completo na OS", "Vídeo do movimento da mesa", "Assinatura do fabricante no relatório"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Mesa parada; você fez as verificações e o reset não resolveu. Próximo passo correto:", "o": ["Abrir chamado ao fabricante imediatamente", "Testar a continuidade do fusível e trocá-lo se estiver rompido", "Desconectar o motor para testar giro livre", "Aguardar o próximo ciclo de rastreamento para confirmar"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Você encontra o botão de emergência da TCU acionado, sem saber por quê. Conduta correta:", "o": ["Rearmar imediatamente — deve ter sido engano", "Verificar antes se há equipe/serviço no tramo e por que foi acionado; só rearmar após confirmar segurança, registrando o achado", "Abrir chamado de falha de TCU", "Trocar o botão, pois acionamento espontâneo indica defeito"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Várias TCUs da mesma região perderam comunicação ao mesmo tempo. A suspeita mais eficiente é:", "o": ["Falha simultânea de todas as TCUs", "Problema na NCU ou na alimentação/comunicação comum daquele grupo", "Fusíveis de todas as mesas rompidos juntos", "Vandalismo em cada mesa individualmente"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Ao meio-dia, uma mesa está visivelmente desalinhada das vizinhas, com TCU comunicando normal. Melhor conduta:", "o": ["Forçar a mesa manualmente até alinhar", "Inspecionar sensor de inclinação, fins de curso e atuador, registrando o desvio — sem mover a mesa na força", "Ignorar — desalinhamento não afeta geração", "Desligar a TCU para a mesa 'destravar' sozinha"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "O fusível da TCU rompe novamente poucos dias após a troca. A conduta correta é:", "o": ["Instalar fusível de maior corrente para parar de romper", "Seguir trocando — fusível é item de desgaste", "Investigar a causa (curto no circuito, atuador travado, fonte) e abrir OS corretiva com o histórico das trocas", "Fazer jumper no porta-fusível até a próxima preventiva"], "c": 2, "e": "tecnico", "tipo": "caso"}], "manutencao": [{"q": "A distinção correta entre os tipos de manutenção é:", "o": ["Preventiva corrige falhas; corretiva antecipa; preditiva limpa módulos", "Preventiva segue rotinas planejadas (MPM/MPS/MPA); corretiva atende falhas dentro do SLA; preditiva monitora a condição (ex.: termografia) para agir antes da falha", "Preditiva e preventiva são sinônimos; corretiva é opcional", "Corretiva é sempre programada; preventiva é sempre emergencial"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "O papel da termografia na estratégia de manutenção é:", "o": ["Substituir as preventivas mensais", "Encontrar pontos quentes (conexões, fusíveis, células) antes que evoluam para falha — manutenção preditiva", "Medir a resistência de isolamento dos circuitos", "Comprovar a limpeza dos módulos"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Numa corretiva, a OS só deve ser encerrada quando:", "o": ["O reparo físico for concluído, independentemente de teste", "O diagnóstico for registrado, mesmo sem reparo", "Após diagnóstico → reparo → teste, com a normalização confirmada", "O cliente autorizar o fechamento"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "Conforme o POP de tratamento de anomalia, um ponto FRIO na termografia (mais frio que os similares em carga) indica:", "o": ["Componente saudável, operando com folga", "Defeito — provável conexão aberta/sem corrente; reconfirmar o ângulo e escalar a Engenharia", "Reflexo solar, sempre descartável", "Sensor da câmera descalibrado"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Ainda conforme o POP, um resultado 'Rejeição' exige:", "o": ["Somente registro fotográfico", "Aceite com observações e acompanhamento", "Etiqueta no componente + OS corretiva com desligamento programado", "Reparo imediato energizado para não perder geração"], "c": 2, "e": "tecnico", "tipo": "conceito"}, {"q": "Alarme de inversor no SCADA. Antes de abrir chamado ao fabricante, o técnico deve:", "o": ["Abrir o chamado direto — alarme é responsabilidade do fabricante", "Executar a inspeção padrão do equipamento (verificações locais, reset conforme procedimento), evitando chamado indevido", "Desligar o inversor por 24h para 'resetar' o alarme", "Transferir o alarme para a próxima preventiva"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "O técnico terminou o reparo de uma corretiva no fim do dia e quer fechar a OS. O inversor ainda não foi testado sob carga. Conduta:", "o": ["Fechar a OS — o reparo foi feito", "Fechar e testar informalmente amanhã", "Manter a OS aberta até confirmar a normalização (teste/verificação no SCADA)", "Fechar a OS e abrir outra para o teste"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "A termografia classificou uma conexão como 'Atenção'. O tratamento correto é:", "o": ["Ignorar — só Rejeição gera ação", "Registrar como aceite com observações e acompanhar com prioridade na próxima inspeção", "Abrir OS corretiva de emergência com desligamento imediato", "Reapertar na hora, com o circuito energizado"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Durante uma preventiva, o técnico encontra um defeito que exige substituição de peça fora do escopo da rotina. Ele deve:", "o": ["Improvisar o reparo com o material disponível para não voltar depois", "Registrar o achado com evidências e abrir OS corretiva para tratamento planejado", "Encerrar a preventiva e esperar ordens", "Deixar para relatar na reunião semanal"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "No mesmo dia surgem: (1) hotspot em conexão classificado como Rejeição e (2) limpeza de módulos atrasada. Como priorizar?", "o": ["A limpeza, pois afeta o PR de toda a usina", "O hotspot: Rejeição térmica é risco de falha/incêndio e vira corretiva prioritária; a limpeza é reprogramada", "Ambos aguardam a próxima MPS", "A limpeza, porque exige menos recursos"], "c": 1, "e": "tecnico", "tipo": "caso"}], "mpm": [{"q": "Toda atividade de MPM começa, obrigatoriamente, por:", "o": ["Abertura das string boxes para inspeção interna", "Leitura da OS, APR/PT e conferência dos EPIs", "Registro fotográfico geral da usina", "Comunicação ao fabricante dos equipamentos"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Em qualquer intervenção elétrica durante a rotina, o padrão exige:", "o": ["Apenas luvas isolantes", "LOTO, detector de tensão e, quando aplicável, aterramento temporário", "Somente a presença de um segundo técnico", "Autorização verbal do supervisor, sem bloqueio"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "São critérios de REJEIÇÃO na inspeção visual da MPM:", "o": ["Superfícies limpas e arruelas comprimidas", "Pintura íntegra e cordoalhas contínuas", "Vazamento ativo, corrosão avançada, parafusos faltantes/frouxos, sinais de superaquecimento ou ninhos de pássaros", "Poeira leve sobre o gabinete"], "c": 2, "e": "tecnico", "tipo": "conceito"}, {"q": "Diante de um achado grave (ex.: risco elétrico exposto), o fluxo correto na MPM é:", "o": ["Corrigir na hora e relatar depois", "Fixar etiqueta 'MANUTENÇÃO CORRETIVA', não prosseguir no componente e comunicar o supervisor para abrir OS", "Fotografar e continuar o checklist no mesmo componente", "Encerrar a MPM da usina inteira"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Sobre o registro das leituras (status/alarmes de inversores, correntes de string) na MPM:", "o": ["Basta anotar os valores fora do normal", "Toda evidência deve ter foto e registro na OS — dado incompleto significa retrabalho", "As leituras são opcionais quando o SCADA está online", "O registro pode ser consolidado de memória no fim da semana"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Na MPM você observa metal descolorido e isolação levemente derretida num terminal de string box. Classificação e ação:", "o": ["Aceite — o componente ainda opera", "Sinal de superaquecimento = rejeição: etiquetar, registrar com foto e comunicar para abrir corretiva", "Apenas limpar o terminal e reavaliar no próximo mês", "Reapertar imediatamente com o circuito energizado"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Você encontra um ninho de pássaros dentro de uma string box. Conduta correta:", "o": ["Remover com as mãos e seguir o checklist", "Tratar como rejeição: registrar, sinalizar e encaminhar remoção segura conforme procedimento — há risco de curto e de fauna", "Fechar a caixa e ignorar", "Lavar a caixa com água para expulsar o ninho"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Fixações com arruelas comprimidas, pintura íntegra e cordoalhas contínuas. Conforme os critérios da MPM, isso é:", "o": ["Rejeição — arruela comprimida indica sobreaperto", "Aceitação: condição íntegra, registrar normalmente e seguir", "Atenção — exige reaperto preventivo imediato", "Impossível avaliar sem termografia"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Na leitura das correntes de string, uma delas está muito abaixo das demais do mesmo arranjo. Na MPM, a conduta correta é:", "o": ["Abrir a string box e trocar o fusível na hora", "Registrar a leitura com foto e sinalizar para investigação (possível fusível/conector) — sem abrir caixas fora do escopo/APR da rotina", "Zerar o registro e aguardar a MPS", "Curto-circuitar a string para testar"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Para adiantar a rota, um colega sugere pular as fotos e registrar tudo por texto no fim do dia. Você responde que:", "o": ["É aceitável se a memória for boa", "Fotos são exigidas apenas em achados graves", "Não: evidência com foto e registro na OS é o padrão — dado incompleto vira retrabalho e o achado sem evidência se perde", "Pode pular fotos desde que o supervisor autorize por áudio"], "c": 2, "e": "processos", "tipo": "caso"}], "mps": [{"q": "São condições obrigatórias para a validade da termografia na MPS:", "o": ["Usina desligada (LOTO) e céu encoberto", "Usina com ≥70% da carga nominal, irradiância >600 W/m², céu limpo, entre 10h e 14h", "Qualquer condição, desde que a câmera seja calibrada", "Irradiância acima de 200 W/m² e vento nulo"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "A termografia deve ser feita com a usina em carga/geração porque:", "o": ["A câmera precisa da luz solar para funcionar", "Sem corrente circulando não há aquecimento — o defeito não aparece", "O SCADA só grava imagens com a usina ligada", "A emissividade dos materiais muda quando desligados"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "A conduta por severidade do ΔT na termografia é:", "o": ["Qualquer ΔT → corretiva imediata", "ΔT pequeno → monitorar; ΔT relevante → reapertar/investigar e registrar; ΔT alto/risco → corretiva imediata", "ΔT só importa acima de 100°C", "ΔT pequeno → trocar componente por precaução"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Sobre o reaperto na MPS, é correto:", "o": ["Apertar 'firme' é suficiente, o torque é referência", "Usar torquímetro de estalo no valor do fabricante — sub e sobreaperto causam falha — e nunca reapertar energizado", "Reaperto pode ser feito energizado se for rápido", "Só se reaperta conexão que já apresentou ΔT alto"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Ao termografar cobre ou alumínio polido, o cuidado correto é:", "o": ["Aumentar a emissividade para 0,99", "Focar a medição na junção/fita isolante, pois o metal nu tem emissividade menor e engana a leitura", "Molhar o metal para uniformizar a temperatura", "Medir apenas à noite"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "A usina precisou ser religada para realizar a termografia. Antes de medir, você deve:", "o": ["Medir imediatamente, aproveitando o transitório", "Aguardar cerca de 15 minutos de estabilização térmica", "Esperar o dia seguinte obrigatoriamente", "Reduzir a carga para 50% para proteger a câmera"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "O planejamento agendou termografia para as 8h, com previsão de 400 W/m². Você deve:", "o": ["Executar assim mesmo — agenda é agenda", "Executar e aplicar fator de correção nas temperaturas", "Reprogramar para a janela válida (10h–14h, >600 W/m², carga ≥70%), pois fora dela o resultado não vale", "Executar com a usina desligada para compensar"], "c": 2, "e": "tecnico", "tipo": "caso"}, {"q": "No voo de drone, uma célula aparece a 88°C em análise a nível celular (hotspot). Conforme a tabela de aceitação, isso é:", "o": ["Aceitação — módulos toleram até 90°C", "Atenção — reavaliar na próxima MPS", "Rejeição (>85°C a nível celular): destacar, etiquetar e abrir OS corretiva", "Erro de leitura do drone, ignorar"], "c": 2, "e": "tecnico", "tipo": "caso"}, {"q": "Uma conexão de barramento foi classificada como Rejeição na termografia. O tratamento correto é:", "o": ["Reaperto imediato com a usina em carga, para confirmar a causa", "Programar desligamento e tratar sob OS corretiva: reaperto com torquímetro, limpeza química ou troca de terminal", "Aumentar a ventilação do painel e reavaliar em 6 meses", "Somente registrar em relatório, sem etiqueta"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Antes dos testes elétricos da MPS, as buchas e isoladores têm sujeira leve. Conduta:", "o": ["Testar assim mesmo — sujeira leve não interfere", "Limpar com álcool isopropílico mesmo com sujeira leve, para garantir bons resultados de ensaio", "Lavar com água e detergente comum", "Adiar o ensaio para a MPA"], "c": 1, "e": "tecnico", "tipo": "caso"}], "mpa": [{"q": "Os critérios de resistência de isolamento (megôhmetro, 1 min) são:", "o": ["Aceita ≥1 MΩ; rejeita <100 kΩ", "Aceita R ≥ 1 GΩ; Atenção 1 MΩ ≤ R < 1 GΩ; Rejeição R < 1 MΩ", "Aceita ≥10 GΩ; qualquer valor menor rejeita", "Aceita qualquer valor estável após 1 minuto"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "As tensões de ensaio de isolamento previstas são:", "o": ["5 kV para trafo BT×Terra e 1 kV para cabos MT", "1 kV para trafo BT×Terra e 5 kV para cabos de MT", "10 kV para tudo, por padronização", "500 V para qualquer circuito"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "No ensaio de resistência de enrolamento, é correto:", "o": ["Corrente de teste de 50% da nominal para leitura rápida", "Corrente ≤10% da nominal; desvio entre fases <5% aceita; e sempre desligar a injeção antes de desconectar as garras (risco de arco)", "Desconectar as garras sob corrente para verificar faiscamento", "Medir apenas uma fase como amostra"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "No ensaio de relação de transformação (TTR):", "o": ["O TAP não interfere no resultado", "Registrar a posição do TAP (com foto); erro ≤0,5% aceita, >0,5% rejeita", "Erro até 5% é aceitável", "O ensaio é feito com o trafo energizado"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Na instalação do Aterramento Temporário (ATR), a ordem correta é:", "o": ["Grampos de fase primeiro, depois a malha de terra", "Primeiro o grampo à malha de terra e só depois os grampos de fase", "Todos ao mesmo tempo, com duas pessoas", "A ordem é indiferente com detector indicando zero"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Antes de abrir a caixa de inspeção da malha para o ensaio de aterramento (queda de potencial, regra dos 62%), você mede 32 V na malha. Conduta:", "o": ["Prosseguir — abaixo de 50 V é seguro", "Suspender o ensaio: acima de 25 V há risco de tensão de passo/toque", "Usar luva isolante e prosseguir", "Reduzir a trena para 25 m e continuar"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Antes de inserir o traçador de curva I×V no circuito da string, é obrigatório:", "o": ["Apenas conferir a polaridade dos cabos", "Cortar a carga via inversor/SCADA, confirmar corrente em 0,0 A e aplicar LOTO na seccionadora da string", "Aumentar a irradiância esperando o meio-dia, sem mais cuidados", "Curto-circuitar a string para descarregar"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "A curva I×V para validação de garantia foi agendada, mas a irradiância está em 650 W/m². Você deve:", "o": ["Executar — 650 W/m² é suficiente para qualquer fim", "Executar e extrapolar matematicamente sem ressalvas", "Reprogramar: para validação de garantia a irradiância mínima é 800 W/m²", "Executar à noite com fonte artificial"], "c": 2, "e": "tecnico", "tipo": "caso"}, {"q": "O isolamento de um cabo de MT, ensaiado a 5 kV por 1 minuto, resultou em 800 kΩ. Conduta:", "o": ["Aceitar — está na casa dos centenas de milhares de ohms", "Atenção: registrar e monitorar", "Rejeição (<1 MΩ): não energizar, etiquetar corretiva e abrir OS", "Repetir com 1 kV para confirmar"], "c": 2, "e": "tecnico", "tipo": "caso"}, {"q": "A resistência de enrolamento apresentou desvio de 6% entre fases; os demais ensaios do trafo passaram. Conclusão correta:", "o": ["Aprovar o trafo pela média dos ensaios", "Rejeitar: desvio ≥5% entre fases reprova o ensaio — não energizar e escalar para investigação", "Aprovar com observação, pois o TTR passou", "Refazer só a fase divergente até convergir, sem registrar"], "c": 1, "e": "tecnico", "tipo": "caso"}], "mpa_modstr": [{"q": "A Voc esperada de uma string é estimada por:", "o": ["Nº de módulos × Isc do módulo", "Nº de módulos × Voc do módulo, corrigida pela temperatura", "Potência do inversor ÷ tensão MPPT", "Voc do módulo × irradiância em kW/m²"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "A medição de Isc da string deve ser feita com:", "o": ["Multímetro comum na escala de tensão", "Alicate amperímetro CC True RMS", "Megôhmetro em escala baixa", "TTR portátil"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Sobre a higienização de módulos na sistemática da Grid:", "o": ["É mensal e obrigatória em todas as usinas", "É condicional — gatilho: queda de PR >10% ou índice de sujidade; pode recuperar até 10% de PR; água de osmose reversa, umedecendo de cima para baixo", "Usa água clorada para eliminar fungos", "Só pode ser feita com a usina desligada à noite"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Sobre o risco elétrico específico do lado CC durante a MPA:", "o": ["Após seccionar, o circuito fica totalmente morto", "A montante do ponto seccionado, enquanto houver sol, há tensão letal (Voc) contínua; e após ensaio com megôhmetro há energia capacitiva residual a descarregar", "O risco só existe acima de 1.500 VCC", "Com EPI qualquer, pode-se tocar os condutores"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "O EPI mínimo de vestimenta para essas atividades é:", "o": ["Uniforme algodão comum", "Vestimenta anti-arco Categoria de Risco II (mínimo)", "Apenas luvas de vaqueta", "Capa de chuva isolante"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Uma string mede Voc equivalente a 'um módulo a menos' que as vizinhas. Causa mais provável:", "o": ["Soiling concentrado na string", "Módulo/conector em aberto ou diodo de bypass acionado", "Fusível CC da string rompido", "Inversor limitando a tensão"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Uma string limpa apresenta Isc consistentemente menor que as vizinhas. Interpretação correta:", "o": ["Normal — Isc varia aleatoriamente", "Sombreamento, mismatch ou célula degradada — investigar", "Excesso de irradiância na string", "Erro do alicate, sempre"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Logo após o ensaio de isolamento com megôhmetro na string, o colega vai desconectar os cabos com a mão. Você orienta:", "o": ["Pode tocar — o megôhmetro desliga sozinho", "Descarregar/aterrar o circuito antes de manusear: há energia capacitiva residual armazenada", "Esperar 5 segundos é suficiente", "Usar a outra mão livre para equalizar o potencial"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "A equipe quer lavar módulos no meio de tarde muito quente e ensolarada. Os riscos que impõem seguir o procedimento são:", "o": ["Nenhum — água limpa não conduz", "Choque térmico no vidro quente e água condutiva penetrando em conectores fissurados — seguir janela e método (osmose reversa, de cima para baixo)", "Apenas o desperdício de água", "Somente o ofuscamento do operador"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "No teste de fixação, o parafuso 'gira em falso' antes de o torquímetro estalar. Classificação e conduta:", "o": ["Aceitação — o estalo é opcional", "Rejeição: ancoragem comprometida — programar reaperto/correção na fileira e registrar", "Atenção — lubrificar e reapertar mais forte", "Trocar o torquímetro, que deve estar descalibrado"], "c": 1, "e": "tecnico", "tipo": "caso"}], "mpa_cabine": [{"q": "Os ensaios da MPA na cabine de MT são:", "o": ["Curva I×V, soiling e torque", "Resistência de isolamento, resistência de contato (disjuntor/seccionadora) e relação de transformação (TP/TC)", "Somente inspeção visual e limpeza", "Cromatografia do óleo e análise de gases"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "A sequência obrigatória de manobra segura antes de trabalhar na cabine é:", "o": ["Ausência de tensão → bloqueio → ensaios → aterramento", "Bloqueio montante (MT) e jusante (BT/inversores) → constatação de ausência de tensão → ATR/chave de aterramento → disjuntor extraível em posição teste/extraída", "Bloq
