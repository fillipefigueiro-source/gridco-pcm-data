ueio apenas do lado MT → ensaios diretos", "Aterramento primeiro, bloqueio depois"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "O ATR e/ou a chave de aterramento do cubículo são obrigatórios porque:", "o": ["Melhoram a precisão do TTR", "Descarregam a energia capacitiva residual que permanece mesmo com o detector indicando ausência de tensão", "Substituem o bloqueio das seccionadoras", "Evitam apenas ruído nas medições"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "Resistência de contato elevada em disjuntor/seccionadora indica:", "o": ["Isolamento úmido", "Desgaste/oxidação dos contatos, que em carga gera aquecimento — tratar ou substituir", "Erro de relação do TC", "Mola de fechamento fraca apenas"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "A norma de referência para os ensaios de disjuntores de MT citada no módulo é:", "o": ["IEC 61829", "ABNT NBR IEC 62271-100", "IEC 60891", "NR-35"], "c": 1, "e": "tecnico", "tipo": "conceito"}, {"q": "O detector indicou ausência de tensão em todas as fases. O técnico propõe pular o ATR para ganhar tempo. Decisão correta:", "o": ["Aceitar — zero volts é zero risco", "Recusar: o aterramento é obrigatório para descarregar a capacitiva residual; detector 'zero' não elimina essa energia", "Aceitar se o serviço durar menos de 15 minutos", "Aceitar com um vigia observando"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "A equipe bloqueou apenas a seccionadora de montante (MT) e quer iniciar os ensaios. O risco não coberto é:", "o": ["Sobrecarga da malha de terra", "Retorno de tensão pela jusante (BT/inversores) energizando a cabine — bloquear os dois lados antes de qualquer contato", "Apenas atraso no cronograma", "Nenhum — montante bloqueada basta"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "A resistência de contato do disjuntor deu bem acima da referência, mas o isolamento e a relação passaram. Conduta:", "o": ["Aprovar o conjunto pelos dois ensaios bons", "Registrar e tratar/substituir os contatos sob OS — os ensaios são independentes e contato ruim vira ponto quente em carga", "Aguardar a próxima MPA para reavaliar", "Lixar os contatos na hora, sem OS"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "O isolamento de um barramento da cabine resultou baixo. Conduta correta:", "o": ["Energizar e monitorar a temperatura", "Não energizar: investigar umidade/contaminação antes de qualquer retorno à operação", "Aplicar verniz isolante e energizar", "Refazer o ensaio com tensão menor até passar"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "Antes de iniciar os ensaios, o disjuntor extraível ainda está inserido na posição de serviço. Você deve:", "o": ["Iniciar mesmo assim — ele está aberto", "Levá-lo à posição teste/extraída, conforme a sequência de manobra, antes de qualquer ensaio", "Apenas travar a mola de fechamento", "Retirá-lo por completo e apoiá-lo no chão da cabine"], "c": 1, "e": "tecnico", "tipo": "caso"}], "cos_turno": [{"q": "Pelo POP.COS.01.001, o operador do turno diurno deve chegar ao COS:", "o": ["30 minutos antes, para refazer a ronda do noturno", "Com no mínimo 10 minutos de antecedência (05h50)", "Em qualquer horário, desde que o noturno concorde", "Às 06h00 em ponto, quando o turno inicia"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Na passagem de turno com o operador noturno, qual item NÃO faz parte dos pontos críticos previstos no POP?", "o": ["Manutenções programadas ou corretivas em curso", "Metas comerciais do trimestre e propostas em negociação", "Condições climáticas atuais e previsão do dia", "Alarmes ativos e falhas pendentes não resolvidas"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "No início do turno, o Prescinto (IBM) é acessado principalmente para:", "o": ["Verificar as ordens de serviço do dia e as pendências de manutenção", "Enviar o status inicial aos clientes", "Configurar os alarmes do SCADA SunOp", "Executar religamentos remotos de inversores"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "O e-mail de encerramento de turno deve conter, no mínimo:", "o": ["Pendências em aberto, usinas normais, ocorrências com ações realizadas e observações gerais", "Somente os alarmes que receberam Ack no turno", "Apenas a lista de usinas em operação normal", "O relatório mensal de performance consolidado"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "Sobre manobras e comandos remotos durante o turno, o POP determina que:", "o": ["Devem ser autorizados e registrados; na dúvida, consultar o supervisor antes de agir", "Só podem ocorrer no período noturno, com menor geração", "Dispensam registro quando bem-sucedidos", "Podem ser executados livremente pelo operador experiente"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "Você assume o turno e encontra um alarme ativo que o operador noturno não mencionou nem registrou. A conduta correta é:", "o": ["Dar Ack para limpar o painel e observar se retorna", "Devolver a responsabilidade ao noturno por telefone e aguardar ele resolver", "Tratar como evento novo: triagem, classificação, registro da ocorrência e reporte da lacuna ao supervisor", "Presumir que já foi tratado e seguir a rotina"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "São 17h40 e uma ocorrência segue em andamento com equipe de campo mobilizada. No encerramento do turno você deve:", "o": ["Omiti-la do status final para não alarmar o cliente", "Detalhá-la no e-mail de encerramento e reforçá-la na passagem verbal como pendência prioritária", "Encerrar a ocorrência no CMMS para não deixar pendência", "Transferir o registro para o operador noturno redigir"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Um colega pede para usar seu login do SCADA porque a senha dele expirou. Você deve:", "o": ["Recusar: o acesso é por credenciais individuais; ele deve acionar o suporte para restabelecer a senha", "Criar um usuário genérico compartilhado para o COS", "Emprestar, já que a operação não pode parar", "Emprestar apenas para consultas, sem comandos"], "c": 0, "e": "processos", "tipo": "caso"}, {"q": "No login inicial, você percebe que o SCADA está sem comunicação com três usinas do mesmo cluster. A primeira providência é:", "o": ["Ignorar até o fim da ronda, pois pode ser intermitência", "Reiniciar os servidores do COS por conta própria", "Registrar o fato, verificar conectividade por vias alternativas e acionar o suporte/provedor, informando o supervisor", "Dar Ack nos alarmes de comunicação e seguir o checklist"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "No status final via WhatsApp, uma usina segue com inversor parado aguardando peça. O correto é reportá-la como:", "o": ["'Offline', para dar mais urgência ao caso", "Não citá-la, tratando o assunto apenas internamente", "'Normal', pois a OS já foi aberta", "'Com pendência', com breve resumo das ações e alerta para o próximo período"], "c": 3, "e": "processos", "tipo": "caso"}], "cos_monit": [{"q": "Durante todo o turno, devem permanecer visíveis e ativas as telas de:", "o": ["Somente o e-mail e o WhatsApp Web", "SCADA SunOp, PV Operation e Fusion", "Apenas a usina de maior potência do portfólio", "Apenas o Prescinto (IBM)"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Ao identificar um novo alarme, a primeira ação do operador é:", "o": ["Aguardar o alarme se repetir para confirmar", "Religar o equipamento para testar", "Realizar o reconhecimento (Ack) e contextualizar tipo de alarme e equipamento afetado", "Abrir OS de campo imediatamente"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "Na suspeita de falha de comunicação de uma usina, o POP orienta:", "o": ["Reiniciar todos os inversores da usina", "Verificar por outras vias (ping, portal do fabricante) e abrir chamado com o provedor de internet da usina", "Aguardar 24h pela normalização automática", "Despachar equipe de campo imediatamente"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Para falhas de equipamento com suspeita de recorrência, o operador deve consultar o histórico de:", "o": ["15 dias, repassando aos supervisores de campo se houver frequência caracterizada", "90 dias, apenas em auditorias", "7 dias", "48 horas"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "Diante de um alarme durante manobra ou manutenção programada, o operador deve:", "o": ["Executar religamento imediato para restabelecer a geração", "Verificar a programação e aguardar a confirmação do técnico de campo antes de qualquer ação, mantendo a comunicação no grupo", "Escalar diretamente à diretoria", "Silenciar os alarmes da usina até o fim do dia"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Alarme de sobretemperatura em inversor num dia de 38 °C. A leitura mais adequada é:", "o": ["Desligar o inversor preventivamente", "Falha grave: acionar o campo com urgência máxima", "Ignorar: calor sempre gera esse alarme", "Correlacionar com a condição ambiental, monitorar a tendência e registrar — escalando se persistir ou houver derating anormal"], "c": 3, "e": "tecnico", "tipo": "caso"}, {"q": "Na ronda, uma usina gera 30% abaixo do esperado sem nenhum alarme ativo. Você deve:", "o": ["Investigar o desvio (geração por inversor, strings, irradiância), pois ausência de alarme não atesta normalidade", "Reiniciar o SCADA para atualizar os dados", "Aguardar o relatório semanal de performance apontar a causa", "Considerar normal: sem alarme não há evento"], "c": 0, "e": "tecnico", "tipo": "caso"}, {"q": "O medidor de uma usina repete exatamente o mesmo valor há 3 horas. A hipótese mais provável e a ação correta são:", "o": ["Dado congelado (falha de telemetria): validar por fonte independente e registrar a ocorrência", "Erro do cliente; aguardar reclamação", "Geração estável; nenhuma ação", "Furto de energia; acionar a polícia"], "c": 0, "e": "tecnico", "tipo": "caso"}, {"q": "Cinco alarmes de equipamentos diferentes do mesmo skid disparam em poucos minutos. A leitura avançada é:", "o": ["Coincidência estatística; aguardar novos alarmes", "Falha do SCADA; dar Ack em todos", "Provável causa comum a montante (alimentação, comunicação, rede) — investigar o elemento compartilhado", "Cinco falhas independentes; tratar em ordem alfabética"], "c": 2, "e": "tecnico", "tipo": "caso"}, {"q": "Você detecta um desvio, trata e resolve. Onde essa atuação deve ficar registrada?", "o": ["Apenas na memória do operador, se resolvida rapidamente", "No SCADA, no log de turno e, se aplicável, no CMMS (Prescinto)", "Somente no grupo de WhatsApp", "Apenas no e-mail pessoal do supervisor"], "c": 1, "e": "processos", "tipo": "caso"}], "cos_alarmes": [{"q": "Pela tabela de prioridades do POP.COS.03.001, um alarme de transformador é classificado como:", "o": ["P1 — Crítica", "P3 — Média", "P4 — Baixa", "P2 — Alta"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "Ainda pela tabela do POP, CFTV, switch e ETM correspondem à prioridade:", "o": ["P1", "P4", "P3", "P2"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "A análise do impacto potencial de um alarme considera:", "o": ["Geração, segurança, conformidade, tempo de resolução e custo", "Apenas o horário do disparo", "Somente o custo financeiro da parada", "Apenas a perda de geração"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "A prioridade definida (P1–P4) deve ser registrada:", "o": ["Apenas no grupo de WhatsApp", "Somente quando o alarme for P1", "Só no caderno do operador", "No sistema de gestão de manutenção, ao abrir a ocorrência"], "c": 3, "e": "processos", "tipo": "conceito"}, {"q": "Além do POP de resposta correspondente, a prioridade do alarme determina:", "o": ["O valor da penalidade contratual", "A cor do ícone no supervisório", "A urgência da comunicação interna, conforme a Matriz de Escalada (POP.COS.05.002)", "O modelo de relatório mensal"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "Disparam simultaneamente: alarme de relé de proteção (usina X), falha de strings (usina Y) e falha de CFTV (usina Z). A ordem de tratamento é:", "o": ["X (P1), depois Y (P2), depois Z (P3)", "Por ordem de chegada dos alarmes", "Z, Y, X — do mais simples ao mais complexo", "Y primeiro, pois strings afetam a performance"], "c": 0, "e": "processos", "tipo": "caso"}, {"q": "Numa avalanche de alarmes causada por tempestade, dar Ack em massa para 'limpar a tela' é:", "o": ["Indiferente, pois os alarmes ficam no histórico", "Obrigatório pelo POP antes da triagem", "Erro grave: mascara eventos reais e pode esconder um P1 no meio do ruído", "Boa prática de organização visual"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "Um alarme intermitente se repete há dias sem qualquer perda de geração associada. A conduta correta é:", "o": ["Investigar como possível problema de configuração/qualidade de dado, registrar e tratar a causa do falso alarme", "Desabilitar o ponto de alarme no SCADA sem registro", "Escalar como P1 por recorrência", "Ignorar definitivamente, já que não afeta geração"], "c": 0, "e": "tecnico", "tipo": "caso"}, {"q": "Alarme de subtensão na subestação seguido de queda em cascata de inversores. A leitura correta é:", "o": ["Falha do sistema supervisório", "Provável evento de rede/proteção — tratar como evento único P1, agrupando os alarmes por causa comum", "Vários eventos independentes: abrir uma ocorrência por inversor", "Soiling severo nos módulos"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "O mesmo alarme aparece em várias usinas do mesmo cliente na mesma semana. Além de tratar cada caso, você deve:", "o": ["Nada — coincidências acontecem", "Suspeitar de causa sistêmica (projeto, configuração, rede) e escalar para Engenharia/PCM com os dados consolidados", "Silenciar o alarme nas usinas restantes", "Abrir uma única OS genérica para o cliente"], "c": 1, "e": "processos", "tipo": "caso"}], "cos_incid": [{"q": "O POP.COS.04.001 (Resposta a Alarmes Críticos) tem como foco:", "o": ["Padronizar relatórios mensais", "Reduzir custos de manutenção preventiva", "Definir a escala de férias do COS", "Minimizar tempo de inatividade, proteger pessoas e ativos e recuperar a geração em eventos P1"], "c": 3, "e": "processos", "tipo": "conceito"}, {"q": "A perda total de geração é confirmada no monitoramento quando:", "o": ["A geração cai 10% em relação à véspera", "O PR do dia fica abaixo da média mensal", "O cliente liga reclamando", "Todos os inversores aparecem offline e o disjuntor principal está aberto"], "c": 3, "e": "tecnico", "tipo": "conceito"}, {"q": "A regra de ouro da intervenção remota em eventos críticos é:", "o": ["Tentar todas as ações remotas possíveis antes de escalar", "Nunca tentar ação remota que possa agravar a situação ou criar risco; na dúvida, não agir sem validação do Supervisor", "Religar imediatamente para não perder geração", "Aguardar sempre a equipe de campo, sem qualquer ação remota"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Ao acionar o Supervisor num P1, o operador deve informar:", "o": ["Usina afetada, natureza do alarme crítico e primeiras observações/tentativas remotas realizadas", "A estimativa de perda financeira mensal", "Apenas o nome da usina", "Somente o horário do alarme"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "A ocorrência P1 no sistema de gestão deve ser aberta:", "o": ["Imediatamente após a triagem, mesmo com ações em andamento, com detalhes e prints anexados", "Apenas se o campo for acionado", "Somente após a resolução completa do evento", "No dia seguinte, com calma"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "Alarme indica princípio de incêndio na cabine de uma usina. Sua primeira providência é:", "o": ["Tratar como emergência de segurança: comunicar imediatamente supervisor/emergência — sem qualquer manobra remota", "Abrir OS P2 e aguardar o campo", "Dar Ack e monitorar a temperatura", "Tentar religamento remoto para testar o circuito"], "c": 0, "e": "processos", "tipo": "caso"}, {"q": "O disjuntor principal abriu por atuação do relé de proteção. Antes de religar, é imprescindível:", "o": ["Compreender a causa da atuação e validar com o supervisor; religar às cegas pode significar fechar sobre falta", "Nada — religar rápido é prioridade", "Esperar 15 minutos e religar automaticamente", "Desabilitar a proteção para evitar novo desarme"], "c": 0, "e": "tecnico", "tipo": "caso"}, {"q": "O reset remoto de um inversor falhou duas vezes seguidas. O próximo passo correto é:", "o": ["Tentar mais cinco vezes em intervalos menores", "Dar Ack e reavaliar amanhã", "Parar de insistir: abrir OS de campo registrando as tentativas e a recorrência", "Reiniciar o SCADA para descartar erro de tela"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "A equipe de campo está a caminho da usina em evento P1. O papel do operador do COS passa a ser:", "o": ["Vigilância intensiva da usina, fornecendo dados dos sistemas ao campo e registrando as atualizações até a resolução", "Encerrar a ocorrência, pois o campo assumiu", "Apenas aguardar o relatório do técnico", "Desligar os alarmes da usina para reduzir ruído"], "c": 0, "e": "processos", "tipo": "caso"}, {"q": "Após a resolução de um P1, o operador deve:", "o": ["Comunicar a imprensa local", "Participar da análise pós-incidente para identificar causa raiz, lições aprendidas e ações preventivas", "Apagar os registros intermediários para simplificar o histórico", "Arquivar o caso sem análise, se a geração voltou"], "c": 1, "e": "processos", "tipo": "caso"}], "cos_escala": [{"q": "Na matriz de escalada do COS, o Nível 2 corresponde a:", "o": ["Diretoria", "Supervisor de Operação", "Operador de turno", "Especialistas / Gerência de O&M"], "c": 3, "e": "processos", "tipo": "conceito"}, {"q": "Para um P1 confirmado, o contato com o Supervisor deve ocorrer:", "o": ["No fechamento do turno", "Imediatamente por telefone, com contato em no máximo 5 minutos, seguido de e-mail de alerta", "Em até 60 minutos, por e-mail", "Apenas se o religamento remoto falhar"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Um P1 sem progresso 30 minutos após o acionamento do Supervisor deve:", "o": ["Ser rebaixado para P2", "Subir ao Nível 2 (Especialistas/Gerência de O&M), com contato em até 15 minutos", "Ir direto à imprensa", "Permanecer no Nível 1 até resolver"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Ocorrências P4 exigem:", "o": ["Abertura de OS emergencial", "Acionamento telefônico do supervisor", "Escalada imediata ao Nível 2", "Apenas registro no log de turno e no e-mail de encerramento — o Supervisor toma ciência ao revisar os logs"], "c": 3, "e": "processos", "tipo": "conceito"}, {"q": "Toda comunicação de escalada deve conter, de forma concisa:", "o": ["Usina, tipo de alarme, impacto atual, ações já tomadas, próximos passos sugeridos e urgência", "Apenas o nome do operador e o horário", "A previsão do tempo da região", "Somente o número da ocorrência"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "Às 10h (horário comercial), sua primeira tentativa remota num P2 falhou. Pela matriz, você deve:", "o": ["Acionar diretamente a Diretoria", "Tentar por mais 4 horas antes de escalar", "Aguardar o próximo turno", "Acionar o Nível 1 (Supervisor) por telefone ou e-mail, com contato em até 10 minutos e registro no sistema"], "c": 3, "e": "processos", "tipo": "caso"}, {"q": "Um P1 evolui com potencial de grande impacto financeiro e indisponibilidade prolongada. O Nível 3 (Diretoria) é acionado para:", "o": ["Redigir o log de turno", "Decisões estratégicas e comunicação com stakeholders externos, com contato em até 30 minutos", "Substituir a equipe de campo", "Executar comandos no SCADA"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Você ligou para o Supervisor num P1 e a ligação caiu na caixa postal. A conduta correta é:", "o": ["Insistir por canais alternativos até obter confirmação de recebimento — sem confirmação, não houve acionamento", "Esperar ele retornar quando puder", "Considerar a escalada concluída: a tentativa vale", "Pular direto para o cliente"], "c": 0, "e": "processos", "tipo": "caso"}, {"q": "Você escalou um evento por telefone mas não registrou no CMMS. A consequência prática é:", "o": ["O supervisor registra por você, obrigatoriamente", "Nenhuma, pois a ligação aconteceu", "Para efeito de SLA e auditoria, a escalada 'não existe': falta data, hora, acionado e canal — registre sempre", "O SLA é automaticamente suspenso"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "Num P2 trabalhoso, o operador decide 'ganhar tempo' e-mailando direto a Diretoria com cópia geral. O erro é:", "o": ["Quebrar a cadeia: o acionamento passa primeiro pelo Supervisor (N1), que filtra e direciona aos níveis corretos", "Usar e-mail em vez de WhatsApp", "Não anexar fotos da usina", "Nenhum: quanto mais gente, melhor"], "c": 0, "e": "processos", "tipo": "caso"}], "cos_doc": [{"q": "Pelo POP.COS.06.001, uma ocorrência deve ser registrada quando:", "o": ["Apenas quando há OS de campo associada", "Um alarme P1, P2 ou P3 é detectado — ou uma anomalia significativa sem alarme requer investigação/ação", "Somente em eventos com perda total", "Apenas quando o cliente solicita"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "No campo 'mensagens de alarme' da ocorrência, o operador deve:", "o": ["Transcrever as mensagens exatas do SCADA/CMMS, incluindo códigos de erro", "Deixar em branco se houver print", "Colocar apenas 'alarme ativo'", "Resumir com suas palavras o que entendeu"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "O impacto inicial da ocorrência deve ser:", "o": ["Omitido até a análise da engenharia", "Calculado somente no fechamento mensal", "Descrito apenas como 'alto' ou 'baixo'", "Quantificado sempre que possível (ex.: perda de 500 kW, offline por 2 horas, risco elétrico)"], "c": 3, "e": "processos", "tipo": "conceito"}, {"q": "São anexos recomendados ao registro da ocorrência:", "o": ["Apenas a foto do crachá do operador", "Somente o contrato do cliente", "Nenhum — anexos poluem o sistema", "Prints dos alarmes/dashboards, gráficos de geração ou PR evidenciando a queda e logs do equipamento"], "c": 3, "e": "processos", "tipo": "conceito"}, {"q": "Sobre a qualidade do registro, o POP determina:", "o": ["Delegar o registro ao técnico de campo", "Registrar uma única vez, sem alterações posteriores", "Registrar apenas ocorrências resolvidas", "Revisar antes de salvar e atualizar continuamente (diagnóstico do campo, solução, resolução) até o fechamento"], "c": 3, "e": "processos", "tipo": "conceito"}, {"q": "Uma ocorrência registrada apenas como 'inversor com defeito, resolvido' é inadequada porque:", "o": ["Está longa demais", "Faltou copiar o cliente no texto", "Não sustenta diagnóstico, causa raiz, indicadores nem defesa em contestação: faltam sintomas, códigos, impacto, contexto e ações", "Deveria estar em inglês"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "Três meses depois, o cliente contesta uma indisponibilidade de 6 horas. O que permite reconstruir o evento com segurança?", "o": ["A memória do operador que estava de turno", "A ocorrência detalhada com anexos + histórico de mensagens e e-mails, que são documentação de referência em auditoria", "O extrato de faturamento da distribuidora", "Uma nova visita de campo à usina"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "O técnico de campo informa por telefone o diagnóstico e a solução aplicada. Você deve:", "o": ["Atualizar a ocorrência com o diagnóstico, a solução e a data/hora da resolução antes do fechamento", "Pedir para ele mesmo registrar quando voltar à base", "Registrar apenas se houver nova falha", "Confiar na ligação: o que importa é a usina gerando"], "c": 0, "e": "processos", "tipo": "caso"}, {"q": "Ao registrar um evento, você lembra de caso semelhante na mesma usina meses atrás. A boa prática é:", "o": ["Apagar o registro antigo para evitar confusão", "Reabrir a ocorrência antiga e duplicar os dados", "Referenciar a ocorrência anterior no registro — evidencia recorrência e acelera o diagnóstico", "Não misturar assuntos: cada ocorrência é isolada"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "A OS foi concluída pelo campo, mas a ocorrência segue aberta no CMMS. O fechamento correto exige:", "o": ["Transferir a ocorrência para o backlog do PCM", "Nada: a OS concluída encerra tudo automaticamente", "Excluir a ocorrência para zerar a fila", "Linkar/atualizar o status da OS, registrar data e hora da resolução e fechar a ocorrência com as informações finais"], "c": 3, "e": "processos", "tipo": "caso"}], "cos_x": [{"q": "A sequência canônica do ciclo de resposta do COS é:", "o": ["Detecção → Ack/triagem → classificação → ação remota segura → escalada/campo → registro", "Religamento → detecção → comunicação → arquivamento", "Escalada → religamento → triagem → Ack", "Registro → escalada → detecção → triagem"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "O religamento remoto é apropriado quando:", "o": ["Somente após o campo inspecionar localmente", "Apenas em usinas com tracker", "Sempre, em qualquer falha, para ganhar tempo", "Não há indicação de falha física nem risco de segurança — e com validação do supervisor em caso de dúvida"], "c": 3, "e": "processos", "tipo": "conceito"}, {"q": "Antes de despachar equipe de campo, o valor central do COS está em:", "o": ["Validar o evento por fontes independentes e esgotar o diagnóstico/ação remota — evitando deslocamentos para falsos eventos", "Esperar o evento se agravar para confirmar", "Acumular alarmes para despachos em lote", "Transferir a decisão ao cliente"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "São KPIs característicos da operação do COS:", "o": ["Torque de aperto e curva IV", "Tempo de detecção, tempo de resposta/religamento e disponibilidade do monitoramento", "Número de e-mails enviados por turno", "Índice de soiling e PR de referência"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "O registro disciplinado do COS alimenta diretamente:", "o": ["O cadastro de fornecedores", "Apenas o arquivo morto da empresa", "Somente a folha de ponto do operador", "Indicadores como MTTR, MTBF e disponibilidade — além das análises de recorrência e pós-incidente"], "c": 3, "e": "processos", "tipo": "conceito"}, {"q": "Uma usina some inteira do SCADA enquanto as vizinhas seguem normais. A primeira hipótese a validar é:", "o": ["Furto de cabos", "Falha de comunicação (link/gateway): validar por ping, portal do fabricante ou contato local antes de concluir", "Perda total de geração — acionar emergência", "Erro de cadastro da usina"], "c": 1, "e": "tecnico", "tipo": "caso"}, {"q": "A geração de uma usina despenca, mas nenhum alarme dispara. A leitura avançada é:", "o": ["Possível falha de telemetria/sensor ou falha real não instrumentada — validar por fonte independente antes de qualquer conclusão", "Reiniciar o SCADA resolve", "Está tudo bem: o alarme é a única fonte da verdade", "Aguardar o fechamento do dia para comparar"], "c": 0, "e": "tecnico", "tipo": "caso"}, {"q": "Um P1 e dois P2 estão abertos simultaneamente. A gestão correta da fila é:", "o": ["Congelar tudo até o supervisor chegar", "P1 primeiro; os P2 na sequência, respeitando os prazos de SLA de cada um", "Aleatória, conforme a familiaridade do operador", "Resolver os P2 primeiro, pois são mais rápidos"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "O religamento remoto resolveu a falha e não há risco nem indício de dano. Quanto ao campo:", "o": ["Despachar mesmo assim, por garantia", "Aguardar nova falha para decidir", "Não despachar: registrar a ocorrência e o religamento, encerrando sem OS de campo — recurso de campo é para o que o remoto não resolve", "Despachar apenas se o cliente exigir"], "c": 2, "e": "processos", "tipo": "caso"}, {"q": "O mesmo tipo de evento se repete em várias usinas do portfólio de um cliente. O papel avançado do COS é:", "o": ["Consolidar os dados, evidenciar a recorrência e escalar para Engenharia/PCM como possível causa sistêmica", "Tratar cada caso isoladamente e nada mais", "Silenciar os alarmes repetidos", "Sugerir a troca do cliente de plataforma"], "c": 0, "e": "processos", "tipo": "caso"}], "cultura": [{"q": "O valor nº 1 da Grid, que não se negocia em nenhuma situação, é:", "o": ["A velocidade de atendimento", "A segurança", "O custo mínimo", "A satisfação do cliente"], "c": 1, "e": "cultura", "tipo": "conceito"}, {"q": "\"Dono do ativo\" significa que a equipe deve:", "o": ["Assumir a propriedade legal da usina", "Cuidar da usina como se fosse dela, antecipando problemas", "Cobrar o cliente por melhorias", "Decidir sozinha sem consultar ninguém"], "c": 1, "e": "cultura", "tipo": "conceito"}, {"q": "O campo da Grid se organiza em:", "o": ["Uma pessoa fixa por usina", "Turmas volantes por cluster, com líder de campo e coordenador", "Equipes contratadas por demanda", "Apenas plantão remoto"], "c": 1, "e": "cultura", "tipo": "conceito"}, {"q": "No arranjo do O&M, quem monitora as usinas 24/7 e quem ataca causas-raiz são, respectivamente:", "o": ["PCM e COS", "COS e Engenharia", "KAM e PCM", "Performance e cliente"], "c": 1, "e": "cultura", "tipo": "conceito"}, {"q": "O valor \"dado confiável\" se materializa no dia a dia principalmente por:", "o": ["OS bem preenchida, com evidências e registro honesto", "Relatórios longos", "Reuniões frequentes", "Mensagens rápidas no WhatsApp"], "c": 0, "e": "cultura", "tipo": "conceito"}, {"q": "Durante uma tarefa surge um risco que não estava na APR. O SLA vence em 1 hora. A conduta correta é:", "o": ["Concluir com atenção redobrada, pois falta pouco", "Parar, acionar o líder e reavaliar o risco antes de continuar", "Pedir prazo ao cliente e continuar enquanto isso", "Trocar de tarefa e voltar depois"], "c": 1, "e": "cultura", "tipo": "caso"}, {"q": "O serviço atrasou por uma parada de segurança legítima. No fechamento da OS você deve:", "o": ["Ajustar o horário para caber no SLA", "Registrar o ocorrido como foi, com o motivo do atraso e as evidências", "Fechar sem detalhes e explicar verbalmente", "Transferir o registro para o líder"], "c": 1, "e": "cultura", "tipo": "caso"}, {"q": "Um colega vai começar uma atividade sem APR \"porque é rapidinho\". Você:", "o": ["Deixa — a tarefa é simples", "Alerta e não deixa iniciar sem a APR", "Ajuda a terminar mais rápido", "Faz a APR depois, junto com o fechamento"], "c": 1, "e": "cultura", "tipo": "caso"}, {"q": "Você percebe que outra equipe cometeu um erro que pode afetar o cliente. Pelo valor do trabalho em equipe, o correto é:", "o": ["Ignorar — cada área cuida do seu", "Expor o erro no grupo geral", "Avisar a equipe e o líder para corrigirem juntos, sem buscar culpados", "Registrar reclamação formal contra os colegas"], "c": 2, "e": "cultura", "tipo": "caso"}, {"q": "\"Cliente no centro\" significa, na prática:", "o": ["Aceitar qualquer pedido, mesmo fora do escopo", "Deixar o cliente decidir as prioridades técnicas", "SLA e satisfação do cliente guiam as prioridades, dentro da segurança e do contrato", "Responder mensagens em minutos, a qualquer custo"], "c": 2, "e": "cultura", "tipo": "caso"}], "seguranca": [{"q": "Antes de qualquer intervenção em campo são obrigatórias:", "o": ["Apenas avisar o COS", "APR e PT", "Somente a OS no Fracttal", "Fotos do local"], "c": 1, "e": "cultura", "tipo": "conceito"}, {"q": "A NR que trata de trabalho em altura é a:", "o": ["NR10", "NR12", "NR35", "NR06"], "c": 2, "e": "cultura", "tipo": "conceito"}, {"q": "LOTO significa:", "o": ["Bloqueio e etiquetagem de fontes de energia", "Um tipo de EPI para MT", "O teste de ausência de tensão", "A permissão de trabalho em altura"], "c": 0, "e": "cultura", "tipo": "conceito"}, {"q": "Sobre trabalho em média tensão (MT), a regra da Grid é:", "o": ["Permitido sozinho se for rápido", "Nunca sozinho", "Sozinho apenas durante o dia", "Sozinho com autorização do COS"], "c": 1, "e": "cultura", "tipo": "conceito"}, {"q": "Os riscos críticos do trabalho elétrico incluem:", "o": ["Choque, arco elétrico e queimaduras", "Apenas cansaço físico", "Somente queda de altura", "Ruído e vibração apenas"], "c": 0, "e": "cultura", "tipo": "conceito"}, {"q": "Outra equipe desligou o circuito pela manhã. Antes de tocar nos terminais à tarde, você deve:", "o": ["Confiar no desligamento e iniciar", "Confirmar pelo SCADA e iniciar", "Aplicar seu próprio bloqueio LOTO e testar ausência de tensão", "Pedir ao colega mais experiente para tocar primeiro"], "c": 2, "e": "cultura", "tipo": "caso"}, {"q": "Para religar uma cabine de MT após manutenção, é exigida:", "o": ["Apenas a baixa da OS", "PT específica de religamento", "Autorização verbal do cliente", "Somente a presença do líder"], "c": 1, "e": "cultura", "tipo": "caso"}, {"q": "No meio da tarefa, o vento aumenta e surge um risco não previsto na APR. Você:", "o": ["Continua com atenção redobrada", "Para, reavalia o risco e refaz a APR antes de continuar", "Acelera para terminar antes de piorar", "Troca de atividade sem comunicar"], "c": 1, "e": "cultura", "tipo": "caso"}, {"q": "Antes de energizar após um reparo, o item que REPROVA a energização é:", "o": ["Falta de foto do painel", "Proteção ou aterramento reprovado na verificação", "Ausência do cliente no local", "Chuva fina"], "c": 1, "e": "cultura", "tipo": "caso"}, {"q": "Um colega sem a NR exigida se oferece para executar a tarefa \"só desta vez\". O correto é:", "o": ["Aceitar, com supervisão à distância", "Não permitir a execução e redistribuir a tarefa a quem é habilitado", "Aceitar se ele assinar a APR", "Dividir a tarefa entre os dois"], "c": 1, "e": "cultura", "tipo": "caso"}], "processos": [{"q": "Quando uma demanda precisa de execução em campo, o fluxo correto é:", "o": ["A área executa e regulariza depois", "Abre-se SS e o PCM a converte em OS", "O técnico abre a OS no local", "O cliente abre a OS direto"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Os SLAs de P1, P2 e P3 são, respectivamente:", "o": ["4 h, 24 h e 5 dias úteis", "2 h, 12 h e 3 dias úteis", "8 h, 48 h e 10 dias úteis", "24 h, 48 h e 7 dias corridos"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "Diante de uma usina desligada, a primeira tentativa é sempre:", "o": ["Mobilizar o campo imediatamente", "Religamento remoto pelo COS", "Abrir chamado de garantia", "Aguardar o cliente autorizar"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Para equipamento em garantia com defeito, a regra é:", "o": ["Trocar rápido e negociar depois", "Registrar evidências e abrir chamado ao fabricante (via Controller), sem trocar por conta própria", "Descartar e comprar novo", "Transferir a decisão ao cliente"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "O COS prioriza os atendimentos pelo:", "o": ["Prazo mais restritivo do contrato", "Prazo mais folgado", "Tamanho da usina", "Pedido mais recente"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "Geração zerada em uma usina, religamento remoto sem sucesso. A classificação e o prazo corretos são:", "o": ["P2 — 24 h, pois o remoto pode ser repetido", "P1 — 4 h, com abertura de OS e despacho do campo", "P3 — 5 dias úteis, se o cliente não reclamar", "Sem classificação até o diagnóstico"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Peça em garantia confirmada como causa da falha e peça igual disponível no estoque. Você deve:", "o": ["Trocar imediatamente para religar", "Registrar evidências e abrir o chamado de garantia antes de qualquer troca", "Aguardar o fabricante sem registrar nada", "Instalar a peça do estoque e devolver depois"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Ao trocar um equipamento numa OS, o registro deve incluir obrigatoriamente:", "o": ["Apenas a data da troca", "Nº de série e posição (do removido e do instalado), fotos e leituras", "Somente o nome do técnico", "O valor da peça"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Uma solicitação sem necessidade de campo (ex.: ajuste de relatório) deve:", "o": ["Virar SS e aguardar o PCM", "Ser aberta como OS direto pela área responsável", "Ser tratada por WhatsApp, sem registro", "Aguardar a reunião semanal"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Duas OS vencem hoje: uma P2 de um contrato com prazo de 24 h e uma P2 de outro contrato cujo prazo é 12 h. Com uma equipe só, você atende primeiro:", "o": ["A que foi aberta primeiro", "A do contrato com prazo de 12 h — vale o prazo mais restritivo", "A da usina maior", "A mais próxima da base"], "c": 1, "e": "processos", "tipo": "caso"}], "confiab": [{"q": "Reset, troca de fusível em estoque e reconexão simples são intervenções de nível:", "o": ["N1 — campo", "N2 — Engenharia", "N3 — projeto", "Fora do escopo do O&M"], "c": 0, "e": "processos", "tipo": "conceito"}, {"q": "Caracteriza \"falha recorrente\" que deve ser escalada para N2:", "o": ["Qualquer falha nova", "≥2 falhas no mesmo ativo em 30 dias ou causa não identificada", "Uma falha por ano", "Somente falhas com perda total de geração"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "A RCA (ex.: 5 Porquês) busca:", "o": ["O culpado pela falha", "A causa-raiz, além do sintoma", "Acelerar o fechamento da OS", "Definir o valor da penalidade"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "MTBF maior e MTTR menor significam, respectivamente:", "o": ["Mais falhas e reparos mais lentos", "Ativo mais confiável e reparo mais rápido", "Menos geração e mais backlog", "Nada — são métricas financeiras"], "c": 1, "e": "processos", "tipo": "conceito"}, {"q": "Retrofit ou upgrade de equipamento caracteriza o nível:", "o": ["N1", "N2", "N3", "Manutenção preventiva comum"], "c": 2, "e": "processos", "tipo": "conceito"}, {"q": "Um inversor falhou 4 vezes em 25 dias, sempre resolvido com reset. A conduta correta é:", "o": ["Seguir resetando — funciona", "Resetar para recuperar a geração E escalar a recorrência para a Engenharia (N2)", "Parar de resetar e aguardar a Engenharia", "Trocar o inversor por conta própria"], "c": 1, "e": "processos", "tipo": "caso"}, {"q": "Para function exportResult(){const md=modsOf();const rec={nome:S.user.nome,email:S.user.email,trilha:S.trilha,trilhaNome:D.trilhas[S.trilha].nome,data:new Date().toISOString(),modulos:md.map(m=>({id:m,titulo:D.mod[m].titulo,score:S.mods[m]?Math.round(S.mods[m].score*100):null,pass:!!(S.mods[m]&&S.mods[m].pass),recic:S.mods[m]?S.mods[m].recic||0:0,apto:D.mod[m].apto||null})),final:S.finais[S.trilha]||null};
 dl(JSON.stringify(rec,null,2),'resultado_'+S.user.nome.replace(/\s+/g,'_')+'_'+S.trilha+'.json','application/json');}
function dl(t,n,m){const b=new Blob([t],{type:m});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click();}
// RECRUTAMENTO
function showRecrut(){$('uname').textContent='👤 Recrutamento';$('dash').classList.add('hide');$('view').classList.remove('hide');window.scrollTo(0,0);
 $('view').innerHTML='<div class="panel"><h2 style="color:var(--navy)">📝 Avaliação de Candidato</h2><p style="color:var(--gray);font-size:13px">Aplique a prova para medir o conhecimento técnico do candidato.</p><label>Nome do candidato</label><input id="cand" placeholder="Nome"/><label>Prova</label><div class="row" style="margin-top:6px">'+Object.keys(D.recrut).map(k=>'<button class="gbtn" style="width:auto;padding:8px 16px;font-size:13px" onclick="startExam(\''+k+'\')">'+D.recrut[k].nome+'</button>').join('')+'</div></div>';}
function startExam(k){const E=D.recrut[k];const cand=esc(($('cand')&&$('cand').value.trim())||'Candidato');window._exam={k,cand};window.scrollTo(0,0);
 let quiz=E.q.map((q,i)=>'<div class="qbox" data-qi="'+i+'"><div class="q">'+(i+1)+'. '+q.q+'</div>'+q.o.map((o,j)=>'<label class="opt" onclick="pick(this,'+i+','+j+')">'+o+'</label>').join('')+'</div>').join('');
 $('view').innerHTML='<button class="back" onclick="showRecrut()">← voltar</button><div class="panel"><h2 style="color:var(--navy)">'+E.nome+'</h2><p style="color:var(--gray);font-size:13px">Candidato: <b>'+cand+'</b> · '+E.desc+'</p>'+quiz+'<button class="gbtn" style="max-width:260px" onclick="submitExam()">Finalizar prova</button><div id="qres"></div></div>';window._set=E.q;window._ans={};}
function submitExam(){const E=D.recrut[window._exam.k];const ok=grade(E.q);const sc=ok/E.q.length;const corte=E.corte;
 let v,cls;if(sc>=corte){v='✓ APTO (recomendado avançar)';cls='ok';}else if(sc>=corte-0.12){v='⚠ ATENÇÃO (revisar com entrevista técnica)';cls='warn';}else{v='✗ NÃO APTO';cls='bad';}
 const by={tecnico:[0,0],processos:[0,0],cultura:[0,0]};E.q.forEach((q,i)=>{by[q.e][1]++;if(window._ans[i]===q.c)by[q.e][0]++;});
 const rec={candidato:window._exam.cand,prova:E.nome,nota:Math.round(sc*100),corte:Math.round(corte*100),resultado:v.replace(/[✓⚠✗]\s?/,''),por_eixo:{tecnico:by.tecnico[1]?Math.round(by.tecnico[0]/by.tecnico[1]*100):null,processos:by.processos[1]?Math.round(by.processos[0]/by.processos[1]*100):null,cultura:by.cultura[1]?Math.round(by.cultura[0]/by.cultura[1]*100):null},data:new Date().toISOString()};
 $('qres').innerHTML='<div class="result '+cls+'">'+v+' — '+Math.round(sc*100)+'% (corte '+Math.round(corte*100)+'%)</div><div class="row" style="margin-top:10px"><button class="gbtn" style="max-width:240px" onclick=\'dl('+JSON.stringify(JSON.stringify(rec,null,2))+',"prova_"+'+JSON.stringify(window._exam.cand.replace(/\s+/g,"_"))+'+".json","application/json")\'>⬇ Exportar resultado</button><button class="gbtn" style="max-width:200px;background:#e6e9ee;color:var(--navy)" onclick="showRecrut()">Nova prova</button></div>';}
// BANCO DE PERGUNTAS (editor do gestor)
var _bk={sel:null,tab:'aval',fin:null};
function _bkVoltar(){if(typeof isManager==='function'&&isManager())showGestor();else renderDash();}
function _bkEnsure(kind,key,src){_cfgQ[kind]=_cfgQ[kind]||{};if(!_cfgQ[kind][key])_cfgQ[kind][key]=JSON.parse(JSON.stringify(src||[]));return _cfgQ[kind][key];}
function _qArr(kind,key){return _cfgQ[kind]&&_cfgQ[kind][key];}
function _qSet(kind,key,qi,f,val){_qArr(kind,key)[qi][f]=val;}
function _qSetOpt(kind,key,qi,oi,val){_qArr(kind,key)[qi].o[oi]=val;}
function _qCorrect(kind,key,qi,oi){_qArr(kind,key)[qi].c=oi;bkBody();}
function _qAddOpt(kind,key,qi){_qArr(kind,key)[qi].o.push('Nova alternativa');bkBody();}
function _qDelOpt(kind,key,qi,oi){var a=_qArr(kind,key)[qi];if(a.o.length<=2){alert('Mínimo de 2 alternativas.');return;}a.o.splice(oi,1);if(a.c>=a.o.length)a.c=0;bkBody();}
function _qAdd(kind,key,tipo){var q={q:'Nova pergunta',o:['Alternativa 1','Alternativa 2','Alternativa 3','Alternativa 4'],c:0,e:''};if(tipo)q.tipo='conceito';_qArr(kind,key).push(q);bkBody();}
function _qDel(kind,key,qi){if(!confirm('Excluir esta questão?'))return;_qArr(kind,key).splice(qi,1);bkBody();}
function _qList(kind,key,opt){var a=_qArr(kind,key)||[];var h='';a.forEach(function(q,qi){
 h+='<div class="bk-q">';
 h+='<div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#5b6b7d;margin-bottom:2px"><span>Questão '+(qi+1)+'</span>'+(opt.tipo?'<select class="bk-mini" onchange="_qSet(\''+kind+'\',\''+key+'\','+qi+',\'tipo\',this.value)"><option value="conceito"'+(q.tipo==='conceito'?' selected':'')+'>conceito</option><option value="caso"'+(q.tipo==='caso'?' selected':'')+'>caso</option></select>':'')+'</div>';
 h+='<textarea class="bk-in" oninput="_qSet(\''+kind+'\',\''+key+'\','+qi+',\'q\',this.value)">'+esc(q.q||'')+'</textarea>';
 (q.o||[]).forEach(function(op,oi){h+='<div class="bk-opt"><input type="radio" name="bk_'+kind+'_'+qi+'" '+(q.c===oi?'checked':'')+' title="marcar como correta" onchange="_qCorrect(\''+kind+'\',\''+key+'\','+qi+','+oi+')"><input class="bk-in" value="'+esc(op)+'" oninput="_qSetOpt(\''+kind+'\',\''+key+'\','+qi+','+oi+',this.value)"><button class="bk-x" title="remover" onclick="_qDelOpt(\''+kind+'\',\''+key+'\','+qi+','+oi+')">✕</button></div>';});
 h+='<div style="margin-top:5px;display:flex;gap:6px;align-items:center;flex-wrap:wrap"><button class="bk-sm" onclick="_qAddOpt(\''+kind+'\',\''+key+'\','+qi+')">+ alternativa</button><button class="bk-sm bk-del" onclick="_qDel(\''+kind+'\',\''+key+'\','+qi+')">excluir questão</button><span style="font-size:11px;color:#1f7a3d">✓ correta: alternativa '+((q.c||0)+1)+'</span></div>';
 h+='</div>';});
 h+='<button class="bk-sm" style="margin-top:4px" onclick="_qAdd(\''+kind+'\',\''+key+'\','+(opt.tipo?'true':'false')+')">+ adicionar questão</button>';
 return h;}
// --- editor de ramificações ---
function _cCase(key){return _cfgQ.modcase&&_cfgQ.modcase[key];}
function _cSet(key,f,v){_cCase(key)[f]=v;}
function _nSet(key,nk,f,v){_cCase(key).nodes[nk][f]=v;}
function _oSet(key,nk,oi,f,v){_cCase(key).nodes[nk].o[oi][f]=v;}
function _oFlags(key,nk,oi,f,v){var arr=v.split(',').map(function(s){return s.trim();}).filter(Boolean);var o=_cCase(key).nodes[nk].o[oi];if(arr.length)o[f]=arr;else delete o[f];}
function _oAdd(key,nk){var first=Object.keys(_cCase(key).nodes)[0];_cCase(key).nodes[nk].o.push({t:'Nova alternativa',q:'ok',fb:'',to:first});bkBody();}
function _oDel(key,nk,oi){var n=_cCase(key).nodes[nk];if(n.o.length<=2){alert('Mínimo de 2 alternativas.');return;}n.o.splice(oi,1);bkBody();}
function _nDel(key,nk){var cs=_cCase(key);if(cs.start===nk){alert('Não dá para excluir o nó inicial.');return;}if(!confirm('Excluir o nó '+nk+'?'))return;delete cs.nodes[nk];bkBody();}
function _nAdd(key){var cs=_cCase(key);var nk=prompt('Id do novo nó (ex: d):');if(!nk)return;nk=nk.trim();if(!nk||cs.nodes[nk]){alert('Id inválido ou já existe.');return;}var first=Object.keys(cs.nodes)[0];cs.nodes[nk]={s:'Nova situação',o:[{t:'Alternativa 1',q:'good',fb:'',to:first},{t:'Alternativa 2',q:'bad',fb:'',to:first}]};bkBody();}
function _nAddFim(key){var cs=_cCase(key);var nk=prompt('Id do desfecho (ex: f_novo):');if(!nk)return;nk=nk.trim();if(!nk||cs.nodes[nk]){alert('Id inválido ou já existe.');return;}cs.nodes[nk]={fim:1,tit:'Novo desfecho',txt:''};bkBody();}
function _nodeSelect(cs,cur,handler){var h='<select class="bk-mini" onchange="'+handler+'">';Object.keys(cs.nodes).forEach(function(k){h+='<option value="'+k+'"'+(k===cur?' selected':'')+'>'+k+(cs.nodes[k].fim?' (desfecho)':'')+'</option>';});return h+'</select>';}
function _sel(arr,cur,handler){var h='<select class="bk-mini" onchange="'+handler+'">';arr.forEach(function(x){h+='<option'+(x===cur?' selected':'')+'>'+x+'</option>';});return h+'</select>';}
function _caseFlags(cs){var s={};Object.keys(cs.nodes).forEach(function(k){var n=cs.nodes[k];if(n.o)n.o.forEach(function(o){(o.set||[]).forEach(function(f){s[f]=1;});(o.block||[]).forEach(function(f){s[f]=1;});(o.req||[]).forEach(function(f){s[f]=1;});});});return Object.keys(s);}
function _caseEditor(kind,key){var cs=_cCase(key);if(!cs)return '<p style="color:#5b6b7d">Sem caso de decisão neste módulo.</p>';
 var h='<div class="bk-q"><div style="font-size:11px;color:#5b6b7d">Título do caso</div><input class="bk-in" value="'+esc(cs.tit||'')+'" oninput="_cSet(\''+key+'\',\'tit\',this.value)">';
 h+='<div style="font-size:11px;color:#5b6b7d;margin-top:4px">Contexto (aparece em todos os nós)</div><textarea class="bk-in" oninput="_cSet(\''+key+'\',\'ctx\',this.value)">'+esc(cs.ctx||'')+'</textarea>';
 h+='<div style="font-size:11px;color:#5b6b7d;margin-top:4px">Nó inicial</div>'+_nodeSelect(cs,cs.start,'_cSet(\''+key+'\',\'start\',this.value)')+'</div>';
 var flags=_caseFlags(cs);
 h+='<div style="font-size:11.5px;color:#41506a;margin:8px 0 6px;background:#eef4d9;border-radius:8px;padding:8px 10px">Estados de consequência em uso: '+(flags.length?flags.map(function(f){return '<code style="background:#fff;padding:1px 5px;border-radius:4px">'+esc(f)+'</code>';}).join(' '):'<i>nenhum ainda — use "define estado" numa escolha errada</i>')+'</div>';

function _gDays(iso){if(!iso)return null;var d=new Date(iso);if(isNaN(d.getTime()))return null;return Math.floor((Date.now()-d.getTime())/86400000);}
function _gStatus(r){var idle=_gDays(r.data);if(r.final&&r.final.pass)return{k:'ap',t:'Aprovado',bg:'#e1f5ee',fg:'#0f6e56'};if(r.final)return{k:'re',t:'Reprovado',bg:'#fcebeb',fg:'#a32d2d'};if(idle!=null&&idle>=14)return{k:'pa',t:'Parado '+idle+'d',bg:'#faeeda',fg:'#854f0b'};return{k:'ec',t:'Em curso',bg:'#e6f1fb',fg:'#185fa5'};}
