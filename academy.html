 "q": "ok", "fb": "Parcial — o PR usa a POA (plano do módulo); limpar só o horizontal pode não resolver.", "to": "c"}, {"t": "Desativo a estação e passo a usar dado de satélite sem validar.", "q": "bad", "fb": "Trocar a fonte sem validação só troca um dado ruim por outro incerto.", "to": "c"}]}, "c": {"s": "Você encontra o <b>piranômetro do plano inclinado sujo</b> (fezes de pássaro). Após limpar:", "o": [{"t": "Registro na OS com fotos, comparo as leituras pós-limpeza com a referência e sinalizo à equipe de performance o período de dado inválido.", "q": "good", "fb": "Excelente — corrige a origem e protege o histórico do PR marcando o período contaminado.", "to": "e_ok"}, {"t": "Limpo e sigo a rota, sem comunicar performance.", "q": "ok", "fb": "O sensor voltou, mas o PR histórico fica errado sem a sinalização do período.", "to": "e_parcial"}, {"t": "Apago do histórico os dados do período sujo.", "q": "bad", "fb": "Dado bruto não se apaga — se trata e se documenta. Apagar destrói a rastreabilidade.", "to": "e_err"}]}, "e_ok": {"fim": 1, "tit": "Dado confiável restabelecido", "txt": "Sensor limpo, evidência registrada e período inválido sinalizado: o PR volta a refletir a usina de verdade."}, "e_parcial": {"fim": 1, "tit": "Sensor ok, histórico não", "txt": "A medição voltou, mas sem comunicar o período de dado falso o relatório continua distorcido."}, "e_err": {"fim": 1, "tit": "Dado falso virou decisão falsa", "txt": "Se a estação falha, o PR fica errado e a usina parece pior (ou melhor) do que é. O caminho é verificar sensor, corrigir e documentar — nunca maquiar."}}}, "protecoes": {"tit": "Tempestade e usina desarmada", "ctx": "Após uma noite de tempestade com raios, a usina amanhece desligada: <b>a proteção da subestação atuou</b>. Evento P1.", "start": "a", "nodes": {"a": {"s": "Primeira ação?", "o": [{"t": "Trato como P1: alinho com o COS e verifico no relé qual função atuou (50/51, diferencial) antes de qualquer religamento.", "q": "good", "fb": "Correto — o registro do relé diz o que procurar; religar sem isso é religar no escuro.", "to": "b"}, {"t": "Vou direto à subestação fazer inspeção visual.", "q": "ok", "fb": "Inspeção ajuda, mas sem ler o relé você não sabe se a falha foi na MT, no trafo ou a jusante.", "to": "b"}, {"t": "Religo o disjuntor para restabelecer rápido — o cliente está perdendo geração.", "q": "bad", "fb": "Religar sobre falha não eliminada pode causar dano severo e acidente. P1 se trata com método.", "to": "e_err"}]}, "b": {"s": "O relé registrou <b>sobrecorrente (51)</b>. Em campo, várias string boxes estão com <b>DPS com indicador de fim de vida</b>. O que fazer?", "o": [{"t": "Substituo os DPS sob OS e aproveito para inspecionar o SPDA e o aterramento (captores, cordoalhas, conexões da malha), já que houve descarga.", "q": "good", "fb": "Correto — DPS sacrificado indica surto real; o SPDA e a malha precisam ser verificados junto.", "to": "c"}, {"t": "Troco os DPS e parto para o religamento.", "q": "ok", "fb": "Resolve o sintoma, mas descarga atmosférica pede verificação do SPDA/aterramento — é a proteção das pessoas e dos equipamentos.", "to": "c"}, {"t": "Removo os DPS queimados e opero sem eles até chegar a reposição.", "q": "bad", "fb": "Operar strings sem proteção de surto deixa a usina exposta ao próximo evento.", "to": "e_err"}]}, "c": {"s": "Fechamento do evento:", "o": [{"t": "Religo conforme procedimento alinhado com o COS, registro tudo (fotos, DPS trocados, achados do SPDA) e recomendo medição da malha de terra.", "q": "good", "fb": "Excelente — restabelece com segurança e deixa trilha para prevenir o próximo evento.", "to": "e_ok"}, {"t": "Religo e deixo um registro resumido 'atuação por tempestade'.", "q": "ok", "fb": "Usina de volta, mas registro pobre impede análise de recorrência e priorização do PCM.", "to": "e_parcial"}, {"t": "Fecho a OS sem registrar causa nem substituições.", "q": "bad", "fb": "Sem registro, o evento se repete e ninguém aprende — P1 exige rastreabilidade completa.", "to": "e_err"}]}, "e_ok": {"fim": 1, "tit": "P1 tratado com método", "txt": "Relé lido, DPS substituídos, SPDA verificado e religamento coordenado: proteção existe para atuar — o O&M existe para entender por quê."}, "e_parcial": {"fim": 1, "tit": "Voltou, mas aprendeu pouco", "txt": "A usina religou, porém sem registro completo a análise de recorrência fica cega."}, "e_err": {"fim": 1, "tit": "Risco assumido sem controle", "txt": "Religar sem eliminar a falha ou operar sem DPS troca minutos de geração por risco de dano maior — nunca é um bom negócio."}}}, "tracker": {"tit": "Mesa parada apontando para oeste", "ctx": "9h. O SCADA acusa <b>TCU sem comunicação</b> e a mesa travada na posição de ontem à tarde.", "start": "a", "nodes": {"a": {"s": "Qual a conduta inicial em campo?", "o": [{"t": "Inspeção padrão: verifico se a TCU está ligada, se o botão de emergência está acionado e se a base do fusível está apertada; faço o reset.", "q": "good", "fb": "Correto — é a inspeção padrão de TCU parada; muitos casos se resolvem em campo.", "to": "b"}, {"t": "Faço só o reset da TCU.", "q": "ok", "fb": "O reset pode resolver, mas pular as verificações (emergência, fusível, alimentação) deixa causa óbvia para trás.", "to": "b"}, {"t": "Abro chamado direto ao fabricante do tracker.", "q": "bad", "fb": "Chamado sem inspeção padrão vira chamado indevido — a maioria resolve com reset/fusível.", "to": "e_chamado"}, {"t": "Forço a mesa manualmente para a posição correta.", "q": "bad", "fb": "Forçar o atuador pode danificar motor e estrutura — nunca mover na marra.", "to": "e_err"}]}, "b": {"s": "O reset não resolveu. Próximo passo?", "o": [{"t": "Testo a continuidade do fusível com multímetro e troco se estiver rompido.", "q": "good", "fb": "Correto — continuidade primeiro: confirma o diagnóstico antes de trocar a peça.", "to": "c"}, {"t": "Troco o fusível sem testar.", "q": "ok", "fb": "Se o fusível estava bom, você trocou peça à toa e continua sem diagnóstico.", "to": "c"}, {"t": "Religo e desligo a TCU várias vezes seguidas.", "q": "bad", "fb": "Ciclar alimentação repetidamente não é diagnóstico e pode estressar a fonte/bateria.", "to": "c"}]}, "c": {"s": "Fusível trocado, TCU comunicando e mesa voltando a rastrear. Fechamento?", "o": [{"t": "Fotografo a TCU e o nº MAC, registro tudo na OS e confirmo no SCADA que o rastreamento normalizou.", "q": "good", "fb": "Correto — foto da TCU e do MAC é padrão; registro completo fecha o ciclo.", "to": "e_ok"}, {"t": "Registro na OS sem foto do MAC.", "q": "ok", "fb": "Sem o MAC, o histórico daquela TCU específica se perde — dificulta análise de reincidência.", "to": "e_parcial"}, {"t": "Resolvi, então sigo sem registrar.", "q": "bad", "fb": "Sem registro não existe histórico: se o fusível romper de novo, ninguém verá a reincidência.", "to": "e_err"}]}, "e_ok": {"fim": 1, "tit": "Resolvido em campo, com rastreio", "txt": "Inspeção padrão + continuidade + registro com MAC: caso fechado sem chamado indevido e com histórico para detectar reincidência."}, "e_parcial": {"fim": 1, "tit": "Resolvido, rastreio incompleto", "txt": "A mesa voltou, mas sem identificar a TCU (MAC) o histórico de falhas fica frágil."}, "e_chamado": {"fim": 1, "tit": "Chamado indevido", "txt": "Sem a inspeção padrão, o chamado provavelmente voltará como 'era só o fusível/reset' — custo e prazo desperdiçados."}, "e_err": {"fim": 1, "tit": "Dano evitável", "txt": "Forçar a mesa causa dano evitável — e resolver sem registrar apaga o histórico: a reincidência voltará como surpresa. Método e registro fecham o caso de verdade."}}}, "manutencao": {"tit": "Ponto frio na termografia", "ctx": "Durante a preditiva, a câmera mostra um <b>fusível de string box anormalmente mais frio</b> que os vizinhos, com a usina em plena geração.", "start": "a", "nodes": {"a": {"s": "Como interpretar o achado?", "o": [{"t": "Ponto frio também é defeito — provável conexão aberta/circuito sem corrente. Mudo levemente o ângulo e reconfirmo.", "q": "good", "fb": "Correto — conforme o POP, ponto frio = sem corrente passando; reconfirmar o ângulo elimina reflexo.", "to": "b"}, {"t": "Registro como observação e sigo a varredura.", "q": "ok", "fb": "Registrar é bom, mas tratar como observação subestima: ponto frio é defeito, não curiosidade.", "to": "b"}, {"t": "Concluo que está saudável — frio é o oposto de ponto quente.", "q": "bad", "fb": "Errado: se os vizinhos aquecem em carga e este não, ele não conduz corrente.", "to": "e_perde"}, {"t": "Encosto a ponta de prova no fusível para confirmar.", "q": "bad", "fb": "Termografia é ensaio óptico — tocar circuito energizado é violação de segurança.", "to": "e_err"}]}, "b": {"s": "Reconfirmado o ponto frio. Conduta conforme o POP?", "o": [{"t": "Verifico a leitura de corrente daquela string, registro com foto e contato a Engenharia de O&M.", "q": "good", "fb": "Correto — a leitura de corrente confirma o diagnóstico e o POP manda escalar Engenharia.", "to": "c"}, {"t": "Escalo direto sem verificar a corrente da string.", "q": "ok", "fb": "Escalar é certo, mas sem a leitura de corrente o diagnóstico vai incompleto.", "to": "c"}, {"t": "Troco o fusível na hora, com o circuito energizado.", "q": "bad", "fb": "Intervir energizado, sem OS e sem LOTO, é risco de arco e acidente.", "to": "e_err"}]}, "c": {"s": "Confirmado: string sem corrente (fusível aberto). Tratamento final?", "o": [{"t": "Etiqueta no painel + OS corretiva com desligamento programado, registro completo com fotos e localização.", "q": "good", "fb": "Correto — é exatamente o fluxo do POP para Rejeição: etiqueta + corretiva programada.", "to": "e_ok"}, {"t": "Abro a corretiva mas não etiqueto o painel.", "q": "ok", "fb": "Sem etiqueta, outra equipe pode intervir sem saber do defeito — a sinalização física importa.", "to": "e_parcial"}, {"t": "Fecho tudo dentro da própria OS de preditiva, sem abrir corretiva.", "q": "bad", "fb": "A preditiva detecta; quem corrige é a corretiva. Sem OS própria o defeito perde prioridade e rastreio.", "to": "e_perde"}]}, "e_ok": {"fim": 1, "tit": "Preditiva cumprindo o papel", "txt": "A termografia achou o defeito antes da perda maior: ponto frio reconfirmado, corrente verificada, Engenharia acionada e corretiva programada."}, "e_parcial": {"fim": 1, "tit": "Quase completo", "txt": "Corretiva aberta, mas sem etiqueta física a informação não chega a quem estiver em campo amanhã."}, "e_perde": {"fim": 1, "tit": "Defeito ignorado", "txt": "String sem gerar passa despercebida por meses — a preditiva só vale se o achado vira ação."}, "e_err": {"fim": 1, "tit": "Segurança violada", "txt": "Termografia é estritamente óptica e intervenção exige OS + desligamento. Nenhum diagnóstico justifica tocar circuito energizado."}}}, "mpm": {"tit": "Vazamento no trafo durante a MPM", "ctx": "Inspeção mensal: você encontra <b>mancha de óleo recente</b> sob o transformador do skid, com gotejamento lento porém ativo.", "start": "a", "nodes": {"a": {"s": "Como classificar e agir?", "o": [{"t": "Vazamento ativo = rejeição: fixo a etiqueta 'MANUTENÇÃO CORRETIVA', não prossigo no componente e comunico o supervisor.", "q": "good", "fb": "Correto — gotejamento/mancha recente é critério de rejeição e achado grave segue esse fluxo exato.", "to": "b"}, {"t": "Registro como 'aceite com observações' para acompanhar no próximo mês.", "q": "ok", "fb": "Acompanhar vale para achado leve — vazamento ATIVO é rejeição, exige corretiva.", "to": "b"}, {"t": "Limpo a mancha e sigo o checklist normalmente.", "q": "bad", "fb": "Limpar a evidência sem tratar é esconder o defeito — o vazamento continua.", "to": "e_perde"}, {"t": "Tento reapertar as conexões do radiador com o trafo energizado.", "q": "bad", "fb": "Intervenção não prevista, sem OS e em equipamento energizado: risco grave.", "to": "e_err"}]}, "b": {"s": "Supervisor comunicado. Como registrar o achado?", "o": [{"t": "Fotos do gotejamento e da mancha, localização exata, nível de óleo no visor (se visível) e registro completo na OS.", "q": "good", "fb": "Correto — toda evidência com foto e registro na OS; dado incompleto = retrabalho.", "to": "c"}, {"t": "Descrevo por texto na OS, sem fotos.", "q": "ok", "fb": "Sem foto, quem for planejar a corretiva não dimensiona a severidade — provável retrabalho.", "to": "c"}, {"t": "Aviso por áudio no grupo e relato formalmente só no fim do dia.", "q": "bad", "fb": "Registro de memória se perde e áudio não é evidência rastreável.", "to": "e_perde"}]}, "c": {"s": "E a continuidade da MPM?", "o": [{"t": "Continuo os demais itens do checklist, sem intervir no trafo etiquetado.", "q": "good", "fb": "Correto — o achado grave interrompe o trabalho NAQUELE componente; o resto da rotina segue.", "to": "e_ok"}, {"t": "Suspendo toda a MPM do skid até resolverem o trafo.", "q": "ok", "fb": "Conservador demais: paralisa a rotina sem necessidade — o defeito está isolado e etiquetado.", "to": "e_parcial"}, {"t": "Como parou de gotejar, removo a etiqueta e encerro sem corretiva.", "q": "bad", "fb": "A etiqueta só sai quando a corretiva tratar a causa — pausa no gotejamento não é reparo.", "to": "e_err"}]}, "e_ok": {"fim": 1, "tit": "Rejeição tratada no padrão", "txt": "Etiqueta, comunicação, evidência completa e rotina preservada: é assim que a MPM transforma achado em ação."}, "e_parcial": {"fim": 1, "tit": "Seguro, mas ineficiente", "txt": "O defeito foi tratado, porém paralisar o checklist inteiro atrasa a rotina sem ganho de segurança."}, "e_perde": {"fim": 1, "tit": "Evidência perdida", "txt": "Sem etiqueta, foto e OS, o vazamento segue evoluindo até virar parada não programada do trafo."}, "e_err": {"fim": 1, "tit": "Improviso perigoso", "txt": "Intervir fora do escopo ou remover sinalização por conta própria transforma uma rejeição controlada em risco real."}}}, "mps": {"tit": "Hotspot na termografia semestral", "ctx": "MPS, 11h, céu limpo, usina a <b>85% da carga</b>, irradiância 820 W/m². A câmera (ε=0,95) mostra <b>conexão CC do inversor a 78°C</b>; a conexão similar de referência está a 42°C.", "start": "a", "nodes": {"a": {"s": "O ensaio é válido? Como classificar?", "o": [{"t": "Válido (carga ≥70%, >600 W/m², 10h–14h, ε=0,95). Conexão CC de inversor acima de 70°C = Rejeição.", "q": "good", "fb": "Correto — condições obrigatórias atendidas e 78°C ultrapassa o limite de rejeição (>70°C) para conexões CC/CA de inversor.", "to": "b"}, {"t": "Classifico como Atenção e agendo reavaliação na próxima MPS.", "q": "ok", "fb": "Atenção seria a faixa 50–70°C; a 78°C já é Rejeição — esperar 6 meses é arriscado.", "to": "b"}, {"t": "Reaperto a conexão imediatamente para eliminar o ponto quente.", "q": "bad", "fb": "Nunca reapertar energizado — reaperto só sob OS corretiva com desligamento.", "to": "e_err"}, {"t": "Refaço a medição com ε=0,5 para confirmar o valor.", "q": "bad", "fb": "Emissividade errada gera leitura falsa — o padrão do ensaio é ε=0,95 (e focar junção/fita, não metal polido).", "to": "b"}]}, "b": {"s": "Confirmada a Rejeição. Qual o tratamento?", "o": [{"t": "Destaco em vermelho no relatório, etiqueto o painel e abro OS corretiva com desligamento programado (reaperto com torquímetro ou troca de terminal).", "q": "good", "fb": "Correto — é o fluxo do POP para Rejeição: vermelho + etiqueta + corretiva programada.", "to": "c"}, {"t": "Anoto para tratar dentro da própria rotina da MPS na semana seguinte.", "q": "ok", "fb": "Rejeição pede OS corretiva formal — dissolver na rotina tira prioridade e rastreio.", "to": "c"}, {"t": "Desligo o inversor agora, por conta própria, sem OS nem coordenação.", "q": "bad", "fb": "Desligar sem coordenação gera perda desnecessária e manobra fora de procedimento — o risco era programável.", "to": "c"}]}, "c": {"s": "No desligamento programado, como executar o reparo?", "o": [{"t": "LOTO + ausência de tensão; reaperto com torquímetro de estalo no valor do fabricante; religo e refaço a termografia após ~15 min de estabilização.", "q": "good", "fb": "Perfeito — torque de fabricante evita sub/sobreaperto e a reinspeção após estabilização comprova o reparo.", "to": "e_ok"}, {"t": "Reaperto 'no braço', sem torquímetro — experiência resolve.", "q": "ok", "fb": "Sub ou sobreaperto é justamente a causa clássica de conexão que aquece de novo.", "to": "e_parcial"}, {"t": "Só limpo o terminal com álcool e religo, sem reapertar nem reinspecionar.", "q": "bad", "fb": "A causa (conexão frouxa) continua lá — o hotspot volta e pode evoluir para falha.", "to": "e_perde"}]}, "e_ok": {"fim": 1, "tit": "Hotspot eliminado com método", "txt": "Ensaio válido, classificação correta, corretiva programada e reparo comprovado por reinspeção: a termografia cumpriu o ciclo completo."}, "e_parcial": {"fim": 1, "tit": "Reparo sem garantia", "txt": "Sem torquímetro no valor do fabricante, o reaperto pode ficar errado — e conexão mal apertada é a origem do próximo hotspot."}, "e_perde": {"fim": 1, "tit": "Causa não tratada", "txt": "Limpar sem reapertar trata o sintoma. A conexão frouxa continua aquecendo até romper — provavelmente no pior momento."}, "e_err": {"fim": 1, "tit": "Intervenção energizada", "txt": "Reapertar energizado é risco de arco. Rejeição térmica se trata com OS corretiva e desligamento programado, nunca na hora e sob carga."}}}, "mpa": {"tit": "Isolamento do trafo em zona de atenção", "ctx": "MPA. Ensaio de resistência de isolamento do trafo <b>BT×Terra com megôhmetro em 1 kV</b>, injetando por 1 minuto. Leitura final: <b>350 MΩ</b>.", "start": "a", "nodes": {"a": {"s": "Como classificar o resultado?", "o": [{"t": "Atenção (1 MΩ ≤ R < 1 GΩ): registro o valor com foto do display, e o trafo segue monitorado/investigado.", "q": "good", "fb": "Correto — aceitação plena é R ≥ 1 GΩ; 350 MΩ cai na faixa de Atenção: registrar e acompanhar.", "to": "b"}, {"t": "Aprovo direto — centenas de megaohms é isolamento de sobra.", "q": "ok", "fb": "Parece muito, mas o critério do POP é objetivo: abaixo de 1 GΩ não é aceitação plena.", "to": "b"}, {"t": "Rejeito: etiqueto e abro corretiva para não energizar.", "q": "bad", "fb": "Rejeição é R < 1 MΩ — superdimensionar o critério gera parada e custo desnecessários.", "to": "b"}, {"t": "Repito o ensaio em 5 kV para ver se melhora o valor.", "q": "bad", "fb": "5 kV é a tensão para cabos MT; para trafo BT×Terra o ensaio é 1 kV — mudar a tensão não 'melhora' resultado, invalida a comparação.", "to": "b"}]}, "b": {"s": "No ensaio seguinte (resistência de enrolamento), o colega vai <b>desconectar as garras com a injeção de corrente ainda ligada</b>. Você:", "o": [{"t": "Impeço na hora: sempre desligar a injeção antes de desconectar — romper o circuito sob corrente gera arco.", "q": "good", "fb": "Correto — circuito indutivo interrompido sob corrente = arco elétrico. A injeção morre primeiro, sempre.", "to": "c"}, {"t": "Pauso o serviço e revisamos juntos o POP antes de continuar.", "q": "ok", "fb": "Seguro, mas o risco era iminente — a intervenção direta vem primeiro, o POP depois.", "to": "c"}, {"t": "Deixo — a corrente de teste é só 10% da nominal, não faz arco.", "q": "bad", "fb": "Mesmo corrente reduzida em circuito indutivo gera arco na abertura. O POP é explícito: desligar antes de desconectar.", "to": "c"}]}, "c": {"s": "Ensaio de relação (TTR), TAP registrado com foto: <b>erro de 0,8%</b>. Enrolamento entre fases deu desvio de 2%. Conclusão?", "o": [{"t": "Relação >0,5% = Rejeição: não energizar, etiquetar, registrar e escalar a Engenharia de O&M — mesmo com o enrolamento aprovado.", "q": "good", "fb": "Correto — os critérios são independentes: enrolamento <5% aprova aquele ensaio, mas a relação estourou o limite de 0,5%.", "to": "e_ok"}, {"t": "Aprovo o trafo: o enrolamento deu bom e 0,8% é quase o limite.", "q": "ok", "fb": "'Quase' não existe em critério de ensaio — >0,5% rejeita, e um ensaio bom não compensa outro reprovado.", "to": "e_parcial"}, {"t": "Mudo o TAP e repito até dar abaixo de 0,5%, sem registrar as tentativas.", "q": "bad", "fb": "Manipular a condição de ensaio sem registro esconde um possível defeito real de espiras/comutador.", "to": "e_err"}]}, "e_ok": {"fim": 1, "tit": "Critérios aplicados como são", "txt": "Atenção registrada, arco evitado e rejeição de TTR escalada: na MPA os números mandam — 1 GΩ, 5%, 0,5% não são sugestões."}, "e_parcial": {"fim": 1, "tit": "Critério flexibilizado", "txt": "Aceitar '0,8% ≈ 0,5%' devolve à rede um trafo com possível defeito de relação — o custo aparece depois, em falha."}, "e_err": {"fim": 1, "tit": "Ensaio manipulado", "txt": "Repetir até passar, sem registro, destrói o propósito da MPA: o relatório anual precisa refletir o equipamento real."}}}, "mpa_modstr": {"tit": "String com Voc de 'um módulo a menos'", "ctx": "MPA em string boxes, sol pleno. A string 7 mede <b>Voc = 1.180 V</b>; as vizinhas (mesmos 24 módulos) medem <b>~1.230 V</b>.", "start": "a", "nodes": {"a": {"s": "Interpretação da medição?", "o": [{"t": "A diferença (~50 V) equivale à Voc de um módulo: provável módulo/conector em aberto ou diodo de bypass acionado.", "q": "good", "fb": "Correto — degrau de 'um módulo a menos' na Voc é a assinatura clássica de bypass atuado ou circuito aberto parcial.", "to": "b"}, {"t": "Deve ser efeito de temperatura entre as mesas.", "q": "ok", "fb": "Temperatura corrige a Voc, mas não explica um degrau exato de um módulo entre strings vizinhas na mesma condição.", "to": "b"}, {"t": "É soiling — a string 7 deve estar mais suja.", "q": "bad", "fb": "Sujeira derruba a corrente (Isc), não produz degrau de tensão na Voc.", "to": "b"}, {"t": "Diferença pequena, religo e sigo o checklist.", "q": "bad", "fb": "50 V a menos é um módulo fora do circuito — ignorar deixa geração e possivelmente um ponto quente para trás.", "to": "e_perde"}]}, "b": {"s": "Você vai investigar na mesa. Quais cuidados de segurança?", "o": [{"t": "Lembro que a montante do ponto seccionado há tensão Voc letal e contínua enquanto houver sol; visto EPI anti-arco (mín. Cat. II) e meço Isc com alicate True RMS CC.", "q": "good", "fb": "Correto — seccionar não desenergiza o lado do sol; o EPI e o instrumento certo são obrigatórios.", "to": "c"}, {"t": "Espero o fim da tarde para investigar com menos tensão.", "q": "ok", "fb": "Reduz a tensão mas não a elimina, e não substitui EPI/procedimento — além de perder a janela boa de diagnóstico.", "to": "c"}, {"t": "Vou tateando os conectores para achar o ponto quente, sem EPI.", "q": "bad", "fb": "Tensão letal contínua + possível conector danificado: tocar sem proteção é risco de choque e arco.", "to": "e_err"}]}, "c": {"s": "Você localiza um <b>conector MC4 derretido</b> no meio da string. Conduta final?", "o": [{"t": "Etiqueta corretiva + OS com foto e posição; substituição programada com a string seccionada e, se houve ensaio com megôhmetro, descarregada/aterrada (energia capacitiva residual).", "q": "good", "fb": "Correto — reparo programado, seccionado e com a capacitiva descarregada antes de manusear.", "to": "e_ok"}, {"t": "Troco o conector agora — o sol está fraco e é serviço rápido.", "q": "ok", "fb": "Improviso sem OS: sem registro, sem planejamento de peça e ainda com tensão presente a montante.", "to": "e_parcial"}, {"t": "Isolo com fita de autofusão e religo a string.", "q": "bad", "fb": "Conector derretido é ponto de falha e incêndio — fita não é reparo, é bomba-relógio.", "to": "e_err"}]}, "e_ok": {"fim": 1, "tit": "Diagnóstico fino, reparo seguro", "txt": "Voc leu o defeito, a segurança respeitou o risco letal contínuo do lado CC e a corretiva programada fechou o ciclo com rastreio."}, "e_parcial": {"fim": 1, "tit": "Consertou no improviso", "txt": "Pode ter funcionado, mas sem OS, peça controlada e descarga da capacitiva, o 'serviço rápido' cobra caro um dia."}, "e_perde": {"fim": 1, "tit": "Defeito deixado para trás", "txt": "Um módulo fora do circuito é perda contínua de geração — e um bypass atuado pode esconder célula aquecendo."}, "e_err": {"fim": 1, "tit": "Risco letal ignorado", "txt": "No CC, enquanto há sol, há tensão — seccionar não desliga o gerador. EPI, instrumento certo e reparo programado não são burocracia."}}}, "mpa_cabine": {"tit": "Preparando os ensaios na cabine de MT", "ctx": "MPA da cabine: resistência de isolamento, resistência de contato e relação de TP/TC. A equipe chega com a PT emitida.", "start": "a", "nodes": {"a": {"s": "Qual a sequência de manobra antes de tocar em qualquer componente?", "o": [{"t": "Bloqueio (cadeado+etiqueta) nas seccionadoras de montante (MT) e jusante (BT/inversores) → constatação de ausência de tensão → ATR/chave de aterramento → disjuntor extraível em posição teste/extraída.", "q": "good", "fb": "Correto — a ordem é obrigatória e inclui os dois lados: montante E jusante.", "to": "b"}, {"t": "Bloqueio só a seccionadora de montante (MT) e sigo.", "q": "ok", "fb": "Faltou a jusante — os inversores/BT podem devolver tensão à cabine. O bloqueio é dos dois lados.", "to": "b"}, {"t": "O detector indicou zero em todas as fases, então pulo o aterramento temporário.", "q": "bad", "fb": "O ATR/chave de aterramento é obrigatório justamente para descarregar a energia capacitiva residual — que o detector 'zero' não elimina.", "to": "e_err"}, {"t": "Começo pelos TPs e TCs, que são 'só medição'.", "q": "bad", "fb": "É proibido aproximar/tocar barramentos, contatos, TPs e TCs antes da sequência completa de manobra.", "to": "b"}]}, "b": {"s": "Ensaio de <b>resistência de contato do disjuntor MT</b>: valor bem acima da referência do fabricante. Interpretação?", "o": [{"t": "Contatos desgastados/oxidados — em carga isso vira aquecimento; registro e programo tratamento/substituição dos contatos sob OS.", "q": "good", "fb": "Correto — resistência de contato alta = desgaste/oxidação, e a consequência em operação é ponto quente.", "to": "c"}, {"t": "Repito a medição para confirmar antes de concluir.", "q": "ok", "fb": "Repetir é razoável, mas se confirmar o valor a conduta é a mesma: tratar — não normalizar o desvio.", "to": "c"}, {"t": "Aprovo, porque a resistência de isolamento deu excelente.", "q": "bad", "fb": "São ensaios independentes: isolamento bom não compensa contato ruim — cada um reprova sozinho.", "to": "c"}]}, "c": {"s": "Ao final, você percebe que o <b>intertravamento mecânico da seccionadora não funciona</b>. Decisão?", "o": [{"t": "Não operar o conjunto: etiqueto, registro e escalo — intertravamento inoperante permite manobra indevida.", "q": "good", "fb": "Correto — o POP é direto: intertravamento não funcional → não operar.", "to": "e_ok"}, {"t": "Libero a operação com aviso escrito na cabine e correção urgente agendada.", "q": "ok", "fb": "O aviso não impede fisicamente a manobra errada — é exatamente disso que o intertravamento protege.", "to": "e_parcial"}, {"t": "Destravo com arame para concluir a manobra de hoje.", "q": "bad", "fb": "Anular um dispositivo de segurança é gravíssimo — abre caminho para abrir seccionadora sob carga.", "to": "e_err"}]}, "e_ok": {"fim": 1, "tit": "Cabine ensaiada com disciplina", "txt": "Sequência completa de manobra, critérios independentes respeitados e intertravamento inoperante bloqueado: MT não dá segunda chance."}, "e_parcial": {"fim": 1, "tit": "Barreira substituída por aviso", "txt": "Papel não segura manobra errada. Dispositivo de segurança inoperante = equipamento fora de operação até corrigir."}, "e_err": {"fim": 1, "tit": "Segurança anulada", "txt": "Pular o ATR ou burlar o intertravamento remove as barreiras que existem porque o detector e o operador falham — a capacitiva residual e a manobra indevida matam."}}}, "cos_turno": {"tit": "A passagem de turno que quase se perdeu", "ctx": "05h55. Você assume o turno diurno. O operador noturno está com pressa para sair, o e-mail de encerramento dele está genérico e o SCADA SunOp mostra <b>um alarme ativo de inversor offline</b> na usina Ibirapuã I que não aparece em registro nenhum.", "start": "a", "nodes": {"a": {"s": "O colega já está pegando a mochila. O que você faz?", "o": [{"t": "Seguro a saída dele: passagem verbal completa cobrindo os pontos críticos do POP (usinas, alarmes, pendências, ocorrências, clima, comunicações) e validação dos registros.", "q": "good", "fb": "Exato — o POP.COS.01.001 exige a passagem verbal estruturada e a confirmação de que tudo foi registrado. Cinco minutos aqui evitam horas de retrabalho.", "to": "b"}, {"t": "Deixo ele ir — o e-mail de encerramento já foi enviado, depois eu leio com calma.", "q": "bad", "fb": "O e-mail está genérico e há um alarme sem registro. Sem a passagem verbal, você assume o turno às cegas e o evento fica órfão.", "to": "b"}, {"t": "Dou Ack em todos os alarmes para começar o turno com a tela limpa e organizo o posto.", "q": "bad", "fb": "Ack em massa sem análise mascara eventos reais — é exatamente o que o procedimento proíbe. A tela limpa não significa usina saudável.", "to": "b"}]}, "b": {"s": "Ficou claro que o alarme do inversor de Ibirapuã I não foi tratado nem registrado pelo turno anterior. Como você conduz?", "o": [{"t": "Trato como evento novo: triagem, classificação de prioridade, registro da ocorrência no CMMS e menção no status inicial do WhatsApp.", "q": "good", "fb": "Correto — evento sem dono vira evento seu no momento em que você assume. Triagem, registro e transparência no status inicial.", "to": "c"}, {"t": "Ligo para o operador noturno para entender o que houve, registro a lacuna e informo o supervisor antes de seguir a triagem.", "q": "ok", "fb": "Válido buscar o contexto e reportar a falha de processo — desde que isso não atrase a triagem do alarme, que é a prioridade.", "to": "c"}, {"t": "Presumo que o noturno já resolveu e só esqueceu de baixar o alarme; sigo para a ronda normal.", "q": "bad", "fb": "Presunção não é diagnóstico. Se o inversor estiver realmente parado, cada hora de sol é geração perdida — e o registro continua inexistente.", "to": "f_ruim"}]}, "c": {"s": "17h00. A ocorrência do inversor segue em andamento (campo acionado, peça em deslocamento). Como você encerra o turno?", "o": [{"t": "Revisão final dos sistemas, status final no WhatsApp (usina 'com pendência'), e-mail de encerramento detalhando a ocorrência e as ações, passagem verbal ao noturno e logoff.", "q": "good", "fb": "Encerramento completo conforme o POP: as três entregas formais (WhatsApp, e-mail, passagem verbal) + desconexão segura. O próximo turno assume com contexto total.", "to": "f_ok"}, {"t": "Mando o status no WhatsApp e deixo o e-mail para o noturno enviar, já que a ocorrência agora é dele.", "q": "bad", "fb": "O e-mail de encerramento documenta o SEU turno — é rastreabilidade e auditoria. Transferir a pendência sem documentar quebra a cadeia de registro.", "to": "f_meio"}, {"t": "Como a ocorrência está registrada no CMMS, saio no horário sem passagem verbal: está tudo no sistema.", "q": "bad", "fb": "O CMMS não substitui a passagem de turno. Nuances operacionais (contatos, combinados com o campo, riscos) se perdem sem o repasse verbal.", "to": "f_meio"}]}, "f_ok": {"fim": 1, "tit": "Turno exemplar", "txt": "Você blindou os dois momentos mais frágeis da operação 24/7: a assunção e a entrega do turno. O evento órfão virou ocorrência registrada, o cliente foi informado com transparência e o próximo operador assumiu com contexto completo. É assim que a corrente de turnos não quebra."}, "f_meio": {"fim": 1, "tit": "Turno com pontas soltas", "txt": "O evento foi tratado, mas o encerramento incompleto deixou lacunas de rastreabilidade. Em auditoria — ou na próxima contestação do cliente — a falta do e-mail de encerramento ou da passagem verbal vai custar caro. Revise as três entregas formais do fim de turno."}, "f_ruim": {"fim": 1, "tit": "Evento órfão, geração perdida", "txt": "O inversor ficou parado sob sol pleno enquanto todos presumiam que outra pessoa havia tratado. Sem triagem, sem registro e sem dono, a falha só foi percebida horas depois — perda de geração, SLA estourado e nenhum registro para explicar. A regra: alarme pendente na assunção do turno é SEU até prova em contrário."}}}, "cos_monit": {"tit": "O desvio silencioso", "ctx": "10h40, céu limpo. Na ronda pelo Prescinto você nota a usina Capitão Poço gerando <b>40% abaixo do esperado</b>. No SCADA SunOp, nenhum alarme ativo. Tudo aparentemente 'normal'.", "start": "a", "nodes": {"a": {"s": "Nenhum alarme, mas o número não fecha. Qual é sua primeira ação?", "o": [{"t": "Investigo a telemetria: comparo geração por inversor, verifico strings e cruzo com a irradiância do momento.", "q": "good", "fb": "Correto — ausência de alarme não é atestado de normalidade. O desvio detectado na ronda deve ser investigado até achar a causa.", "to": "b"}, {"t": "Sem alarme, sem ação: sigo a ronda e reavalio no fim do turno.", "q": "bad", "fb": "Um desvio de 40% em dia limpo é evento real ou falha de telemetria — ambos exigem ação agora. Esperar é perder geração ou operar cego.", "to": "f_ruim"}, {"t": "Executo reset remoto em todos os inversores da usina para 'normalizar' o quadro.", "q": "bad", "fb": "Manobra sem diagnóstico é o oposto do procedimento: pode agravar a situação e mascarar a causa. Nunca comandar sem entender o que está acontecendo.", "to": "f_ruim"}]}, "b": {"s": "Metade dos inversores mostra 0 kW, mas todos aparecem 'online'. Cheiro de problema de dado. O que você faz?", "o": [{"t": "Verifico conectividade por outras vias (ping, portal do fabricante), consulto o histórico de falhas de 15 dias e confirmo se é falha de comunicação ou parada real.", "q": "good", "fb": "Exatamente a triagem do POP.COS.02.001: validar por fonte independente antes de concluir, e usar o histórico para detectar recorrência.", "to": "c"}, {"t": "Abro OS de campo imediatamente para inspecionar os inversores zerados.", "q": "ok", "fb": "Cauteloso, mas prematuro: se for gateway ou link de dados, o campo viaja para nada. Confirme primeiro por via remota — é mais rápido e mais barato.", "to": "c"}, {"t": "Dou Ack no painel, anoto na caderneta e deixo para o próximo turno verificar.", "q": "bad", "fb": "Anotação pessoal não é registro, e adiar a validação mantém a usina possivelmente parada sob sol pleno.", "to": "f_ruim"}]}, "c": {"s": "Confirmado: o gateway de comunicação local travou — os inversores estão gerando, mas o dado não sobe. E o portal do fabricante confirma geração normal. Próximo passo?", "o": [{"t": "Reinicio o gateway remotamente / aciono o provedor, abro chamado, registro a ocorrência com as evidências e monitoro o restabelecimento do dado.", "q": "good", "fb": "Fechamento completo: causa tratada, chamado aberto com o provedor conforme o POP, registro com evidências e vigilância até normalizar.", "to": "f_ok"}, {"t": "Como a usina está gerando, considero falso alarme e sigo a ronda sem registrar.", "q": "bad", "fb": "Sem telemetria você está cego: se um inversor cair agora, ninguém verá. Falha de comunicação é ocorrência real, com registro e chamado — mesmo com a usina gerando.", "to": "f_meio"}, {"t": "Aciono equipe de campo para reiniciar o gateway presencialmente ainda hoje.", "q": "bad", "fb": "O gateway aceita reinício remoto e o provedor tem chamado aberto — deslocar campo num problema de telecom resolvível da mesa é desperdiçar o recurso mais caro da operação.", "to": "f_meio"}]}, "f_ok": {"fim": 1, "tit": "Diagnóstico cirúrgico", "txt": "Você transformou um 'tudo normal' enganoso em diagnóstico preciso: desvio detectado na ronda, validação por fonte independente, causa identificada (comunicação) e tratamento com registro. Nenhum deslocamento desperdiçado, nenhuma geração perdida — e a telemetria de volta ao ar."}, "f_meio": {"fim": 1, "tit": "Causa achada, lição perdida", "txt": "O diagnóstico foi bom, mas ignorar a falha de comunicação deixou a usina sem visibilidade — e sem registro, o problema vai se repetir sem histórico. Monitorar é também cuidar da qualidade do dado que permite monitorar."}, "f_ruim": {"fim": 1, "tit": "Cegueira operacional", "txt": "Entre ignorar o desvio, comandar sem diagnóstico e empurrar para o próximo turno, o resultado é o mesmo: horas sem saber se a usina gerava ou não, decisões no escuro e zero rastreabilidade. A ronda existe para achar exatamente o que o alarme não mostra — e este caso era o exemplo clássico."}}}, "cos_alarmes": {"tit": "Avalanche na tempestade", "ctx": "14h20. Uma frente de tempestade cruza a região e o SCADA dispara <b>mais de 30 alarmes</b> em 4 usinas: falhas de comunicação de trackers, alarmes de strings e — na usina de maior porte — <b>'disjuntor geral aberto'</b> com geração zerada.", "start": "a", "nodes": {"a": {"s": "A tela está vermelha e o som não para. Por onde você começa?", "o": [{"t": "Priorizo pela tabela P1–P4: o disjuntor geral aberto (P1, perda total) primeiro; agrupo os demais alarmes por causa comum antes de tratar um a um.", "q": "good", "fb": "Perfeito — disjuntor/inversor/relé/trafo são P1 na tabela do POP.COS.03.001. E numa avalanche, agrupar por causa transforma 30 alarmes em 3 eventos.", "to": "b"}, {"t": "Trato na ordem de chegada: o alarme mais antigo primeiro, para não perder o histórico.", "q": "bad", "fb": "Ordem de chegada não é critério. Enquanto você baixa alarmes P4 de tracker, a maior usina do portfólio está parada — a criticidade manda.", "to": "b"}, {"t": "Dou Ack em massa para silenciar o painel e enxergar melhor.", "q": "bad", "fb": "Ack em massa sem análise mascara eventos reais e destrói a confiança no painel. Você acabou de 'esconder' um P1 no meio do ruído.", "to": "f_ruim"}]}, "b": {"s": "Confirmado: perda total na usina grande, disjuntor principal aberto. A tempestade ainda passa sobre a região. O que fazer com o P1?", "o": [{"t": "Triagem rápida (relé/proteção, tensão de rede), abro a ocorrência P1 com as mensagens exatas do SCADA e aciono conforme o POP de resposta a críticos.", "q": "good", "fb": "Correto: confirmar criticidade, registrar com códigos exatos e encadear com o POP.COS.04.001 e a matriz de escalada. O P1 tem dono e trilha.", "to": "c"}, {"t": "Fecho o disjuntor remotamente já — cada minuto é geração perdida.", "q": "bad", "fb": "Religar às cegas durante tempestade, sem verificar a atuação da proteção, é arriscar fechar sobre falta e transformar um desarme em dano de equipamento.", "to": "f_ruim"}, {"t": "Espero a tempestade passar para reavaliar tudo de uma vez.", "q": "bad", "fb": "O P1 não espera o clima: a triagem e a escalada devem começar imediatamente, mesmo que a manobra final aguarde condições seguras.", "to": "c"}]}, "c": {"s": "O P1 está encaminhado com o supervisor. Restam ~25 alarmes: strings em duas usinas (P2) e comunicação de trackers (P4). Como fechar o quadro?", "o": [{"t": "Trato os P2 conforme SLA (triagem, registro, acompanhamento) e deixo os P4 registrados no log de turno — reavaliando se persistirem após a tempestade.", "q": "good", "fb": "É a disciplina da matriz: P2 com tratamento e prazo, P4 apenas registro e ciência do supervisor via log. Recursos onde importam.", "to": "f_ok"}, {"t": "Abro OS de campo para todos os alarmes, incluindo os P4 de comunicação de tracker.", "q": "ok", "fb": "Nada ficou sem tratamento, mas você inflou o backlog do campo com P4s que provavelmente se normalizam com o fim da tempestade. Priorizar também é saber o que NÃO despachar.", "to": "f_meio"}, {"t": "Dou Ack nos P2 e P4 e encerro o assunto: o P1 era o que importava.", "q": "bad", "fb": "Ack sem tratamento mascara os P2 — strings paradas são perda real de geração com SLA correndo. Prioridade menor não significa prioridade nenhuma.", "to": "f_ruim"}]}, "f_ok": {"fim": 1, "tit": "Ordem no caos", "txt": "Avalanche tratada como manda o procedimento: P1 primeiro, causa comum agrupada, P2 no SLA e P4 no registro. Nenhum evento mascarado, nenhum religamento arriscado, escalada no prazo. É exatamente para dias assim que a tabela P1–P4 existe."}, "f_meio": {"fim": 1, "tit": "Tudo tratado, mal dosado", "txt": "O essencial foi feito — P1 escalado e registrado — mas o despacho indiscriminado de OS para alarmes de baixa prioridade consome equipe de campo e polui os indicadores. Reveja o filtro: prioridade define não só a ordem, mas o tipo de resposta."}, "f_ruim": {"fim": 1, "tit": "O P1 engolido pelo ruído", "txt": "Entre o Ack em massa e o religamento às cegas, o desfecho é grave: ou a perda total ficou invisível no painel 'limpo', ou a manobra sem verificação de proteção arriscou o transformador. Numa avalanche, a sequência é sempre: classificar, agrupar, tratar o crítico — nunca silenciar ou improvisar."}}}, "cos_incid": {"tit": "Perda total ao meio-dia", "ctx": "12h05, sol pleno. Alarme sonoro no SCADA SunOp: usina de 5 MWp <b>totalmente offline</b> — todos os inversores fora e <b>disjuntor principal aberto</b>. É o pior horário possível para perder geração.", "start": "a", "nodes": {"a": {"s": "O alarme grita na tela. Primeira ação?", "o": [{"t": "Ack imediato e confirmação da criticidade: inversores todos offline? Disjuntor aberto confirmado? Alguma indicação de risco (fumaça, proteção atuada)?", "q": "good", "fb": "Sequência exata do POP.COS.04.001: reconhecer e confirmar a criticidade antes de qualquer manobra — inclusive checando sinais de risco à segurança.", "to": "b"}, {"t": "Fecho o disjuntor remotamente agora: ao meio-dia, cada minuto custa caro.", "q": "bad", "fb": "NUNCA religar sem entender por que abriu. Se houve atuação de proteção, fechar sobre falta pode destruir equipamento e criar risco real de segurança.", "to": "f_ruim"}, {"t": "Ligo primeiro para o cliente avisando da parada, para ganhar tempo na comunicação.", "q": "bad", "fb": "Comunicação externa vem após a validação do supervisor, com fatos. Antes de qualquer coisa: confirmar o que está acontecendo.", "to": "b"}]}, "b": {"s": "O relé indica atuação de proteção por subtensão — a rede da concessionária oscilou. A usina desarmou corretamente. E agora?", "o": [{"t": "Aciono o supervisor imediatamente (P1: contato em até 5 min) com usina, natureza do evento e observações; verifico a estabilização da tensão de rede antes de propor religamento.", "q": "good", "fb": "Correto: P1 confirmado = telefone imediato ao supervisor com contexto completo. E religamento só com rede comprovadamente estável.", "to": "c"}, {"t": "A rede já voltou ao normal no supervisório — religo por conta própria e aviso o supervisor depois.", "q": "bad", "fb": "A manobra pode até dar certo, mas comandos dessa magnitude exigem validação: 'nunca realizar alterações sem validação técnica'. Você assumiu sozinho um risco que o procedimento distribui.", "to": "c"}, {"t": "Não mexo em nada: abro OS e espero a equipe de campo ir até a usina religar localmente.", "q": "bad", "fb": "Desarme por evento de rede com religamento remoto disponível é o caso clássico de solução remota. Esperar o campo custa horas da melhor geração do dia.", "to": "f_meio"}]}, "c": {"s": "Supervisor validou: rede estável, religamento autorizado. Como você executa e fecha o incidente?", "o": [{"t": "Executo o fechamento via SCADA, mantenho vigilância intensiva no retorno dos inversores, abro/atualizo a ocorrência P1 com prints e horários, e comunico grupos e e-mail de alerta.", "q": "good", "fb": "Fechamento de manual: manobra autorizada e registrada, vigilância até a normalização, ocorrência completa e comunicação factual às partes interessadas.", "to": "f_ok"}, {"t": "Religo, confirmo que os inversores voltaram e sigo para o próximo alarme — registro depois, se der tempo.", "q": "bad", "fb": "Sem registro imediato (horários, prints, causa), a indisponibilidade vira lacuna: o cliente contestará, o indicador sairá errado e a recorrência ficará invisível.", "to": "f_meio"}, {"t": "Peço para a equipe de campo ir até a usina religar localmente, por segurança.", "q": "bad", "fb": "Com a causa identificada (evento de rede), rede estável e autorização do supervisor, o religamento remoto é seguro e imediato — esperar o deslocamento do campo desperdiça horas da melhor geração do dia.", "to": "f_meio"}]}, "f_ok": {"fim": 1, "tit": "Resposta de elite", "txt": "Do alarme ao religamento: confirmação da criticidade, leitura correta da proteção, escalada no prazo de P1, manobra autorizada, vigilância e registro completo. A usina voltou em minutos, com segurança e rastreabilidade total. É este o padrão."}, "f_meio": {"fim": 1, "tit": "Geração de volta, processo pela metade", "txt": "A usina religou, mas o caminho deixou passivos: horas de espera desnecessária ou uma ocorrência sem registro decente. No próximo desarme igual, ninguém saberá que já aconteceu — e a análise pós-incidente nasce sem dados. Resolver o evento é metade do trabalho; documentá-lo é a outra metade."}, "f_ruim": {"fim": 1, "tit": "Religamento às cegas", "txt": "Fechar o disjuntor sem investigar a atuação da proteção é a violação mais grave do procedimento de resposta a críticos: risco de fechar sobre falta, dano a transformador e pessoas em perigo. A regra de ouro existe para isso: em P1, entender antes de manobrar — e na dúvida, NÃO agir sem validação."}}}, "cos_escala": {"tit": "O religamento que não veio", "ctx": "15h10, horário comercial. Um inversor da usina Lajedo está fora com <b>3 strings afetadas (P2)</b>. Sua tentativa de reset remoto <b>falhou</b>. O relógio do SLA está correndo.", "start": "a", "nodes": {"a": {"s": "Reset remoto sem sucesso num P2. Qual é o próximo movimento?", "o": [{"t": "Escalo ao Supervisor (N1) — telefone ou e-mail, contato em até 10 min — com usina, tipo de alarme, impacto, ações já tomadas e próximos passos sugeridos.", "q": "good", "fb": "Gatilho exato da matriz: P2 após 1ª tentativa remota sem sucesso sobe para N1. E a comunicação leva o conteúdo mínimo completo — contexto acionável, não pânico.", "to": "b"}, {"t": "Continuo tentando resets e combinações de comandos por mais uma hora antes de incomodar alguém.", "q": "bad", "fb": "Insistência não é estratégia: o gatilho da matriz já foi atingido. Cada tentativa repetida adia o acionamento do campo e corrói o SLA.", "to": "b"}, {"t": "Mando e-mail direto para a gerência de O&M com cópia para a diretoria: quanto mais gente souber, mais rápido resolve.", "q": "bad", "fb": "Escalar por cima desorganiza a resposta: a cadeia passa primeiro pelo Supervisor (N1), que filtra e direciona. Diretoria é N3 — para impacto financeiro/estratégico, não para um P2 em triagem.", "to": "b"}]}, "b": {"s": "O Supervisor acionou o campo. 4 horas depois: sem progresso — a placa de controle necessária não está no estoque local. O que a matriz manda?", "o": [{"t": "Escalo ao N2 (Especialistas/Gerência de O&M) por e-mail com cópia ao N1 — foco em recursos e coordenação de suprimentos.", "q": "good", "fb": "Gatilho preciso: P2 sem progresso em 4h sobe para N2, exatamente pelo canal previsto (e-mail com cópia ao N1), com foco em suprimentos.", "to": "c"}, {"t": "Reforço com o Supervisor (N1) mais uma vez e aguardo mais um pouco: ele já está cuidando.", "q": "ok", "fb": "Manter o N1 informado é correto, mas o gatilho de 4h JÁ pede o N2 — o gargalo agora é suprimento, que está acima da alçada do Supervisor. Reescalar no mesmo nível só gira em círculo.", "to": "c"}, {"t": "Deixo anotado para o próximo turno acompanhar; o campo já está mobilizado mesmo.", "q": "bad", "fb": "Pendência sem escalada registrada é SLA morrendo em silêncio. A matriz existe para destravar exatamente este tipo de gargalo — usá-la é obrigação, não opção.", "to": "f_ruim"}]}, "c": {"s": "N2 acionado, peça localizada em outro cluster, chegada prevista amanhã cedo. Seu turno está acabando. Como você fecha?", "o": [{"t": "Registro toda a cadeia no CMMS (quem foi acionado, quando, por qual canal, com confirmação de recebimento) e detalho o plano no e-mail de encerramento e na passagem de turno.", "q": "good", "fb": "Escalada sem registro 'não aconteceu' para efeito de SLA e auditoria. Com a trilha completa + passagem de turno, o evento atravessa a noite com dono e prazo.", "to": "f_ok"}, {"t": "Passo verbalmente ao operador noturno — ele é gente boa, vai acompanhar.", "q": "bad", "fb": "Confiança não substitui registro: sem a trilha no CMMS e no e-mail de encerramento, a rastreabilidade da escalada se perde e o acompanhamento vira memória oral.", "to": "f_meio"}, {"t": "Considero o caso escalado e encerrado da minha parte: agora é com o N2.", "q": "bad", "fb": "Escalar não transfere a ocorrência: o operador segue dono do acompanhamento e do registro até o fechamento. Sem a trilha no CMMS, a cadeia de escalada se perde.", "to": "f_meio"}]}, "f_ok": {"fim": 1, "tit": "Escalada cirúrgica", "txt": "Cada gatilho da matriz foi respeitado: N1 na primeira falha do remoto, N2 nas 4 horas sem progresso, canais corretos, conteúdo mínimo completo e tudo registrado com confirmação de recebimento. O SLA foi defendido por processo, não por sorte."}, "f_meio": {"fim": 1, "tit": "Resolvido no improviso", "txt": "O problema caminhou, mas a trilha formal ficou incompleta: escalada sem registro ou passagem sem documentação. Quando o cliente pedir a linha do tempo do atendimento — e ele vai pedir — faltarão elos na corrente. Processo bom deixa prova."}, "f_ruim": {"fim": 1, "tit": "SLA morto em silêncio", "txt": "O evento tinha solução e a matriz tinha o caminho — mas sem acionar o nível certo no gatilho certo, a peça não andou, o inversor atravessou a noite parado e o SLA estourou sem que ninguém acima soubesse. Escalar não é fraqueza: é o procedimento funcionando."}}}, "cos_doc": {"tit": "O registro que virou prova", "ctx": "16h30. Você acabou de encerrar um P1: inversor central com placa queimada, substituída pela equipe de campo após 5h12 de indisponibilidade parcial. Agora falta o que separa um bom operador de um operador comum: <b>a documentação</b>.", "start": "a", "nodes": {"a": {"s": "Hora de consolidar a ocorrência no CMMS. O que você escreve?", "o": [{"t": "Registro completo: sintomas observados, mensagens exatas dos alarmes com códigos de erro, impacto quantificado (kW × horas), contexto e cada ação preliminar do COS (Ack, reset sem sucesso, ping OK, análise de logs).", "q": "good", "fb": "É o padrão do POP.COS.06.001: campos essenciais completos, com transcrição exata e impacto quantificado. Este registro sustenta diagnóstico, indicador e auditoria.", "to": "b"}, {"t": "Escrevo 'inversor com defeito — placa trocada pelo campo, normalizado' e fecho: o importante já foi feito.", "q": "bad", "fb": "Isso não é registro, é a ausência de um. Sem códigos, impacto e ações, a ocorrência não serve para causa raiz, nem para histórico, nem para defesa em contestação.", "to": "b"}, {"t": "Deixo o registro para amanhã com calma — agora quero focar no painel.", "q": "bad", "fb": "Registro se faz com a memória fresca e o evento aberto. Amanhã os horários exatos, as mensagens e a sequência de ações já estarão distorcidos.", "to": "f_ruim"}]}, "b": {"s": "Registro descritivo pronto. E as evidências e a OS?", "o": [{"t": "Linko a OS à ocorrência com status atualizado, anexo prints dos alarmes no SCADA, gráfico de geração mostrando a queda e o log do inversor, e registro data/hora da resolução.", "q": "good", "fb": "Evidência fecha o ciclo: OS linkada, prints, gráfico de geração/PR e logs. Quando o cliente contestar a indisponibilidade daqui a três meses, a reconstrução leva minutos.", "to": "c"}, {"t": "O texto está detalhado — anexos são opcionais, considero suficiente e fecho a ocorrência.", "q": "ok", "fb": "O texto ajuda, mas o POP pede evidências visuais e de dados anexadas. Palavra sem print perde força em auditoria e dificulta a análise técnica posterior.", "to": "c"}, {"t": "Anexo apenas uma foto da placa queimada que o técnico mandou no WhatsApp.", "q": "bad", "fb": "A foto ajuda, mas sem prints dos alarmes, gráfico de geração e OS linkada a ocorrência não reconstrói o evento — e a evidência solta no WhatsApp não substitui o anexo no CMMS.", "to": "c"}]}, "c": {"s": "O supervisor convoca análise pós-incidente para amanhã: terceiro evento de placa queimada em inversores desta usina no semestre. Qual é sua contribuição?", "o": [{"t": "Levo a linha do tempo completa, referencio as ocorrências anteriores semelhantes e participo da identificação de causa raiz e ações preventivas, atualizando a base de conhecimento.", "q": "good", "fb": "É o fechamento nobre do ciclo: recorrência evidenciada por registros comparáveis, causa raiz investigada e aprendizado convertido em procedimento e conhecimento reutilizável.", "to": "f_ok"}, {"t": "Minha parte terminou com a OS concluída — pós-incidente é assunto da engenharia.", "q": "bad", "fb": "O operador é testemunha-chave: sem a visão de quem detectou e conduziu, o post-mortem perde metade dos dados. E a recorrência que VOCÊ notou é justamente o insumo mais valioso.", "to": "f_meio"}, {"t": "Encaminho o caso ao KAM para ele conduzir a análise com o cliente.", "q": "bad", "fb": "O post-mortem é interno e técnico-operacional; o KAM comunica o cliente DEPOIS, com as conclusões. Pular a análise interna é entregar narrativa sem causa raiz.", "to": "f_meio"}]}, "f_ok": {"fim": 1, "tit": "Documentação que gera valor", "txt": "Ocorrência completa, evidências anexadas, OS linkada e aprendizado incorporado à base de conhecimento. O terceiro evento de placa queimada deixou de ser azar e virou investigação de causa sistêmica — porque os registros permitiram enxergar o padrão. Documentar bem é operar melhor no futuro."}, "f_meio": {"fim": 1, "tit": "Registro bom, aprendizado curto", "txt": "A ocorrência ficou bem documentada, mas a recusa em participar do pós-incidente desperdiçou o valor acumulado: o padrão de recorrência que seus registros revelavam ficou sem a narrativa de quem viveu os eventos. Documentação sem análise é arquivo morto."}, "f_ruim": {"fim": 1, "tit": "Memória fresca desperdiçada", "txt": "Adiar o registro corrompeu o dado: horários imprecisos, mensagens de alarme perdidas, sequência de ações reconstruída de memória. A ocorrência virou um relato vago — inútil para causa raiz, frágil em contestação e invisível para os indicadores. Registro é parte da resposta ao incidente, não epílogo opcional."}}}, "cos_x": {"tit": "Sábado, três frentes ao mesmo tempo", "ctx": "15h de sábado, você está sozinho no COS. Em cinco minutos: a usina <b>A</b> some inteira do SCADA (as vizinhas seguem ok); um inversor da usina <b>B</b> marca 0 kW sob sol pleno, sem alarme; e o cliente da usina <b>C</b> liga afirmando que a usina está parada — mas o SCADA a mostra normal.", "start": "a", "nodes": {"a": {"s": "Três eventos, um operador. Como você organiza a resposta?", "o": [{"t": "Triagem primeiro: classifico cada evento por criticidade potencial e impacto antes de agir — a usina A pode ser P1 real ou só telecom; B é perda parcial confirmada; C precisa de validação de dado.", "q": "good", "fb": "Pensamento de COS avançado: sob pressão, a primeira entrega é a priorização correta — não a primeira ação que aparecer.", "to": "b"}, {"t": "Atendo primeiro o cliente da usina C: ele está na linha e a relação comercial vem antes.", "q": "bad", "fb": "O cliente merece resposta — factual e rápida —, mas priorizar pela pressão de quem liga inverte a lógica: a usina A pode estar 100% parada agora.", "to": "b"}, {"t": "Despacho equipes de campo para as três usinas simultaneamente: cobertura total.", "q": "bad", "fb": "Despachar sem triagem queima o recurso mais escasso do sábado. Dois dos três eventos provavelmente se resolvem da mesa — é para isso que existe o COS.", "to": "f_ruim"}]}, "b": {"s": "Usina A: totalmente 'offline' no SCADA, vizinhas operando normalmente. Qual é a leitura?", "o": [{"t": "Suspeito de comunicação: valido por vias independentes (ping, portal do fabricante, contato local) antes de concluir perda de geração.", "q": "good", "fb": "Clássico dominado: usina inteira sumindo com vizinhas ok aponta para link/gateway, não para desligamento real. Validar antes de escalar evita um falso P1.", "to": "c"}, {"t": "Trato como P1 de perda total: telefone imediato ao supervisor e acionamento de emergência do campo.", "q": "bad", "fb": "Escalada prematura: sem validar a comunicação, você pode mobilizar a cadeia inteira de resposta para um roteador travado. Confirme primeiro — leva minutos.", "to": "c"}, {"t": "Dou Ack e aguardo: se for grave, mais alarmes vão aparecer.", "q": "bad", "fb": "Se o link caiu, NENHUM alarme novo daquela usina vai chegar — esperar sinal de um canal mudo é a armadilha perfeita. E se for desligamento real, você perdeu o tempo de resposta.", "to": "f_ruim"}]}, "c": {"s": "Validação concluída: usina A gera normalmente (link caiu — portal do fabricante confirma); o inversor de B está parado de verdade; o medidor de C está com dado congelado. Como você fecha as três frentes?", "o": [{"t": "A: chamado com o provedor + ocorrência de comunicação. B: reset remoto (sem indicação de falha física); se falhar duas vezes, OS de campo com recorrência. C: alinho com Performance sobre o dado e retorno ao cliente com fatos. Tudo registrado.", "q": "good", "fb": "Fechamento integral: cada evento com o tratamento proporcional à sua natureza, cliente respondido com dados validados e trilha completa no registro. COS avançado é isso.", "to": "f_ok"}, {"t": "Resolvo o inversor de B (perda real) e deixo A e C anotados para o turno de segunda-feira.", "q": "bad", "fb": "B era mesmo a prioridade de geração, mas A ficará dois dias sem telemetria e o cliente de C sem resposta — dois passivos evitáveis criados por não fechar o ciclo.", "to": "f_meio"}, {"t": "Aciono o supervisor para decidir as três frentes por mim antes de qualquer ação.", "q": "bad", "fb": "Os três eventos estão dentro da alçada do Nível 0: triagem, chamado de telecom, reset remoto e validação de dado. Escalar sem necessidade congestiona a cadeia — o supervisor entra nos gatilhos da matriz, não no lugar da sua triagem.", "to": "f_meio"}]}, "f_ok": {"fim": 1, "tit": "Mestre do plantão", "txt": "Três eventos, três naturezas, três tratamentos corretos: telecom com chamado ao provedor, falha real com religamento seguro e regra das duas tentativas, dado congelado validado com Performance e cliente respondido com fatos. Triagem, validação, ação proporcional e registro — o ciclo completo do COS num só plantão."}, "f_meio": {"fim": 1, "tit": "Uma frente vencida, duas abandonadas", "txt": "A perda real foi tratada — boa prioridade inicial —, mas deixar a telemetria de A caída e o cliente de C sem retorno até segunda cria riscos desnecessários: dois dias de cegueira operacional e um cliente construindo sozinho a narrativa da falha. Plantão bom fecha ciclos, não só apaga o maior incêndio."}, "f_ruim": {"fim": 1, "tit": "Recursos queimados, tempo perdido", "txt": "Sem triagem e sem validação, o plantão virou reação em cadeia: campo despachado para problema de roteador, escalada esperando sinal de um canal mudo, e a perda real de geração tratada tarde. As ferramentas remotas e o método existem exatamente para evitar este desfecho."}}}, "cultura": {"tit": "O prazo, o cliente e o valor nº 1", "ctx": "Sexta-feira, 16h30. Sua turma está fechando uma corretiva P2 que vence hoje. O cliente já ligou duas vezes cobrando. Ao montar o cenário do serviço, você percebe que o ponto de trabalho exige uma condição que <b>não estava prevista na APR</b> feita de manhã.", "start": "a", "nodes": {"a": {"s": "O relógio corre e o SLA vence às 18h. O que você faz?", "o": [{"t": "Paro a atividade, chamo o líder e refaço a APR para a condição nova antes de continuar.", "q": "good", "fb": "Exato. Segurança é o valor nº 1 e é inegociável: risco novo = análise nova. O SLA importa, mas nunca acima da integridade da equipe.", "to": "b"}, {"t": "Sigo com cuidado redobrado — a equipe é experiente e falta pouco para terminar.", "q": "bad", "fb": "\"Cuidado redobrado\" não substitui análise de risco. É exatamente nesse improviso de fim de tarde que os acidentes acontecem.", "to": "b"}, {"t": "Ligo para o cliente pedindo mais prazo antes de decidir qualquer coisa em campo.", "q": "ok", "fb": "Comunicar é bom, mas a ordem está invertida: primeiro se garante a segurança (parar e reavaliar), depois se trata o prazo — e quem negocia SLA com o cliente é o KAM/coordenação.", "to": "b"}]}, "b": {"s": "A APR foi refeita e a tarefa concluída com segurança, mas o SLA estourou em 40 minutos. Como você registra o serviço na OS?", "o": [{"t": "Registro tudo como foi: a condição nova, a parada para reavaliação e o motivo do atraso, com fotos antes/depois.", "q": "good", "fb": "Dado confiável é um valor da Grid: o registro honesto explica o atraso, protege a equipe e vira aprendizado para as próximas OS.", "to": "c"}, {"t": "Registro o serviço concluído e ajusto o horário para dentro do SLA — foram só 40 minutos.", "q": "bad", "fb": "Maquiar horário destrói a confiança no dado. Uma OS 'bonita' e falsa vale menos que uma OS atrasada e verdadeira.", "to": "c"}, {"t": "Fecho a OS só com 'serviço concluído' e explico os detalhes verbalmente ao líder.", "q": "bad", "fb": "O que não está na OS não existe: auditoria, garantia e indicadores dependem do registro escrito, não da memória de ninguém.", "to": "c"}]}, "c": {"s": "Na segunda-feira, o coordenador pergunta na reunião o que houve com o SLA. Um colega sugere: \"diz que foi chuva, ninguém confere\". Você:", "o": [{"t": "Apresenta o que registrou: condição não prevista, parada de segurança e reavaliação — e sugere revisar a APR padrão daquela atividade.", "q": "good", "fb": "Postura de dono do ativo: transparência + proposta de melhoria. O time aprende e a próxima equipe não cai na mesma armadilha.", "to": "f_ok"}, {"t": "Confirma a versão da chuva para proteger a equipe do desgaste.", "q": "bad", "fb": "Mentir em reunião corrói os valores todos de uma vez: segurança, dado confiável e trabalho em equipe. E uma mentira descoberta custa muito mais que um SLA estourado.", "to": "f_ruim"}, {"t": "Diz apenas que 'houve um imprevisto operacional' e muda de assunto.", "q": "ok", "fb": "Não é mentira, mas esconde o aprendizado. A parada de segurança foi uma decisão certa — contá-la fortalece a cultura, não enfraquece.", "to": "f_meio"}]}, "f_ok": {"fim": 1, "tit": "Cultura na prática", "txt": "Você viveu os valores na sequência certa: segurança acima do prazo, registro honesto e transparência com proposta de melhoria. É assim que um SLA estourado vira aprendizado — e não um precedente perigoso."}, "f_meio": {"fim": 1, "tit": "Quase lá", "txt": "As decisões de campo foram corretas, mas a comunicação tímida desperdiçou o aprendizado. Cultura forte se constrói contando as decisões difíceis — especialmente as que deram certo."}, "f_ruim": {"fim": 1, "tit": "Valores em curto-circuito", "txt": "A execução foi segura, mas a mentira na reunião apagou tudo: o dado deixou de ser confiável e o exemplo dado à equipe foi o pior possível. Na Grid, transparência não é opcional — é o que sustenta os outros valores."}}}, "seguranca": {"tit": "A cabine que 'já estava desligada'", "ctx": "Corretiva em um inversor central: o disjuntor de MT foi aberto pela manhã por outra equipe. Seu colega, experiente, diz: <b>\"a cabine já está morta, o pessoal desligou cedo — bora direto, que dá tempo de pegar a estrada antes de escurecer\"</b>.", "start": "a", "nodes": {"a": {"s": "Antes de tocar em qualquer terminal, o que você faz?", "o": [{"t": "Aplico meu próprio bloqueio LOTO, testo ausência de tensão com o detector e só então libero o trabalho.", "q": "good", "fb": "Regra de ouro: bloqueio próprio + teste de ausência de tensão, sempre. 'Alguém desligou' não é condição segura — é boato até prova em contrário.", "to": "b"}, {"t": "Confiro no SCADA com o COS que o disjuntor está aberto e sigo — o sistema confirma o estado.", "q": "ok", "fb": "Confirmar com o COS agrega, mas telemetria não substitui LOTO nem teste local de ausência de tensão. O sistema mostra o disjuntor; não mostra retorno de tensão, indução ou religamento indevido.", "to": "b"}, {"t": "Sigo direto — a equipe da manhã é de confiança e o tempo está curto.", "q": "bad", "fb": "Confiança não segura arco elétrico. Sem bloqueio próprio e teste, você está apostando a vida na memória de outra equipe.", "to": "b"}]}, "b": {"s": "Bloqueio feito e ausência de tensão confirmada. Na hora de emitir a PT, o colega sugere aproveitar a PT genérica da manhã, \"que ainda vale\". Você:", "o": [{"t": "Emito a PT específica para esta intervenção, com a APR revisada para as condições de agora.", "q": "good", "fb": "PT é da tarefa, não do dia. Condições mudam (clima, equipe, energização parcial) — a permissão tem que refletir o trabalho real que vai acontecer.", "to": "c"}, {"t": "Uso a PT da manhã, mas anexo uma observação com o novo horário e escopo.", "q": "bad", "fb": "PT remendada é PT inválida. Se algo der errado, a permissão não descreve nem a equipe nem a tarefa executada — e isso tem consequência legal e, pior, física.", "to": "c"}, {"t": "Dispenso a PT porque o circuito já está bloqueado e testado.", "q": "bad", "fb": "LOTO e PT não se substituem: um garante a desenergização, o outro formaliza autorização, riscos e responsáveis. Em MT, os dois são obrigatórios.", "to": "c"}]}, "c": {"s": "Serviço concluído. Começa a chover e o colega quer energizar logo para ir embora. A verificação final de proteções e aterramento ainda não foi feita. Você:", "o": [{"t": "Concluo a verificação completa (proteções, aterramento, ferramentas fora, pessoal afastado) antes de qualquer energização.", "q": "good", "fb": "Energizar é o momento mais crítico do dia. Checklist completo, área liberada e só então religar — chuva nenhuma justifica pular a verificação.", "to": "f_ok"}, {"t": "Faço uma verificação visual rápida dos pontos principais e energizo — o resto confere depois.", "q": "bad", "fb": "Proteção reprovada ou aterramento esquecido descobertos 'depois' significam equipamento danificado ou gente ferida. Verificação parcial não existe.", "to": "f_meio"}, {"t": "Deixo tudo pronto mas espero a chuva passar para energizar, mesmo atrasando a saída.", "q": "ok", "fb": "Prudência válida se houver risco real com o tempo — mas o essencial não é a chuva, é completar a verificação. Com checklist completo e condições controladas, a energização pode seguir o procedimento normal.", "to": "f_ok"}]}, "f_ok": {"fim": 1, "tit": "Ninguém se machucou — por método, não por sorte", "txt": "Bloqueio próprio, teste de ausência de tensão, PT específica e verificação completa antes de energizar. O serviço saiu, a equipe voltou inteira e o registro sustenta tudo. Segurança não atrasa o trabalho: ela garante que ele termine bem."}, "f_meio": {"fim": 1, "tit": "Terminou bem — desta vez", "txt": "A energização com verificação parcial não cobrou o preço hoje, mas o método falhou. Arco elétrico não dá segundo aviso: reveja o checklist de energização e trate cada religamento como o momento mais perigoso do dia."}, "f_ruim": {"fim": 1, "tit": "Aposta perdida", "txt": "Trabalhar em MT sem bloqueio próprio, sem teste e sem PT válida é apostar contra o arco elétrico — uma aposta que ninguém vence duas vezes. Pare, releia as regras de ouro e lembre: nenhum prazo vale uma vida."}}}, "processos": {"tit": "Da usina parada ao chamado de garantia", "ctx": "09h15. O COS detecta uma usina com <b>geração zerada</b>. Tentou religamento remoto duas vezes: sem sucesso. O inversor central indica falha interna e <b>está dentro do prazo de garantia do fabricante</b>. Você é acionado para a sequência do atendimento.", "start": "a", "nodes": {"a": {"s": "O religamento remoto falhou. Qual é o próximo passo correto do fluxo?", "o": [{"t": "Abrir a OS corretiva como P1 (4 h) e despachar o campo com a PT adequada.", "q": "good", "fb": "Usina parada = P1 Crítico, SLA de 4 horas. Falhou o remoto, o fluxo segue imediatamente para OS e mobilização do campo.", "to": "b"}, {"t": "Registrar como P2 (24 h), já que o COS ainda pode tentar mais religamentos ao longo da manhã.", "q": "ok", "fb": "Insistir no remoto pode acontecer em paralelo, mas a classificação não espera: geração zerada é P1 pelo contrato. Subclassificar para 'ganhar prazo' estoura o SLA real.", "to": "b"}, {"t": "Acionar direto o fabricante, já que o inversor está em garantia.", "q": "bad", "fb": "A garantia entra depois do diagnóstico em campo. Antes é preciso abrir a OS, mobilizar e confirmar a falha — o fabricante não atende usina parada em 4 horas.", "to": "b"}]}, "b": {"s": "Em campo, o diagnóstico confirma módulo de potência queimado — peça coberta pela garantia. Há um módulo compatível no almoxarifado. O técnico sugere trocar logo para religar a usina. Você:", "o": [{"t": "Registra evidências completas (fotos, códigos de erro, nº de série, posição) e abre o chamado de garantia via Controller antes de qualquer troca.", "q": "good", "fb": "Equipamento em garantia: não trocar por conta própria. Evidência + chamado ao fabricante preservam a cobertura; troca sem autorização pode anular a garantia e virar custo Grid.", "to": "c"}, {"t": "Autoriza a troca imediata para religar e depois negocia com o fabricante o reembolso da peça.", "q": "bad", "fb": "Troca sem autorização do fabricante costuma anular a garantia. O SLA importa, mas o fluxo de garantia existe exatamente para proteger esse custo.", "to": "c"}, {"t": "Deixa o técnico aguardando no local enquanto o fabricante responde o chamado.", "q": "bad", "fb": "Equipe parada no campo é desperdício: o chamado segue via Controller com as evidências, e a equipe é liberada ou realocada conforme a resposta do fabricante.", "to": "c"}]}, "c": {"s": "O fabricante autorizou a substituição, executada no dia seguinte. No fechamento da OS, o registro correto inclui:", "o": [{"t": "Descrição completa, fotos antes/depois, leituras, nº de série e posição da peça nova e da removida, e vínculo com o chamado de garantia.", "q": "good", "fb": "É esse registro que sustenta a garantia, os indicadores e o histórico do ativo. OS de troca sem nº de série e posição é dado perdido.", "to": "f_ok"}, {"t": "Descrição resumida e as fotos — os números de série ficam no chamado do fabricante.", "q": "ok", "fb": "Quase: as evidências do chamado não substituem o registro na OS. O Fracttal é a fonte do histórico do ativo — se o dado só existe no e-mail do fabricante, o ativo 'perde' a memória.", "to": "f_meio"}, {"t": "Fechar rápido com 'inversor normalizado' para não estourar ainda mais o prazo.", "q": "bad", "fb": "OS sem evidência é retrabalho garantido: sem histórico, a próxima falha recomeça do zero e a garantia fica indefensável.", "to": "f_ruim"}]}, "f_ok": {"fim": 1, "tit": "Fluxo completo, garantia preservada", "txt": "P1 bem classificado, campo mobilizado no prazo, garantia protegida com evidências e OS fechada com dado completo. O contrato foi cumprido e o custo da peça ficou onde deveria: com o fabricante."}, "f_meio": {"fim": 1, "tit": "Atendeu, mas o dado ficou pela metade", "txt": "A usina voltou e a garantia foi acionada, mas o histórico do ativo ficou incompleto no Fracttal. Na próxima falha — ou na auditoria da garantia — alguém vai pagar o preço dessa lacuna. Registro completo é parte do serviço, não burocracia."}, "f_ruim": {"fim": 1, "tit": "Usina voltou, processo quebrou", "txt": "No improviso, a garantia ficou vulnerável e o registro não sustenta nada. O que parecia agilidade virou risco de custo (peça + anulação de garantia) e dado imprestável. O fluxo SS/OS/garantia existe para proteger exatamente disso."}}}, "confiab": {"tit": "O inversor que 'resolvia com reset'", "ctx": "Um inversor de string da sua rota desarma por sobretemperatura. O reset resolve — é a <b>quarta vez em 25 dias</b>. Cada OS anterior foi fechada como \"normalizado após reset\", sem mais detalhes. Hoje você está de novo na frente dele.", "start": "a", "nodes": {"a": {"s": "O reset funcionaria de novo em 5 minutos. O que você faz?", "o": [{"t": "Reseto para recuperar a geração, mas registro a recorrência (4x/25 dias) e escalo para a Engenharia como candidato a N2.", "q": "good", "fb": "Exato: ≥2 falhas em 30 dias no mesmo ativo é falha recorrente — o reset trata o sintoma, o escalonamento trata a causa. As duas coisas juntas.", "to": "b"}, {"t": "Reseto e aproveito para limpar filtros e conferir as ventoinhas antes de sair, registrando tudo na OS.", "q": "ok", "fb": "Boa iniciativa N1 — ventilação é uma causa comum de sobretemperatura. Mas sem registrar a recorrência e escalar, a investigação estrutural não acontece: se a causa for outra (dimensionamento, lote, instalação), você volta aqui semana que vem.", "to": "b"}, {"t": "Reseto e sigo a rota — o procedimento funcionou nas outras vezes.", "q": "bad", "fb": "Quarta falha em 25 dias não é coincidência, é padrão. Repetir o reset eternamente é enxugar gelo com hora extra.", "to": "b"}]}, "b": {"s": "A Engenharia abre a RCA e pede a sua contribuição. O que mais ajuda a análise?", "o": [{"t": "Histórico das 4 OS, horários e temperatura ambiente das falhas, fotos da instalação e das ventoinhas, e leituras do inversor.", "q": "good", "fb": "É disso que a RCA vive: evidência e contexto. Padrão de horário + condição ambiente + estado físico apontam a causa muito mais rápido que opinião.", "to": "c"}, {"t": "Minha hipótese fechada: 'é defeito de fabricação, precisa trocar' — para acelerar a conclusão.", "q": "bad", "fb": "Hipótese sem evidência contamina a análise. A RCA precisa dos dados brutos; a conclusão vem deles, não antes deles.", "to": "c"}, {"t": "Apenas os números das OS — o resto a Engenharia encontra no sistema.", "q": "bad", "fb": "As OS dizem 'normalizado após reset' — quase nada. O contexto que só o campo tem (instalação, ambiente, horários) é justamente o que falta no sistema.", "to": "c"}]}, "c": {"s": "A RCA conclui: ventilação obstruída por poeira sazonal + setpoint de alarme conservador. Ações executadas. Um mês depois, o mesmo modelo começa a desarmar em duas outras usinas da região. Você:", "o": [{"t": "Sinaliza à Engenharia a possível causa sistêmica e sugere replicar a solução (limpeza programada + ajuste de setpoint) como padrão preventivo.", "q": "good", "fb": "Melhoria que funcionou vira padrão — esse é o fim certo do ciclo de confiabilidade. Mesma falha, mesmo modelo, região parecida: replicar antes que vire backlog.", "to": "f_ok"}, {"t": "Trata cada usina como caso novo e espera as RCAs individuais chegarem à mesma conclusão.", "q": "ok", "fb": "Rigor é bom, mas redescobrir a mesma causa três vezes desperdiça o aprendizado. A RCA existente é o ponto de partida — valida-se rápido e replica-se a solução.", "to": "f_meio"}, {"t": "Não conecta os eventos — cada usina tem seu contexto e sua equipe.", "q": "bad", "fb": "Enxergar padrão entre ativos é exatamente o que separa manutenção reativa de engenharia de confiabilidade. A conexão perdida custa MTBF em três usinas.", "to": "f_ruim"}]}, "f_ok": {"fim": 1, "tit": "Ciclo de confiabilidade completo", "txt": "Sintoma tratado, recorrência escalada, RCA alimentada com evidência de campo e solução replicada como padrão. O MTBF sobe, o backlog cai e o conhecimento ficou na empresa — não na cabeça de uma pessoa."}, "f_meio": {"fim": 1, "tit": "Aprendizado desperdiçado", "txt": "A análise foi certa, mas o conhecimento não circulou: cada usina repetiu o caminho do zero. Confiabilidade é também gestão do aprendizado — RCA concluída que não vira padrão é relatório de gaveta."}, "f_ruim": {"fim": 1, "tit": "Enxugando gelo", "txt": "Sem conectar recorrências, o time seguiu tratando sintomas: resets somando, geração pingando e a causa-raiz intacta. Falha que repete é dado gritando — alguém precisa ouvir e escalar."}}}, "lider_x": {"tit": "Dois P1, uma turma e um atalho perigoso", "ctx": "07h40, DDS recém-concluído. Chegam <b>dois P1 quase simultâneos</b>: a usina A está com geração zerada (religamento remoto falhou) e na usina B há um disjuntor de MT desarmado com <b>relato de cheiro de queimado na cabine</b>. Você tem uma turma completa e um técnico avulso disponível.", "start": "a", "nodes": {"a": {"s": "Como líder, como você despacha?", "o": [{"t": "Turma completa para a usina B (risco potencial na cabine, exige dupla em MT); técnico avulso inicia o deslocamento para A; alinho prioridades com o Coordenador de O&M.", "q": "good", "fb": "Priorização por risco antes de SLA: indício de falha térmica em cabine é segurança. MT nunca sozinho — a dupla vai para B. E a coordenação fica no circuito desde o início.", "to": "b"}, {"t": "Turma para a usina A (geração zerada = perda maior) e o técnico avulso para B, só para inspecionar a cabine por fora sem intervir.", "q": "ok", "fb": "Defensável se a inspeção de B for realmente só externa e o risco contido — mas indício de queimado em cabine tende a exigir dupla e prioridade: se algo evoluir, o avulso sozinho não pode agir e você perde o tempo de resposta.", "to": "b"}, {"t": "Divido a turma: metade para cada usina, resolvendo os dois P1 em paralelo.", "q": "bad", "fb": "Dividir a turma pode deixar alguém sozinho em MT — violação direta da regra de ouro. Velocidade nunca justifica quebrar a barreira de segurança.", "to": "b"}]}, "b": {"s": "Na usina B, a turma quer 'dar uma olhada rápida' na cabine antes da APR, para adiantar o diagnóstico. Você:", "o": [{"t": "Não autorizo: APR primeiro, com a condição específica (possível falha térmica), depois abertura com EPIs e método.", "q": "good", "fb": "Cheiro de queimado = risco elevado de falha em evolução. É exatamente o cenário em que a APR salva vidas. O líder que 'libera só uma olhadinha' ensina a equipe a improvisar.", "to": "c"}, {"t": "Autorizo somente uma inspeção visual externa (termovisor à distância) enquanto preparo a APR.", "q": "ok", "fb": "Inspeção externa sem abrir a cabine, com distância segura, é aceitável — mas exige critério claro do que é 'externo' e disciplina para parar ali. O risco é o limite escorregar no calor do atendimento.", "to": "c"}, {"t": "Autorizo — são 5 minutos e a equipe é experiente.", "q": "bad", "fb": "Abrir cabine com suspeita de falha térmica sem APR é o tipo de atalho que aparece em relatório de acidente. Experiência não blinda contra arco.", "to": "c"}]}, "c": {"s": "Fim do dia: as duas usinas normalizadas. Na validação, a OS da usina A vem sem foto do 'depois' e sem confirmação de retomada de geração; o técnico jura que normalizou. Você:", "o": [{"t": "Devolvo a OS para completar evidências e confirmo a normalização pelo COS/SCADA antes de aprovar.", "q": "good", "fb": "Validar qualidade é o papel-chave do líder: reparo correto + evidência completa + normalização confirmada. OS aprovada 'no fiado' é retrabalho e indicador falso.", "to": "f_ok"}, {"t": "Aprovo — o técnico é confiável — e peço para caprichar nas próximas.", "q": "bad", "fb": "Aprovar sem evidência normaliza o desvio: em um mês, metade das OS vem incompleta. E se a geração não retomou de fato, o P1 'fechado' vai reabrir amanhã — como retrabalho seu.", "to": "f_meio"}, {"t": "Eu mesmo completo a OS com prints do SCADA para agilizar o fechamento.", "q": "bad", "fb": "Corrigir por fora esconde o problema e vicia o processo: o executante nunca aprende o padrão e o líder vira despachante de evidência. Devolver e orientar é o caminho.", "to": "f_meio"}]}, "f_ok": {"fim": 1, "tit": "Liderança que segura o padrão", "txt": "Despacho por risco, APR sem atalho e validação de verdade no fechamento. Dois P1 resolvidos com a turma inteira e o dado confiável. É essa constância — especialmente sob pressão — que faz o padrão do cluster ser o seu padrão."}, "f_meio": {"fim": 1, "tit": "Atendeu, mas o padrão cedeu", "txt": "As usinas voltaram, mas a validação frouxa plantou o problema de amanhã: OS incompletas viram norma, indicadores mentem e o retrabalho volta para a sua mesa. Liderar é sustentar o padrão justamente quando aprovar 'no fiado' parece inofensivo."}, "f_ruim": {"fim": 1, "tit": "A conta chega", "txt": "Atalhos de segurança e validação de fachada podem passar despercebidos num dia bom. Num dia ruim, viram acidente, P1 reaberto e auditoria sem resposta. Reveja as regras de ouro e o checklist de validação — o cluster segue o exemplo do
