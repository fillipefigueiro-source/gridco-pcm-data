<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grid Co. Academy — O&M</title>
<style>
:root{--navy:#191528;--lime:#A9DB21;--gray:#504C63;--ink:#23202E;--bg:#eef0f4;--ok:#2E7D32;--bad:#C0392B}
*{box-sizing:border-box;font-family:Arial,Segoe UI,system-ui,sans-serif}html,body{margin:0;background:var(--bg);color:var(--ink)}.hide{display:none!important}
#login{min-height:100vh;background:linear-gradient(135deg,#191528,#241a3c);display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{background:#fff;border-radius:18px;max-width:440px;width:100%;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.lcard img{height:32px;margin-bottom:14px}.lcard h1{font-size:22px;color:var(--navy);margin:0}.lcard h1 b{color:#7cb518}.lcard .sub{color:var(--gray);font-size:13px;margin:2px 0 18px}
.msbtn{display:flex;align-items:center;gap:10px;width:100%;justify-content:center;background:#2F2F2F;color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer}.msbtn:hover{background:#000}
.msnote{font-size:11px;color:var(--gray);margin:8px 0 14px;text-align:center}.divider{display:flex;align-items:center;gap:10px;color:#aaa;font-size:12px;margin:4px 0 12px}.divider:before,.divider:after{content:"";flex:1;height:1px;background:#e2e6ec}
label{display:block;font-size:12px;color:var(--gray);font-weight:700;margin:10px 0 4px}input,select{width:100%;padding:11px;border:1px solid #d7dee7;border-radius:9px;font-size:14px;background:#fff}
.gbtn{background:var(--lime);color:var(--navy);border:none;border-radius:9px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:14px}.gbtn:hover{filter:brightness(.96)}
.glink{display:block;text-align:center;margin-top:12px;color:#9fb0c0;font-size:12px;cursor:pointer;text-decoration:underline}
#topbar{background:var(--navy);color:#fff;display:flex;align-items:center;gap:14px;padding:10px 20px;position:sticky;top:0;z-index:5}#topbar img{height:24px}.sp{flex:1}
.pill{background:#2a2440;border-radius:20px;padding:4px 12px;font-size:12px;display:flex;align-items:center;gap:6px}.pill b{color:var(--lime)}#topbar button{background:transparent;border:1px solid #3a3550;color:#cdd3dd;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer}
.wrap{max-width:1040px;margin:0 auto;padding:22px 20px 60px}
.hero{color:#fff;border-radius:16px;padding:22px 24px;margin-bottom:18px}.hero .k{font-weight:700;font-size:12px;opacity:.85}.hero h2{margin:6px 0 4px;font-size:24px}.hero p{margin:0;font-size:13px;opacity:.9}
.prog{height:12px;background:rgba(255,255,255,.2);border-radius:8px;overflow:hidden;margin-top:16px}.prog span{display:block;height:100%;background:var(--lime);width:0}.progtxt{font-size:12px;opacity:.9;margin-top:6px}
.badges{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.badge{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:30px;padding:6px 12px;font-size:12px;font-weight:700;color:#fff;opacity:.4}.badge.on{opacity:1;background:#fff;color:var(--navy)}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.sec-title{font-size:13px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.mcard{background:#fff;border:1px solid #e6e9ee;border-radius:14px;padding:16px;cursor:pointer;transition:.15s;position:relative}.mcard:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(25,21,40,.12)}.mcard .ic{font-size:26px}.mcard h3{margin:8px 0 4px;font-size:15px;color:var(--navy)}.mcard .meta{font-size:11.5px;color:var(--gray)}
.st{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}.st.todo{background:#eef0f4;color:var(--gray)}.st.done{background:#e7f3e9;color:var(--ok)}
.eixo{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:8px}.eixo.tecnico{background:#e9f0fb;color:#2E5FBF}.eixo.processos{background:#fdf1e3;color:#b06a00}.eixo.cultura{background:#f4e9f6;color:#7A1FA2}
.aptotag{display:inline-block;font-size:10px;font-weight:700;background:#e7f3e9;color:#1F7A3D;border-radius:10px;padding:2px 8px;margin-top:8px;margin-left:6px}
.panel{background:#fff;border:1px solid #e6e9ee;border-radius:14px;padding:24px;margin-bottom:16px}
.back{background:none;border:none;color:var(--gray);font-size:13px;cursor:pointer;margin-bottom:8px}
.acc{border:1px solid #eef0f4;border-radius:10px;margin:10px 0;overflow:hidden}.acc h4{margin:0;padding:13px 16px;background:#fafbfc;cursor:pointer;font-size:14px;color:var(--navy);display:flex;justify-content:space-between}.acc .body{padding:8px 16px 14px;font-size:13.5px;line-height:1.55}.acc .body ul{margin:6px 0 6px 18px}.acc .body li{margin:3px 0}.acc .body svg{margin:8px 0;display:block}
.vid{background:#f4f5f7;border:1px dashed #c7d0dd;border-radius:12px;padding:16px;margin:10px 0;text-align:center}.vid .tip{font-size:12.5px;color:var(--gray);margin-bottom:8px}
.recbanner{background:#fff7e6;border:1px solid #E8A317;border-radius:10px;padding:10px 14px;margin:10px 0;font-size:13px;color:#8a5a00;font-weight:700}
.qbox{border:1px solid #e6e9ee;border-radius:12px;padding:16px;margin:12px 0;background:#fcfcfd}.qbox .q{font-weight:700;color:var(--navy);margin-bottom:8px}
.opt{display:block;border:1px solid #d7dee7;border-radius:9px;padding:10px 12px;margin:6px 0;cursor:pointer;font-size:13.5px}.opt:hover{background:#f6f8ea}.opt.sel{border-color:var(--navy);background:#f1f0f6}.opt.correct{border-color:var(--ok);background:#e7f3e9}.opt.wrong{border-color:var(--bad);background:#fbeaea}
.result{padding:14px 16px;border-radius:10px;margin-top:12px;font-weight:700}.result.ok{background:#e7f3e9;color:var(--ok)}.result.bad{background:#fbeaea;color:var(--bad)}.result.warn{background:#fff7e6;color:#8a5a00}
table{width:100%;border-collapse:collapse;font-size:12.5px}th,td{border-bottom:1px solid #eef0f4;padding:8px 10px;text-align:left}th{background:#191528;color:#fff}.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}.tag.ap{background:#e7f3e9;color:var(--ok)}.tag.re{background:#fbeaea;color:var(--bad)}
#cert .sheet{background:#fff;border:6px solid var(--navy);border-radius:8px;max-width:760px;margin:0 auto;padding:40px;text-align:center}#cert .sheet img{height:34px;filter:invert(.85)}#cert h2{color:var(--navy);font-size:27px;margin:16px 0 6px}.nome{font-size:30px;color:var(--navy);font-weight:700;border-bottom:2px solid var(--lime);display:inline-block;padding:0 20px 6px;margin:10px 0}
.scores{display:flex;gap:14px;justify-content:center;margin:18px 0;flex-wrap:wrap}.sc{background:#f4f5f7;border-radius:10px;padding:12px 18px;min-width:110px}.sc b{display:block;font-size:22px;color:var(--navy)}.sc span{font-size:12px;color:var(--gray)}
@media print{#topbar,.noprint{display:none!important}body{background:#fff}}
.bookwrap{max-width:820px;margin:0 auto;text-align:left}.bookchap{border-top:1px solid #eef0f4;padding:12px 0}.bookchap h3{margin:0 0 6px;color:var(--navy);font-size:16px}.bookchap p{line-height:1.6;margin:6px 0}.bookchap ul{margin:6px 0 6px 20px;line-height:1.6}.bookchap b{color:var(--navy)}
.cen-card{display:flex;gap:12px;align-items:center;border:1px solid #e0e7f0;border-radius:12px;padding:12px 14px;margin:10px 0;cursor:pointer;transition:.15s}.cen-card:hover{border-color:#ff7a1a;background:#fafcff}.cen-num{width:34px;height:34px;flex:0 0 34px;border-radius:9px;background:#0f2f5c;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}.cen-t{font-weight:600}.cen-d{font-size:12.5px;color:#5b6b7d}.cen-done{margin-left:auto;font-size:12px;font-weight:700;color:#1f7a3d}.cen-box{border:1px solid #e0e7f0;border-radius:14px;overflow:hidden;margin-top:12px}.cen-ctx{background:linear-gradient(120deg,#0f2f5c,#12467e);color:#fff;padding:16px 18px}.cen-ctx b{color:#ffd9b0}.cen-stage{padding:18px}.cen-sit{font-size:16px;font-weight:600;margin-bottom:6px}.cen-meta{font-size:12.5px;color:#5b6b7d;margin-bottom:12px}.cen-opt{display:block;width:100%;text-align:left;background:#f7f9fc;border:1.5px solid #dbe3ee;border-radius:10px;padding:12px 14px;margin:8px 0;cursor:pointer;font-size:14.5px}.cen-opt:hover{border-color:#ff7a1a;background:#fff}.cen-fb{border-radius:10px;padding:12px 14px;margin:10px 0;font-size:14px}.cen-fb.good{background:#eaf6ee;border:1px solid #bfe3cb}.cen-fb.ok{background:#fef7e6;border:1px solid #f0dca6}.cen-fb.bad{background:#fbeae8;border:1px solid #f0c3bd}.cen-prog{height:6px;background:#e6ebf2;border-radius:5px;margin:10px 0;overflow:hidden}.cen-prog i{display:block;height:100%;background:#ff7a1a;width:0;transition:.3s}.cen-badge{display:inline-block;font-size:12px;font-weight:700;padding:2px 8px;border-radius:12px;background:#eef2f7;color:#12467e}

.tec-vid{width:100%;aspect-ratio:16/9;border:0;border-radius:12px;margin:6px 0 2px}.tec-ref{font-size:13px;color:#41506a}.tec-ref a{color:#12467e}

.trilha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}.trilha-card{background:#fff;border:1px solid #e0e7f0;border-radius:14px;padding:16px;cursor:pointer;transition:.15s;box-shadow:0 2px 8px #0000000d}.trilha-card:hover{transform:translateY(-2px);box-shadow:0 10px 22px #0f2f5c22}.tc-ic{font-size:30px;line-height:1}.tc-nome{font-weight:700;color:#0f2f5c;margin-top:8px;font-size:15px}.tc-niv{font-size:12px;color:#5b6b7d;margin-bottom:10px}.tc-bar{height:6px;background:#e6ebf2;border-radius:5px;overflow:hidden}.tc-bar i{display:block;height:100%}.tc-pct{font-size:12px;color:#5b6b7d;margin-top:5px}

.mh-nav{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.mh-nb{flex:1;min-width:150px;border:1.5px solid #e0e7f0;border-radius:12px;padding:9px 11px;cursor:pointer;background:#fff;text-align:left;font-size:13px}.mh-nb.on{border-color:#ff7a1a;background:#fff7f0}.mh-nb.lock{opacity:.55;cursor:not-allowed}.mh-nb b{display:block;color:#0f2f5c}.mh-nb span{font-size:11.5px;color:#5b6b7d}.mh-prog{height:7px;background:#e6ebf2;border-radius:5px;overflow:hidden;margin:8px 0}.mh-prog i{display:block;height:100%;background:#ff7a1a}.lockmsg{background:#f4f7fb;border:1px dashed #cfd9e6;border-radius:12px;padding:20px;text-align:center;color:#5b6b7d}.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:600px){.vgrid{grid-template-columns:1fr}}.vcard{border:1px solid #e0e7f0;border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;display:block}

.doccard{border:0.5px solid #e0e7f0;border-radius:12px;padding:12px 14px;margin-bottom:10px;background:#fff}.cfgrow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;border:0.5px solid #e0e7f0;border-radius:10px;padding:9px 12px;margin:6px 0}.cfgadd{display:flex;flex-direction:column;gap:6px;margin-top:8px}.cfgadd input{padding:8px 10px;border:1px solid #dbe3ee;border-radius:8px;font-size:13px}
</style></head><body>

const D={"mod":{"cultura": {"titulo": "Cultura & Valores Grid", "icone": "🤝", "eixo": "cultura", "dur": "10 min", "video": "", "videoTip": "Vídeo institucional da Grid / boas-vindas do gestor", "secoes": [{"t": "Quem somos", "h": "<p>Somos uma empresa de <b>O&M de usinas fotovoltaicas</b>. Mantemos os ativos dos clientes <b>gerando com segurança, disponibilidade e performance</b>.</p>"}, {"t": "Valores", "h": "<ul><li><b>Segurança é inegociável.</b></li><li><b>Dono do ativo</b> — cuidamos da usina como se fosse nossa.</li><li><b>Dado confiável</b> — OS bem preenchida sustenta as decisões.</li><li><b>Trabalho em equipe</b> — campo, COS, PCM e engenharia, um só time.</li><li><b>Cliente no centro.</b></li></ul>"}, {"t": "Como o O&M se organiza", "h": "<p>Turmas <b>volantes por cluster</b> (técnico/eletricista/mantenedor) → <b>Líder de campo</b> → <b>Coordenador de O&M</b>. O <b>COS</b> monitora 24/7; o <b>PCM</b> planeja e controla as OS; a <b>Engenharia</b> ataca causas-raiz.</p>"}], "quiz": [{"q": "Qual é o valor número 1 da Grid?", "o": ["Velocidade", "Segurança inegociável", "Custo mínimo"], "c": 1, "e": "cultura"}, {"q": "Preencher bem a OS reflete qual valor?", "o": ["Dado confiável", "Hierarquia", "Velocidade"], "c": 0, "e": "cultura"}, {"q": "Como o campo é organizado?", "o": ["1 pessoa fixa por usina", "Turmas volantes por cluster", "Sem coordenação"], "c": 1, "e": "cultura"}, {"q": "Quem monitora as usinas 24/7?", "o": ["O PCM", "O COS", "O cliente"], "c": 1, "e": "cultura"}, {"q": "\"Dono do ativo\" significa:", "o": ["Cuidar da usina como se fosse nossa", "Ser o proprietário legal", "Cobrar do cliente"], "c": 0, "e": "cultura"}, {"q": "Diante de um risco não previsto, a postura correta é:", "o": ["Continuar", "Parar e acionar o líder", "Improvisar"], "c": 1, "e": "cultura"}, {"q": "Quem ataca as causas-raiz das falhas recorrentes?", "o": ["O cliente", "A Engenharia (com o PCM)", "Ninguém"], "c": 1, "e": "cultura"}, {"q": "O cliente no centro significa:", "o": ["SLA e satisfação guiam as prioridades", "Atender só quando sobra tempo", "Ignorar prazos"], "c": 0, "e": "cultura"}, {"q": "Trabalho em equipe na Grid:", "o": ["Cada área isolada", "Campo, COS, PCM e engenharia como um time", "Só o campo importa"], "c": 1, "e": "cultura"}, {"q": "Um colega vai executar sem APR. Você:", "o": ["Deixa, não é problema seu", "Alerta e não deixa começar sem APR", "Ajuda a improvisar"], "c": 1, "e": "cultura"}]}, "seguranca": {"titulo": "Segurança do Trabalho", "icone": "🦺", "eixo": "cultura", "dur": "15 min", "video": "", "videoTip": "Vídeo de APR/PT e uso de EPIs em campo (Grid)", "secoes": [{"t": "NRs aplicáveis", "h": "<ul><li><b>NR10 / NR10-SEP</b> — eletricidade e sistema elétrico de potência (MT).</li><li><b>NR35</b> — trabalho em altura.</li><li><b>NR12</b> — máquinas (trackers).</li><li><b>NR06</b> — EPIs.</li></ul>"}, {"t": "APR e PT", "h": "<p><b>APR</b> (Análise Preliminar de Risco) e <b>PT</b> (Permissão de Trabalho) são obrigatórias <b>antes</b> de intervir. Em MT, o religamento exige PT específica (cabine/inversor/usina).</p>"}, {"t": "Regras de ouro", "h": "<ul><li><b>LOTO</b> — bloqueio e etiquetagem.</li><li>Distâncias de segurança em MT; respeitar a zona de risco.</li><li><b>Nunca sozinho</b> em MT.</li><li><b>DDS</b> diário; EPIs sempre.</li></ul>"}, {"t": "Risco elétrico e arco", "h": "<p>Choque, arco elétrico e queimaduras são os riscos críticos. Trabalhe <b>desenergizado</b> sempre que possível (LOTO + teste de ausência de tensão).</p>"}], "quiz": [{"q": "Obrigatório antes de qualquer intervenção:", "o": ["Avisar o COS", "APR e PT", "Nada, se for rápido"], "c": 1, "e": "cultura"}, {"q": "NR de trabalho em altura:", "o": ["NR10", "NR35", "NR12"], "c": 1, "e": "cultura"}, {"q": "Em MT pode-se trabalhar sozinho?", "o": ["Sim com pressa", "Não, nunca", "Só à noite"], "c": 1, "e": "cultura"}, {"q": "LOTO é:", "o": ["Bloqueio e etiquetagem", "Um EPI", "Um tipo de inversor"], "c": 0, "e": "cultura"}, {"q": "NR10-SEP trata de:", "o": ["Altura", "Sistema elétrico de potência (MT)", "Máquinas"], "c": 1, "e": "cultura"}, {"q": "Antes de tocar um circuito de MT desligado:", "o": ["Confiar que está sem tensão", "Testar ausência de tensão (LOTO)", "Não precisa testar"], "c": 1, "e": "cultura"}, {"q": "Religamento em MT exige:", "o": ["Nada", "PT específica", "Só avisar o cliente"], "c": 1, "e": "cultura"}, {"q": "O DDS é:", "o": ["Diálogo Diário de Segurança", "Um documento de OS", "Um equipamento"], "c": 0, "e": "cultura"}, {"q": "Maior risco no trabalho elétrico inclui:", "o": ["Arco elétrico e choque", "Apenas cansaço", "Nenhum"], "c": 0, "e": "cultura"}, {"q": "A tarefa não pode ser feita com segurança. Você:", "o": ["Faz pelo SLA", "Para e aciona o líder", "Improvisa"], "c": 1, "e": "cultura"}]}, "fundamentos": {"titulo": "Fundamentos de O&M Fotovoltaico", "icone": "☀️", "eixo": "tecnico", "dur": "15 min", "video": "", "videoTip": "Vídeo \"como funciona uma usina solar\" / passeio pela planta", "secoes": [{"t": "Como uma UFV gera", "h": "<p>Fluxo: <b>módulos (CC) → string → string box → inversor (CC→CA) → transformador → subestação → rede</b>. O SCADA monitora tudo.</p><svg viewBox=\"0 0 660 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:620px\"><rect width=\"660\" height=\"200\" fill=\"#fff\"/>\n<defs><marker id=\"ar\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"4\" orient=\"auto\"><path d=\"M0,0L7,4L0,8Z\" fill=\"#504C63\"/></marker></defs>\n<g font-family=\"Arial\" font-size=\"10\" fill=\"#fff\" text-anchor=\"middle\">\n<rect x=\"20\" y=\"70\" width=\"80\" height=\"44\" rx=\"6\" fill=\"#2E5FBF\"/><text x=\"60\" y=\"88\">Módulos</text><text x=\"60\" y=\"102\">(CC)</text>\n<rect x=\"130\" y=\"70\" width=\"80\" height=\"44\" rx=\"6\" fill=\"#2E5FBF\"/><text x=\"170\" y=\"96\">String box</text>\n<rect x=\"240\" y=\"70\" width=\"80\" height=\"44\" rx=\"6\" fill=\"#7A1FA2\"/><text x=\"280\" y=\"88\">Inversor</text><text x=\"280\" y=\"102\">CC→CA</text>\n<rect x=\"350\" y=\"70\" width=\"90\" height=\"44\" rx=\"6\" fill=\"#1F6F7A\"/><text x=\"395\" y=\"96\">Transformador</text>\n<rect x=\"470\" y=\"70\" width=\"90\" height=\"44\" rx=\"6\" fill=\"#1F7A3D\"/><text x=\"515\" y=\"88\">Subestação</text><text x=\"515\" y=\"102\">→ Rede</text>\n</g>\n<g stroke=\"#504C63\" stroke-width=\"2\" marker-end=\"url(#ar)\"><line x1=\"100\" y1=\"92\" x2=\"128\" y2=\"92\"/><line x1=\"210\" y1=\"92\" x2=\"238\" y2=\"92\"/><line x1=\"320\" y1=\"92\" x2=\"348\" y2=\"92\"/><line x1=\"440\" y1=\"92\" x2=\"468\" y2=\"92\"/></g>\n<rect x=\"240\" y=\"150\" width=\"200\" height=\"30\" rx=\"6\" fill=\"#191528\"/><text x=\"340\" y=\"170\" font-family=\"Arial\" font-size=\"11\" fill=\"#A9DB21\" text-anchor=\"middle\" font-weight=\"bold\">SCADA monitora tudo (COS 24/7)</text>\n<line x1=\"280\" y1=\"114\" x2=\"300\" y2=\"150\" stroke=\"#999\" stroke-width=\"1.5\" stroke-dasharray=\"3 3\"/><line x1=\"395\" y1=\"114\" x2=\"380\" y2=\"150\" stroke=\"#999\" stroke-width=\"1.5\" stroke-dasharray=\"3 3\"/></svg>"}, {"t": "Principais equipamentos", "h": "<ul><li><b>Inversores</b> — onde mais ocorrem alarmes.</li><li><b>Trackers/TCU</b> — seguem o sol.</li><li><b>String box</b> — agrupa e protege strings.</li><li><b>Subestação/trafo</b> — eleva tensão.</li><li><b>SCADA</b> — monitoramento remoto.</li></ul>"}, {"t": "Indicadores", "h": "<ul><li><b>PR</b> (Performance Ratio) — gerado vs. esperado.</li><li><b>Disponibilidade</b> — % apta a gerar.</li><li><b>Soiling</b> — perda por sujeira.</li><li><b>MWp</b> — potência instalada.</li></ul>"}], "quiz": [{"q": "O inversor:", "o": ["Converte CC em CA", "Move trackers", "Mede irradiância"], "c": 0, "e": "tecnico"}, {"q": "Equipamento com mais alarmes:", "o": ["Módulos", "Inversores", "String box"], "c": 1, "e": "tecnico"}, {"q": "Soiling é:", "o": ["Falha de tracker", "Perda por sujeira nos módulos", "Queda na rede"], "c": 1, "e": "tecnico"}, {"q": "PR significa:", "o": ["Potência instalada", "Gerado vs. esperado", "Nº de inversores"], "c": 1, "e": "tecnico"}, {"q": "Sequência correta:", "o": ["Módulo→inversor→string box", "Módulo→string box→inversor→trafo", "Inversor→módulo→rede"], "c": 1, "e": "tecnico"}, {"q": "A string box serve para:", "o": ["Agrupar e proteger strings", "Converter CC→CA", "Medir vento"], "c": 0, "e": "tecnico"}, {"q": "Disponibilidade mede:", "o": ["% do tempo apta a gerar", "A sujeira", "A tensão"], "c": 0, "e": "tecnico"}, {"q": "O SCADA permite:", "o": ["Monitorar remotamente (COS)", "Lavar módulos", "Trocar fusível"], "c": 0, "e": "tecnico"}, {"q": "MWp é:", "o": ["Energia gerada no mês", "Potência instalada", "Perda por soiling"], "c": 1, "e": "tecnico"}, {"q": "O transformador na usina:", "o": ["Eleva a tensão para a rede", "Gera energia", "Limpa módulos"], "c": 0, "e": "tecnico"}]}, "recurso": {"titulo": "Recurso Solar & Irradiância", "icone": "📡", "eixo": "tecnico", "dur": "18 min", "video": "", "videoTip": "Vídeo sobre estação solarimétrica e medição de irradiância", "secoes": [{"t": "GHI, DNI, DHI e POA/IPOA", "h": "<p>A radiação solar tem componentes:</p><ul><li><b>GHI</b> (Global Horizontal Irradiance) — total no plano <b>horizontal</b>.</li><li><b>DNI</b> (Direct Normal) — direta, perpendicular ao sol.</li><li><b>DHI</b> (Diffuse Horizontal) — difusa (céu/nuvens).</li><li><b>POA / IPOA</b> (Plane of Array / In-Plane of Array) — irradiância <b>no plano do módulo</b> inclinado: é a que <b>de fato gera</b>.</li></ul><p>Relação: <b>GHI = DNI·cos(z) + DHI</b>.</p><svg viewBox=\"0 0 640 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:600px\"><rect width=\"640\" height=\"300\" fill=\"#fff\"/>\n<circle cx=\"90\" cy=\"55\" r=\"30\" fill=\"#F6C026\"/><g stroke=\"#F6C026\" stroke-width=\"3\"><line x1=\"90\" y1=\"10\" x2=\"90\" y2=\"0\"/><line x1=\"50\" y1=\"55\" x2=\"38\" y2=\"55\"/><line x1=\"60\" y1=\"25\" x2=\"52\" y2=\"17\"/></g>\n<line x1=\"110\" y1=\"75\" x2=\"300\" y2=\"245\" stroke=\"#E0A800\" stroke-width=\"3\" marker-end=\"url(#a)\"/>\n<defs><marker id=\"a\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"4\" orient=\"auto\"><path d=\"M0,0L7,4L0,8Z\" fill=\"#E0A800\"/></marker>\n<marker id=\"b\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"4\" orient=\"auto\"><path d=\"M0,0L7,4L0,8Z\" fill=\"#9AB0C0\"/></marker></defs>\n<text x=\"200\" y=\"150\" font-family=\"Arial\" font-size=\"13\" fill=\"#E0A800\" font-weight=\"bold\" transform=\"rotate(40 200 150)\">DNI (direta)</text>\n<g stroke=\"#9AB0C0\" stroke-width=\"2\"><line x1=\"180\" y1=\"40\" x2=\"290\" y2=\"230\" marker-end=\"url(#b)\"/><line x1=\"320\" y1=\"40\" x2=\"300\" y2=\"230\" marker-end=\"url(#b)\"/><line x1=\"430\" y1=\"60\" x2=\"310\" y2=\"232\" marker-end=\"url(#b)\"/></g>\n<text x=\"360\" y=\"120\" font-family=\"Arial\" font-size=\"12\" fill=\"#6b7785\">DHI (difusa)</text>\n<line x1=\"120\" y1=\"248\" x2=\"520\" y2=\"248\" stroke=\"#777\" stroke-width=\"2\"/><text x=\"430\" y=\"268\" font-family=\"Arial\" font-size=\"13\" fill=\"#333\" font-weight=\"bold\">Plano horizontal → GHI</text>\n<g transform=\"translate(300,235) rotate(-25)\"><rect x=\"-6\" y=\"-50\" width=\"90\" height=\"10\" fill=\"#1F3A5F\"/><text x=\"6\" y=\"-58\" font-family=\"Arial\" font-size=\"13\" fill=\"#1F3A5F\" font-weight=\"bold\">Módulo → POA/IPOA</text></g>\n<text x=\"20\" y=\"292\" font-family=\"Arial\" font-size=\"11\" fill=\"#6b7785\">GHI = DNI·cos(z) + DHI · POA/IPOA = irradiância no plano inclinado do módulo (o que de fato gera)</text></svg>"}, {"t": "Estação solarimétrica", "h": "<p>Mede o recurso solar para calcular <b>PR e perdas</b>. Elementos:</p><ul><li><b>Piranômetro</b> (horizontal) — mede GHI.</li><li><b>Piranômetro inclinado</b> ou <b>célula de referência</b> — mede POA.</li><li><b>Pireliômetro</b> (em rastreador) — mede DNI.</li><li><b>Anemômetro/biruta</b> — vento.</li><li><b>Sensores de temperatura</b> de módulo e ambiente, umidade.</li><li><b>Datalogger</b> — registra tudo.</li></ul><svg viewBox=\"0 0 640 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:600px\"><rect width=\"640\" height=\"300\" fill=\"#fff\"/>\n<line x1=\"60\" y1=\"250\" x2=\"600\" y2=\"250\" stroke=\"#9c8\" stroke-width=\"3\"/>\n<g font-family=\"Arial\" font-size=\"11\" fill=\"#23202e\">\n<circle cx=\"100\" cy=\"120\" r=\"14\" fill=\"#1F3A5F\"/><line x1=\"100\" y1=\"134\" x2=\"100\" y2=\"250\" stroke=\"#555\" stroke-width=\"3\"/><text x=\"70\" y=\"100\" font-weight=\"bold\">Piranômetro</text><text x=\"78\" y=\"160\" fill=\"#6b7785\">GHI</text>\n<g transform=\"translate(190,150) rotate(-25)\"><rect x=\"-12\" y=\"-6\" width=\"40\" height=\"12\" fill=\"#1F3A5F\"/></g><line x1=\"200\" y1=\"150\" x2=\"200\" y2=\"250\" stroke=\"#555\" stroke-width=\"3\"/><text x=\"160\" y=\"120\" font-weight=\"bold\">Piranômetro</text><text x=\"160\" y=\"135\" font-weight=\"bold\">inclinado · POA</text>\n<circle cx=\"300\" cy=\"110\" r=\"9\" fill=\"#E0A800\"/><line x1=\"300\" y1=\"119\" x2=\"300\" y2=\"250\" stroke=\"#555\" stroke-width=\"3\"/><text x=\"270\" y=\"95\" font-weight=\"bold\">Pireliômetro</text><text x=\"276\" y=\"135\" fill=\"#6b7785\">DNI (rastreador)</text>\n<g transform=\"translate(390,120)\"><line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"-22\" stroke=\"#1F3A5F\" stroke-width=\"2\"/><circle cx=\"0\" cy=\"-26\" r=\"5\" fill=\"#1F3A5F\"/><circle cx=\"-14\" cy=\"-10\" r=\"5\" fill=\"#1F3A5F\"/><circle cx=\"14\" cy=\"-10\" r=\"5\" fill=\"#1F3A5F\"/></g><line x1=\"390\" y1=\"120\" x2=\"390\" y2=\"250\" stroke=\"#555\" stroke-width=\"3\"/><text x=\"360\" y=\"100\" font-weight=\"bold\">Anemômetro</text><text x=\"366\" y=\"160\" fill=\"#6b7785\">vento</text>\n<rect x=\"470\" y=\"160\" width=\"60\" height=\"40\" rx=\"4\" fill=\"#504C63\"/><text x=\"478\" y=\"184\" fill=\"#fff\" font-size=\"10\">Datalogger</text><text x=\"466\" y=\"225\" fill=\"#6b7785\">+ sensores de Tmódulo e Tambiente/UR</text>\n</g>\n<text x=\"20\" y=\"285\" font-family=\"Arial\" font-size=\"11\" fill=\"#6b7785\">A estação solarimétrica mede a irradiância (GHI, POA, DNI), vento e temperatura — base para calcular PR e perdas.</text></svg>"}, {"t": "Por que isso importa no campo", "h": "<p>Se a estação/sensor falha, o <b>PR fica errado</b> e a usina parece pior (ou melhor) do que é. Sensor sujo, descalibrado ou sombreado gera <b>dado falso</b>. Limpeza e verificação dos sensores são parte da manutenção.</p>"}], "quiz": [{"q": "GHI é a irradiância no plano:", "o": ["Inclinado do módulo", "Horizontal", "Vertical"], "c": 1, "e": "tecnico"}, {"q": "POA/IPOA é a irradiância:", "o": ["No plano do módulo (a que gera)", "Difusa", "Da rede"], "c": 0, "e": "tecnico"}, {"q": "DNI é a componente:", "o": ["Difusa", "Direta (normal ao sol)", "Refletida"], "c": 1, "e": "tecnico"}, {"q": "DHI é a componente:", "o": ["Direta", "Difusa", "Direta + difusa"], "c": 1, "e": "tecnico"}, {"q": "Qual sensor mede GHI?", "o": ["Piranômetro horizontal", "Anemômetro", "Pireliômetro"], "c": 0, "e": "tecnico"}, {"q": "Qual instrumento mede DNI?", "o": ["Piranômetro", "Pireliômetro (em rastreador)", "Datalogger"], "c": 1, "e": "tecnico"}, {"q": "A célula de referência / piranômetro inclinado mede:", "o": ["POA", "Vento", "Temperatura"], "c": 0, "e": "tecnico"}, {"q": "O anemômetro mede:", "o": ["Irradiância", "Velocidade do vento", "Tensão"], "c": 1, "e": "tecnico"}, {"q": "Um sensor de irradiância sujo causa:", "o": ["Nada", "PR/dado falso", "Mais geração"], "c": 1, "e": "tecnico"}, {"q": "Relação correta:", "o": ["GHI = DNI·cos(z) + DHI", "GHI = POA", "DNI = GHI + DHI"], "c": 0, "e": "tecnico"}, {"q": "O datalogger da estação:", "o": ["Registra os dados dos sensores", "Gera energia", "Move o tracker"], "c": 0, "e": "tecnico"}]}, "protecoes": {"titulo": "Proteções, Aterramento & SPDA", "icone": "🛡️", "eixo": "tecnico", "dur": "15 min", "video": "", "videoTip": "Vídeo de inspeção de string box e proteções", "secoes": [{"t": "Proteções da string box", "h": "<ul><li><b>Fusíveis</b> — protegem cada string (sobrecorrente).</li><li><b>DPS / SPD</b> — protegem contra <b>surtos</b> (descargas atmosféricas).</li><li><b>Seccionador / disjuntor CC</b> — permite isolar com segurança.</li></ul><svg viewBox=\"0 0 640 300\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:600px\"><rect width=\"640\" height=\"300\" fill=\"#fff\"/>\n<g font-family=\"Arial\" font-size=\"11\" fill=\"#23202e\">\n<text x=\"20\" y=\"40\" font-weight=\"bold\" font-size=\"13\" fill=\"#1F3A5F\">String Box (combiner) — proteções</text>\n<rect x=\"40\" y=\"60\" width=\"260\" height=\"180\" rx=\"6\" fill=\"#f4f5f7\" stroke=\"#c7d0dd\"/>\n<line x1=\"20\" y1=\"90\" x2=\"60\" y2=\"90\" stroke=\"#E0A800\" stroke-width=\"2\"/><line x1=\"20\" y1=\"120\" x2=\"60\" y2=\"120\" stroke=\"#E0A800\" stroke-width=\"2\"/><text x=\"0\" y=\"78\" font-size=\"10\">strings (+)</text>\n<rect x=\"70\" y=\"82\" width=\"16\" height=\"16\" fill=\"#fff\" stroke=\"#c0392b\"/><rect x=\"70\" y=\"112\" width=\"16\" height=\"16\" fill=\"#fff\" stroke=\"#c0392b\"/><text x=\"95\" y=\"95\" fill=\"#c0392b\" font-weight=\"bold\">Fusíveis (proteção da string)</text>\n<rect x=\"160\" y=\"95\" width=\"22\" height=\"40\" fill=\"#fff\" stroke=\"#2E5FBF\"/><text x=\"190\" y=\"120\" fill=\"#2E5FBF\" font-weight=\"bold\">DPS / SPD (surto)</text>\n<rect x=\"160\" y=\"160\" width=\"40\" height=\"22\" fill=\"#fff\" stroke=\"#1F7A3D\"/><text x=\"210\" y=\"176\" fill=\"#1F7A3D\" font-weight=\"bold\">Seccionador / disjuntor CC</text>\n<line x1=\"300\" y1=\"150\" x2=\"360\" y2=\"150\" stroke=\"#333\" stroke-width=\"3\"/><text x=\"312\" y=\"142\">p/ inversor</text>\n<g transform=\"translate(440,70)\"><text x=\"0\" y=\"0\" font-weight=\"bold\" font-size=\"13\" fill=\"#1F3A5F\">Aterramento & SPDA</text>\n<line x1=\"60\" y1=\"20\" x2=\"60\" y2=\"70\" stroke=\"#555\" stroke-width=\"3\"/><line x1=\"44\" y1=\"70\" x2=\"76\" y2=\"70\" stroke=\"#555\" stroke-width=\"3\"/><line x1=\"48\" y1=\"78\" x2=\"72\" y2=\"78\" stroke=\"#555\" stroke-width=\"2\"/><line x1=\"52\" y1=\"86\" x2=\"68\" y2=\"86\" stroke=\"#555\" stroke-width=\"1.5\"/>\n<text x=\"-10\" y=\"115\" font-size=\"10\" fill=\"#6b7785\">Malha de terra + captores</text><text x=\"-10\" y=\"130\" font-size=\"10\" fill=\"#6b7785\">protegem contra descargas</text></g>\n</g>\n<text x=\"20\" y=\"285\" font-family=\"Arial\" font-size=\"11\" fill=\"#6b7785\">Proteções: fusível (string), DPS/SPD (surtos atmosféricos), seccionador/disjuntor, aterramento e SPDA.</text></svg>"}, {"t": "Aterramento e SPDA", "h": "<p>O <b>SPDA</b> (para-raios/captores + malha de terra) protege contra <b>descargas atmosféricas</b>. O <b>aterramento</b> dá referência e escoa correntes de falha — essencial para a segurança das pessoas e dos equipamentos.</p>"}, {"t": "Proteções da subestação", "h": "<p>Na MT/subestação há <b>relés de proteção</b> (sobrecorrente 50/51, diferencial, etc.), <b>disjuntores</b> e <b>chaves seccionadoras</b>. Atuação indevida ou falha dessas proteções desliga a usina — é evento P1.</p>"}], "quiz": [{"q": "O fusível na string box protege contra:", "o": ["Surto atmosférico", "Sobrecorrente da string", "Sujeira"], "c": 1, "e": "tecnico"}, {"q": "DPS/SPD protege contra:", "o": ["Surtos (descargas)", "Soiling", "Falta de sol"], "c": 0, "e": "tecnico"}, {"q": "O SPDA serve para:", "o": ["Proteger contra descargas atmosféricas", "Medir irradiância", "Mover o tracker"], "c": 0, "e": "tecnico"}, {"q": "O aterramento:", "o": ["Escoa correntes de falha e protege pessoas", "Aumenta a geração", "Não tem função"], "c": 0, "e": "tecnico"}, {"q": "Para isolar uma string com segurança usa-se:", "o": ["Fusível", "Seccionador/disjuntor CC", "Anemômetro"], "c": 1, "e": "tecnico"}, {"q": "Relés 50/51 na subestação são de:", "o": ["Sobrecorrente", "Irradiância", "Temperatura"], "c": 0, "e": "tecnico"}, {"q": "Atuação de proteção da subestação que desliga a usina é:", "o": ["P3", "Evento P1 (crítico)", "Sem impacto"], "c": 1, "e": "tecnico"}, {"q": "Antes de trabalhar na string box, você:", "o": ["Aplica LOTO e testa ausência de tensão", "Mexe direto", "Só desliga o inversor remoto"], "c": 0, "e": "tecnico"}, {"q": "Um DPS danificado deve ser:", "o": ["Ignorado", "Substituído (perde a proteção)", "Pintado"], "c": 1, "e": "tecnico"}, {"q": "Fusível aberto repetidamente na mesma string indica:", "o": ["Tudo normal", "Possível falha (investigar causa)", "Excesso de sol"], "c": 1, "e": "tecnico"}]}, "tracker": {"titulo": "Trackers & TCU", "icone": "🔭", "eixo": "tecnico", "dur": "15 min", "video": "", "videoTip": "Vídeo de inspeção/reset de TCU e tracker (STI/Soltec/etc.)", "secoes": [{"t": "O que é um tracker", "h": "<p>Estrutura que <b>move os módulos seguindo o sol</b> (1 eixo, em geral leste-oeste), aumentando a geração. Componentes:</p><svg viewBox=\"0 0 640 320\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:600px\"><rect width=\"640\" height=\"320\" fill=\"#fff\"/>\n<g font-family=\"Arial\" font-size=\"11\" fill=\"#23202e\">\n<text x=\"20\" y=\"34\" font-weight=\"bold\" font-size=\"13\" fill=\"#1F3A5F\">Tracker (rastreador) — componentes</text>\n<line x1=\"80\" y1=\"250\" x2=\"560\" y2=\"250\" stroke=\"#9c8\" stroke-width=\"3\"/>\n<line x1=\"320\" y1=\"250\" x2=\"320\" y2=\"150\" stroke=\"#777\" stroke-width=\"6\"/><text x=\"330\" y=\"210\" fill=\"#6b7785\">eixo / pilar</text>\n<g transform=\"translate(320,150) rotate(-18)\"><rect x=\"-150\" y=\"-12\" width=\"300\" height=\"16\" fill=\"#1F3A5F\"/></g><text x=\"380\" y=\"120\" font-weight=\"bold\">Mesa de módulos</text>\n<rect x=\"285\" y=\"150\" width=\"70\" height=\"34\" rx=\"4\" fill=\"#504C63\"/><text x=\"292\" y=\"171\" fill=\"#fff\" font-size=\"10\">Motor/Atuador</text>\n<rect x=\"120\" y=\"150\" width=\"70\" height=\"40\" rx=\"5\" fill=\"#191528\"/><text x=\"128\" y=\"166\" fill=\"#A9DB21\" font-size=\"10\" font-weight=\"bold\">TCU</text><text x=\"128\" y=\"180\" fill=\"#fff\" font-size=\"9\">controladora</text>\n<line x1=\"190\" y1=\"170\" x2=\"285\" y2=\"167\" stroke=\"#999\" stroke-width=\"2\" stroke-dasharray=\"4 3\"/>\n<g transform=\"translate(470,150)\"><circle cx=\"0\" cy=\"0\" r=\"10\" fill=\"#E0A800\"/><text x=\"-8\" y=\"35\" font-size=\"10\">Sensor de</text><text x=\"-12\" y=\"48\" font-size=\"10\">inclinação</text></g>\n<text x=\"120\" y=\"215\" font-size=\"10\" fill=\"#6b7785\">Fim de curso · fonte/bateria · NCU (concentra várias TCUs) → SCADA</text>\n</g>\n<text x=\"20\" y=\"300\" font-family=\"Arial\" font-size=\"11\" fill=\"#6b7785\">TCU controla o motor seguindo o sol; sensores de inclinação e fim de curso; NCU agrega e comunica ao SCADA.</text></svg>"}, {"t": "Componentes principais", "h": "<ul><li><b>TCU</b> (Tracker Control Unit) — controla o movimento.</li><li><b>Motor/atuador</b> — move a mesa.</li><li><b>Sensor de inclinação</b> e <b>fim de curso</b>.</li><li><b>Fonte/bateria</b> — alimenta a TCU.</li><li><b>NCU</b> — concentra várias TCUs e comunica ao SCADA.</li></ul>"}, {"t": "Inspeção padrão de TCU parada", "h": "<p>Antes de abrir chamado: verificar se a TCU está <b>ligada</b>, se o <b>botão de emergência</b> está acionado, se a <b>base do fusível</b> está apertada; fazer o <b>reset</b>; testar a <b>continuidade do fusível</b>; trocar o fusível se necessário. Foto da TCU e do nº MAC. Muitos casos se resolvem em campo.</p>"}], "quiz": [{"q": "A TCU é:", "o": ["A controladora do tracker", "O inversor", "O sensor de vento"], "c": 0, "e": "tecnico"}, {"q": "O tracker aumenta a geração porque:", "o": ["Segue o sol (maior POA)", "Limpa os módulos", "Reduz a tensão"], "c": 0, "e": "tecnico"}, {"q": "Quem concentra várias TCUs e comunica ao SCADA?", "o": ["NCU", "DPS", "Datalogger"], "c": 0, "e": "tecnico"}, {"q": "Primeira ação numa TCU parada:", "o": ["Trocar a TCU", "Inspeção padrão (botão emergência, fusível, reset)", "Abrir chamado direto"], "c": 1, "e": "tecnico"}, {"q": "O fim de curso serve para:", "o": ["Limitar o movimento da mesa", "Medir irradiância", "Aterrar"], "c": 0, "e": "tecnico"}, {"q": "O motor/atuador do tracker:", "o": ["Move a mesa de módulos", "Converte CC→CA", "Mede vento"], "c": 0, "e": "tecnico"}, {"q": "Ao trocar uma TCU, registre:", "o": ["Nada", "Nº de série/MAC e posição", "Só a data"], "c": 1, "e": "tecnico"}, {"q": "Tracker travado em posição de segurança (stow) costuma ocorrer com:", "o": ["Sol forte", "Vento alto / alarme", "Falta de OS"], "c": 1, "e": "tecnico"}, {"q": "O sensor de inclinação informa:", "o": ["A posição angular da mesa", "A irradiância", "A corrente da string"], "c": 0, "e": "tecnico"}, {"q": "A inspeção padrão antes do chamado evita:", "o": ["Geração", "Chamado indevido ao fabricante", "Segurança"], "c": 1, "e": "tecnico"}]}, "processos": {"titulo": "Processos: SS/OS, criticidade e religamento", "icone": "🔁", "eixo": "processos", "dur": "15 min", "video": "", "videoTip": "Vídeo do fluxo SS/OS e abertura de OS no Fracttal", "secoes": [{"t": "SS x OS", "h": "<p><b>SS</b> (precisa campo) → o <b>PCM</b> cria a <b>OS</b>. Sem campo, a área abre a OS direto. Toda execução de campo é via OS.</p>"}, {"t": "Criticidade e SLA", "h": "<ul><li><b>P1 Crítico</b> — 4 h (corretiva não programada).</li><li><b>P2 Maior</b> — 24 h.</li><li><b>P3 Menor</b> — 5 dias úteis.</li></ul><p>O COS prioriza pelo prazo mais restritivo do contrato.</p>"}, {"t": "Religamento e garantia", "h": "<p>COS tenta <b>remoto</b>; não resolvendo, abre OS e aciona o campo (PT). Equipamento <b>em garantia</b>: não trocar — registrar evidências e abrir <b>chamado ao fabricante</b> (Controller).</p>"}, {"t": "OS no Fracttal", "h": "<p>Toda OS: descrição, <b>fotos antes/depois</b>, leituras e, em troca, <b>nº de série e posição</b>. Dado incompleto = retrabalho.</p>"}], "quiz": [{"q": "Quem cria a OS a partir da SS?", "o": ["O técnico", "O PCM", "O cliente"], "c": 1, "e": "processos"}, {"q": "SLA de P1:", "o": ["4 h", "24 h", "5 dias úteis"], "c": 0, "e": "processos"}, {"q": "SLA de P2:", "o": ["4 h", "24 h", "5 dias úteis"], "c": 1, "e": "processos"}, {"q": "SLA de P3:", "o": ["4 h", "24 h", "5 dias úteis"], "c": 2, "e": "processos"}, {"q": "Primeira tentativa numa usina desligada:", "o": ["Trocar inversor", "Religamento remoto (COS)", "Abrir garantia"], "c": 1, "e": "processos"}, {"q": "Equipamento em garantia com defeito:", "o": ["Trocar por conta própria", "Chamado ao fabricante com evidências", "Descartar"], "c": 1, "e": "processos"}, {"q": "Não pode faltar no fechamento da OS:", "o": ["Descrição, fotos e leituras", "Só a data", "Nada"], "c": 0, "e": "processos"}, {"q": "O COS prioriza pelo prazo:", "o": ["Mais folgado", "Mais restritivo do contrato", "Do técnico"], "c": 1, "e": "processos"}, {"q": "Toda execução em campo acontece via:", "o": ["E-mail", "OS", "Telefone"], "c": 1, "e": "processos"}, {"q": "Ao trocar um equipamento, registre também:", "o": ["Nº de série e posição", "Nada", "A cor"], "c": 0, "e": "processos"}]}, "manutencao": {"titulo": "Manutenção: preventiva, corretiva e preditiva", "icone": "🔧", "eixo": "tecnico", "dur": "15 min", "video": "", "videoTip": "Vídeo de termografia e preventiva de inversores", "secoes": [{"t": "Preventiva", "h": "<p><b>MPM</b> mensal, <b>MPS</b> semestral, <b>MPA</b> anual — cada uma com checklist (limpeza, torque, inspeção, medições).</p>"}, {"t": "Corretiva", "h": "<p>Atender a falha no SLA: <b>diagnóstico → reparo → teste</b>. Confirmar a <b>normalização</b> antes de fechar a OS.</p>"}, {"t": "Preditiva — termografia", "h": "<p>A <b>termografia</b> acha <b>pontos quentes</b> (conexões, fusíveis, células) antes da falha.</p>"}, {"t": "Inspeção antes do chamado", "h": "<p>Fazer a inspeção padrão (ex.: TCU/inversor) antes de abrir chamado — evita chamado indevido.</p>"}, {"t": "📖 POP — Tratamento de anomalia (referência)", "h": "<p>Resultado <b>Rejeição</b> → etiqueta + OS corretiva (desligamento programado). <b>Atenção</b> → aceite com observações, acompanhar. <b>Ponto frio</b> em termografia = defeito (conexão aberta), reconfirmar ângulo e escalar Engenharia.</p><p style=\"font-size:11px;color:#888;margin-top:8px\">Fonte: procedimento controlado da Grid Co. — resumo de referência. Sempre consulte a versão vigente do POP antes de executar.</p>"}], "quiz": [{"q": "MPM, MPS, MPA são:", "o": ["Preventivas mensal, semestral, anual", "Inversores", "Criticidades"], "c": 0, "e": "tecnico"}, {"q": "Termografia detecta:", "o": ["Pontos quentes", "Vento", "Tensão da rede"], "c": 0, "e": "tecnico"}, {"q": "Antes de abrir chamado de TCU:", "o": ["Abrir direto", "Inspeção padrão (reset/fusível)", "Trocar TCU"], "c": 1, "e": "tecnico"}, {"q": "Ao concluir corretiva, antes de fechar a OS:", "o": ["Confirmar normalização", "Sair", "Não testar"], "c": 0, "e": "tecnico"}, {"q": "A preventiva serve para:", "o": ["Evitar falhas (planejada)", "Corrigir falha já ocorrida", "Nada"], "c": 0, "e": "tecnico"}, {"q": "Torque correto em conexões evita:", "o": ["Pontos quentes/falhas", "Mais geração", "Soiling"], "c": 0, "e": "tecnico"}, {"q": "A corretiva é acionada:", "o": ["Por falha, dentro do SLA", "Todo mês fixo", "Nunca"], "c": 0, "e": "tecnico"}, {"q": "Ponto quente numa conexão indica:", "o": ["Conexão frouxa/defeito", "Excesso de sol", "Tudo ok"], "c": 0, "e": "tecnico"}, {"q": "A MPA é a preventiva:", "o": ["Mensal", "Anual", "Semestral"], "c": 1, "e": "tecnico"}, {"q": "Lavagem de módulos combate:", "o": ["Soiling", "Arco elétrico", "Vento"], "c": 0, "e": "tecnico"}]}, "confiab": {"titulo": "Engenharia & Confiabilidade — quando escalar", "icone": "⚙️", "eixo": "processos", "dur": "12 min", "video": "", "videoTip": "Vídeo curto sobre RCA / 5 porquês aplicado a O&M", "secoes": [{"t": "Níveis N1/N2/N3", "h": "<ul><li><b>N1 Campo</b> — reset, fusível em estoque, limpeza, reconexão.</li><li><b>N2 Engenharia</b> — falha recorrente (≥2x/30 dias), causa não identificada.</li><li><b>N3 Projeto</b> — retrofit/upgrade.</li></ul>"}, {"t": "RCA", "h": "<p>Falha recorrente → <b>RCA</b> (5 Porquês) para achar a <b>causa-raiz</b>. Você fornece evidências e histórico.</p>"}, {"t": "MTBF e MTTR", "h": "<p><b>MTBF</b> tempo médio entre falhas (maior = melhor); <b>MTTR</b> tempo médio de reparo (menor = melhor).</p>"}], "quiz": [{"q": "Reset e troca de fusível são:", "o": ["N1 (campo)", "N3 (projeto)", "Fora do O&M"], "c": 0, "e": "processos"}, {"q": "Quando escalar para N2 (Engenharia)?", "o": ["Sempre", "Falha recorrente / sem causa", "Nunca"], "c": 1, "e": "processos"}, {"q": "RCA busca:", "o": ["O sintoma", "A causa-raiz", "Trocar sem analisar"], "c": 1, "e": "processos"}, {"q": "MTBF maior significa:", "o": ["Mais confiável", "Menos confiável", "Nada"], "c": 0, "e": "processos"}, {"q": "MTTR menor significa:", "o": ["Reparo mais rápido", "Reparo mais lento", "Mais falhas"], "c": 0, "e": "processos"}, {"q": "\"Falha recorrente\" =", "o": ["≥2x no mesmo ativo em 30 dias", "1x por ano", "Nunca repete"], "c": 0, "e": "processos"}, {"q": "Geradores crônicos de OS devem ser:", "o": ["Ignorados", "Comunicados à Engenharia", "Resolvidos sempre só no campo"], "c": 1, "e": "processos"}, {"q": "Retrofit/upgrade é nível:", "o": ["N1", "N2", "N3"], "c": 2, "e": "processos"}, {"q": "O 5 Porquês é uma técnica de:", "o": ["Análise de causa-raiz", "Lavagem", "Medição de vento"], "c": 0, "e": "processos"}, {"q": "Bom dado de OS melhora:", "o": ["MTBF e MTTR", "Soiling", "Nada"], "c": 0, "e": "processos"}], "avancado": [{"q": "Inversor falhou 4x em 20 dias, sempre o mesmo módulo de potência:", "o": ["Trocar e seguir", "Padrão claro → RCA / N2 (causa comum: lote, ventilação)", "Ignorar"], "c": 1, "e": "processos"}, {"q": "O reparo resolveu o sintoma mas a falha voltou:", "o": ["Repetir o reparo eternamente", "Não atacou a causa-raiz — fazer RCA", "Trocar o ativo sem analisar"], "c": 1, "e": "processos"}, {"q": "Mesma falha em 3 usinas do mesmo fabricante:", "o": ["Coincidência", "Causa sistêmica/garantia — escalar", "Nada"], "c": 1, "e": "processos"}, {"q": "MTTR alto numa usina específica:", "o": ["Só culpar o técnico", "Analisar logística/peças/distância, não só o reparo", "Ignorar"], "c": 1, "e": "processos"}, {"q": "MTBF de um ativo caindo ao longo do ano:", "o": ["Normal", "Degradação — investigar (RCA)", "Mais confiável"], "c": 1, "e": "processos"}, {"q": "Uma usina concentra grande parte das OS (gerador crônico):", "o": ["Aceitar", "Priorizar RCA para reduzir backlog/retrabalho", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Dado de OS ruim atrapalha a análise de causa:", "o": ["Tudo bem", "Reforçar a qualidade do registro (sustenta a RCA)", "Não importa"], "c": 1, "e": "processos"}, {"q": "5 Porquês: 'fusível abriu' → ... a investigação serve para:", "o": ["Trocar o fusível", "Chegar à causa-raiz (ex.: dimensionamento, conexão)", "Pintar"], "c": 1, "e": "processos"}, {"q": "Falha N1 que se repete vira:", "o": ["N1 para sempre", "Candidata a N2 (Engenharia) pela recorrência", "N3 direto"], "c": 1, "e": "processos"}, {"q": "Melhoria de confiabilidade bem-sucedida deve:", "o": ["Ficar na cabeça do técnico", "Virar padrão/procedimento (replicar)", "Ser esquecida"], "c": 1, "e": "processos"}], "passThr": 0.8}, "lider_x": {"titulo": "Liderança de Campo (avançado)", "icone": "🎖️", "eixo": "processos", "dur": "15 min", "video": "", "videoTip": "Vídeo de condução de DDS e validação de qualidade em campo", "secoes": [{"t": "Papel do líder", "h": "<p>O líder <b>verifica</b> a execução, valida a <b>qualidade técnica</b> das OS, conduz <b>DDS/APR/PT</b> e é o ponto técnico do cluster.</p>"}, {"t": "Validação e qualidade", "h": "<p>Confere se a OS tem evidências completas, se o reparo está correto e a normalização confirmada. Indicador-chave: <b>retrabalho</b> (OS reabertas).</p>"}, {"t": "Diagnóstico e escalonamento", "h": "<p>Apoia o 2º nível: identifica recorrência, decide N1 vs. escalar N2, prioriza P1/P2/P3 com o Coordenador de O&M.</p>"}], "quiz": [{"q": "Principal papel do líder de campo:", "o": ["Executar todas as OS sozinho", "Verificar e validar a qualidade da execução", "Só dirigir"], "c": 1, "e": "processos"}, {"q": "Indicador-chave do líder:", "o": ["Soiling", "Retrabalho (OS reabertas)", "Vento"], "c": 1, "e": "processos"}, {"q": "Antes da turma iniciar, o líder conduz:", "o": ["DDS/APR", "Nada", "Só café"], "c": 0, "e": "processos"}, {"q": "OS sem evidências completas:", "o": ["Aprovar mesmo assim", "Devolver para corrigir", "Apagar"], "c": 1, "e": "processos"}, {"q": "Falha repetiu 3x no mês no mesmo ativo. O líder:", "o": ["Resolve sempre no campo", "Escala para Engenharia (N2)", "Ignora"], "c": 1, "e": "processos"}, {"q": "Quem autoriza o deslocamento/priorização com o líder?", "o": ["O cliente", "O Coordenador de O&M", "O fornecedor"], "c": 1, "e": "processos"}, {"q": "Numa P1 com risco de segurança, a prioridade é:", "o": ["Velocidade acima da segurança", "Segurança e despacho imediato", "Aguardar"], "c": 1, "e": "processos"}, {"q": "Validar a normalização significa:", "o": ["Confirmar que a geração voltou", "Só fechar a OS", "Nada"], "c": 0, "e": "processos"}, {"q": "O líder identifica um gerador crônico de OS. Deve:", "o": ["Comunicar à Engenharia/PCM", "Esconder", "Trocar tudo"], "c": 0, "e": "processos"}, {"q": "Qualidade técnica da OS inclui:", "o": ["Reparo correto + evidências + normalização", "Apenas a foto", "Apenas a hora"], "c": 0, "e": "processos"}, {"q": "Conflito entre prazo e segurança: o líder decide por:", "o": ["Prazo", "Segurança", "Sorteio"], "c": 1, "e": "processos"}], "avancado": [{"q": "Turma quer pular a APR por pressa:", "o": ["Liberar", "Não autorizar; conduzir a APR", "Fazer metade"], "c": 1, "e": "cultura"}, {"q": "OS chega sem foto e sem confirmação de normalização:", "o": ["Aprovar", "Devolver para corrigir", "Apagar"], "c": 1, "e": "processos"}, {"q": "Dois P1 simultâneos no cluster:", "o": ["Aleatório", "Priorizar por risco/SLA e acionar a coordenação", "Atender o mais perto só"], "c": 1, "e": "processos"}, {"q": "Técnico sem a NR exigida para a tarefa:", "o": ["Deixa fazer", "Não executa; redistribui/aciona", "Ajuda a improvisar"], "c": 1, "e": "cultura"}, {"q": "Qualidade técnica duvidosa numa execução:", "o": ["Liberar", "Revalidar/refazer antes de fechar", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Turma reporta falta recorrente da mesma peça:", "o": ["Ignorar", "Input para Asset/sobressalentes (mín/máx)", "Comprar do bolso"], "c": 1, "e": "processos"}, {"q": "Conflito entre prazo do cliente e segurança:", "o": ["Prazo", "Segurança", "Sorteio"], "c": 1, "e": "cultura"}, {"q": "Gerador crônico de OS no seu cluster:", "o": ["Esconder", "Comunicar Engenharia/PCM", "Trocar tudo"], "c": 1, "e": "processos"}, {"q": "Documentação do dia incompleta no fim do turno:", "o": ["Encerrar assim", "Cobrar/completar antes de encerrar", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Falha repetiu 3x no mesmo ativo no mês:", "o": ["Resolver sempre no campo", "Escalar para N2 (Engenharia)", "Ignorar"], "c": 1, "e": "processos"}], "passThr": 0.8}, "cos_x": {"titulo": "Operação do COS (avançado)", "icone": "🖥️", "eixo": "processos", "dur": "15 min", "video": "", "videoTip": "Vídeo do COS: SCADA/Prescinto, alarmes e religamento remoto", "secoes": [{"t": "O COS como centro nervoso do O&M", "h": "<p>O COS opera <b>24/7</b> como primeira linha de defesa da disponibilidade do portfólio: monitora geração, alarmes e status via <b>SCADA SunOp / PV Operation / Fusion</b> e performance/OS via <b>Prescinto (IBM)</b>. Seu ciclo canônico: <b>detecção → Ack e triagem → classificação (P1–P4) → ação remota segura → escalada/acionamento de campo → registro</b>. Cada elo alimenta o seguinte: uma triagem ruim gera uma escalada errada; um registro ruim gera um indicador falso.</p><p>Os KPIs que medem a excelência do COS são <b>tempo de detecção</b>, <b>tempo de resposta/religamento</b> e <b>disponibilidade do monitoramento</b> — e todos dependem da disciplina do operador, não apenas da tecnologia.</p>"}, {"t": "Decisão sob pressão: telemetria, remoto e campo", "h": "<p>O operador avançado domina as armadilhas de diagnóstico que separam um evento real de um fantasma:</p><ul><li><b>Usina inteira off no SCADA, vizinhas ok:</b> investigar comunicação (ping, portal do fabricante, provedor) antes de concluir perda de geração — link caído não é usina parada.</li><li><b>Queda de geração sem alarme:</b> suspeitar de falha de telemetria/sensor e validar por fonte independente; ausência de alarme não é normalidade.</li><li><b>Cliente reporta usina parada, SCADA mostra normal:</b> checar qualidade do dado e da medição, alinhar com Performance e responder ao cliente com fatos.</li><li><b>Religamento remoto:</b> executar quando não há indicação de falha física nem risco; se falhar repetidamente no mesmo equipamento, parar de insistir e abrir OS de campo marcando a recorrência.</li><li><b>Avalanche de alarmes:</b> priorizar P1, <b>agrupar por causa comum</b> (evento de rede derruba dezenas de inversores de uma vez) e nunca fazer Ack em massa.</li></ul><p>Regra permanente: em dúvida sobre segurança ou efeito da manobra, <b>não agir sem validação do Supervisor</b>.</p>"}, {"t": "Interfaces, escalada e o valor do registro", "h": "<p>O COS não trabalha sozinho — ele é o hub entre áreas, e a matriz de escalada (N0 operador → N1 supervisor → N2 especialistas/gerência → N3 diretoria) formaliza esse trânsito com prazos por prioridade (P1: supervisor em até 5 min; persistência de 30 min aciona N2).</p><ul><li><b>Performance:</b> recebe do COS os desvios validados e devolve análises que refinam a triagem.</li><li><b>PCM/Engenharia:</b> recorrências e causas sistêmicas identificadas pelo COS viram plano de manutenção e melhoria de projeto.</li><li><b>KAM/Cliente:</b> a comunicação factual do COS (status, incidentes, prazos) sustenta a relação contratual e os SLAs.</li><li><b>Campo:</b> o COS despacha com contexto completo (usina, equipamento, severidade, ações já tentadas) e acompanha até o fechamento.</li></ul><p>A <b>passagem de turno</b> fecha o ciclo: eventos em aberto documentados e repassados garantem que a operação 24/7 seja uma corrente contínua, não turnos isolados. E o registro disciplinado de tudo — ocorrências, escaladas, manobras — é o que transforma a operação em indicadores confiáveis: MTTR, MTBF e disponibilidade nascem no teclado do operador.</p>"}], "quiz": [{"q": "O COS monitora principalmente via:", "o": ["SCADA/Prescinto", "Visita presencial", "Telefone"], "c": 0, "e": "processos"}, {"q": "Primeira ação do COS num desligamento:", "o": ["Acionar campo direto", "Tentar religamento remoto", "Abrir garantia"], "c": 1, "e": "processos"}, {"q": "Ao não resolver remotamente, o COS:", "o": ["Encerra o evento", "Abre OS e aciona o campo", "Aguarda o dia seguinte"], "c": 1, "e": "processos"}, {"q": "A matriz de escalada define:", "o": ["Quem comunicar/escalar e quando", "O preço da energia", "A cor do EPI"], "c": 0, "e": "processos"}, {"q": "KPI central do COS:", "o": ["Disponibilidade do monitoramento", "Soiling", "Torque"], "c": 0, "e": "processos"}, {"q": "Um alarme crítico (perda total) é:", "o": ["P3", "P1", "Sem prioridade"], "c": 1, "e": "processos"}, {"q": "Religamento remoto é:", "o": ["Função natural do turno do COS", "Só do campo", "Proibido"], "c": 0, "e": "processos"}, {"q": "Na passagem de turno o operador:", "o": ["Some", "Registra e repassa eventos em aberto", "Apaga tudo"], "c": 1, "e": "processos"}, {"q": "Falso alarme recorrente deve ser:", "o": ["Ignorado para sempre", "Tratado (qualidade de dado/config)", "Religado sem registro"], "c": 1, "e": "processos"}, {"q": "Antes de despachar o campo, o COS coleta:", "o": ["Nada", "Informações do evento (usina, equipamento, severidade)", "Só a hora"], "c": 1, "e": "processos"}, {"q": "Prioridade entre dois eventos: o COS usa:", "o": ["A criticidade/SLA", "A ordem alfabética", "A preferência pessoal"], "c": 0, "e": "processos"}], "avancado": [{"q": "Tempestade gera dezenas de alarmes simultâneos. Conduta:", "o": ["Tratar sem critério", "Priorizar P1, agrupar por causa comum", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Subtensão na subestação + vários inversores caindo:", "o": ["P3", "Evento de rede/proteção — P1, escalar", "Soiling"], "c": 1, "e": "processos"}, {"q": "Religamento remoto falhou 2x no mesmo inversor:", "o": ["Insistir no remoto", "Abrir OS de campo e marcar recorrência", "Ack e esquecer"], "c": 1, "e": "processos"}, {"q": "Usina inteira off no SCADA, vizinhas ok:", "o": ["Despachar campo já", "Investigar comunicação/SCADA local antes de concluir", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Geração cai mas nenhum alarme dispara:", "o": ["Tudo certo", "Possível falha de telemetria/sensor — validar", "Religar tudo"], "c": 1, "e": "processos"}, {"q": "Inversor reporta 0 kW ao meio-dia com sol e sem religar:", "o": ["Esperar", "Falha real — abrir OS de campo", "Ack"], "c": 1, "e": "processos"}, {"q": "Cliente reclama de uma usina que está ok no SCADA:", "o": ["Ignorar", "Checar dado/medição e alinhar com Performance", "Religar"], "c": 1, "e": "processos"}, {"q": "Alarme P1 e dois P2 abertos ao mesmo tempo:", "o": ["P2 primeiro", "P1 primeiro, depois P2 por SLA", "Aleatório"], "c": 1, "e": "processos"}, {"q": "Mesmo evento se repete em várias usinas do cliente:", "o": ["Coincidência", "Causa sistêmica — escalar engenharia/PCM", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Quando NÃO acionar o campo imediatamente:", "o": ["Sempre acionar", "Quando o remoto resolve e não há risco", "Nunca"], "c": 1, "e": "processos"}], "passThr": 0.8}, "pcm_x": {"titulo": "PCM — Planejamento e Controle (avançado)", "icone": "🗂️", "eixo": "processos", "dur": "15 min", "video": "", "videoTip": "Vídeo do PCM: plano 52 semanas, Fracttal e indicadores", "secoes": [{"t": "Planejamento", "h": "<p>O PCM mantém o <b>plano de 52 semanas</b>, gera a <b>programação semanal</b> e controla o <b>backlog</b>. Define critérios de priorização com a Engenharia.</p>"}, {"t": "Controle de OS e dados", "h": "<p>Garante a <b>integridade do dado</b> no Fracttal, a <b>aderência</b> (planejado vs. executado) e os indicadores (<b>MTTR, MTBF, disponibilidade, backlog</b>).</p>"}, {"t": "Garantias e MPAs", "h": "<p>Conduz os <b>chamados de garantia</b> (Controller) e a gestão das <b>MPAs</b> (anuais). Sobressalentes e calibração ficam com o Asset Management.</p>"}], "quiz": [{"q": "O plano de manutenção do PCM cobre:", "o": ["52 semanas", "1 dia", "Sem horizonte"], "c": 0, "e": "processos"}, {"q": "Aderência mede:", "o": ["Planejado vs. executado no prazo", "A irradiância", "O vento"], "c": 0, "e": "processos"}, {"q": "Integridade do dado no Fracttal é responsabilidade:", "o": ["Do cliente", "Do Analista Controlador de OS (PCM)", "De ninguém"], "c": 1, "e": "processos"}, {"q": "Backlog é:", "o": ["OS em aberto/atrasadas", "Energia gerada", "Nº de inversores"], "c": 0, "e": "processos"}, {"q": "Triagem de solicitações no Fracttal deve usar:", "o": ["SLAs/criticidade por categoria", "Ordem de chegada apenas", "Aleatório"], "c": 0, "e": "processos"}, {"q": "MPA é a manutenção:", "o": ["Mensal", "Anual", "Semestral"], "c": 1, "e": "processos"}, {"q": "Chamado de garantia é conduzido pelo:", "o": ["Técnico", "Controller de Processos", "Cliente"], "c": 1, "e": "processos"}, {"q": "Sobressalentes/calibração ficam com:", "o": ["Asset Management", "O motorista", "Ninguém"], "c": 0, "e": "processos"}, {"q": "Checklist de encerramento de OS serve para:", "o": ["Garantir registro completo", "Atrasar", "Nada"], "c": 0, "e": "processos"}, {"q": "KPIs que o PCM acompanha:", "o": ["MTTR/MTBF/disponibilidade/aderência", "Só a cor", "Só a data"], "c": 0, "e": "processos"}, {"q": "Falha recorrente identificada pelo dado deve ir para:", "o": ["Engenharia (confiabilidade)", "Lixo", "Cliente sem análise"], "c": 0, "e": "processos"}], "avancado": [{"q": "Aderência ao plano caindo nas últimas semanas:", "o": ["Ignorar", "Investigar gargalo (recursos/distância/peças)", "Trocar o plano todo"], "c": 1, "e": "processos"}, {"q": "Uma usina concentra ~40% das OS abertas:", "o": ["Normal", "Gerador crônico — escalar engenharia e ajustar plano", "Fechar as OS"], "c": 1, "e": "processos"}, {"q": "OS sendo fechadas sem evidência/normalização:", "o": ["Aceitar", "Reabrir/cobrar qualidade (dado confiável)", "Apagar"], "c": 1, "e": "processos"}, {"q": "Preventivas atrasadas acumulando:", "o": ["Tudo bem", "Risco de virar corretiva — repriorizar", "Cancelar"], "c": 1, "e": "processos"}, {"q": "Programação gerada pela IA com OS conflitantes:", "o": ["Liberar direto", "Validar/ajustar antes de liberar", "Ignorar a IA"], "c": 1, "e": "processos"}, {"q": "Indicador de garantia parado/atrasado:", "o": ["Esperar", "Cobrar fabricante/Controller e acompanhar", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Backlog de P3 crescendo enquanto P1/P2 ok:", "o": ["Ignorar", "Planejar/repriorizar os P3 antes de virarem problema", "Fechar sem fazer"], "c": 1, "e": "processos"}, {"q": "Falha recorrente identificada pelos dados:", "o": ["Lixo", "Abrir input de confiabilidade (Engenharia)", "Cliente sem análise"], "c": 1, "e": "processos"}, {"q": "MTTR alto num cluster específico:", "o": ["Culpar o técnico", "Analisar peças/logística/distância", "Ignorar"], "c": 1, "e": "processos"}, {"q": "Dado inconsistente no Fracttal antes do RMO:", "o": ["Reportar assim mesmo", "Corrigir a integridade antes de reportar", "Apagar"], "c": 1, "e": "processos"}], "passThr": 0.8}, "mpm": {"titulo": "Preventiva Mensal (MPM) — Certificação", "icone": "📅", "eixo": "tecnico", "dur": "22 min", "video": "", "videoTip": "Vídeo da MPM real da Grid (rotina em campo)", "apto": "Apto MPM", "passThr": 0.8, "secoes": [{"t": "Objetivo e segurança", "h": "<p>A <b>MPM</b> (mensal) é a rotina frequente de <b>inspeção visual, leituras e limpeza básica</b>. Toda atividade começa com <b>leitura da OS, APR/PT e EPIs</b>. Em qualquer intervenção elétrica: <b>LOTO</b>, detector de tensão e, quando aplicável, <b>aterramento temporário</b>.</p>"}, {"t": "Inspeção visual — critérios de decisão", "h": "<p>Inspeção de módulos, string box, inversores, trackers, vegetação e drenagem. Para cada item há <b>critério de aceitação x rejeição</b>:</p><ul><li><b>Aceita:</b> superfícies limpas, sem vazamentos, fixações firmes (arruelas comprimidas), pintura íntegra, cordoalhas contínuas.</li><li><b>Rejeita:</b> vazamento ativo (gotejamento/mancha recente), corrosão avançada, parafusos faltantes/frouxos, sinais de superaquecimento (metal descolorido, isolação derretida, marcas de queima), ninhos de pássaros.</li></ul><p><b>Achado grave</b> (ex.: risco elétrico exposto, vazamento severo): fixe etiqueta <b>\"MANUTENÇÃO CORRETIVA\"</b>, <b>não prossiga</b> no componente e comunique o supervisor para abrir OS.</p>"}, {"t": "Leituras e registro", "h": "<p>Leitura de status/alarmes dos inversores e das correntes de string. <b>Toda evidência com foto</b> e registro na OS — dado incompleto = retrabalho. Você fica <b>Apto MPM</b> ao atingir <b>≥80%</b>.</p>"}, {"t": "📖 POP — Inspeção mensal (referência)", "h": "<p>Registrar tudo na <b>OS</b> com fotos. Inspeção visual de estruturas, cabos, conectores e proteções; qualquer anomalia que represente risco → sinalizar e abrir corretiva.</p><p>Tratar todo circuito como <b>energizado</b>; em atividade de continuidade, só superfícies, <b>proibido abrir caixas</b> sem APR/PT específica.</p><p style=\"font-size:11px;color:#888;margin-top:8px\">Fonte: procedimento controlado da Grid Co. — resumo de referência. Sempre consulte a versão vigente do POP antes de executar.</p>"}], "quiz": [{"q": "A MPM é a preventiva:", "o": ["Mensal", "Semestral", "Anual"], "c": 0, "e": "tecnico"}, {"q": "Toda atividade da MPM começa com:", "o": ["Leitura da OS, APR/PT e EPIs", "Religar a usina", "Nada"], "c": 0, "e": "cultura"}, {"q": "Vazamento ativo de óleo numa inspeção:", "o": ["Aceitar", "Rejeitar (etiqueta corretiva + comunicar)", "Limpar e ignorar"], "c": 1, "e": "tecnico"}, {"q": "Parafusos frouxos / arruelas não comprimidas:", "o": ["Critério de rejeição", "Tudo certo", "Irrelevante"], "c": 0, "e": "tecnico"}, {"q": "Metal descolorido / marcas de queima indicam:", "o": ["Superaquecimento (rejeição)", "Pintura nova", "Nada"], "c": 0, "e": "tecnico"}, {"q": "Achado grave (risco elétrico exposto):", "o": ["Continuar", "Etiqueta corretiva, parar no componente e comunicar", "Consertar sozinho"], "c": 1, "e": "cultura"}, {"q": "Evidência da inspeção é registrada com:", "o": ["Foto na OS", "Só de memória", "Não registra"], "c": 0, "e": "processos"}, {"q": "String com corrente bem abaixo das vizinhas:", "o": ["Normal", "Investigar (fusível aberto/string com defeito)", "Mais sol"], "c": 1, "e": "tecnico"}, {"q": "DPS da string box com indicador vermelho:", "o": ["Substituir (proteção perdida)", "Ok", "Pintar"], "c": 0, "e": "tecnico"}, {"q": "Para ser Apto MPM é preciso atingir:", "o": ["≥80%", "Qualquer nota", "≥50%"], "c": 0, "e": "cultura"}], "avancado": [{"q": "Inspeção: cordoalha de aterramento cortada. Conduta:", "o": ["Aceitar", "Rejeitar e tratar (segurança comprometida)", "Ignorar"], "c": 1, "e": "tecnico"}, {"q": "Inversor lendo derating térmico recorrente:", "o": ["Ignorar", "Investigar ventilação/sujeira; corretiva se persistir", "Desligar a usina"], "c": 1, "e": "tecnico"}, {"q": "Tanque do transformador estufado (visual):", "o": ["Aceitação", "Rejeição — não ensaiar, corretiva", "Limpar"], "c": 1, "e": "tecnico"}, {"q": "Antes de qualquer reaperto em conexão:", "o": ["Garantir desenergização/ATR e inspecionar", "Apertar energizado", "Nada"], "c": 0, "e": "cultura"}, {"q": "Ninho de pássaros na cabine/estrutura:", "o": ["Critério de rejeição (registrar/remover com segurança)", "Aceitação", "Bom isolante"], "c": 0, "e": "tecnico"}, {"q": "Você não tem a NR exigida para um item da MPM:", "o": ["Faz mesmo assim", "Não executa esse item; aciona o líder", "Pede ao cliente"], "c": 1, "e": "cultura"}, {"q": "Registro fotográfico ausente em itens críticos:", "o": ["Tudo bem", "Refazer — compromete rastreabilidade", "Não importa"], "c": 1, "e": "processos"}, {"q": "Mancha de óleo recente sob o radiador:", "o": ["Vazamento ativo → rejeição", "Condensação normal", "Aceitar"], "c": 0, "e": "tecnico"}, {"q": "Inspeção de string box energizada exige:", "o": ["APR/PT, EPI, sem contato, instrumento adequado", "Abrir direto", "Desligar o COS"], "c": 0, "e": "cultura"}, {"q": "Vegetação alta sob os módulos:", "o": ["Risco (sombra/incêndio) — registrar", "Sem impacto", "Bom"], "c": 0, "e": "tecnico"}]}, "mps": {"titulo": "Preventiva Semestral (MPS) — Certificação", "icone": "🗓️", "eixo": "tecnico", "dur": "28 min", "video": "", "videoTip": "Vídeo de termografia (câmera e drone) e reaperto da Grid", "apto": "Apto MPS", "passThr": 0.8, "secoes": [{"t": "Escopo da MPS", "h": "<p>Mais profunda que a MPM: <b>termografia</b> (câmera e drone), <b>reaperto de torque</b>, <b>limpeza</b> e inspeção elétrica. Atividades em MT exigem <b>NR10-SEP e PT</b>.</p>"}, {"t": "Termografia — como e quando", "h": "<p>A termografia identifica <b>pontos quentes</b> (conexões frouxas, células com defeito, fusíveis). Regras importantes:</p><ul><li>Feita com a usina <b>em carga/geração</b> (sem carga não há aquecimento para ver).</li><li>Avalia-se o <b>ΔT</b> (diferença de temperatura) entre o ponto e a referência similar.</li><li><b>Termografia com drone</b> para varrer grandes áreas de módulos.</li></ul><p>Conduta por severidade (conforme o POP): ΔT pequeno → <b>monitorar</b>; ΔT relevante → <b>reapertar/investigar e registrar</b>; ΔT alto / risco → <b>corretiva imediata</b>.</p>"}, {"t": "Reaperto e limpeza", "h": "<p><b>Reaperto</b> com <b>torquímetro de estalo</b> conforme a especificação do fabricante (sub/sobreaperto causa falha). Limpeza de buchas/isoladores com <b>álcool isopropílico</b> (mesmo sujeira leve, para bons testes). Limpeza de módulos seguindo procedimento (evitar choque térmico sob sol forte).</p>"}, {"t": "Aptidão", "h": "<p>Aprovação <b>≥80%</b> torna você <b>Apto MPS</b>. MT só com habilitação e PT.</p>"}, {"t": "📖 POP — Termografia & reaperto (referência)", "h": "<p>Veja o módulo <b>“MPS — Termografia (níveis de aceitação)”</b> para a tabela completa de critérios por componente.</p><p><b>Reaperto</b>: usar <b>torquímetro</b> no valor do fabricante; conexão que aquece (termografia em Rejeição) → reaperto ou troca de terminal sob OS corretiva. Nunca reapertar energizado.</p><p style=\"font-size:11px;color:#888;margin-top:8px\">Fonte: procedimento controlado da Grid Co. — resumo de referência. Sempre consulte a versão vigente do POP antes de executar.</p>"}], "quiz": [{"q": "A MPS é a preventiva:", "o": ["Mensal", "Semestral", "Anual"], "c": 1, "e": "tecnico"}, {"q": "Termografia detecta:", "o": ["Pontos quentes", "Vento", "Irradiância"], "c": 0, "e": "tecnico"}, {"q": "Termografia deve ser feita com a usina:", "o": ["Em carga/geração", "Desligada", "À noite"], "c": 0, "e": "tecnico"}, {"q": "Reaperto correto usa:", "o": ["Torquímetro conforme spec", "No olho", "Aleatório"], "c": 0, "e": "tecnico"}, {"q": "Para varrer grandes áreas de módulos:", "o": ["Termografia com drone", "Multímetro", "Megôhmetro"], "c": 0, "e": "tecnico"}, {"q": "Limpeza de buchas/isoladores antes de ensaios:", "o": ["Álcool isopropílico", "Água com sabão", "Não limpar"], "c": 0, "e": "tecnico"}, {"q": "Ponto quente em conexão (ΔT relevante):", "o": ["Reapertar/investigar e registrar", "Ignorar", "Pintar"], "c": 0, "e": "tecnico"}, {"q": "Atividade de MT na MPS exige:", "o": ["NR10-SEP e PT", "Nada", "Só luva"], "c": 0, "e": "cultura"}, {"q": "Sub ou sobreaperto de conexão:", "o": ["Causa falha (seguir torque)", "Não tem efeito", "Melhora"], "c": 0, "e": "tecnico"}, {"q": "Para ser Apto MPS:", "o": ["≥80%", "Qualquer nota", "≥50%"], "c": 0, "e": "cultura"}], "avancado": [{"q": "Termografia mostra ponto quente em fusível com corrente normal:", "o": ["Ignorar", "Investigar contato/base do fusível e registrar", "Trocar inversor"], "c": 1, "e": "tecnico"}, {"q": "ΔT muito alto numa conexão de MT com risco:", "o": ["Aguardar a próxima MPS", "Tratar como corretiva imediata", "Pintar"], "c": 1, "e": "tecnico"}, {"q": "Conexão volta a aquecer mesmo após reaperto correto:", "o": ["Normal", "Terminal degradado — substituir", "Apertar mais forte"], "c": 1, "e": "tecnico"}, {"q": "Termografia feita com a usina sem carga:", "o": ["Válida", "Inválida — não há aquecimento a medir", "Melhor"], "c": 1, "e": "tecnico"}, {"q": "Reaperto sem torquímetro calibrado:", "o": ["Pode estimar", "Não — risco de sub/sobreaperto", "Tanto faz"], "c": 1, "e": "tecnico"}, {"q": "Limpeza de módulos com água sob sol forte:", "o": ["Sempre", "Evitar (choque térmico) — seguir procedimento", "Indiferente"], "c": 1, "e": "tecnico"}, {"q": "ΔT entre células do mesmo módulo elevado:", "o": ["Hot spot / célula com defeito", "Sujeira leve", "Tudo ok"], "c": 0, "e": "tecnico"}, {"q": "Antes de tocar barramento de MT supostamente desligado:", "o": ["Confiar", "Testar ausência de tensão e aterrar", "Não testar"], "c": 1, "e": "cultura"}, {"q": "Drone de termografia perde sinal/condição de vento alto:", "o": ["Continuar", "Suspender por segurança", "Forçar"], "c": 1, "e": "cultura"}, {"q": "Documentação da MPS deve conter:", "o": ["Imagens térmicas e valores de torque/ensaios", "Só a data", "Nada"], "c": 0, "e": "processos"}]}, "mpa": {"titulo": "Preventiva Anual (MPA) — Certificação", "icone": "📆", "eixo": "tecnico", "dur": "35 min", "video": "", "videoTip": "Vídeo da MPA: ensaios de transformador, aterramento e curva IxV", "apto": "Apto MPA", "passThr": 0.8, "secoes": [{"t": "Escopo e segurança da MPA", "h": "<p>A MPA é a mais completa: <b>ensaios elétricos</b> (isolamento, enrolamento, relação de transformação, continuidade, aterramento), <b>curva I×V</b>, inspeção da cabine de MT e do transformador, e relatório anual. Disciplina: <b>Engenharia de O&M</b>.</p><p><b>Sequência de segurança</b> antes de qualquer ensaio: leitura da OS + APR/PT → <b>LOTO</b> (bloqueio/etiquetagem MT e BT) → <b>detector de tensão</b> (ausência de potencial em todas as fases) → <b>Aterramento Temporário (ATR)</b>: conectar <b>primeiro</b> o grampo à malha de terra e <b>só depois</b> os grampos de fase.</p>"}, {"t": "Resistência de isolamento (megôhmetro)", "h": "<p>Mede o isolamento entre enrolamentos/terra. Megôhmetro modulado em <b>1 kV</b> (trafo BT×Terra) ou <b>5 kV</b> (cabos MT), injetando por <b>1 minuto</b>, registrando o valor e foto do display.</p><p><b>Critérios:</b> <b>Aceitação R ≥ 1 GΩ</b> · <b>Atenção 1 MΩ ≤ R < 1 GΩ</b> (registrar, monitorar/investigar) · <b>Rejeição R < 1 MΩ</b> (não energizar, etiqueta corretiva, abrir OS).</p>"}, {"t": "Resistência de enrolamento e relação (TTR)", "h": "<ul><li><b>Enrolamento:</b> corrente de teste ≤ <b>10% da nominal</b>; medir por par de fases (BT: X1-X0…; MT: H1-H2…). <b>Sempre desligue a injeção antes de desconectar as garras</b> (o rompimento sob corrente gera arco). Critério: <b>desvio entre fases &lt; 5%</b> aceita; <b>≥ 5%</b> rejeita.</li><li><b>Relação de transformação (TTR):</b> registrar a <b>posição do TAP</b> (foto). Critério: <b>erro ≤ 0,5%</b> aceita; <b>&gt; 0,5%</b> rejeita.</li></ul>"}, {"t": "Aterramento e continuidade", "h": "<p><b>Aterramento</b> com <b>terrômetro</b> (método 3 polos / queda de potencial; <b>regra dos 62%</b> com trena de 50 m). <b>Segurança:</b> antes de abrir a caixa de inspeção, medir tensão na malha — se houver <b>tensão &gt; 25 V</b>, <b>suspender</b> (risco de tensão de passo/toque). <b>Continuidade/equipotencialização:</b> tratar tudo como energizado; restringir às superfícies metálicas; <b>proibido</b> abrir caixas/desconectar cabos.</p>"}, {"t": "Curva I×V", "h": "<p>Ensaio diagnóstico do arranjo FV (Voc, Isc, Vmp, Imp, Pmax — normas <b>IEC 61829 / 60891</b>). Circuitos de até <b>1500 VCC</b>. Antes de inserir o medidor: <b>cortar a carga via inversor/SCADA e confirmar corrente em 0,0 A</b>; <b>LOTO</b> da seccionadora da string. <b>Irradiância mínima ≥ 800 W/m²</b> para validações de garantia.</p>"}, {"t": "Aptidão", "h": "<p>Aprovação <b>≥80%</b> torna você <b>Apto a participar da MPA</b> (ensaios/MT sob habilitação e supervisão).</p>"}, {"t": "📖 POP — Critérios de ensaio (referência)", "h": "<p><b>Resistência de isolamento</b> (megôhmetro, 1 min): Aceita <b>R≥1GΩ</b> · Atenção <b>1MΩ≤R&lt;1GΩ</b> · Rejeita <b>R&lt;1MΩ</b>. Tensão de ensaio: 1kV (trafo BT×Terra), 5kV (cabos MT).</p><p><b>Resistência de enrolamento</b>: corrente de teste ≤10% da nominal; desligar a injeção <b>antes</b> de desconectar (risco de arco); desvio entre fases <b>&lt;5% aceita / ≥5% rejeita</b>.</p><p><b>Relação de transformação (TTR)</b>: registrar o TAP; erro <b>≤0,5% aceita / &gt;0,5% rejeita</b>.</p><p><b>Aterramento</b>: terrômetro queda de potencial, <b>regra dos 62%</b> (trena 50 m); tensão &gt;25V na malha → suspender. <b>Curva I×V</b>: cortar carga e confirmar 0,0A; irradiância <b>≥800 W/m²</b> para garantia.</p><p>ATR: conectar <b>primeiro à malha de terra</b>, depois às fases. Achado grave → etiqueta 'Corretiva', não ensaiar, comunicar.</p><p style=\"font-size:11px;color:#888;margin-top:8px\">Fonte: procedimento controlado da Grid Co. — resumo de referência. Sempre consulte a versão vigente do POP antes de executar.</p>"}], "quiz": [{"q": "A MPA é a preventiva:", "o": ["Anual", "Semestral", "Mensal"], "c": 0, "e": "tecnico"}, {"q": "Ordem correta ao instalar o aterramento temporário (ATR):", "o": ["Primeiro à malha de terra, depois às fases", "Primeiro às fases", "Tanto faz"], "c": 0, "e": "cultura"}, {"q": "Megôhmetro para isolamento de cabos MT:", "o": ["5 kV", "12 V", "220 V"], "c": 0, "e": "tecnico"}, {"q": "Critério de aceitação da resistência de isolamento:", "o": ["R ≥ 1 GΩ", "R ≥ 1 MΩ", "R ≥ 1 kΩ"], "c": 0, "e": "tecnico"}, {"q": "Resistência de isolamento R < 1 MΩ:", "o": ["Aceitação", "Rejeição (não energizar)", "Atenção"], "c": 1, "e": "tecnico"}, {"q": "No ensaio de enrolamento, antes de desconectar as garras:", "o": ["Desligar a injeção de corrente (evitar arco)", "Puxar rápido", "Nada"], "c": 0, "e": "cultura"}, {"q": "Critério do ensaio de relação de transformação (TTR):", "o": ["Erro ≤ 0,5%", "Erro ≤ 5%", "Erro ≤ 10%"], "c": 0, "e": "tecnico"}, {"q": "Antes de inserir o medidor na curva I×V:", "o": ["Cortar carga via inversor/SCADA e confirmar 0,0 A", "Medir energizado", "Nada"], "c": 0, "e": "cultura"}, {"q": "Irradiância mínima para validação de garantia na curva I×V:", "o": ["≥ 800 W/m²", "≥ 100 W/m²", "Qualquer"], "c": 0, "e": "tecnico"}, {"q": "Tensão > 25 V detectada na malha antes do teste de aterramento:", "o": ["Suspender (risco de passo/toque)", "Continuar", "Aterrar com a mão"], "c": 0, "e": "cultura"}, {"q": "Para ser Apto MPA:", "o": ["≥80%", "Qualquer nota", "≥50%"], "c": 0, "e": "cultura"}], "avancado": [{"q": "Isolamento BT×Terra medido = 3 MΩ. Conduta:", "o": ["Aceitar normalmente", "Atenção (1MΩ≤R<1GΩ): registrar e investigar", "Rejeitar e descartar"], "c": 1, "e": "tecnico"}, {"q": "Isolamento = 0,5 MΩ. Conduta:", "o": ["Energizar", "Rejeição: não energizar, etiqueta corretiva, OS", "Aceitar"], "c": 1, "e": "tecnico"}, {"q": "Isolamento = 2,5 GΩ. Resultado:", "o": ["Aceitação (R≥1GΩ)", "Rejeição", "Atenção"], "c": 0, "e": "tecnico"}, {"q": "Desvio entre resistências de enrolamento das fases = 7%. Resultado:", "o": ["Aceitação", "Rejeição (≥5%)", "Indiferente"], "c": 1, "e": "tecnico"}, {"q": "Erro de relação de transformação medido = 0,8%. Resultado:", "o": ["Aceitação", "Rejeição (>0,5%)", "Atenção"], "c": 1, "e": "tecnico"}, {"q": "Posição do TAP antes do TTR deve ser:", "o": ["Registrada (foto/diagrama)", "Alterada", "Ignorada"], "c": 0, "e": "tecnico"}, {"q": "Corrente de teste no ensaio de enrolamento deve ser:", "o": ["≤ 10% da nominal", "= 100% da nominal", "Máxima possível"], "c": 0, "e": "tecnico"}, {"q": "Curva I×V com irradiância 600 W/m² para garantia:", "o": ["Validar", "Não validar (abaixo de 800 W/m²)", "Tanto faz"], "c": 1, "e": "tecnico"}, {"q": "Bucha trincada do transformador na inspeção:", "o": ["Ensaiar mesmo assim", "Não ensaiar; etiqueta corretiva; comunicar", "Limpar e seguir"], "c": 1, "e": "cultura"}, {"q": "Ensaio de continuidade/equipotencialização permite:", "o": ["Abrir caixas e desconectar cabos", "Só medir superfícies metálicas (tratar como energizado)", "Energizar"], "c": 1, "e": "cultura"}, {"q": "Método do terrômetro para aterramento:", "o": ["3 polos / queda de potencial (regra dos 62%)", "2 fios na tomada", "Visual"], "c": 0, "e": "tecnico"}, {"q": "Inversor: classe do multímetro para medições:", "o": ["CAT III 1000 V", "CAT I 50 V", "Qualquer"], "c": 0, "e": "tecnico"}]}, "cos_turno": {"titulo": "POP COS — Gestão de Turno", "icone": "🕐", "eixo": "processos", "dur": "12 min", "video": "", "videoTip": "Vídeo do POP.COS.01 em operação", "secoes": [{"t": "Estrutura do turno e preparação do posto", "h": "<p>O turno diurno do COS vai das <b>06h00 às 18h00</b>, e o POP.COS.01.001 exige chegada com <b>10 minutos de antecedência (05h50)</b> para garantir a assunção pontual. Antes de assumir, o operador organiza o posto (computadores, monitores, fones), separa material de anotação para a passagem de turno e faz <b>login com credenciais individuais</b> em todos os sistemas de supervisão.</p><ul><li><b>SCADA SunOp (Automa) / PV Operation / Fusion Solar:</b> verificar comunicação com todas as usinas (online e enviando dados), identificar alarmes ativos e reconhecê-los de forma coerente com a ação que será tomada.</li><li><b>Prescinto (IBM):</b> conferir as ordens de serviço do dia e as pendências de manutenção, acompanhando a programação ao longo do turno.</li><li><b>Comunicação:</b> WhatsApp Web (grupos de usinas e clientes), e-mail e telefonia — validando alarmes reportados contra o que o operador noturno passou.</li></ul><p>Nunca compartilhe senha ou use a sessão de outro operador: a rastreabilidade das ações depende do login individual.</p>"}, {"t": "Passagem de turno: os pontos críticos obrigatórios", "h": "<p>A passagem de turno é feita <b>verbalmente e com registro</b>, cobrindo um roteiro fixo de pontos críticos. Pular qualquer um deles é a principal causa de eventos 'órfãos' — alarmes que ninguém assume.</p><table><tr><th>Ponto</th><th>O que verificar</th></tr><tr><td><b>Situação das usinas</b></td><td>Geração esperada × real, desvios significativos</td></tr><tr><td><b>Alarmes e falhas</b></td><td>Alarmes ativos e falhas pendentes não resolvidas no turno anterior</td></tr><tr><td><b>Manutenções</b></td><td>Programadas ou corretivas em curso; usinas indisponíveis ou com performance reduzida</td></tr><tr><td><b>Ocorrências relevantes</b></td><td>Incidentes do turno anterior, resoluções e ações pendentes</td></tr><tr><td><b>Clima</b></td><td>Eventos recentes (chuva intensa, vento, granizo) e previsão do dia</td></tr><tr><td><b>Comunicações pendentes</b></td><td>Mensagens a repassar a equipes internas ou externas</td></tr></table><p>Por fim, <b>confirmar que o operador anterior registrou tudo</b> em logs e e-mail de encerramento, validando a consistência dos dados. Após o levantamento de pendências, envia-se o <b>status inicial via WhatsApp</b> no modelo padrão (usina a usina: normal / com pendência / offline), estabelecendo transparência com as partes interessadas desde o início do turno.</p>"}, {"t": "Encerramento, comunicação formal e segurança operacional", "h": "<p>A partir das <b>17h00</b> inicia-se a revisão abrangente: reconferir alarmes pendentes no SCADA e no Prescinto, verificar as saídas de usinas e ocorrências do dia e garantir que <b>todas as ações do turno estejam registradas</b>. O encerramento tem três entregas formais:</p><ul><li><b>Status final via WhatsApp:</b> lista atualizada usina a usina (normal / com pendência / offline), resumo das ações do turno e alertas para o próximo período.</li><li><b>E-mail de encerramento (diário de bordo):</b> pendências em aberto detalhadas, usinas em operação normal, ocorrências e ações realizadas, observações gerais — com relatórios
